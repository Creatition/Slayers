  function fitTreeView() {
    const tree = SKILL_TREES[charTreeClass];
    if (!tree || !tree.nodes.length) return;
    const treeOX2 = 30, treeOY2 = 80;
    let mnX=Infinity, mxX=-Infinity, mnY=Infinity, mxY=-Infinity;
    for (const n of tree.nodes) { mnX=Math.min(mnX,n.x); mxX=Math.max(mxX,n.x); mnY=Math.min(mnY,n.y); mxY=Math.max(mxY,n.y); }
    const tw = mxX-mnX||1, th = mxY-mnY||1;
    const vW = W - treeOX2*2, vH = H - treeOY2 - 30;
    treeViewZoom = Math.max(0.12, Math.min(2.0, Math.min(vW/tw, vH/th) * 0.88));
    const cx = (mnX+mxX)/2, cy = (mnY+mxY)/2;
    treeViewX = vW/2 - cx * treeViewZoom;
    treeViewY = (vH/2 + treeOY2) - treeOY2 - cy * treeViewZoom;
  }
  // ── Shared char-tree click handler ───────────────────────────────────────
  // ── ONLINE CO-OP — WebSocket client ─────────────────────────────────────────
  function netStartHost() {
    try {
      netSocket = new WebSocket(netServerUrl);
      netIsHost = true;
      netSocket.onopen  = () => netSocket.send(JSON.stringify({ type: 'host' }));
      netSocket.onmessage = (e) => handleNetMessage(JSON.parse(e.data));
      netSocket.onclose = () => { netSocket = null; netIsHost = false; netRoomCode = ''; netPlayerStates = {}; };
      netSocket.onerror = () => { alert('Server not reachable. Run:\n  cd Slayers && npm install && npm start'); netSocket = null; netIsHost = false; };
    } catch(e) { console.warn('net host failed', e); }
  }
  function netStartJoin(code) {
    try {
      netSocket = new WebSocket(netServerUrl);
      netIsHost = false; netRoomCode = code;
      netSocket.onopen  = () => netSocket.send(JSON.stringify({ type: 'join', roomId: code }));
      netSocket.onmessage = (e) => handleNetMessage(JSON.parse(e.data));
      netSocket.onclose = () => { netSocket = null; netRoomCode = ''; netPlayerStates = {}; };
      netSocket.onerror = () => { alert('Could not connect. Check the room code and server IP.'); netSocket = null; };
    } catch(e) { console.warn('net join failed', e); }
  }
  function handleNetMessage(msg) {
    if (msg.type === 'hosted') {
      netRoomCode = msg.roomId; netPlayerId = msg.playerId;
      Sfx.uiConfirm && Sfx.uiConfirm();
    } else if (msg.type === 'joined') {
      netPlayerId = msg.playerId;
      // Send initial class preference immediately on join
      if (netSocket && netSocket.readyState === 1) {
        const _jcp = ensureCP(selectedClassId);
        netSocket.send(JSON.stringify({
          type: 'netEvent', event: 'charInfo',
          classId: selectedClassId, level: _jcp.level,
        }));
      }
      Sfx.uiConfirm && Sfx.uiConfirm();
    } else if (msg.type === 'playerJoined') {
      // Host: reserve a slot for this new client (extraPlayer created at run start)
      if (netIsHost) {
        const slot = Object.keys(netPlayerIdToSlot).length;
        netPlayerIdToSlot[msg.playerId] = slot;
        netClientInputs[msg.playerId]   = { x: 0, y: 0 };
        // If already in a run, create their extraPlayer immediately
        if (state === STATE.PLAYING) {
          const _ep = new Player(W / 2 + (slot + 1) * 28, H / 2, selectedClassId);
          applyPrimaryStatsToPlayer(_ep); applySkillTreeToPlayer(_ep);
          extraPlayers.push(_ep);
        }
      }
    } else if (msg.type === 'playerState') {
      if (msg.playerId !== netPlayerId) netPlayerStates[msg.playerId] = msg;
    } else if (msg.type === 'netEvent') {
      if (msg.event === 'enemyDied') {
        // Legacy relay-mode kill (kept for fallback)
        const e = enemies.find(en => en._netId === msg.enemyId && en.alive);
        if (e) { e.hp = 0; handleEnemyDeath(e); }
      } else if (msg.event === 'startRun') {
        if (!netIsHost) {
          resetWorld();
          // Send full stats now that player object exists
          if (netSocket && netSocket.readyState === 1) {
            netSocket.send(JSON.stringify({
              type: 'netEvent', event: 'charInfo',
              classId: selectedClassId,
              level:  ensureCP(selectedClassId).level,
              maxHp:  player.maxHp,
              attack: player.attack,
              speed:  player.speed,
              critChance: player.critChance || 0.05,
            }));
          }
        }
      } else if (msg.event === 'clientInput') {
        // Host receives movement input from a client
        if (netIsHost && msg.fromPlayerId) {
          netClientInputs[msg.fromPlayerId] = { x: msg.x || 0, y: msg.y || 0 };
        }
      } else if (msg.event === 'charInfo') {
        // Host receives client character info — store and apply to their extraPlayer slot
        if (netIsHost && msg.fromPlayerId) {
          netClientCharInfo[msg.fromPlayerId] = {
            classId: msg.classId || selectedClassId,
            level:   msg.level   || 1,
            maxHp:   msg.maxHp,
            attack:  msg.attack,
            speed:   msg.speed,
            critChance: msg.critChance,
          };
          // If extraPlayer already exists for this slot (late-join or post-run update), refresh stats
          const _slot = netPlayerIdToSlot[msg.fromPlayerId];
          if (_slot != null) {
            const _ep = extraPlayers[_slot];
            if (_ep) {
              if (msg.maxHp)     { _ep.maxHp = msg.maxHp; _ep.hp = Math.min(_ep.hp, _ep.maxHp); }
              if (msg.attack)     _ep.attack     = msg.attack;
              if (msg.speed)      _ep.speed      = msg.speed;
              if (msg.critChance) _ep.critChance = msg.critChance;
              if (msg.level)      _ep._netLevel  = msg.level;
            }
          }
        }
      } else if (msg.event === 'gameSnapshot') {
        // Client receives authoritative world state from host
        if (!netIsHost) {
          // Sync wave
          if (msg.wave != null) currentWave = msg.wave;
          // Sync game state transitions (intermission, victory, dead)
          if (msg.gameState != null && msg.gameState !== STATE.PLAYING &&
              state === STATE.PLAYING) {
            state = msg.gameState;
          }
          // Sync enemies from snapshot
          const snap = msg.enemies || [];
          const snapMap = {};
          for (const s of snap) snapMap[s.id] = s;
          // Kill enemies no longer in snapshot
          for (const e of enemies) {
            if (!snapMap[e._netId] && e.alive) { e.alive = false; }
          }
          // Update or create enemies from snapshot
          for (const s of snap) {
            // If we killed this enemy locally, wait until host confirms it dead (hp=0)
            if (netKilledIds.has(s.id) && s.hp > 0) continue;
            if (netKilledIds.has(s.id) && s.hp <= 0) { netKilledIds.delete(s.id); continue; }
            let e = enemies.find(en => en._netId === s.id);
            if (!e) {
              try { e = new Enemy(s.x, s.y, s.type || 'skeleton', 1, 1, 1); } catch(_) { continue; }
              e._netId = s.id; e._netGhost = true;
              enemies.push(e);
            }
            e.x = s.x; e.y = s.y;
            e.hp = s.hp; e.maxHp = s.maxHp; e.r = s.r;
            e.isBoss = !!s.isBoss; e.elite = !!s.elite;
            e.alive = s.hp > 0;
            e._netGhost = true;
          }
          enemies = enemies.filter(e => e.alive);
          // Sync other player states
          if (msg.players) {
            for (const [pid, ps] of Object.entries(msg.players)) {
              if (pid !== netPlayerId) netPlayerStates[pid] = ps;
            }
          }
        }
      }
    } else if (msg.type === 'playerLeft') {
      if (netIsHost) {
        const slot = netPlayerIdToSlot[msg.playerId];
        if (slot != null && slot < extraPlayers.length) {
          extraPlayers.splice(slot, 1);
          // Shift slots above this one down
          for (const pid of Object.keys(netPlayerIdToSlot)) {
            if (netPlayerIdToSlot[pid] > slot) netPlayerIdToSlot[pid]--;
          }
        }
        delete netPlayerIdToSlot[msg.playerId];
        delete netClientInputs[msg.playerId];
        delete netClientCharInfo[msg.playerId];
      }
      delete netPlayerStates[msg.playerId];
    }
  }
  // ── HOST: broadcast full game snapshot at 20 Hz ──────────────────────────
  function netHostBroadcast(dt) {
    if (!netIsOnlineHost()) return;
    netHostSnapshotTimer += dt;
    if (netHostSnapshotTimer < 0.05) return;
    netHostSnapshotTimer = 0;
    // Build compact enemy list
    const esnap = enemies.filter(e => e.alive).map(e => ({
      id: e._netId, x: Math.round(e.x), y: Math.round(e.y),
      hp: e.hp, maxHp: e.maxHp, r: e.r,
      type: e.type || 'skeleton', isBoss: !!e.isBoss, elite: !!e.elite,
    }));
    // All active player states
    const psnap = { [netPlayerId]: {
      x: player.x, y: player.y, hp: player.hp, maxHp: player.maxHp,
      facing: player.facing, classId: selectedClassId,
    }};
    const clientPids = Object.keys(netPlayerIdToSlot);
    for (let _i = 0; _i < clientPids.length; _i++) {
      const _pid = clientPids[_i];
      const _ep  = extraPlayers[netPlayerIdToSlot[_pid]];
      const _cinf = netClientCharInfo[_pid] || {};
      if (_ep) psnap[_pid] = { x: _ep.x, y: _ep.y, hp: _ep.hp, maxHp: _ep.maxHp,
        facing: _ep.facing || 1, classId: _cinf.classId || selectedClassId };
    }
    netSocket.send(JSON.stringify({
      type: 'netEvent', event: 'gameSnapshot',
      wave: currentWave, gameState: state,
      enemies: esnap, players: psnap,
    }));
  }

  // ── CLIENT: send own movement input to host at 20 Hz ─────────────────────
  function netSendInput(dt) {
    if (!netIsOnlineClient()) return;
    netClientInputTimer += dt;
    if (netClientInputTimer < 0.05) return;
    netClientInputTimer = 0;
    netSocket.send(JSON.stringify({
      type: 'netEvent', event: 'clientInput',
      x: Actions.moveX, y: Actions.moveY,
    }));
    // Also broadcast own player state so host can render us
    netSocket.send(JSON.stringify({
      type: 'playerState', playerId: netPlayerId,
      x: player.x, y: player.y, hp: player.hp, maxHp: player.maxHp,
      classId: selectedClassId, dead: player.hp <= 0, facing: player.facing,
    }));

  function netBroadcastEnemyDeath(enemyId) {
    if (!netSocket || netSocket.readyState !== 1) return;
    netSocket.send(JSON.stringify({ type: 'netEvent', event: 'enemyDied', enemyId }));
  }

  function resetClassProgress(cid) {
    // Refund all skill tree nodes for this class
    const spentNodes = spentSkillNodes[cid] || {};
    const treeRefund = Object.values(spentNodes).filter(Boolean).length;
    spentSkillNodes[cid] = {};
    const _rcp = ensureCP(cid);
    _rcp.treePts += treeRefund;
    if (cid === selectedClassId) treePoints = _rcp.treePts;
    // Refund all ability points spent (rank = AP invested; slot 0 = signature, refund ranks > 1 only)
    let ablRefund = 0;
    if (player && cid === player.class.id) {
      for (let _si = 0; _si < player.abilities.length; _si++) {
        const abl = player.abilities[_si];
        if (!abl) continue;
        if (_si === 0) {
          // Signature: refund extra ranks only (rank 1 is free)
          if ((abl.rank || 1) > 1) { ablRefund += (abl.rank || 1) - 1; abl.rank = 1; }
        } else {
          // Unlocked via AP: refund ALL points (rank = AP spent), then remove from slot
          ablRefund += (abl.rank || 1);
          player.abilities[_si] = null;
        }
      }
      player.skillPoints = (player.skillPoints || 0) + ablRefund;
    }
    // Re-apply skill tree to player since nodes were cleared
    if (player && cid === player.class.id) {
      applySkillTreeToPlayer(player);
      player.recomputeStats();
    }
    saveData();
    const totalRefund = treeRefund + ablRefund;
    if (player && cid === player.class.id) {
      spawnDamageNumber(player.x, player.y - 32, `↺ Reset — ${totalRefund} pts returned`, { color: '#ff9966', size: 11, vy: -55, life: 2.2 });
    }
    Sfx.uiConfirm && Sfx.uiConfirm();
  }

  function handleCharTreeClicks(backFn) {
    if (!mouseClicked) return;
    if (isHovering(8, H - 26, 80, 20)) { backFn(); return; }
    // RESET ALL button
    if (isHovering(W - 108, H - 26, 100, 20)) {
      const _hasNodes = Object.values(spentSkillNodes[charTreeClass] || {}).some(Boolean);
      const _hasRanks = player && charTreeClass === player.class.id &&
        player.abilities.some((a, si) => a && (si > 0 || (a.rank || 1) > 1));
      if (_hasNodes || _hasRanks) { resetClassProgress(charTreeClass); return; }
    }
    if (isHovering(W/2 - 82, 46, 78, 14)) { charTreeTab = 'tree'; fitTreeView(); }
    if (isHovering(W/2 + 4,  46, 78, 14)) charTreeTab = 'abilities';
    const allClasses = ['ranger','sorcerer','berserker','assassin','templar','crusader','shaman','necromancer','druid','amazonian'];
    const cTabW = Math.floor((W - 16) / allClasses.length);
    // Only allow class tab switching when not in an active run
    if (state !== STATE.INVENTORY) {
      for (let i = 0; i < allClasses.length; i++) {
        if (isHovering(8 + i * cTabW, 63, cTabW - 2, 14)) { charTreeClass = allClasses[i]; break; }
      }
    }
    if (charTreeTab === 'abilities') {
      // Sort matches draw order (by tier ascending)
      const viewAbl = classAbilities(charTreeClass).slice().sort((a, b) => (a.tier || 1) - (b.tier || 1));
      const cardW2 = 116, cardH2 = 116, gap2 = 8, ablPerRow = 3;
      const totalAblW = ablPerRow * cardW2 + (ablPerRow - 1) * gap2;
      const ablX0 = Math.floor((W - totalAblW) / 2);
      const ablY0 = (state === STATE.INVENTORY) ? 78 : 92;
      const _charLvl2 = ensureCP(charTreeClass).level;
      for (let ai = 0; ai < viewAbl.length; ai++) {
        const adef = viewAbl[ai];
        const col = ai % ablPerRow, row = Math.floor(ai / ablPerRow);
        const ax = ablX0 + col * (cardW2 + gap2), ay = ablY0 + row * (cardH2 + gap2) - charAbilScroll;
        if (ay + cardH2 < ablY0 || ay > H) continue;
        const ablTier = adef.tier || 1;
        const reqLv2 = ablTier <= 1 ? 0 : ablTier === 2 ? 5 : ablTier === 3 ? 10 : 15;
        const tierGateMet2 = _charLvl2 >= reqLv2;
        if (!tierGateMet2) continue; // can't interact with level-locked abilities
        const owned2 = player ? player.abilities.find(s => s && s.id === adef.id) : null;
        const curRank = owned2 ? (owned2.rank || 1) : 0;
        const maxRank = adef.maxRank || 10;
        const btnY2 = ay + cardH2 - 16;
        // [+1] rank up (right button, only for owned)
        if (owned2 && isHovering(ax + cardW2 - 22, btnY2, 18, 12)) {
          if (curRank < maxRank && player && (player.skillPoints || 0) >= 1 && charTreeClass === player.class.id) {
            player.skillPoints--;
            owned2.rank = curRank + 1;
            const lbl = owned2.rank >= 10 ? '★CAPSTONE!' : owned2.rank >= 5 ? '★Notable!' : `${owned2.rank}/10`;
            spawnDamageNumber(player.x, player.y - 28, `${adef.name} ${lbl}`, { color: adef.color, size: 11, vy: -55, life: 2.0 });
            Sfx.uiConfirm && Sfx.uiConfirm();
          }
          break;
        }
        // [-1] refund (left button, only for owned rank > 1)
        if (owned2 && curRank > 1 && isHovering(ax + 4, btnY2, 18, 12)) {
          if (player && charTreeClass === player.class.id) {
            owned2.rank--;
            player.skillPoints = (player.skillPoints || 0) + 1;
            spawnDamageNumber(player.x, player.y - 28, `${adef.name} refunded`, { color: '#ff8866', size: 10, vy: -50, life: 1.8 });
            Sfx.uiClick && Sfx.uiClick();
          }
          break;
        }
        // [UNLOCK] button (full-width bottom, only for unowned)
        if (!owned2 && isHovering(ax + 4, btnY2, cardW2 - 8, 12)) {
          const freeSlot = player ? player.abilities.indexOf(null, 1) : -1;
          if (player && (player.skillPoints || 0) >= 1 && freeSlot >= 0 && charTreeClass === player.class.id) {
            player.skillPoints--;
            player.abilities[freeSlot] = { id: adef.id, def: adef, rarity: RARITY.WHITE, rank: 1 };
            spawnDamageNumber(player.x, player.y - 28, `${adef.name} UNLOCKED!`, { color: adef.color || '#ffdd44', size: 12, vy: -60, life: 2.2 });
            Sfx.uiConfirm && Sfx.uiConfirm();
          }
          break;
        }
      }
    } else {
      const tree = SKILL_TREES[charTreeClass];
      if (tree) {
        const treeOX = 30, treeOY = 80;
        const NODE_R = { minor:5, notable:8, ability:10, keystone:13 };
        for (const node of tree.nodes) {
              const nx = 30 + node.x * treeViewZoom + treeViewX;
          const ny2 = 80 + node.y * treeViewZoom + treeViewY;
          const r = ((NODE_R[node.type] || 7) + 4) * treeViewZoom;
          const dx = mouseX - nx, dy = mouseY - ny2;
          if (dx*dx + dy*dy <= r*r) { spendSkillNode(charTreeClass, node); Sfx.uiConfirm && Sfx.uiConfirm(); break; }
        }
      }
    }
  }

    else if (i === 2) {
      // Award run XP before quitting so progress is never lost
      if (!runXpAwarded) { awardRunXp(runWavesCompleted, runBossesKilled, false); runXpAwarded = true; }
      else saveData(); // ensure any mid-run pickLevelUp saves are flushed
      state = STATE.CLASS_SELECT;
    }

    Sfx.uiClick && Sfx.uiClick();
    if (i === 0) { Sfx.toggleMute(); }
    else if (i === 1) { gameSettings.screenShake = !gameSettings.screenShake; }
    else if (i === 2) { pauseInSettings = false; pauseMenuSel = 1; }

      const cat = PARAGON_BOARD[CATS[i]];
      const tx = tabStartX + i * tabW, ty = 58;
      const active = CATS[i] === paragonTreeCat;
      ctx.fillStyle = active ? cat.color : '#222'; ctx.fillRect(tx, ty, tabW - 2, tabH);
      ctx.strokeStyle = cat.color; ctx.lineWidth = active ? 2 : 1; ctx.strokeRect(tx, ty, tabW - 2, tabH);
      ctx.fillStyle = active ? '#000' : cat.color; ctx.font = `bold 7px monospace`; ctx.textAlign = 'center';
      ctx.fillText(cat.label, tx + (tabW - 2) / 2, ty + 9);
    }
    // Node grid — 5 rows, 2 per row, laid out in the board area
    const cat = PARAGON_BOARD[paragonTreeCat];

    const rowH = 42, startY = 82;

    const rows = {};

  // ============================================================
  // MAIN LOOP
  // ============================================================
  loadSave();
  resetWorld();
  state = STATE.CLASS_SELECT; // start at class picker
  let lastTime = performance.now();

  function loop(now) {
    const dt = Math.min((now - lastTime) / 1000, 1 / 30);
    lastTime = now;
    updateInput();

    // Global audio mute toggle (M key) — works in any state.
    if (keyJustPressed.has('m')) Sfx.toggleMute();

    // Pause toggle: ESC or gamepad Start (9) while playing/paused
    if ((keyJustPressed.has('escape') || gpJustPressed.has(9)) && state === STATE.PLAYING) {
      state = STATE.PAUSED; pauseMenuSel = 0; pauseInSettings = false;
    } else if ((keyJustPressed.has('escape') || gpJustPressed.has(9)) && state === STATE.PAUSED && !pauseInSettings) {
      state = STATE.PLAYING;
    } else if ((keyJustPressed.has('tab') || keyJustPressed.has('i') || gpJustPressed.has(8)) &&
        (state === STATE.PLAYING || state === STATE.INVENTORY)) {
      toggleInventory();
    } else if (keyJustPressed.has('escape') && state === STATE.INVENTORY) {
      toggleInventory();
    }

    if (state === STATE.PLAYING) {
      if (keyJustPressed.has('1') || gpJustPressed.has(0)) castAbility(0);
      if (keyJustPressed.has('2') || gpJustPressed.has(1)) castAbility(1);
      if (keyJustPressed.has('3') || gpJustPressed.has(2)) castAbility(2);
      if (keyJustPressed.has('4') || gpJustPressed.has(3)) castAbility(3);
      if (keyJustPressed.has('5') || gpJustPressed.has(4)) castAbility(4); // LB
      if (keyJustPressed.has('6') || gpJustPressed.has(5)) castAbility(5); // RB

      // Hit-pause: freeze world for a few frames after a crit/big hit.
      // Damage numbers continue animating so the popup is visible during the freeze.
      const frozen = hitPauseTimer > 0;
      if (frozen) hitPauseTimer -= dt;
      const wdt = frozen ? 0 : dt;

      const cfg = waveConfig(currentWave);
      // ── Enemy simulation — host-authoritative: skip on online clients ──────
      if (!netIsOnlineClient()) {
        waveTimer -= wdt;
        if (!isBossWave(currentWave) && waveTimer > 0) {
          spawnTimer += wdt;
          while (spawnTimer >= cfg.spawnInterval) {
            spawnTimer -= cfg.spawnInterval;
            spawnEnemy(cfg);
          }
        }
      }
      player.update(wdt);
      updateClassMechanics(wdt);
      // Online host: broadcast game snapshot; client: send input
      netHostBroadcast(dt);
      netSendInput(dt);
      // ── Extra players (local co-op + online host slots) ────────────────────
      for (let _ei = 0; _ei < extraPlayers.length; _ei++) {
        const _ep = extraPlayers[_ei];
        if (_ep.hp <= 0) continue;
        const _mv = getExtraPlayerMove(_ei);
        // Context-swap: temporarily make _ep the active player
        const _savedPlayer = player;

          }
          // Salvage buttons row
          const refX = SHOP_START_X + 4 * (SHOP_ITEM_W + SHOP_GAP);
          const salvX = refX + 95, salvY = SHOP_Y;
          if (isHovering(salvX, salvY, 90, SHOP_ITEM_H))      { bulkSalvage(0); Sfx.uiClick(); }
          else if (isHovering(salvX+94, salvY, 90, SHOP_ITEM_H)) { bulkSalvage(1); Sfx.uiClick(); }
          else if (isHovering(salvX+188, salvY, 90, SHOP_ITEM_H)) { bulkSalvage(2); Sfx.uiClick(); }
          // Refresh button
          else if (isHovering(refX, SHOP_Y, 90, SHOP_ITEM_H)) { doRefreshShop(); }
          // READY button
          else if (isHovering(W - 130, H - 30, 120, 24)) {
            selectedInvIdx = -1; startNextWave();
          }
          else { selectedInvIdx = -1; }
        }
      }
      // RIGHT-CLICK: shop item → lock/unlock | inv item → instant equip
      if (rightClicked) {
        if (shopIdx >= 0) {
          shopLocked[shopIdx] = !shopLocked[shopIdx];
          Sfx.uiClick();
        } else if (invIdxShop >= 0 && player.inventory[invIdxShop]) {
          equipFromInventory(invIdxShop);
        } else if (eqSlotShop) {
          unequipSlot(eqSlotShop); Sfx.uiClick();
        }
      }
    }

    // HUB state input
    if (state === STATE.HUB) {
      updateVirtualCursor(dt);
      if (gpJustPressed.has(0)) mouseClicked = true;
      if (keyJustPressed.has('h') || keyJustPressed.has('escape') || gpJustPressed.has(1)) {
        if (hubSubMenu) { hubSubMenu = null; hubSelectedItem = null; hubGemPick = null; }
        else state = STATE.CLASS_SELECT;
      }
      if (mouseClicked) {
        // Back button (8,8,70,16) — always visible
        if (isHovering(8, 8, 70, 16)) {
          if (hubSubMenu) { hubSubMenu = null; hubSelectedItem = null; hubGemPick = null; }
          else state = STATE.CLASS_SELECT;
        } else if (!hubSubMenu) {
          // NPC panel clicks
          const panels = drawHubScreen._panels || [];
          for (const p of panels) {
            if (mouseX >= p._hx && mouseX <= p._hx + p._hw && mouseY >= p._hy && mouseY <= p._hy + p._hh) {
              hubSubMenu = p.id; hubSelectedItem = null; hubGemPick = null; break;
            }
          }
        } else if (hubSubMenu === 'blacksmith') {
          // Select item
          for (const k of Object.keys(player.equipped)) {
            const it = player.equipped[k];
            if (!it) continue;
            if (it._bsHx !== undefined && mouseX >= it._bsHx && mouseX < it._bsHx + it._bsHw && mouseY >= it._bsHy && mouseY < it._bsHy + it._bsHh) {
              hubSelectedItem = { source: 'eq', key: k }; break;
            }
          }
          if (!hubSelectedItem) {
            const invItems = player.inventory.filter(Boolean);
            for (const it of invItems) {
              if (it._bsHx !== undefined && mouseX >= it._bsHx && mouseX < it._bsHx + it._bsHw && mouseY >= it._bsHy && mouseY < it._bsHy + it._bsHh) {
                hubSelectedItem = { source: 'inv', it }; break;
              }
            }
          }
          // Add socket button (232,98,140,18)
          if (hubSelectedItem && isHovering(232, 98, 140, 18)) {
            const it = hubSelectedItem.source === 'eq' ? player.equipped[hubSelectedItem.key] : hubSelectedItem.it;
            if (it && player.gold >= 50) {
              const socks = (it.sockets || []);
              const maxS = it.base.maxSockets || 0;
              if (socks.length < maxS) {
                if (!it.sockets) it.sockets = [];
                it.sockets.push(null); // empty socket
                player.gold -= 50;
                saveData();
                spawnDamageNumber(W/2, H/2, 'SOCKET ADDED', { color: '#ff8844', size: 12, vy: -50, life: 1.5 });
              }
            }
          }
          // Forge click handler
          if (ctx._forgeRecipes) {
            const fgX = 225, fgW = 205, frBtnH = 24, frBtnGap = 5;
            for (let ri = 0; ri < ctx._forgeRecipes.length; ri++) {
              const rec = ctx._forgeRecipes[ri];
              if (rec._fCanForge && rec._fy !== undefined && isHovering(fgX + 6, rec._fy, fgW - 12, frBtnH)) {
                // Consume materials and forge item
                player.mats[rec.matId] -= rec.cost;
                const forged = generateItemForClass(player.class.id, waveItemLevel(currentWave, charLevel));
                // If result is below the minimum rarity, upgrade it
                const _order = { white: 0, blue: 1, yellow: 2, orange: 3, green: 4 };
                let _item = forged;
                if (_order[_item.rarity.id] < _order[rec.minRarity]) {
                  _item = generateItemMinRarity(rec.minRarity, waveItemLevel(currentWave, charLevel));
                }
                if (player.inventory.length < player.INVENTORY_CAP) {
                  player.inventory.push(_item);
                  spawnDamageNumber(W/2, H/2 - 20, `⚒ FORGED ${rec.label}!`, { color: rec.color || '#ff8844', size: 13, vy: -55, life: 2.0 });
                } else {
                  // Inventory full — drop at player feet
                  if (typeof ItemDrop !== 'undefined') itemDrops.push(new ItemDrop(player.x, player.y, _item));
                  spawnDamageNumber(W/2, H/2 - 20, '⚒ FORGED (inv full!)', { color: '#ff4444', size: 11, vy: -50, life: 1.8 });
                }
                Sfx.uiConfirm && Sfx.uiConfirm();
                saveData();
                break;
              }
            }
          }
        } else if (hubSubMenu === 'jeweler') {
          // Gem selection
          const gems = player.gems || [];
          for (let i = 0; i < gems.length; i++) {
            const gem = gems[i];
            if (gem._jHx !== undefined && mouseX >= gem._jHx && mouseX < gem._jHx + gem._jHw && mouseY >= gem._jHy && mouseY < gem._jHy + gem._jHh) {
              hubGemPick = (hubGemPick && hubGemPick._idx === i) ? null : { ...gem, _idx: i };
              break;
            }
          }
          // Combine button (438,102,130,16)
          if (hubGemPick && isHovering(438, 102, 130, 16)) {
            const sameIdxs = gems.map((g,i) => (g.typeId === hubGemPick.typeId && g.quality === hubGemPick.quality) ? i : -1).filter(i => i >= 0);
            if (sameIdxs.length >= 3 && hubGemPick.quality < 4) {
              // Remove 3 gems
              const toRemove = sameIdxs.slice(0, 3).sort((a,b) => b-a);
              for (const idx of toRemove) gems.splice(idx, 1);
              // Add 1 higher quality
              gems.push({ typeId: hubGemPick.typeId, quality: hubGemPick.quality + 1 });
              hubGemPick = null;
              saveData();
              spawnDamageNumber(W/2, H/2, 'GEM UPGRADED!', { color: '#44ccff', size: 13, vy: -55, life: 1.8 });
            }
          }
          // Socket gem into item slot
          for (const k of Object.keys(player.equipped)) {
            const it = player.equipped[k];
            if (!it || !it._jSock) continue;
            for (const sock of it._jSock) {
              if (!sock) continue;
              if (mouseX >= sock.x && mouseX < sock.x + sock.w && mouseY >= sock.y && mouseY < sock.y + sock.h) {
                if (hubGemPick) {
                  // Insert gem
                  if (!it.sockets) it.sockets = [];
                  while (it.sockets.length <= sock.si) it.sockets.push(null);
                  it.sockets[sock.si] = { typeId: hubGemPick.typeId, quality: hubGemPick.quality };
                  gems.splice(hubGemPick._idx, 1);
                  hubGemPick = null;
                  player.recomputeStats();
                  saveData();
                }
              }
            }
          }
        }
      }
      // H key from dead/victory → hub
    }
    // H key from dead/victory state — visit hub
    if ((state === STATE.DEAD || state === STATE.VICTORY) && keyJustPressed.has('h')) {
      if (!runXpAwarded) { awardRunXp(runWavesCompleted, runBossesKilled, state === STATE.VICTORY); runXpAwarded = true; }
      hubSubMenu = null; hubSelectedItem = null; hubGemPick = null;
      state = STATE.HUB;
    }

    for (const p of particles) p.update(dt);
    particles = particles.filter(p => !p.dead);
    updateDamageNumbers(dt);
    if (levelUpFlashTimer > 0) levelUpFlashTimer -= dt;
    if (lootFlashTimer > 0) lootFlashTimer -= dt;
    if (bossBannerTimer > 0) bossBannerTimer -= dt;
    if (bossDefeatedBannerTimer > 0) bossDefeatedBannerTimer -= dt;
    if (playerDeathFlashTimer > 0) playerDeathFlashTimer -= dt;
    if (goldFlashTimer > 0) goldFlashTimer -= dt;
    if (biomeBannerTimer > 0) biomeBannerTimer -= dt;
    shake *= 0.85; if (shake < 0.05) shake = 0;

    ctx.save();
    if (shake > 0 && gameSettings.screenShake && state !== STATE.INVENTORY && state !== STATE.SHOP) {
      const sx = (Math.random() - 0.5) * shake * 2;
      const sy = (Math.random() - 0.5) * shake * 2;
      ctx.translate(sx, sy);
    }
    drawBackground();
    drawGroundEffects(ctx);
    for (const d of itemDrops) d.draw(ctx);
    // Ability cast rings
    for (let i = abilityFlashes.length - 1; i >= 0; i--) {
      const f = abilityFlashes[i];
      f.r += (f.maxR - f.r) * 0.28;
      f.life -= 1/60;
      if (f.life <= 0) { abilityFlashes.splice(i, 1); continue; }
      const alpha = f.life / f.maxLife;
      const progress = 1 - alpha;
      ctx.save();
      // Outer expanding ring
      ctx.globalAlpha = alpha * 0.85;
      ctx.strokeStyle = f.color;
      ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2); ctx.stroke();
      // Second (lagging) ripple ring
      ctx.globalAlpha = alpha * 0.45;
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(f.x, f.y, f.r * 0.6, 0, Math.PI * 2); ctx.stroke();
      // Inner fill glow
      ctx.globalAlpha = alpha * (1 - progress) * 0.2;
      ctx.fillStyle = f.color;
      ctx.beginPath(); ctx.arc(f.x, f.y, f.r * 0.5, 0, Math.PI * 2); ctx.fill();
      // Bright center spark on fresh cast
      if (progress < 0.3) {
        ctx.globalAlpha = (1 - progress / 0.3) * 0.6;
        ctx.fillStyle = '#ffffff';
        ctx.beginPath(); ctx.arc(f.x, f.y, 4, 0, Math.PI * 2); ctx.fill();
      }
      ctx.restore();
    }
    for (const g of xpGems) g.draw(ctx);
    for (const p of particles) p.draw(ctx);
    for (const e of enemies) e.draw(ctx);
    for (const e of enemies) if (e.alive && e.elite) drawEliteBeacon(ctx, e);
    for (const sw of meleeSwings) sw.draw(ctx);
    for (const p of projectiles) p.draw(ctx);
    for (const ep of enemyProjectiles) ep.draw(ctx);
    if (state !== STATE.DEAD) player.draw(ctx);
    // Draw extra local players
    for (const _ep of extraPlayers) {
      if (_ep.hp > 0) _ep.draw(ctx);
      else {
        // Dead local player: grey ghost outline
        ctx.save(); ctx.globalAlpha = 0.3;
        ctx.strokeStyle = '#aaa'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(Math.floor(_ep.x), Math.floor(_ep.y), _ep.r, 0, Math.PI*2); ctx.stroke();
        ctx.restore();
      }
    }
    // Draw online remote players
    for (const [_pid, _rp] of Object.entries(netPlayerStates)) {
      if (_pid === netPlayerId) continue; // skip self
      const _rcl = getClassById(_rp.classId || 'ranger');
      const _rpx = Math.floor(_rp.x || 0), _rpy = Math.floor(_rp.y || 0);
      ctx.save();
      ctx.globalAlpha = _rp.dead ? 0.3 : 1.0;
      // Draw actual player sprite scaled ×2 (same as local player)
      const _rpSprite = (typeof PLAYER_SPRITES !== 'undefined') ? PLAYER_SPRITES[_rp.classId || 'ranger'] : null;
      if (_rpSprite) {
        drawSprite(ctx, _rpSprite, _rpx, _rpy, _rp.facing === -1, false, 2);
      } else {
        ctx.fillStyle = _rcl.color;
        ctx.beginPath(); ctx.arc(_rpx, _rpy, 8, 0, Math.PI*2); ctx.fill();
      }
      // HP bar
      const _rhpPct = Math.max(0, (_rp.hp||0) / (_rp.maxHp||100));
      ctx.globalAlpha = _rp.dead ? 0.3 : 0.9;
      ctx.fillStyle = '#200'; ctx.fillRect(_rpx - 14, _rpy - 20, 28, 3);
      ctx.fillStyle = _rhpPct > 0.5 ? '#4f4' : _rhpPct > 0.25 ? '#fa4' : '#f44';
      ctx.fillRect(_rpx - 14, _rpy - 20, Math.floor(28 * _rhpPct), 3);
      // Name tag
      ctx.globalAlpha = _rp.dead ? 0.3 : 0.85;
      ctx.fillStyle = _rcl.color; ctx.font = 'bold 5px monospace'; ctx.textAlign = 'center';
      ctx.fillText(_pid.slice(0,8).toUpperCase(), _rpx, _rpy - 23);
      ctx.restore();
    }
    drawDamageNumbers(ctx);
    // ── Screen-edge glow overlays ──────────────────────────────────────────
    // Level-up: golden radial pulse from edges
    if (levelUpFlashTimer > 0) {
      const _lfa = Math.min(1, levelUpFlashTimer / 1.5) * 0.45;
      const _lfg = ctx.createRadialGradient(W/2, H/2, H*0.25, W/2, H/2, H*0.85);
      _lfg.addColorStop(0, 'rgba(0,0,0,0)');
      _lfg.addColorStop(1, `rgba(255,208,64,${_lfa})`);
      ctx.fillStyle = _lfg; ctx.fillRect(0, 0, W, H);
    }
    // Player death: red flash
    if (playerDeathFlashTimer > 0) {
      const _pdfa = Math.min(1, playerDeathFlashTimer / 0.6) * 0.55;
      ctx.fillStyle = `rgba(180,20,20,${_pdfa})`; ctx.fillRect(0, 0, W, H);
    }
    // Boss spawn: red vignette pulse
    if (bossBannerTimer > 0) {
      const _bfa = Math.min(1, bossBannerTimer / 2.5) * 0.5;
      const _bfg = ctx.createRadialGradient(W/2, H/2, H*0.2, W/2, H/2, H*0.9);
      _bfg.addColorStop(0, 'rgba(0,0,0,0)');
      _bfg.addColorStop(1, `rgba(200,30,30,${_bfa})`);
      ctx.fillStyle = _bfg; ctx.fillRect(0, 0, W, H);
    }
    ctx.restore();

    drawHud();
    if (state === STATEE.PLAYING) drawAbilityBar();
    else if (state === STATE.PAUSED) drawPauseScreen();
    if (state === STATE.LEVELUP) drawLevelUpScreen();
    else if (state === STATE.ABILITYDRAFT) drawAbilityDraftScreen();
    else if (state === STATE.TIERDRAFT) drawTierDraftScreen();
    else if (state === STATE.DEAD) drawDeathScreen();
    else if (state === STATE.VICTORY) drawVictoryScreen();
    else if (state === STATE.INVENTORY) drawInventoryScreen();
    else if (state === STATE.SHOP) drawShopScreen();
    else if (state === STATE.CLASS_SELECT) drawClassSelectScreen();
    else if (state === STATE.CHAR_MENU) drawCharMenuScreen();
    else if (state === STATE.STASH_BANKING) drawStashBankingScreen();
    else if (state === STATE.TRIAL_LOADOUT) drawTrialLoadoutScreen();
    else if (state === STATE.ACT_TRANSITION) drawActTransitionScreen();
    else if (state === STATE.CHAR_SCREEN) drawCharScreen();
    else if (state === STATE.TRIALS_SELECT) drawParagonScreen();
    else if (state === STATE.HUB) drawHubScreen();

    // Virtual cursor on top of all UI
    if (state === STATE.INVENTORY || state === STATE.SHOP || state === STATE.LEVELUP ||
        state === STATE.ABILITYDRAFT || state === STATE.TIERDRAFT || state === STATE.CLASS_SELECT ||
        state === STATE.STASH_BANKING || state === STATE.TRIAL_LOADOUT ||
        state === STATE.CHAR_SCREEN || state === STATE.HUB || state === STATE.PAUSED ||
        state === STATE.CHAR_MENU) {
      drawVirtualCursor();
    }

    finalizeFrame();
  }

  function finalizeFrame() {
    keyJustPressed.clear();
    mouseClicked = false;
    rightClicked = false;
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
</script>
</body>
</html>
