  // ============================================================
  // RENDER — Background
  // ============================================================
  function drawBackground() {
    const biome = currentBiome();
    const t = performance.now() * 0.001; // seconds, for animation
    ctx.fillStyle = biome.bg; ctx.fillRect(0, 0, W, H);

    if (biome.id === 'crypt') {
      // === CRYPT: painted background image ===
      const bgImg = BG_IMAGES.crypt;
      if (bgImg && bgImg.complete && bgImg.naturalWidth > 0) {
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(bgImg, 0, 0, W, H);
      } else {
        // Fallback: solid fill while image loads
        ctx.fillStyle = '#15181a'; ctx.fillRect(0, 0, W, H);
      }
      // Torch glow at 4 corners (animated flicker)
      const torchPositions = [[20, 20], [W-20, 20], [20, H-20], [W-20, H-20]];
      for (const [tx, ty] of torchPositions) {
        const flicker = 0.7 + 0.3 * Math.sin(t * 4.1 + tx * 0.3);
        const grad = ctx.createRadialGradient(tx, ty, 0, tx, ty, 36 * flicker);
        grad.addColorStop(0, `rgba(255,140,30,${0.22 * flicker})`);
        grad.addColorStop(0.5, `rgba(200,80,10,${0.10 * flicker})`);
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(tx, ty, 36 * flicker, 0, Math.PI*2); ctx.fill();
        // Torch stem (tiny pixel)
        ctx.fillStyle = '#cc6622'; ctx.fillRect(tx - 1, ty, 2, 4);
        ctx.fillStyle = '#ffcc44'; ctx.fillRect(tx - 1, ty - 3, 2, 3);
        ctx.fillStyle = '#ffffff'; ctx.fillRect(tx, ty - 4, 1, 1);
      }
      // Floor deco: bone/skull fragments
      for (const d of floorDecorations) {
        ctx.fillStyle = d.color;
        ctx.fillRect(Math.floor(d.x), Math.floor(d.y), d.size, d.size);
        if (d.size > 1) { // skull hint
          ctx.fillStyle = '#2a2e28';
          ctx.fillRect(Math.floor(d.x) + 1, Math.floor(d.y) + 1, 1, 1);
        }
      }
      // Edge vignette
      const vg = ctx.createRadialGradient(W/2,H/2,80, W/2,H/2,Math.max(W,H)*0.65);
      vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, 'rgba(0,0,0,0.45)');
      ctx.fillStyle = vg; ctx.fillRect(0,0,W,H);

    } else if (biome.id === 'frostspire') {
      // === FROSTSPIRE: painted background image ===
      const bgImg = BG_IMAGES.frostspire;
      if (bgImg && bgImg.complete && bgImg.naturalWidth > 0) {
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(bgImg, 0, 0, W, H);
      } else {
        ctx.fillStyle = '#1a2030'; ctx.fillRect(0, 0, W, H);
      }
      // Snowflakes (drifting particles over the image)
      for (const d of floorDecorations) {
        const drift = Math.sin(t * 0.8 + d.x * 0.05) * 2;
        ctx.fillStyle = d.color;
        ctx.fillRect(Math.floor(d.x + drift), Math.floor(d.y), 1, 1);
      }
      // Blue edge glow
      const fg = ctx.createRadialGradient(W/2,H/2,60, W/2,H/2,Math.max(W,H)*0.65);
      fg.addColorStop(0, 'rgba(0,0,0,0)'); fg.addColorStop(1, 'rgba(10,30,80,0.5)');
      ctx.fillStyle = fg; ctx.fillRect(0,0,W,H);

    } else if (biome.id === 'inferno') {
      // === INFERNO: cracked lava floor ===
      const lsz = 20;
      for (let gy = 0; gy < H; gy += lsz) {
        for (let gx = 0; gx < W; gx += lsz) {
          ctx.fillStyle = '#1a0d08';
          ctx.fillRect(gx, gy, lsz - 1, lsz - 1);
          // Lava crack seam (every few tiles)
          const idx = Math.floor(gx/lsz) + Math.floor(gy/lsz) * 33;
          if (idx % 5 === 0) {
            const lavaGlow = 0.5 + 0.5 * Math.sin(t * 2.5 + idx * 0.7);
            ctx.fillStyle = `rgba(255,${60 + Math.floor(lavaGlow*40)},0,${0.5 + lavaGlow * 0.3})`;
            ctx.fillRect(gx + lsz - 1, gy + 2, 2, lsz - 4);
          }
          if (idx % 7 === 0) {
            const lavaGlow = 0.4 + 0.6 * Math.sin(t * 1.8 + idx * 1.1);
            ctx.fillStyle = `rgba(255,${40 + Math.floor(lavaGlow*50)},0,${0.4 + lavaGlow * 0.3})`;
            ctx.fillRect(gx + 2, gy + lsz - 1, lsz - 4, 2);
          }
        }
      }
      // Corner fire glow
      const fireCorners = [[0,0],[W,0],[0,H],[W,H]];
      for (const [fx, fy] of fireCorners) {
        const flicker = 0.75 + 0.25 * Math.sin(t * 3.7 + fx * 0.01);
        const grad = ctx.createRadialGradient(fx, fy, 0, fx, fy, 60 * flicker);
        grad.addColorStop(0, `rgba(255,80,0,${0.30 * flicker})`);
        grad.addColorStop(0.6, `rgba(200,30,0,${0.12 * flicker})`);
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(fx, fy, 60 * flicker, 0, Math.PI*2); ctx.fill();
      }
      // Embers / floor deco
      for (const d of floorDecorations) {
        const rise = ((t * 18 + d.x * 0.7) % d.y) - 4;
        ctx.fillStyle = d.color;
        ctx.fillRect(Math.floor(d.x), Math.floor(Math.max(2, d.y - (rise > 0 ? rise * 0.3 : 0))), 1, 1);
      }
      // Dark vignette
      const ig = ctx.createRadialGradient(W/2,H/2,70, W/2,H/2,Math.max(W,H)*0.65);
      ig.addColorStop(0, 'rgba(0,0,0,0)'); ig.addColorStop(1, 'rgba(40,0,0,0.55)');
      ctx.fillStyle = ig; ctx.fillRect(0,0,W,H);

    } else {
      // === VOID: starfield + floating platforms ===
      // Starfield
      for (const d of floorDecorations) {
        const twinkle = 0.4 + 0.6 * Math.abs(Math.sin(t * 1.5 + d.x * 0.09 + d.y * 0.07));
        ctx.globalAlpha = twinkle;
        ctx.fillStyle = d.color;
        ctx.fillRect(Math.floor(d.x), Math.floor(d.y), d.size, d.size);
      }
      ctx.globalAlpha = 1;
      // Dark platform tiles with glowing edges
      const psz = 32;
      for (let gy = 0; gy < H; gy += psz) {
        for (let gx = 0; gx < W; gx += psz) {
          if ((Math.floor(gx/psz) + Math.floor(gy/psz)) % 3 !== 0) {
            ctx.fillStyle = 'rgba(60,20,100,0.18)';
            ctx.fillRect(gx + 1, gy + 1, psz - 2, psz - 2);
            // Glowing edge
            const eg = 0.3 + 0.2 * Math.sin(t * 0.9 + gx * 0.04 + gy * 0.03);
            ctx.strokeStyle = `rgba(160,80,255,${eg})`; ctx.lineWidth = 0.5;
            ctx.strokeRect(gx + 1, gy + 1, psz - 2, psz - 2);
          }
        }
      }
      // Void rift shimmer at corners
      const voidCorners = [[0,0],[W,0],[0,H],[W,H]];
      for (const [vx, vy] of voidCorners) {
        const pulse = 0.6 + 0.4 * Math.sin(t * 2.2 + vx * 0.01);
        for (let ri = 1; ri <= 3; ri++) {
          ctx.strokeStyle = `rgba(${120+ri*20},${40+ri*10},255,${0.15 * pulse})`;
          ctx.lineWidth = 1;
          ctx.beginPath(); ctx.arc(vx, vy, ri * 14 * pulse, 0, Math.PI*2); ctx.stroke();
        }
      }
      // Purple nebula streak
      ctx.fillStyle = 'rgba(80,20,140,0.07)';
      ctx.fillRect(0, H/2 - 20, W, 40);
      // Dark vignette
      const vgv = ctx.createRadialGradient(W/2,H/2,60, W/2,H/2,Math.max(W,H)*0.65);
      vgv.addColorStop(0, 'rgba(0,0,0,0)'); vgv.addColorStop(1, 'rgba(20,0,50,0.6)');
      ctx.fillStyle = vgv; ctx.fillRect(0,0,W,H);
    }
  }
  function drawBossBar() {

    const bx = (W - bw) / 2, by = 8;

    ctx.fillStyle = '#3a1818'; ctx.fillRect(bx, by, bw, bh);
    const ratio = Math.max(0, bossRef.hp / bossRef.maxHp);
    ctx.fillStyle = ratio > 0.5 ? '#cc3030' : ratio > 0.25 ? '#dd6020' : '#ff2020';
    ctx.fillRect(bx, by, bw * ratio, bh);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 9px monospace'; ctx.textAlign = 'center';
    ctx.fillText(`${bossRef.name.toUpperCase()}  -  ${Math.ceil(bossRef.hp)} / ${bossRef.maxHp}`, W / 2, by + 7);
    ctx.textAlign = 'left';
  }
  function drawHud() {
    // Skip player-stat bars on pure menu screens
    if (state === STATE.CLASS_SELECT || state === STATE.TRIAL_LOADOUT) return;
    const hpx = 8, hpy = 8;
    ctx.fillStyle = '#000'; ctx.fillRect(hpx - 1, hpy - 1, 122, 8);
    ctx.fillStyle = '#3a2020'; ctx.fillRect(hpx, hpy, 120, 6);
    const hpRatio = Math.max(0, player.hp / player.maxHp);
    ctx.fillStyle = hpRatio > 0.5 ? '#ff5050' : hpRatio > 0.25 ? '#ff8030' : '#ff3030';

  function drawAbilityBar() {
    const slotSize = 30, gap = 6;

    const startX = (W - totalW) / 2;
    const y = H - slotSize - 6;
    for (let i = 0; i < slotCount; i++) {
      const x = startX + i * (slotSize + gap);
      const ability = player.abilities[i];
      const cd = player.abilityCooldowns[i];
      ctx.fillStyle = ability ? '#22222a' : '#13131a';
      ctx.fillRect(x, y, slotSize, slotSize);
      if (ability) {
        ctx.strokeStyle = ability.rarity.color; ctx.lineWidth = 2;
        ctx.strokeRect(x + 1, y + 1, slotSize - 2, slotSize - 2);
        ctx.lineWidth = 1;
      } else {
        ctx.strokeStyle = '#2a2a30';
        ctx.strokeRect(x + 0.5, y + 0.5, slotSize - 1, slotSize - 1);

      ctx.font = 'bold 7px monospace'; ctx.textAlign = 'left';
      ctx.fillText(`${i + 1}`, x + 3, y + 8);

        const canCast = cd <= 0 && player.resource >= ability.def.cost;
        ctx.fillStyle = canCast ? ability.def.color : '#666';
        ctx.font = 'bold 16px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(ability.def.letter, x + slotSize / 2, y + slotSize / 2 + 1);
        ctx.textBaseline = 'alphabetic';
        ctx.fillStyle = player.resource >= ability.def.cost ? '#ffd23f' : '#664020';
        ctx.font = '6px monospace'; ctx.textAlign = 'right';
        ctx.fillText(`${ability.def.cost}`, x + slotSize - 2, y + slotSize - 2);
        if (cd > 0) {
          const ratio = cd / ability.def.cooldown;
          ctx.fillStyle = 'rgba(0,0,0,0.7)';
          ctx.fillRect(x, y + slotSize * (1 - ratio), slotSize, slotSize * ratio);
          ctx.fillStyle = '#fff'; ctx.font = 'bold 10px monospace';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

        ctx.fillStyle = '#333'; ctx.font = '6px monospace';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('LOCKED', x + slotSize / 2, y + slotSize / 2);

        ctx.fillStyle = '#aaffaa'; ctx.font = 'bold 7px monospace'; ctx.textAlign = 'right';
        ctx.fillText(label, cx + cardW - 7, cy + 15);
      } else {
        ctx.fillStyle = ch.rarity.color; ctx.font = 'bold 7px monospace'; ctx.textAlign = 'right';
        ctx.fillText((ch.isOffClass ? '✦ ' : '') + ch.rarity.name.toUpperCase(), cx + cardW - 7, cy + 15);
      }
      // Ability letter / icon
      ctx.fillStyle = ch.def.color; ctx.font = 'bold 34px monospace';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(ch.def.letter, cx + cardW / 2, cy + 54);
      ctx.textBaseline = 'alphabetic';
      // Name
      ctx.fillStyle = ch.def.color; ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center';
      ctx.fillText(ch.def.name, cx + cardW / 2, cy + 88);
      // Rank pips
      const maxR = ch.def.maxRank || 5;
      const curR = ch.isRankUp ? (ch.slot.rank || 1) : 0;
      const newR = ch.isRankUp ? curR + 1 : 1;
      const pipW = 10, pipGap = 4, pipTotalW = maxR * pipW + (maxR - 1) * pipGap;
      const pipX0 = cx + (cardW - pipTotalW) / 2;
      for (let p = 0; p < maxR; p++) {
        const px = pipX0 + p * (pipW + pipGap);
        const filled = p < curR;
        const isNew  = p === curR && ch.isRankUp;
        ctx.fillStyle = isNew ? '#aaffaa' : filled ? ch.def.color : '#333';
        ctx.fillRect(px, cy + 96, pipW, 5);
        if (isNew) { ctx.strokeStyle = '#aaffaa'; ctx.lineWidth = 1; ctx.strokeRect(px, cy + 96, pipW, 5); ctx.lineWidth = 1; }

      // Description for the incoming rank
      const rankIdx = ch.isRankUp ? (ch.slot.rank || 1) : 0; // 0-based index for rankDesc
      const rankDescArr = ch.def.rankDesc || [];
      const descText = rankDescArr[rankIdx] || ch.def.desc;
      ctx.fillStyle = ch.isRankUp ? '#aaffcc' : '#aaa'; ctx.font = '7px monospace'; ctx.textAlign = 'center';
      // Wrap text across 2 lines if needed
      const maxW = cardW - 14;
      const words = descText.split(' '); let line = '';
      let lineY = cy + 114;
      for (const w of words) {
        const test = line + (line ? ' ' : '') + w;
        if (ctx.measureText(test).width > maxW && line) {
          ctx.fillText(line, cx + cardW / 2, lineY); line = w; lineY += 11;
        } else { line = test; }
      }
      if (line) ctx.fillText(line, cx + cardW / 2, lineY);
      // Stats
      ctx.fillStyle = '#666'; ctx.font = '7px monospace';
      ctx.fillText(`Cost ${ch.def.cost}  CD ${ch.def.cooldown}s`, cx + cardW / 2, cy + 148);
      if (!ch.isRankUp && ch.rarity.dmgMult > 1) {
        ctx.fillStyle = ch.rarity.color;
        ctx.fillText(`dmg ×${ch.rarity.dmgMult.toFixed(2)}`, cx + cardW / 2, cy + 160);
      }
      if (ch.isRankUp) {
        ctx.fillStyle = '#aaffaa'; ctx.font = 'bold 7px monospace';
        ctx.fillText(`Rank ${(ch.slot.rank||1)} → ${(ch.slot.rank||1)+1}`, cx + cardW / 2, cy + 172);
      }
    }
    ctx.textAlign = 'left';
  }

                                      '#333';
        ctx.lineWidth = (hovered && canBuy) ? 2.5 : isSpent ? 1.5 : 1;
        ctx.stroke(); ctx.lineWidth = 1;
        // Inner icon
        ctx.font = 'bold ' + (r >= 10 ? '7' : '5') + 'px monospace';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        const icon = node.type==='keystone' ? '★' : node.type==='ability' ? '◆' :
                     node.type==='notable'  ? '●' : '·';
        ctx.fillStyle = isSpent ? '#000' : canBuy ? '#fff' : '#555';
        ctx.fillText(icon, cx, cy);
        ctx.textBaseline = 'alphabetic';
        // Hover tooltip — name above, desc below
        if (hovered) {
          const tipY = cy - r - 18;
          ctx.font = 'bold 7px monospace'; ctx.textAlign = 'center';
          ctx.fillStyle = isSpent ? cl.color : canBuy ? '#fff' : '#777';
          ctx.fillText(node.name, cx, tipY);
          ctx.font = '6px monospace';
          ctx.fillStyle = '#aaa';
          ctx.fillText(node.desc, cx, tipY + 9);
          if (canBuy) {
            ctx.fillStyle = '#44dd44'; ctx.font = 'bold 6px monospace';
            ctx.fillText('CLICK TO UNLOCK', cx, tipY + 18);
          }
        }
        // Spent checkmark badge on keystone
        if (isSpent && node.type === 'keystone') {
          ctx.font = 'bold 6px monospace'; ctx.textAlign = 'center';
          ctx.fillStyle = cl.color;
          ctx.fillText('✓', cx, cy + r + 8);
        }
      }

      // 3. Legend strip
      ctx.textAlign = 'left'; ctx.font = '6px monospace'; ctx.fillStyle = '#555';
      ctx.fillText('· minor  ● notable  ◆ ability  ★ keystone', treeOX, treeOY + 178);
    }

    // ── Stats strip ────────────────────────────────────────────
    const statsY = treeOY + 185;
    const stats = [
      ['HP', `${player ? Math.floor(player.baseMaxHp) : '—'}`],
      ['DMG', `${player ? Math.round((player.baseDmgMult - 1) * 100) : 0}%`],
      ['SPD', `${player ? Math.floor(player.baseSpeed) : '—'}`],
      ['CRIT', `${player ? player.baseCritChance : 0}%`],
      ['ARMOR', `${player ? player.baseArmor : 0}`],
      ['DODGE', `${player ? player.baseDodge : 0}%`],
    ];
    const sw = Math.floor(W / stats.length);
    for (let i = 0; i < stats.length; i++) {
      ctx.fillStyle = '#888'; ctx.font = '7px monospace'; ctx.textAlign = 'center';
      ctx.fillText(stats[i][0], 8 + i * sw + sw / 2, statsY + 8);
      ctx.fillStyle = '#fff'; ctx.font = 'bold 9px monospace';
      ctx.fillText(stats[i][1], 8 + i * sw + sw / 2, statsY + 18);
    }

    // ── Back button ────────────────────────────────────────────
    drawButton(8, H - 26, 80, 20, 'BACK', true, '#888');
    ctx.textAlign = 'left';
  }

  // ============================================================
  // INVENTORY UI LAYOUT (shared with shop)
  // ============================================================
  const EQ_LAYOUT = {
    helm:    { x: 70,  y: 50  },
    amulet:  { x: 100, y: 50  },
    chest:   { x: 70,  y: 84  },
    offhand: { x: 100, y: 84  },
    gloves:  { x: 40,  y: 84  },
    belt:    { x: 70,  y: 118 },
    boots:   { x: 70,  y: 152 },
    ring1:   { x: 40,  y: 152 },
    ring2:   { x: 100, y: 152 },
    weapon:  { x: 70,  y: 186 },
  };
  const EQ_SLOT_SIZE = 26;
  const INV_START_X = 200;
  const INV_START_Y = 50;
  const INV_COLS = 6;
  const INV_ROWS = 4;
  const INV_SLOT_SIZE = 28;
  const INV_GAP = 4;
  function getEquippedSlotAtMouse() {
    for (const k in EQ_LAYOUT) {
      const p = EQ_LAYOUT[k];
      if (mouseX >= p.x && mouseX < p.x + EQ_SLOT_SIZE && mouseY >= p.y && mouseY < p.y + EQ_SLOT_SIZE) return k;
    }
    return null;
  }
  function getInventoryIdxAtMouse() {
    for (let i = 0; i < INV_COLS * INV_ROWS; i++) {
      const col = i % INV_COLS;
      const row = Math.floor(i / INV_COLS);
      const x = INV_START_X + col * (INV_SLOT_SIZE + INV_GAP);
      const y = INV_START_Y + row * (INV_SLOT_SIZE + INV_GAP);
      if (mouseX >= x && mouseX < x + INV_SLOT_SIZE && mouseY >= y && mouseY < y + INV_SLOT_SIZE) return i;
    }
    return -1;
  }
  function drawItemInBox(item, x, y, size, selected) {
    if (!item) return;
    ctx.strokeStyle = item.rarity.color;
    ctx.lineWidth = selected ? 3 : 2;
    ctx.strokeRect(x + 1, y + 1, size - 2, size - 2);
    ctx.lineWidth = 1;
    const spr = (typeof ITEM_SPRITES !== 'undefined') && ITEM_SPRITES[item.base.id];
    if (spr && typeof drawSprite === 'function') {
      // Pick scale so sprite fills ~75% of box
      const scale = Math.max(1, Math.floor(size * 0.75 / spr.w));
      drawSprite(ctx, spr, Math.floor(x + size / 2), Math.floor(y + size / 2), false, false, scale);
      // Subtle rarity tint
      ctx.globalAlpha = 0.15;
      ctx.fillStyle = item.rarity.color;
      ctx.fillRect(x + 2, y + 2, size - 4, size - 4);
      ctx.globalAlpha = 1;
    } else {
      ctx.fillStyle = item.rarity.color;
      ctx.font = 'bold 14px monospace';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(item.base.letter, x + size / 2, y + size / 2 + 1);
      ctx.textBaseline = 'alphabetic'; ctx.textAlign = 'left';
    }
  }
  function drawInventoryScreen() {
    if (inventoryTab > 0) { drawCharScreen(); drawInventoryTabBar(); return; }
    ctx.fillStyle = 'rgba(0,0,0,0.82)'; ctx.fillRect(0, 0, W, H);
    drawInventoryTabBar();
    ctx.fillStyle = '#eee'; ctx.textAlign = 'center'; ctx.font = 'bold 14px monospace';
    ctx.fillText('INVENTORY', W / 2, 24);
    ctx.fillStyle = '#666'; ctx.font = '8px monospace';
    ctx.fillText('Click=select  Right-click/Square=equip  Del/Triangle=salvage  E=equip selected  V/B/Y=bulk salvage  Tab/I/Esc=close', W / 2, 32);

    ctx.fillStyle = '#aaa'; ctx.textAlign = 'left'; ctx.font = 'bold 9px monospace';
    ctx.fillText('EQUIPPED', 30, 44);
    for (const k of SLOT_ORDER) {
      const p = EQ_LAYOUT[k];
      const item = player.equipped[k];
      const hovered = mouseX >= p.x && mouseX < p.x + EQ_SLOT_SIZE && mouseY >= p.y && mouseY < p.y + EQ_SLOT_SIZE;
      ctx.fillStyle = hovered ? '#33333d' : '#22222a';
      ctx.fillRect(p.x, p.y, EQ_SLOT_SIZE, EQ_SLOT_SIZE);
      ctx.strokeStyle = '#444';
      ctx.strokeRect(p.x + 0.5, p.y + 0.5, EQ_SLOT_SIZE - 1, EQ_SLOT_SIZE - 1);
      if (item) drawItemInBox(item, p.x, p.y, EQ_SLOT_SIZE);
      else {
        ctx.fillStyle = '#444'; ctx.font = '7px monospace'; ctx.textAlign = 'center';
        ctx.fillText(SLOT_LABEL[k], p.x + EQ_SLOT_SIZE / 2, p.y + EQ_SLOT_SIZE / 2 + 2);
        ctx.textAlign = 'left';
      }
    }

    // ── Full stats breakdown (base+level vs gear) ──────────────────────────
    const sx = 10, sy = 222;
    ctx.fillStyle = '#888'; ctx.font = 'bold 8px monospace';
    ctx.fillText(`STATS — ${player.class.name.toUpperCase()}  LV ${player.level}`, sx, sy);
    // Helper: draw a stat row with gear/level-up callouts
    function drawStat(label, value, gearPart, lvlPart, yOff) {
      const rowY = sy + 11 + yOff;
      ctx.fillStyle = '#ddd'; ctx.font = '8px monospace'; ctx.textAlign = 'left';
      ctx.fillText(label, sx, rowY);
      ctx.fillStyle = '#fff'; ctx.font = 'bold 8px monospace';
      ctx.fillText(value, sx + 52, rowY);
      let cx = sx + 84;
      if (gearPart) {
        ctx.fillStyle = '#55dd88'; ctx.font = '7px monospace';
        ctx.fillText(gearPart, cx, rowY); cx += ctx.measureText(gearPart).width + 4;
      }
      if (lvlPart) {
        ctx.fillStyle = '#ffcc44'; ctx.font = '7px monospace';
        ctx.fillText(lvlPart, cx, rowY);
      }
    }
    // Compute deltas
    const hpGear = player.bonusMaxHp;
    const hpLvl  = player.baseMaxHp - player.class.baseMaxHp;
    const resGear = player.bonusMaxResource;
    const resLvl  = player.baseMaxResource - player.class.baseMaxResource;
    const dmgGear = player.bonusDmgPct;
    const dmgLvl  = Math.round((player.baseDmgMult - 1) * 100);
    const spdGear = Math.round(player.bonusMoveSpeed);
    const spdLvl  = Math.round(player.baseSpeed - player.class.baseSpeed);
    const frGear  = Math.round(player.bonusFireRatePct);
    const frLvl   = Math.round((player.baseFireRateMult - 1) * 100);
    const critGear = Math.round(player.bonusCritChance);
    const critLvl  = Math.round(player.baseCritChance - player.class.baseCritChance);
    const regenGear = player.bonusRegen;
    const regenLvl  = Math.round(player.baseRegen);
    drawStat('MAX HP',  `${Math.ceil(player.hp)}/${player.maxHp}`,
      hpGear  ? `+${hpGear}g`  : '', hpLvl  ? `+${hpLvl}lv`  : '', 0);
    drawStat(player.class.resourceName, `${Math.floor(player.resource)}/${Math.floor(player.maxResource)}`,
      resGear ? `+${resGear}g` : '', resLvl ? `+${resLvl}lv` : '', 11);
    drawStat('DAMAGE',  `×${player.effectiveDmgMult().toFixed(2)}`,
      dmgGear ? `+${dmgGear}%g` : '', dmgLvl ? `+${dmgLvl}%lv` : '', 22);
    drawStat('ATK SPD', `×${player.effectiveFireRateMult().toFixed(2)}`,
      frGear  ? `+${frGear}%g` : '', frLvl  ? `+${frLvl}%lv`  : '', 33);
    drawStat('CRIT',    `${player.effectiveCritChance().toFixed(0)}%`,
      critGear ? `+${critGear}%g` : '', critLvl ? `+${critLvl}%lv` : '', 44);
    drawStat('ARMOR',   `${player.armor}`,
      player.bonusArmor ? `+${player.bonusArmor}g` : '', '', 55);
    drawStat('REGEN',   `${player.regen.toFixed(1)}/s`,
      regenGear ? `+${regenGear}g` : '', regenLvl ? `+${regenLvl}lv` : '', 66);
    drawStat('SPEED',   `${player.effectiveSpeed().toFixed(0)}`,
      spdGear ? `+${spdGear}g` : '', spdLvl ? `+${spdLvl}lv` : '', 77);
    // Gold + kills summary
    ctx.fillStyle = '#888'; ctx.font = '7px monospace'; ctx.textAlign = 'left';
    ctx.fillText(`GOLD ${player.gold}g   KILLS ${player.kills}`, sx, sy + 100);
    ctx.fillStyle = '#555'; ctx.font = '6px monospace';
    ctx.fillText('GREEN=gear  YELLOW=level', sx, sy + 110);

    ctx.fillStyle = '#aaa'; ctx.font = 'bold 9px monospace';
    ctx.fillText(`INVENTORY (${player.inventory.length}/${player.INVENTORY_CAP})`, INV_START_X, 44);
    for (let i = 0; i < INV_COLS * INV_ROWS; i++) {
      const col = i % INV_COLS;
      const row = Math.floor(i / INV_COLS);
      const x = INV_START_X + col * (INV_SLOT_SIZE + INV_GAP);
      const y = INV_START_Y + row * (INV_SLOT_SIZE + INV_GAP);
      const item = player.inventory[i];
      const hovered = mouseX >= x && mouseX < x + INV_SLOT_SIZE && mouseY >= y && mouseY < y + INV_SLOT_SIZE;
      ctx.fillStyle = hovered ? '#33333d' : '#22222a';
      ctx.fillRect(x, y, INV_SLOT_SIZE, INV_SLOT_SIZE);
      ctx.strokeStyle = '#444';
      ctx.strokeRect(x + 0.5, y + 0.5, INV_SLOT_SIZE - 1, INV_SLOT_SIZE - 1);
      if (item) drawItemInBox(item, x, y, INV_SLOT_SIZE);
    }

    drawTooltipPanel(false);
  }

  // ============================================================

  const SHOP_ITEM_W = 60, SHOP_ITEM_H = 50, SHOP_GAP = 10;

  const SHOP_Y = 50;
  function getShopIdxAtMouse() {
    for (let i = 0; i < 4; i++) {
      const x = SHOP_START_X + i * (SHOP_ITEM_W + SHOP_GAP);
      if (mouseX >= x && mouseX < x + SHOP_ITEM_W && mouseY >= SHOP_Y && mouseY < SHOP_Y + SHOP_ITEM_H) return i;

  function drawShopScreen() {
    ctx.fillStyle = 'rgba(0,0,0,0.88)'; ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = '#eee'; ctx.textAlign = 'center'; ctx.font = 'bold 14px monospace';

    ctx.fillText(`GOLD  ${player.gold}`, 10, 14);

    ctx.font = '7px monospace';
    for (const matId of ['bone', 'arcane', 'essence', 'fragment']) {

    // Salvage Whites button (quick bulk salvage of all white/common items)

    ctx.font = 'bold 8px monospace'; ctx.textAlign = 'center';
    ctx.fillText('SALVAGE', salvX + 45, salvY + 16);
    ctx.fillText('WHITES', salvX + 45, salvY + 26);
    ctx.fillStyle = canSalvageWhites ? '#aaa' : '#444';
    ctx.font = '7px monospace';
    ctx.fillText(`(${whiteCount}) [V]`, salvX + 45, salvY + 38);
    // Salvage Blues button
    const blueCount = player.inventory.filter(it => it && it.rarity && it.rarity.id === 'blue').length;
    const canSalvageBlues = blueCount > 0;
    const salvBX = salvX + 94;

    // Salvage Rares button (yellow)
