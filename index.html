      ctx.fillText(def.name, col2, ry + 10);
      ctx.fillStyle = '#555577';
      ctx.font = '7px monospace';
      ctx.fillText(def.detail, col2, ry + 20);

      // Current value (large)
      ctx.fillStyle = val > 0 ? def.color : '#333';
      ctx.font = 'bold 14px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(val, col3 - 18, ry + 18);

      // [+] button
      const addX = col3, addY = ry + 4;
      const canAdd = ensureCP(charTreeClass).statPts > 0;
      const hovAdd = mouseX >= addX && mouseX < addX + btnW && mouseY >= addY && mouseY < addY + btnH;
      ctx.fillStyle = canAdd ? (hovAdd ? '#44aa44' : '#226622') : '#1a1a1a';
      ctx.fillRect(addX, addY, btnW, btnH);
      ctx.fillStyle = canAdd ? '#aaffaa' : '#333';
      ctx.font = 'bold 9px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('+', addX + btnW / 2, addY + 9);

      // [-] button
      const subX = col3, subY = ry + 20;
      const canSub = val > 0;
      const hovSub = mouseX >= subX && mouseX < subX + btnW && mouseY >= subY && mouseY < subY + btnH;
      ctx.fillStyle = canSub ? (hovSub ? '#aa4444' : '#662222') : '#1a1a1a';
      ctx.fillRect(subX, subY, btnW, btnH);
      ctx.fillStyle = canSub ? '#ffaaaa' : '#333';
      ctx.font = 'bold 9px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('-', subX + btnW / 2, subY + 9);

      // Click handlers
      if (mouseClicked) {
        if (hovAdd && canAdd) {
          st[def.id] = (st[def.id] || 0) + 1;
          ensureCP(charTreeClass).statPts--;
          charStatPoints = ensureCP(charTreeClass).statPts;
          if (player) { applyPrimaryStatsToPlayer(player); player.recomputeStats(); }
          saveData();
          Sfx.uiClick && Sfx.uiClick();
        }
        if (hovSub && canSub) {
          st[def.id]--;
          ensureCP(charTreeClass).statPts++;
          charStatPoints = ensureCP(charTreeClass).statPts;
          if (player) { applyPrimaryStatsToPlayer(player); player.recomputeStats(); }
          saveData();
          Sfx.uiClick && Sfx.uiClick();
        }
      }
    }
    // ── Resistance panel ─────────────────────────────────────────────────────
    const _resY = startY + PRIMARY_STATS.length * rowH + 4;
    ctx.fillStyle = '#0d0d1a'; ctx.fillRect(0, _resY, W, H - _resY);
    ctx.fillStyle = '#333366'; ctx.fillRect(0, _resY, W, 1); // divider
    ctx.fillStyle = '#aaaacc'; ctx.font = 'bold 7px monospace'; ctx.textAlign = 'center';
    ctx.fillText('ELEMENTAL RESISTANCES  (cap 75%)', W / 2, _resY + 10);
    // Get resist values — from player if available, else estimate from INT allocation
    const _pint = st.int || 0;
    const _raEst = Math.min(75, Math.round(_pint * 0.12));
    const _fireR  = player ? (player.fireResist  || _raEst) : _raEst;
    const _coldR  = player ? (player.coldResist  || _raEst) : _raEst;
    const _lightR = player ? (player.lightResist || _raEst) : _raEst;
    const _poisR  = player ? (player.poisonResist|| _raEst) : _raEst;
    const _resElems = [
      { label:'FIRE',  val:_fireR,  color:'#ff5522', gemLabel:'Ruby' },
      { label:'COLD',  val:_coldR,  color:'#55aaff', gemLabel:'Sapphire' },
      { label:'LTNG',  val:_lightR, color:'#ffee22', gemLabel:'Topaz' },
      { label:'PSNN',  val:_poisR,  color:'#44dd66', gemLabel:'Emerald' },
    ];
    const _rw = Math.floor(W / 4) - 4, _rBarW = _rw - 28;
    for (let ri = 0; ri < _resElems.length; ri++) {
      const re = _resElems[ri];
      const rx = 4 + ri * (W / 4), ry2 = _resY + 15;
      // Bar bg
      ctx.fillStyle = '#1a1a2e'; ctx.fillRect(rx, ry2, _rw, 16);
      ctx.strokeStyle = re.color; ctx.lineWidth = 1; ctx.strokeRect(rx, ry2, _rw, 16);
      // Bar fill
      const _barFill = Math.floor(_rBarW * (re.val / 75));
      ctx.fillStyle = re.color; ctx.globalAlpha = re.val >= 75 ? 0.9 : 0.5;
      ctx.fillRect(rx + 1, ry2 + 1, _barFill, 14); ctx.globalAlpha = 1;
      // Label + value
      ctx.fillStyle = re.color; ctx.font = 'bold 6px monospace'; ctx.textAlign = 'left';
      ctx.fillText(re.label, rx + 2, ry2 + 8);
      ctx.fillStyle = re.val >= 75 ? '#ffd040' : '#cccccc'; ctx.font = 'bold 7px monospace'; ctx.textAlign = 'right';
      ctx.fillText(re.val + '%', rx + _rw - 2, ry2 + 11);
    }
    // Footer
    ctx.fillStyle = '#333355'; ctx.font = '6px monospace'; ctx.textAlign = 'center';
    ctx.fillText('Points refundable anytime  •  ★=Main stat (+0.8%/pt dmg)  ◆=Secondary (+0.3%/pt)', W / 2, H - 3);
    ctx.textAlign = 'left';
  }

  function drawSheetScreen() {
    // Full computed stat sheet — read-only, no spending here
    if (!player) {
      ctx.fillStyle = '#06060e'; ctx.fillRect(0,0,W,H);
      ctx.fillStyle = '#666'; ctx.font = '9px monospace'; ctx.textAlign = 'center';
      ctx.fillText('Start a run to see your stat sheet', W/2, H/2);
      return;
    }
    ctx.fillStyle = '#06060e'; ctx.fillRect(0,0,W,H);
    // Header bar
    ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0,16,W,22);
    ctx.fillStyle = '#88ffcc'; ctx.font = 'bold 9px monospace'; ctx.textAlign = 'center';
    ctx.fillText('📊 STAT SHEET — ' + player.class.name.toUpperCase() + '  LV ' + (player.level||1), W/2, 30);

    // ── helper: draw a labeled stat row ──────────────────────────────
    function sheetRow(label, value, color, y, icon) {
      const lx = 10, vx = W - 10;
      ctx.fillStyle = '#111122'; ctx.fillRect(0, y, W, 13);
      ctx.fillStyle = color || '#aaaacc';
      ctx.font = '7px monospace'; ctx.textAlign = 'left';
      ctx.fillText((icon||'') + label, lx, y + 9);
      ctx.fillStyle = '#ffffff'; ctx.font = 'bold 8px monospace'; ctx.textAlign = 'right';
      ctx.fillText(value, vx, y + 9);
    }
    function sectionHeader(label, color, y) {
      ctx.fillStyle = color || '#334'; ctx.fillRect(0, y, W, 12);
      ctx.fillStyle = '#ffffff'; ctx.font = 'bold 7px monospace'; ctx.textAlign = 'center';
      ctx.fillText(label, W/2, y + 9);
    }

    const edm = player.effectiveDmgMult();
    const critC = Math.min(100, player.critChance || 0);
    const critD = ((player.baseCritDmg || 2.0) + (player.bonusCritDmg || 0));
    const aspd  = Math.round((player.fireRateMult || 1.0) * 100);
    const dodge = Math.min(50, player.dodge || 0);
    const armr  = Math.round(player.armor || 0);
    const dmgRed = Math.round(armr / (armr + 200) * 100); // approx armor → dmg reduction
    const hp    = Math.round(player.maxHp || 0);
    const regen = (player.regen || 0).toFixed(1);
    const res   = Math.round(player.maxResource || 0);
    const rreg  = (player.resourceRegen || 0).toFixed(1);
    const wdmg  = Math.round((player.weaponDamage || 1) * edm);

    let y = 42;
    const rowH = 14;

    // ── OFFENSE ──────────────────────────────────────────────────────
    sectionHeader('⚔  OFFENSE', '#1a2a0a', y); y += 13;
    sheetRow('Weapon Damage  (base × all mults)', wdmg + ' dmg',  '#ffdd44', y); y += rowH;
    sheetRow('Damage Multiplier',  (edm * 100).toFixed(1) + '%', '#ffaa22', y); y += rowH;
    sheetRow('Crit Chance',        critC.toFixed(1) + '%',       '#ff8844', y); y += rowH;
    sheetRow('Crit Damage',        (critD * 100).toFixed(0) + '%', '#ff6622', y); y += rowH;
    sheetRow('Attack Speed',       aspd + '%',                   '#ffcc88', y); y += rowH;

    // ── DEFENSE ──────────────────────────────────────────────────────
    sectionHeader('🛡  DEFENSE', '#0a1a2a', y); y += 13;
    sheetRow('Max HP',             hp,                           '#ff5555', y); y += rowH;
    sheetRow('HP Regen / sec',     regen,                        '#ff7777', y); y += rowH;
    sheetRow('Armor',              armr + '  (~' + dmgRed + '% reduction)', '#aaaacc', y); y += rowH;
    sheetRow('Dodge Chance',       dodge.toFixed(1) + '%',       '#44ddff', y); y += rowH;

    // ── RESOURCES ────────────────────────────────────────────────────
    sectionHeader('✦  RESOURCES', '#1a0a2a', y); y += 13;
    sheetRow('Max Resource',       res,                          '#aa88ff', y); y += rowH;
    sheetRow('Resource Regen / sec', rreg,                       '#cc99ff', y); y += rowH;

    // ── RESISTANCES ──────────────────────────────────────────────────
    sectionHeader('◈  RESISTANCES  (cap 75%)', '#1a1a0a', y); y += 13;
    const resData = [
      { label:'Fire',      val: player.fireResist   || 0, color: '#ff5522' },
      { label:'Cold',      val: player.coldResist   || 0, color: '#55aaff' },
      { label:'Lightning', val: player.lightResist  || 0, color: '#ffee22' },
      { label:'Poison',    val: player.poisonResist || 0, color: '#44dd66' },
    ];
    for (const r of resData) {
      const barW = W - 90, barX = 68, barY = y + 2;
      ctx.fillStyle = '#0d0d1a'; ctx.fillRect(0, y, W, rowH);
      ctx.fillStyle = r.color; ctx.font = '7px monospace'; ctx.textAlign = 'left';
      ctx.fillText(r.label, 10, y + 9);
      // bar bg
      ctx.fillStyle = '#1a1a2e'; ctx.fillRect(barX, barY, barW, 9);
      ctx.strokeStyle = r.color; ctx.lineWidth = 0.5; ctx.strokeRect(barX, barY, barW, 9);
      // bar fill
      const fill = Math.floor(barW * (Math.min(75, r.val) / 75));
      ctx.fillStyle = r.color; ctx.globalAlpha = r.val >= 75 ? 0.85 : 0.45;
      ctx.fillRect(barX + 1, barY + 1, fill, 7); ctx.globalAlpha = 1;
      // value
      ctx.fillStyle = r.val >= 75 ? '#ffd040' : '#cccccc';
      ctx.font = 'bold 7px monospace'; ctx.textAlign = 'right';
      ctx.fillText(r.val + '%', W - 4, y + 9);
      y += rowH;
    }
    ctx.textAlign = 'left';
  }

  function drawCharScreenTabBar() {
    // small overlay at bottom: tab indicator + LB/RB hint
    ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, H - 13, W, 13);
    ctx.font = '6px monospace'; ctx.textAlign = 'left';
    ctx.fillStyle = '#2a2a44'; ctx.fillText('LB/Q ◄', 3, H - 3);
    ctx.textAlign = 'right'; ctx.fillText('► RB', W - 3, H - 3);
    const tabs2 = ['SKILLS', '📊 SHEET'];
    const tw2 = 60;
    const startX2 = W/2 - (tabs2.length * tw2) / 2;
    for (let i = 0; i < tabs2.length; i++) {
      const active2 = charScreenTab === i;
      const tx2 = startX2 + i * tw2;
      ctx.fillStyle = active2 ? '#1e3a8a' : '#0b0b1c';
      ctx.fillRect(tx2, H - 13, tw2 - 2, 12);
      ctx.strokeStyle = active2 ? '#4477dd' : '#1a1a38';
      ctx.lineWidth = active2 ? 1.5 : 0.5; ctx.strokeRect(tx2 + 0.5, H - 12.5, tw2 - 3, 11);
      ctx.lineWidth = 1;
      ctx.fillStyle = active2 ? '#88bbff' : '#3d4f72';
      ctx.font = (active2 ? 'bold ' : '') + '6px monospace'; ctx.textAlign = 'center';
      ctx.fillText(tabs2[i], tx2 + (tw2 - 2) / 2, H - 4);
    }
    ctx.textAlign = 'left';
  }

  function drawInventoryScreen() {
    if (inventoryTab === 4) { drawSheetScreen(); drawInventoryTabBar(); return; }
    if (inventoryTab === 3) { drawStatsScreen(); drawInventoryTabBar(); return; }
    if (inventoryTab > 0) { drawCharScreen(); drawInventoryTabBar(); return; }
    ctx.fillStyle = 'rgba(0,0,0,0.82)'; ctx.fillRect(0, 0, W, H);
    drawInventoryTabBar();
    ctx.fillStyle = '#eee'; ctx.textAlign = 'center'; ctx.font = 'bold 14px monospace';
    ctx.fillText('INVENTORY', W / 2, 24);
    ctx.fillStyle = '#666'; ctx.font = '8px monospace';
    ctx.fillText('Click=select  Right-click/Square=equip  Del/Triangle=salvage  E=equip selected  V/B/Y=bulk salvage  Tab/I/Esc=close', W / 2, 32);

    ctx.fillStyle = '#aaa'; ctx.textAlign = 'left'; ctx.font = 'bold 9px monospace';
    ctx.fillText('EQUIPPED', 30, 44);
    for (const k of SLOT_ORDER) {
      const p = EQ_LAYOUT[k];
      const item = player.equipped[k];
      const hovered = mouseX >= p.x && mouseX < p.x + EQ_SLOT_SIZE && mouseY >= p.y && mouseY < p.y + EQ_SLOT_SIZE;
      ctx.fillStyle = hovered ? '#33333d' : '#22222a';
      ctx.fillRect(p.x, p.y, EQ_SLOT_SIZE, EQ_SLOT_SIZE);
      ctx.strokeStyle = '#444';
      ctx.strokeRect(p.x + 0.5, p.y + 0.5, EQ_SLOT_SIZE - 1, EQ_SLOT_SIZE - 1);
      if (item) drawItemInBox(item, p.x, p.y, EQ_SLOT_SIZE);
      else {
        ctx.fillStyle = '#444'; ctx.font = '7px monospace'; ctx.textAlign = 'center';
        ctx.fillText(SLOT_LABEL[k], p.x + EQ_SLOT_SIZE / 2, p.y + EQ_SLOT_SIZE / 2 + 2);
        ctx.textAlign = 'left';
      }
    }

    // ── Full stats breakdown (base+level vs gear) ──────────────────────────
    const sx = 10, sy = 222;
    ctx.fillStyle = '#888'; ctx.font = 'bold 8px monospace';
    ctx.fillText(`STATS — ${player.class.name.toUpperCase()}  LV ${player.level}`, sx, sy);
    // Helper: draw a stat row with gear/level-up callouts
    function drawStat(label, value, gearPart, lvlPart, yOff) {
      const rowY = sy + 11 + yOff;
      ctx.fillStyle = '#ddd'; ctx.font = '8px monospace'; ctx.textAlign = 'left';
      ctx.fillText(label, sx, rowY);
      ctx.fillStyle = '#fff'; ctx.font = 'bold 8px monospace';
      ctx.fillText(value, sx + 52, rowY);
      let cx = sx + 84;
      if (gearPart) {
        ctx.fillStyle = '#55dd88'; ctx.font = '7px monospace';
        ctx.fillText(gearPart, cx, rowY); cx += ctx.measureText(gearPart).width + 4;
      }
      if (lvlPart) {
        ctx.fillStyle = '#ffcc44'; ctx.font = '7px monospace';
        ctx.fillText(lvlPart, cx, rowY);
      }
    }
    // Compute deltas
    const hpGear = player.bonusMaxHp;
    const hpLvl  = player.baseMaxHp - player.class.baseMaxHp;
    const resGear = player.bonusMaxResource;
    const resLvl  = player.baseMaxResource - player.class.baseMaxResource;
    const dmgGear = player.bonusDmgPct;
    const dmgLvl  = Math.round((player.baseDmgMult - 1) * 100);
    const spdGear = Math.round(player.bonusMoveSpeed);
    const spdLvl  = Math.round(player.baseSpeed - player.class.baseSpeed);
    const frGear  = Math.round(player.bonusFireRatePct);
    const frLvl   = Math.round((player.baseFireRateMult - 1) * 100);
    const critGear = Math.round(player.bonusCritChance);
    const critLvl  = Math.round(player.baseCritChance - player.class.baseCritChance);
    const regenGear = player.bonusRegen;
    const regenLvl  = Math.round(player.baseRegen);
    drawStat('MAX HP',  `${Math.ceil(player.hp)}/${player.maxHp}`,
      hpGear  ? `+${hpGear}g`  : '', hpLvl  ? `+${hpLvl}lv`  : '', 0);
    drawStat(player.class.resourceName, `${Math.floor(player.resource)}/${Math.floor(player.maxResource)}`,
      resGear ? `+${resGear}g` : '', resLvl ? `+${resLvl}lv` : '', 11);
    drawStat('DAMAGE',  `×${player.effectiveDmgMult().toFixed(2)}`,
      dmgGear ? `+${dmgGear}%g` : '', dmgLvl ? `+${dmgLvl}%lv` : '', 22);
    drawStat('ATK SPD', `×${player.effectiveFireRateMult().toFixed(2)}`,
      frGear  ? `+${frGear}%g` : '', frLvl  ? `+${frLvl}%lv`  : '', 33);
    drawStat('CRIT',    `${player.effectiveCritChance().toFixed(0)}%`,
      critGear ? `+${critGear}%g` : '', critLvl ? `+${critLvl}%lv` : '', 44);
    drawStat('ARMOR',   `${player.armor}`,
      player.bonusArmor ? `+${player.bonusArmor}g` : '', '', 55);
    drawStat('REGEN',   `${player.regen.toFixed(1)}/s`,
      regenGear ? `+${regenGear}g` : '', regenLvl ? `+${regenLvl}lv` : '', 66);
    drawStat('SPEED',   `${player.effectiveSpeed().toFixed(0)}`,
      spdGear ? `+${spdGear}g` : '', spdLvl ? `+${spdLvl}lv` : '', 77);
    // Gold + kills summary
    ctx.fillStyle = '#888'; ctx.font = '7px monospace'; ctx.textAlign = 'left';
    ctx.fillText(`GOLD ${player.gold}g   KILLS ${player.kills}`, sx, sy + 100);
    ctx.fillStyle = '#555'; ctx.font = '6px monospace';
    ctx.fillText('GREEN=gear  YELLOW=level', sx, sy + 110);

    ctx.fillStyle = '#aaa'; ctx.font = 'bold 9px monospace';
    ctx.fillText(`INVENTORY (${player.inventory.length}/${player.INVENTORY_CAP})`, INV_START_X, 44);
    for (let i = 0; i < INV_COLS * INV_ROWS; i++) {
      const col = i % INV_COLS;
      const row = Math.floor(i / INV_COLS);
      const x = INV_START_X + col * (INV_SLOT_SIZE + INV_GAP);
      const y = INV_START_Y + row * (INV_SLOT_SIZE + INV_GAP);
      const item = player.inventory[i];
      const hovered = mouseX >= x && mouseX < x + INV_SLOT_SIZE && mouseY >= y && mouseY < y + INV_SLOT_SIZE;
      ctx.fillStyle = hovered ? '#33333d' : '#22222a';
      ctx.fillRect(x, y, INV_SLOT_SIZE, INV_SLOT_SIZE);
      ctx.strokeStyle = '#444';
      ctx.strokeRect(x + 0.5, y + 0.5, INV_SLOT_SIZE - 1, INV_SLOT_SIZE - 1);
      if (item) drawItemInBox(item, x, y, INV_SLOT_SIZE);
    }

    drawTooltipPanel(false);
  }

  // ============================================================
  // RENDER — Shop screen
  // ============================================================
  const SHOP_ITEM_W = 60, SHOP_ITEM_H = 50, SHOP_GAP = 10;
  const SHOP_START_X = 50;
  const SHOP_Y = 50;
  function getShopIdxAtMouse() {
    for (let i = 0; i < 4; i++) {
      const x = SHOP_START_X + i * (SHOP_ITEM_W + SHOP_GAP);
      if (mouseX >= x && mouseX < x + SHOP_ITEM_W && mouseY >= SHOP_Y && mouseY < SHOP_Y + SHOP_ITEM_H) return i;
    }
    return -1;
  }
  function drawShopScreen() {
    ctx.fillStyle = 'rgba(0,0,0,0.88)'; ctx.fillRect(0, 0, W, H);
    // Title
    ctx.fillStyle = '#eee'; ctx.textAlign = 'center'; ctx.font = 'bold 14px monospace';
    ctx.fillText(`MARKET  -  WAVE ${currentWave + 1} PREP`, W / 2, 16);
    ctx.fillStyle = '#666'; ctx.font = '7px monospace';
    ctx.fillText('Click=buy  Right-click shop=lock  Right-click inv/Square=equip  V/B/Y=bulk salvage  R=refresh  Space=ready', W / 2, 28);

    // Gold + Mats display
    ctx.textAlign = 'left'; ctx.fillStyle = '#ffd23f';
    ctx.font = 'bold 10px monospace';
    ctx.fillText(`GOLD  ${player.gold}`, 10, 14);
    let mx = 10, my = 26;
    ctx.font = '7px monospace';
    for (const matId of ['bone', 'arcane', 'essence', 'fragment']) {
      ctx.fillStyle = MAT_COLORS[matId];
      ctx.fillText(`${MAT_LABELS[matId]} ${player.mats[matId] || 0}`, mx, my);
      mx += 60;
    }

    // Shop items
    ctx.fillStyle = '#aaa'; ctx.font = 'bold 8px monospace'; ctx.textAlign = 'left';
    ctx.fillText('FOR SALE', SHOP_START_X, SHOP_Y - 4);
    for (let i = 0; i < 4; i++) {
      const x = SHOP_START_X + i * (SHOP_ITEM_W + SHOP_GAP);
      const y = SHOP_Y;
      const item = shopItems[i];
      const hovered = mouseX >= x && mouseX < x + SHOP_ITEM_W && mouseY >= y && mouseY < y + SHOP_ITEM_H;
      ctx.fillStyle = hovered && item ? '#33333d' : '#22222a';
      ctx.fillRect(x, y, SHOP_ITEM_W, SHOP_ITEM_H);
      ctx.strokeStyle = item ? item.rarity.color : '#444';
      ctx.lineWidth = hovered && item ? 2 : 1;
      ctx.strokeRect(x + 0.5, y + 0.5, SHOP_ITEM_W - 1, SHOP_ITEM_H - 1);
      ctx.lineWidth = 1;
      if (item) {
        drawItemInBox(item, x + (SHOP_ITEM_W - 36) / 2, y + 2, 36);
        ctx.fillStyle = item.rarity.color; ctx.font = '6px monospace'; ctx.textAlign = 'center';
        ctx.fillText(item.base.name, x + SHOP_ITEM_W / 2, y + 42);
        const price = itemPrice(item);
        const canBuy = player.gold >= price && player.inventory.length < player.INVENTORY_CAP;
        ctx.fillStyle = canBuy ? '#ffd23f' : '#664020';
        ctx.font = 'bold 8px monospace'; ctx.textAlign = 'center';
        ctx.fillText(`${price}g`, x + SHOP_ITEM_W / 2, y + SHOP_ITEM_H - 2);
        // Lock badge
        if (shopLocked[i]) {
          ctx.fillStyle = 'rgba(255,220,60,0.18)';
          ctx.fillRect(x, y, SHOP_ITEM_W, SHOP_ITEM_H);
          ctx.fillStyle = '#ffd23f'; ctx.font = 'bold 8px monospace'; ctx.textAlign = 'left';
          ctx.fillText('🔒', x + 3, y + 10);
        } else {
          ctx.fillStyle = '#555'; ctx.font = '7px monospace'; ctx.textAlign = 'left';
          ctx.fillText('🔓', x + 3, y + 10);
        }
      } else {
        ctx.fillStyle = '#444'; ctx.font = '7px monospace';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('SOLD', x + SHOP_ITEM_W / 2, y + SHOP_ITEM_H / 2);
        ctx.textBaseline = 'alphabetic';
      }
    }
    // Refresh button
    const refX = SHOP_START_X + 4 * (SHOP_ITEM_W + SHOP_GAP) + 10;
    const refY = SHOP_Y;
    const canRefresh = player.gold >= shopRefreshCost;
    drawButton(refX, refY, 90, SHOP_ITEM_H, `REFRESH\n${shopRefreshCost}g`, canRefresh, '#ffd23f');
    // Newlines in fillText don't work — split manually
    ctx.fillStyle = canRefresh ? '#eee' : '#555';
    ctx.font = 'bold 9px monospace'; ctx.textAlign = 'center';
    ctx.fillText('REFRESH', refX + 45, refY + 22);
    ctx.fillStyle = canRefresh ? '#ffd23f' : '#664020';
    ctx.fillText(`${shopRefreshCost}g`, refX + 45, refY + 36);
    // Salvage Whites button (quick bulk salvage of all white/common items)
    const salvX = refX + 95;
    const salvY = refY;
    const whiteCount = player.inventory.filter(it => it && it.rarity.id === 'white').length;
    const canSalvageWhites = whiteCount > 0;
    drawButton(salvX, salvY, 90, SHOP_ITEM_H, '', canSalvageWhites, '#cccccc');
    ctx.fillStyle = canSalvageWhites ? '#eee' : '#555';
    ctx.font = 'bold 8px monospace'; ctx.textAlign = 'center';

    ctx.fillStyle = canSalvageBlues ? '#aaddff' : '#555';
    ctx.font = 'bold 8px monospace'; ctx.textAlign = 'center';
    ctx.fillText('SALVAGE', salvBX + 45, salvY + 16);
    ctx.fillText('BLUES', salvBX + 45, salvY + 26);
    ctx.fillStyle = canSalvageBlues ? '#88aaff' : '#444';

    ctx.fillText(`(${blueCount}) [B]`, salvBX + 45, salvY + 38);
    // Salvage Rares button (yellow)

    const salvRX = salvBX + 94;

    ctx.font = 'bold 8px monospace'; ctx.textAlign = 'center';
    ctx.fillText('SALVAGE', salvRX + 45, salvY + 16);
    ctx.fillText('RARES', salvRX + 45, salvY + 26);

    ctx.fillText(`(${rareCount}) [Y]`, salvRX + 45, salvY + 38);

    // Equipped paper-doll (smaller layout)
    ctx.fillStyle = '#aaa'; ctx.textAlign = 'left'; ctx.font = 'bold 8px monospace';
    ctx.fillText('EQUIPPED', 30, 114);
    const eqYOffset = 70; // shift down
    const EQ_SHOP_LAYOUT = {};
    for (const k in EQ_LAYOUT) {
      EQ_SHOP_LAYOUT[k] = { x: EQ_LAYOUT[k].x, y: EQ_LAYOUT[k].y + eqYOffset };
    }
    for (const k of SLOT_ORDER) {
      const p = EQ_SHOP_LAYOUT[k];
      const item = player.equipped[k];

      ctx.fillStyle = hovered ? '#33333d' : '#22222a';
      ctx.fillRect(p.x, p.y, EQ_SLOT_SIZE, EQ_SLOT_SIZE);
      ctx.strokeStyle = '#444';
      ctx.strokeRect(p.x + 0.5, p.y + 0.5, EQ_SLOT_SIZE - 1, EQ_SLOT_SIZE - 1);
      if (item) drawItemInBox(item, p.x, p.y, EQ_SLOT_SIZE);
      else {
        ctx.fillStyle = '#444'; ctx.font = '7px monospace'; ctx.textAlign = 'center';
        ctx.fillText(SLOT_LABEL[k], p.x + EQ_SLOT_SIZE / 2, p.y + EQ_SLOT_SIZE / 2 + 2);

      }
    }

    // Inventory grid (shifted down)
    const invYOff = 70;
    ctx.fillStyle = '#aaa'; ctx.font = 'bold 8px monospace'; ctx.textAlign = 'left';
    ctx.fillText(`INVENTORY (${player.inventory.length}/${player.INVENTORY_CAP})`, INV_START_X, 114);
    for (let i = 0; i < INV_COLS * INV_ROWS; i++) {
      const col = i % INV_COLS;
      const row = Math.floor(i / INV_COLS);

      const y = INV_START_Y + invYOff + row * (INV_SLOT_SIZE + INV_GAP);

      const hovered = mouseX >= x && mouseX < x + INV_SLOT_SIZE && mouseY >= y && mouseY < y + INV_SLOT_SIZE;
      const isSel = selectedInvIdx === i;
      ctx.fillStyle = isSel ? '#3a3a45' : (hovered ? '#33333d' : '#22222a');
      ctx.fillRect(x, y, INV_SLOT_SIZE, INV_SLOT_SIZE);
      ctx.strokeStyle = isSel ? '#ffd23f' : '#444';
      ctx.lineWidth = isSel ? 2 : 1;
      ctx.strokeRect(x + 0.5, y + 0.5, INV_SLOT_SIZE - 1, INV_SLOT_SIZE - 1);
      ctx.lineWidth = 1;
      if (item) drawItemInBox(item, x, y, INV_SLOT_SIZE, isSel);
    }

    // Selected item action buttons
    if (selectedInvIdx >= 0 && player.inventory[selectedInvIdx]) {
      const sel = player.inventory[selectedInvIdx];
      const spec = rerollSpec(sel);
      const salvageG = salvageGold(sel);
      const matName = RARITY_MAT[sel.rarity.id];
      // 3 buttons at right side
      const btnX = W - 130, btnY = 200, btnW = 120, btnH = 18;
      const canEquip = true;
      drawButton(btnX, btnY,         btnW, btnH, 'EQUIP', canEquip, '#7ad96b');
      const salvageLabel = `SALVAGE  ${salvageG}g + 1 ${MAT_LABELS[matName]}`;
      drawButton(btnX, btnY + btnH + 4, btnW, btnH, salvageLabel, true, '#ff8030');
      const canReroll = spec && player.gold >= spec.gold && (player.mats[spec.mat] || 0) >= spec.count;
      const rerollLabel = spec ? `REROLL  ${spec.gold}g + 1 ${MAT_LABELS[spec.mat]}` : 'REROLL';
      drawButton(btnX, btnY + (btnH + 4) * 2, btnW, btnH, rerollLabel, canReroll, '#ffd23f');
    } else {
      ctx.fillStyle = '#555'; ctx.font = '8px monospace'; ctx.textAlign = 'right';
      ctx.fillText('Click an inventory item to select', W - 10, 210);
      ctx.textAlign = 'left';
    }

    // Tooltip panel at bottom
    drawTooltipPanel(true);

    // READY button (bottom-right)
    const rX = W - 130, rY = H - 30, rW = 120, rH = 24;
    const hov = isHovering(rX, rY, rW, rH);
    ctx.fillStyle = hov ? '#2a4a2a' : '#1a3a1a';
    ctx.fillRect(rX, rY, rW, rH);
    ctx.strokeStyle = '#7ad96b';
    ctx.lineWidth = hov ? 3 : 2;
    ctx.strokeRect(rX + 0.5, rY + 0.5, rW - 1, rH - 1);
    ctx.lineWidth = 1;
    ctx.fillStyle = '#7ad96b'; ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(`READY  -  WAVE ${currentWave + 1}  ▶`, rX + rW / 2, rY + rH / 2 + 1);
    ctx.textBaseline = 'alphabetic';
    ctx.fillStyle = '#557755'; ctx.font = '7px monospace'; ctx.textAlign = 'right';
    ctx.fillText('(Press Space, Enter, or A)', W - 10, rY - 4);
    ctx.textAlign = 'left';
  }

  // ============================================================
  // RENDER — Shared tooltip panel (used by inventory + shop)
  // ============================================================
  function drawTooltipPanel(inShop) {
    let tooltipItem = null;
    let tooltipSource = '';
    if (inShop) {
      // Check shop hover first
      const shopIdx = getShopIdxAtMouse();
      if (shopIdx >= 0 && shopItems[shopIdx]) {
        tooltipItem = shopItems[shopIdx];
        tooltipSource = `SHOP  ${itemPrice(tooltipItem)}g`;
      } else {
        // Equipped (shifted layout)
        for (const k of SLOT_ORDER) {
          const p = EQ_LAYOUT[k];
          const sy = p.y + 70; // matches shop's offset
          if (mouseX >= p.x && mouseX < p.x + EQ_SLOT_SIZE && mouseY >= sy && mouseY < sy + EQ_SLOT_SIZE && player.equipped[k]) {
            tooltipItem = player.equipped[k];
            tooltipSource = `EQUIPPED - ${SLOT_LABEL[k]}`;
            break;
          }
        }
        // Inventory (shifted)
        if (!tooltipItem) {
          for (let i = 0; i < INV_COLS * INV_ROWS; i++) {
            const col = i % INV_COLS;
            const row = Math.floor(i / INV_COLS);
            const x = INV_START_X + col * (INV_SLOT_SIZE + INV_GAP);
            const y = INV_START_Y + 70 + row * (INV_SLOT_SIZE + INV_GAP);
            if (mouseX >= x && mouseX < x + INV_SLOT_SIZE && mouseY >= y && mouseY < y + INV_SLOT_SIZE) {
              if (player.inventory[i]) {
                tooltipItem = player.inventory[i];
                tooltipSource = `INVENTORY`;
              }
              break;
            }
          }
        }
        // If nothing hovered, show selected if any
        if (!tooltipItem && selectedInvIdx >= 0 && player.inventory[selectedInvIdx]) {
          tooltipItem = player.inventory[selectedInvIdx];
          tooltipSource = `SELECTED`;
        }
      }
    } else {
      const eqSlot = getEquippedSlotAtMouse();
      if (eqSlot && player.equipped[eqSlot]) {
        tooltipItem = player.equipped[eqSlot];
        tooltipSource = `EQUIPPED - ${SLOT_LABEL[eqSlot]}`;
      } else {
        const invIdx = getInventoryIdxAtMouse();
        if (invIdx >= 0 && player.inventory[invIdx]) {
          tooltipItem = player.inventory[invIdx];
          tooltipSource = `INVENTORY [click to equip]`;
        }
      }
    }
    const tx = 10, ty = H - 80, tw = W - 150, th = 65;
    ctx.fillStyle = '#1a1a22'; ctx.fillRect(tx, ty, tw, th);
    ctx.strokeStyle = tooltipItem ? tooltipItem.rarity.color : '#333';
    ctx.lineWidth = 2;
    ctx.strokeRect(tx + 1, ty + 1, tw - 2, th - 2);
    ctx.lineWidth = 1;
    if (tooltipItem) {
      ctx.fillStyle = tooltipItem.rarity.color;
      ctx.font = 'bold 11px monospace'; ctx.textAlign = 'left';
      ctx.fillText(itemDisplayName(tooltipItem), tx + 8, ty + 14);
      ctx.fillStyle = '#666'; ctx.font = '7px monospace';
      const iLvlTag = tooltipItem.itemLevel ? `  iLvl ${tooltipItem.itemLevel}` : '';
      ctx.fillText(`(${SLOT_LABEL[tooltipItem.base.slot] || tooltipItem.base.slot.toUpperCase()})  ${tooltipSource}${iLvlTag}`, tx + 8, ty + 25);
      ctx.fillStyle = '#ddd'; ctx.font = '8px monospace';
      let tipY = 38;
      if (tooltipItem.uniqueId) {
        const udef = getUniqueDef(tooltipItem.uniqueId);
        if (udef && udef.uniqueEffect) {
          ctx.fillStyle = '#ffdd88'; ctx.font = 'bold 8px monospace';
          ctx.fillText('★ ' + udef.uniqueEffect.desc, tx + 8, tipY); tipY += 10;
        }
      }
      if (tooltipItem.legendaryEffectId) {
        const ldef = getLegendaryEffect(tooltipItem.legendaryEffectId);
        if (ldef) {
          ctx.fillStyle = '#ffaa44'; ctx.font = 'italic 8px monospace';
          ctx.fillText('⚡ ' + ldef.desc, tx + 8, tipY); tipY += 10;
        }
      }
      if (tooltipItem.setId) {
        const sdef = getSetDef(tooltipItem.setId);
        if (sdef) {
          ctx.fillStyle = '#44ff88'; ctx.font = 'bold 8px monospace';
          const equipped2 = getActiveSetBonuses(player ? player.equipped : {}).find(b => b.def.id === tooltipItem.setId);
          const cnt = equipped2 ? equipped2.count : 0;
          ctx.fillText('◆ ' + sdef.desc + ' (' + cnt + ' equipped)', tx + 8, tipY); tipY += 8;
          ctx.fillStyle = cnt >= 2 ? '#33ff66' : '#446644'; ctx.font = '7px monospace';
          ctx.fillText('  2pc: ' + sdef.bonus2.desc, tx + 8, tipY); tipY += 8;
          ctx.fillStyle = cnt >= 4 ? '#33ff66' : '#446644';
          ctx.fillText('  4pc: ' + sdef.bonus4.desc, tx + 8, tipY); tipY += 9;
        }
      }
      ctx.fillStyle = '#ddd'; ctx.font = '8px monospace';
      if (tooltipItem.affixes.length === 0) {
        ctx.fillStyle = '#888'; ctx.fillText('(no affixes)', tx + 8, tipY);
      } else {
        for (let i = 0; i < tooltipItem.affixes.length; i++) {
          const aff = tooltipItem.affixes[i];
          ctx.fillText(aff.def.fmt(aff.value), tx + 8, tipY + i * 9);
        }
      }
      // Socket display
      if (tooltipItem.base && tooltipItem.base.maxSockets > 0) {
        const socks = tooltipItem.sockets || [];
        const maxS = tooltipItem.base.maxSockets;
        ctx.font = '7px monospace'; ctx.textAlign = 'right';
        for (let si = 0; si < maxS; si++) {
          const gem = socks[si];
          if (gem && typeof getGemType === 'function') {
            const gt = getGemType(gem.typeId);
            ctx.fillStyle = gt ? gt.color : '#888';
            ctx.fillText('◆ ' + (gt ? gemDisplayName(gem) : gem.typeId), tx + tw - 6, ty + 14 + si * 10);
          } else {
            ctx.fillStyle = '#444';
            ctx.fillText('◇ empty', tx + tw - 6, ty + 14 + si * 10);
          }
        }
        ctx.textAlign = 'left';
      }
    } else {
      ctx.fillStyle = '#555'; ctx.font = '9px monospace'; ctx.textAlign = 'center';
      ctx.fillText('Hover an item to inspect', tx + tw / 2, ty + th / 2 + 3);
      ctx.textAlign = 'left';
    }
  }

  // ============================================================
  // LEGENDARY EFFECT DISPATCHER
  // ============================================================
  // burnTimers: Map<enemy, { dmg, rate, timer }>
  const burnTimers = new Map();
  const slowTimers = new Map();

  function applyLegendaryProc(effectId, enemy, shooter) {
    if (!enemy || !enemy.alive) return;
    switch (effectId) {
      case 'searing':
        burnTimers.set(enemy, { dmg: 4, rate: 1.0, timer: 3.0, elapsed: 0 });
        spawnDamageNumber(enemy.x, enemy.y - enemy.r, 'BURN', { color: '#ff6600', size: 9, vy: -40, life: 0.8 });
        break;
      case 'thunderclap':
        explodeAt(enemy.x, enemy.y, 55, 50);
        spawnBurst(enemy.x, enemy.y, ['#ffff88','#ffdd00','#ffffff','#ffaa00'], 14);
        spawnDamageNumber(enemy.x, enemy.y - enemy.r - 10, 'THUNDER', { color: '#ffff44', size: 10, vy: -50, life: 1.0 });
        shake = Math.min(shake + 3, 8);
        break;
      case 'frostbite':
        slowTimers.set(enemy, { mult: 0.5, timer: 2.0 });
        spawnDamageNumber(enemy.x, enemy.y - enemy.r, 'SLOW', { color: '#88ccff', size: 9, vy: -35, life: 0.8 });
        break;
      case 'shrapnel':
        for (let i = 0; i < 3; i++) {
          const ang = (Math.PI * 2 / 3) * i + Math.random() * 0.5;
          const sdmg = Math.max(1, Math.floor(shooter.weaponDmg * 0.4));
          projectiles.push(new Projectile(enemy.x, enemy.y, Math.cos(ang) * 200, Math.sin(ang) * 200, sdmg, 0.5, false));
        }
        break;
      default: break;
    }
  }
  function applyLegendaryKillProc(effectId, enemy, shooter) {
    switch (effectId) {
      case 'vampiric':
        shooter.hp = Math.min(shooter.maxHp, shooter.hp + 8);
        spawnDamageNumber(shooter.x, shooter.y - shooter.r - 4, '+8 HP', { color: '#55ff55', size: 10, vy: -45, life: 0.9 });
        break;
      case 'berserker':
        shooter.berserkerStacks = Math.min(3, (shooter.berserkerStacks || 0) + 1);
        shooter.berserkerTimer = 3.0;
        spawnDamageNumber(shooter.x, shooter.y - shooter.r - 4, 'BERSERK!', { color: '#ff4400', size: 11, vy: -50, life: 1.0 });
        break;
      case 'soul_harvest':
        shooter.resource = Math.min(shooter.maxResource, shooter.resource + 18);
        spawnDamageNumber(shooter.x, shooter.y - shooter.r - 4, '+18', { color: shooter.class.resourceColor || '#aaddff', size: 10, vy: -45, life: 0.9 });
        break;
      default: break;
    }
  }
  function updateBurnAndSlow(dt) {
    for (const [enemy, burn] of burnTimers) {
      if (!enemy.alive) { burnTimers.delete(enemy); continue; }
      burn.elapsed += dt;
      while (burn.elapsed >= burn.rate && enemy.alive) {
        burn.elapsed -= burn.rate;
        const died = enemy.takeDamage(burn.dmg);
        spawnDamageNumber(enemy.x, enemy.y - enemy.r, burn.dmg, { color: '#ff6600', size: 8 });
        if (died) { handleEnemyDeath(enemy); burnTimers.delete(enemy); break; }
      }
      burn.timer -= dt;
      if (burn.timer <= 0) burnTimers.delete(enemy);
    }
    for (const [enemy, slow] of slowTimers) {
      if (!enemy.alive) { slowTimers.delete(enemy); continue; }
      enemy.speedMult = slow.mult;
      slow.timer -= dt;
      if (slow.timer <= 0) { enemy.speedMult = 1; slowTimers.delete(enemy); }
    }
  }

  // ── Class-specific mechanic ticks (Rage decay, Overpower, buff timers) ────
  function updateClassMechanics(dt) {
    if (!player) return;
    const cls = player.class.id;

    // ─ BERSERKER ─────────────────────────────────────────────────────────────
    if (cls === 'berserker') {
      // Rage decay: 3/sec when not recently hitting & not in Rage frenzy
      if (player.lastHitTimer > 0) {
        player.lastHitTimer -= dt;
      } else if (player.rageTimer <= 0) {
        player.resource = Math.max(0, player.resource - 3 * dt);
      }

      // Overpower: announce when Rage hits cap
      if (player.resource >= player.maxResource && !player.overpowerReady) {
        player.overpowerReady = true;
        spawnDamageNumber(player.x, player.y - 24, 'OVERPOWER!', { color: '#ff4400', size: 13, vy: -55, life: 1.5 });
        spawnBurst(player.x, player.y, ['#ff4400','#ff8844','#ffcc00'], 12);
      }
      if (player.resource < player.maxResource * 0.9) player.overpowerReady = false;

      // Whirlwind tick: AoE hit every 0.15s during spin
      if (player.whirlwindTimer > 0) {
        player.whirlwindTimer -= dt;
        player.whirlwindHitTimer = (player.whirlwindHitTimer || 0) - dt;
        // Pull enemies inward (rank 3+)
        if (player.whirlwindPull) {
          for (const e of enemies) {
            if (!e.alive) continue;
            const dist = Math.hypot(e.x - player.x, e.y - player.y);
            if (dist > player.whirlwindRadius && dist < player.whirlwindRadius * 2.5) {
              const ang = Math.atan2(player.y - e.y, player.x - e.x);
              e.x += Math.cos(ang) * 55 * dt;
              e.y += Math.sin(ang) * 55 * dt;
            }
          }
        }
        // Damage tick
        if (player.whirlwindHitTimer <= 0) {
          player.whirlwindHitTimer = 0.15;
          for (const e of enemies) {
            if (!e.alive) continue;
            if (Math.hypot(e.x - player.x, e.y - player.y) < player.whirlwindRadius) {
              const isCrit = Math.random() * 100 < player.critChance;
              const dmg = player.whirlwindDmg * (isCrit ? 2 : 1);
              const died = e.takeDamage(dmg, { crit: isCrit });
              if (isCrit) player.onCrit();
              if (died) { if (player.whirlwindExtend) player.whirlwindTimer += 0.3; handleEnemyDeath(e); }
            }
          }
          player.resource = Math.min(player.maxResource, player.resource + 4);
          player.lastHitTimer = 1.5;
        }
        if (player.whirlwindTimer <= 0) player.whirlwindTimer = 0;
      }

      // Berserker Rage frenzy timer
      if (player.rageTimer > 0) {
        player.rageTimer -= dt;
        if (player.rageTimer <= 0) {
          player.rageTimer = 0;
          player.rageMoveBonus = 0; player.rageSpeedBonus = 0;
          player.rageDmgBonus = 0; player.rageOverpowerEvery3 = false;
          player.rageHitCount = 0;
        }
      }

      // Blood Tide timer (Rage builds 3x faster, kills restore HP)
      if (player.bloodTideTimer > 0) {
        player.bloodTideTimer -= dt;
        player.resource = Math.min(player.maxResource, player.resource + player.class.rageOnHit * 2 * dt);
        if (player.bloodTideTimer <= 0) {
          player.bloodTideTimer = 0;
          player.bloodTideDmgBonus = 0; player.bloodTideLifesteal = 0;
          player.bloodTideHitCount = 0; player.deathShield = false;
        }
      }

      // Battle Shout damage buff timer
      if (player.shoutTimer > 0) {
        player.shoutTimer -= dt;
        if (player.shoutTimer <= 0) { player.shoutTimer = 0; player.shoutDmgBonus = 0; player.shoutSpeedBonus = 0; }
      }
    }

    // ─ DRUID: extra Spirit regen when summons are active ─────────────────────
    // ─ DRUID ─────────────────────────────────────────────────────────────────
    if (cls === 'druid') {
      // Extra Spirit regen with active summons
      const hasSummon = (player.summons || []).some(s => s && s.alive);
      if (hasSummon) player.resource = Math.min(player.maxResource, player.resource + 3 * dt);

      // Wild Shape passive — form bonuses stored as flags for effectiveDmgMult/Speed
      const form = player.class.wildShape || 'human';
      player.wildShapeDragonDmg   = (form === 'dragon' || form === 'hybrid') ? 0.35 : 0;
      player.wildShapePantherSpd  = (form === 'panther' || form === 'hybrid') ? 0.30 : 0;
      player.wildShapePantherCrit = (form === 'panther' || form === 'hybrid') ? 15 : 0;
      player.wildShapeDragonSlowSpd = (form === 'dragon') ? -0.10 : 0;
      // Spirit drain in non-human form
      if (form !== 'human') {
        player.resource = Math.max(0, player.resource - 2 * dt);
        if (player.resource <= 0 && form !== 'hybrid') {
          player.class = Object.assign({}, player.class, { wildShape: 'human' });
          player.wildShapeDragonDmg = 0; player.wildShapePantherSpd = 0; player.wildShapePantherCrit = 0;
        }
      }

      // Primal Rage (hybrid form ult) timer
      if (player.primalRageTimer > 0) {
        player.primalRageTimer -= dt;
        if (player.primalRageTimer <= 0) {
          player.primalRageTimer = 0;
          player.primalRageDmgBonus = 0; player.primalRageKillHeal = false;
          player.primalRageChainFire = false;
          player.class = Object.assign({}, player.class, { wildShape: 'human' });
        }
      }

      // Cataclysm: periodic lightning strikes
      if (player.cataclysmTimer > 0) {
        player.cataclysmTimer -= dt;
        player.cataclysmNextStrike = (player.cataclysmNextStrike || 0) - dt;
        if (player.cataclysmNextStrike <= 0) {
          player.cataclysmNextStrike = player.cataclysmStrikeInterval || 0.4;
          const alive = enemies.filter(e => e.alive);
          if (alive.length) {
            const t = alive[Math.floor(Math.random() * alive.length)];
            const isCrit = Math.random() * 100 < player.critChance;
            const dmg = (player.cataclysmDmg || 1) * (isCrit ? 2 : 1);
            const died = t.takeDamage(dmg, { crit: isCrit });
            if (isCrit) player.onCrit();
            if (player.cataclysmRoot) t.stunTimer = Math.max(t.stunTimer || 0, 1.2);
            spawnBurst(t.x, t.y, ['#88ddff','#ffee44','#ffffff'], 8);
            spawnDamageNumber(t.x, t.y - t.r, dmg, { color: '#ffee44', crit: isCrit });
            if (died) handleEnemyDeath(t);
            // Chain
            if (player.cataclysmChain) {
              const near = enemies.filter(e => e.alive && e !== t && Math.hypot(e.x-t.x,e.y-t.y) < 60);
              for (const n of near.slice(0,2)) {
                const cd = (player.cataclysmDmg||1)*0.5; const nd = n.takeDamage(cd);
                spawnBurst(n.x,n.y,['#88ddff','#ffffff'],4);
                if (nd) handleEnemyDeath(n);
              }
            }
          }
        }
        if (player.cataclysmTimer <= 0) {
          if (player.cataclysmExplode) {
            for (const e of enemies) {
              if (!e.alive) continue;

            }

          }
          player.cataclysmTimer = 0;
        }
      }

      // Solar Beam: channel damage line every 0.1s
      if (player.solarBeamTimer > 0) {
        player.solarBeamTimer -= dt;
        player.solarBeamHitTimer = (player.solarBeamHitTimer || 0) - dt;
        const beamAngle = Math.atan2(mouseY - player.y, mouseX - player.x);

        const beamDmg = (player.solarBeamDmg || 1) * (superheated ? 2 : 1);

          player.solarBeamHitTimer = 0.10;
          for (const e of enemies) {
            if (!e.alive) continue;
            // Project enemy onto beam axis
            const ex = e.x - player.x, ey = e.y - player.y;
            const along = ex * Math.cos(beamAngle) + ey * Math.sin(beamAngle);
            const perp = Math.abs(-ex * Math.sin(beamAngle) + ey * Math.cos(beamAngle));
            if (along > 0 && perp < beamW + e.r) {
              const isCrit = Math.random()*100 < player.critChance;

          if (player.solarBeamScorch) groundEffects.push({ type:'burn', x:mouseX, y:mouseY, r:30, life:3.0, maxLife:3.0, dmgPerSec:player.solarBeamDmg||1, color:'#ffee44', hit:new Set() });
        }
      }

      // World Tree: periodic acorn projectiles + heal ticks
      if (player.worldTreeTimer > 0) {
        player.worldTreeTimer -= dt;
        player.worldTreeAcornTimer = (player.worldTreeAcornTimer||0) - dt;
        player.worldTreeHealTick = (player.worldTreeHealTick||0) - dt;
        // Heal 2% max HP per second
        if (player.worldTreeHealTick <= 0) {

          const t = enemies.filter(e=>e.alive).sort((a,b)=>Math.hypot(a.x-(player.worldTreeX||player.x),a.y-(player.worldTreeY||player.y)) - Math.hypot(b.x-(player.worldTreeX||player.x),b.y-(player.worldTreeY||player.y)))[0];
          if (t) {
            const spd = 180;
            const dx = t.x-(player.worldTreeX||player.x), dy=t.y-(player.worldTreeY||player.y), d=Math.hypot(dx,dy)||1;
            const proj = new Projectile(player.worldTreeX||player.x, player.worldTreeY||player.y, (dx/d)*spd,(dy/d)*spd, player.worldTreeAcornDmg||1, 0.8, false);
            proj.r=3; proj.theme='nature'; proj.color='#66cc44';
            if (player.worldTreeChainHeal) proj.chainHeal = true;
            projectiles.push(proj);
          }
        }
        if (player.worldTreeTimer <= 0) {
          player.worldTreeTimer = 0;
          if (player.worldTreeErupt) {
            for (const e of enemies) { if (!e.alive) continue; const d=e.takeDamage((player.worldTreeAcornDmg||1)*4); if(d) handleEnemyDeath(e); }
            spawnBurst(player.worldTreeX||player.x, player.worldTreeY||player.y, ['#66cc44','#aaffaa','#ffffff'],28);
            if (!player.summons) player.summons = [];
            for (let i=0;i<3;i++) player.summons.push({ type:'wolf', x:(player.worldTreeX||player.x)+(Math.random()-0.5)*30, y:(player.worldTreeY||player.y)+(Math.random()-0.5)*30, hp:20, maxHp:20, timer:8, dmg:(player.worldTreeAcornDmg||1)*0.5, speed:110, r:6, color:'#aaffcc', attackRate:1.2, attackTimer:0, rank:1 });
          }
        }
      }

    }

    // ─ AMAZONIAN ─────────────────────────────────────────────────────────────
    if (cls === 'amazonian') {
      // Spirit Charge slow bleed — suppressed during Spirit Union drain-stop
      if (!(player.spiritUnionTimer > 0 && player.spiritUnionDrainStop)) {
        player.resource = Math.max(0, player.resource - 1.5 * dt);
      }

      // Spirit Bond passive bonuses (applied each frame as player flags)
      const bond = player.class.spiritBond || 'piranha';
      const unionActive = player.spiritUnionTimer > 0;
      const ubMult = (unionActive && player.spiritUnionBonus) ? player.spiritUnionBonus : 1.0;
      player.bondPiranha   = (bond === 'piranha'   || unionActive);
      player.bondAnaconda  = (bond === 'anaconda'  || unionActive);
      player.bondPanther   = (bond === 'panther'   || unionActive);
      player.bondTarantula = (bond === 'tarantula' || unionActive);
      // Piranha:   life steal + kill-stack aspd ramp — checkCollisions + updateClassMechanics
      // Anaconda:  venom on all attacks + constrict slow — projectile hit path
      // Panther:   +35% speed + +10 crit + bleed-on-crit + kill burst — effectiveSpeed/recomputeStats
      // Tarantula: 25% web root + burst dmg to CC'd — checkCollisions

      // Piranha: kill-stack aspd ramp (stacks added in handleEnemyDeath)
      if (player.bondPiranha) {
        player.piranhaAspdBonus = Math.min((player.piranhaKillStacks || 0) * 0.04, 0.40);
      } else {
        player.piranhaAspdBonus = 0;
        if (bond !== 'piranha') player.piranhaKillStacks = 0;
      }
      // Spirit Union timer
      if (player.spiritUnionTimer > 0) {
        player.spiritUnionTimer -= dt;
        if (player.spiritUnionTimer <= 0) {
          player.spiritUnionTimer = 0;
          player.class = Object.assign({}, player.class, { spiritBond: 'piranha' });
          player.bondPiranha=true; player.bondAnaconda=false; player.bondPanther=false; player.bondTarantula=false;
        }
      }

      // Strafe: rapid javelin burst
      if (player.strafeTimer > 0) {
        player.strafeTimer -= dt;
        player.strafeNext = (player.strafeNext||0) - dt;
        if (player.strafeNext <= 0 && player.strafeCount > 0) {
          player.strafeNext = player.strafeInterval || 0.15;
          player.strafeCount--;
          const target = findNearestEnemy(player.x, player.y, player.weaponRange*1.4) || { x: mouseX, y: mouseY };
          const jitter = (Math.random()-0.5)*0.3;
          const ang = Math.atan2(target.y-player.y, target.x-player.x) + jitter;
          const isCrit = Math.random()*100 < player.critChance;
          const dmg = (player.strafeDmg||1)*(isCrit?2:1);
          const proj = new Projectile(player.x,player.y, Math.cos(ang)*player.weaponProjSpeed,Math.sin(ang)*player.weaponProjSpeed, dmg, 0.5, isCrit);
          proj.r=2.5; proj.theme='arrow'; proj.color='#ffaa44';

        if (player.strafeTimer <= 0 || player.strafeCount <= 0) {

            const t2 = findNearestEnemy(player.x,player.y,999);

              const ang2 = Math.atan2(t2.y-player.y,t2.x-player.x);
              const proj2 = new Projectile(player.x,player.y,Math.cos(ang2)*player.weaponProjSpeed*1.3,Math.sin(ang2)*player.weaponProjSpeed*1.3,(player.strafeDmg||1)*2.5,0.7,true);
              proj2.r=3.5; proj2.theme='arrow'; proj2.color='#ff8800';
              projectiles.push(proj2);
              player.onCrit();
            }
          }
          player.strafeTimer=0; player.strafeCount=0;
        }
      }

      // Spear Storm: periodic spear drops from sky
      if (player.spearStormTimer > 0) {
        player.spearStormTimer -= dt;
        player.spearStormNext = (player.spearStormNext||0) - dt;
        if (player.spearStormNext <= 0 && player.spearStormCount > 0) {
          player.spearStormNext = player.spearStormInterval || 0.10;

          const tx = rngInt(8, W-8), ty = rngInt(8, H-8);

          if (isApex && player.spearStormApex > 0) player.spearStormApex--;

    // ─ SORCERER ──────────────────────────────────────────────────────────────
    if (cls === 'sorcerer') {
      // Inferno Stream: channeled fire cone damage every 0.08s
      if (player.infernoStreamTimer > 0) {

        const superheated = player.infernoStreamTimer < player.infernoStreamSuperheatAt;
        const coneW = player.infernoStreamWidth * (superheated ? 2 : 1);

                for(const n of enemies){if(!n.alive)continue;if(Math.hypot(n.x-e.x,n.y-e.y)<40){const nd=n.takeDamage(burstDmg);spawnBurst(n.x,n.y,['#ffffff','#aaccff'],6);if(nd)handleEnemyDeath(n);}}
                e.slowTimer=0;

              burnTimers.set(e,{elapsed:0,rate:0.5,dmg:coneDmg*0.25,timer:1.5});
              if(died)handleEnemyDeath(e);
            }
          }
        }
        if (player.infernoStreamTimer<=0) {
          player.infernoStreamTimer=0;
          if(player.infernoStreamTrail) groundEffects.push({type:'burn',x:mouseX,y:mouseY,r:50,life:4.0,maxLife:4.0,dmgPerSec:(player.infernoStreamDmg||1)*2,color:'#ff6622',hit:new Set()});
        }
      }

      // Arcane Surge: free casts + auto arcane bolts every 0.4s
      if (player.arcaneSurgeTimer > 0) {
        player.arcaneSurgeTimer -= dt;
        player.arcaneSurgeBoltTimer = (player.arcaneSurgeBoltTimer||0) - dt;
        if (player.arcaneSurgeBoltTimer <= 0) {
          player.arcaneSurgeBoltTimer = 0.4;
          const t = enemies.filter(e=>e.alive).sort((a,b)=>Math.hypot(a.x-player.x,a.y-player.y)-Math.hypot(b.x-player.x,b.y-player.y))[0];
          if (t) {
            const isCrit=Math.random()*100<player.critChance;
            const bDmg=(player.arcaneSurgeBoltDmg||1)*(isCrit?2:1);
            const dx=t.x-player.x,dy=t.y-player.y,d=Math.hypot(dx,dy)||1;
            const proj=new Projectile(player.x,player.y,(dx/d)*player.weaponProjSpeed,(dy/d)*player.weaponProjSpeed,bDmg,0.7,isCrit);
            proj.theme='arcane';proj.r=3;
            if(player.arcaneSurgePierce)proj.piercing=true;
            projectiles.push(proj);
            if(isCrit)player.onCrit();
          }
        }
        if (player.arcaneSurgeTimer<=0) {
          player.arcaneSurgeTimer=0;
          if(player.arcaneSurgeDetonate){
            for(const e of enemies){if(!e.alive)continue;const died=e.takeDamage((player.arcaneSurgeBoltDmg||1)*6);spawnBurst(e.x,e.y,['#dd66ff','#ffffff'],8);if(died)handleEnemyDeath(e);}
            spawnBurst(player.x,player.y,['#dd66ff','#aa44ff','#ffffff'],32);

      }

      // Time Freeze: 2× attack speed during freeze
      if (player.timeFreezeTimer > 0) {

      }

      // Meteor Shower: drop meteors periodically
      if (player.meteorShowerTimer > 0) {
        player.meteorShowerTimer -= dt;
        player.meteorShowerMeteorTimer = (player.meteorShowerMeteorTimer||0) - dt;
        if (player.meteorShowerMeteorTimer<=0) {
          player.meteorShowerMeteorTimer = 1.0/(player.meteorShowerRate||1);
          player.meteorShowerCount = (player.meteorShowerCount||0)+1;
          const isMega = player.meteorShowerMegaFinal && player.meteorShowerTimer<=0;
          const tx=rngInt(10,W-10),ty=rngInt(10,H-10);

              if(player.meteorShowerChain){const near=enemies.filter(n=>n.alive&&n!==e&&Math.hypot(n.x-e.x,n.y-e.y)<60).slice(0,2);for(const n of near){const nd=n.takeDamage(dmg*0.5);spawnBurst(n.x,n.y,['#ff8800','#ffdd44'],6);if(nd)handleEnemyDeath(n);}}
              spawnDamageNumber(e.x,e.y-e.r,isCrit?dmg*2:dmg,{color:'#ff4400',crit:isCrit});

            }

          groundEffects.push({type:'shockwave',x:tx,y:ty,r:10,maxR:radius,damage:0,life:0.4,maxLife:0.4,color:'#ff4400',hit:new Set(),target:'none'});

      // Singularity: pull all enemies toward the black hole
      if (player.singularityTimer > 0) {
        player.singularityTimer -= dt;
        for (const e of enemies) {

          const dx=(player.singularityX||mouseX)-e.x, dy=(player.singularityY||mouseY)-e.y;
          const d=Math.hypot(dx,dy)||1;
          const force=(player.singularityPullForce||80)*dt*(1-Math.min(1,d/200));

          shake=Math.min(shake+8,14);hitPauseTimer=Math.max(hitPauseTimer,0.12);

    }

    // ─ ASSASSIN ──────────────────────────────────────────────────────────────
    if (cls === 'assassin') {
      // Shadow Realm: invulnerability + 2× damage (iframeTimer handles invulnerability)
      if (player.shadowRealmTimer > 0) {

            for(let i=0;i<bCount;i++){const a=(i/bCount)*Math.PI*2;const proj=new Projectile(player.x,player.y,Math.cos(a)*player.weaponProjSpeed,Math.sin(a)*player.weaponProjSpeed,bDmg,0.6,true);proj.theme='shadow';proj.r=2;projectiles.push(proj);}
            player.onCrit();spawnBurst(player.x,player.y,['#cc0066','#ff88aa','#ffffff'],32);
          }
        }
      }
    }

  // ── TEMPLAR CLASS MECHANICS ───────────────────────────────────
  if (player.class.id === 'templar') {

    // Tick judged on all enemies (shared with Crusader, handled here and below)
    for (const e of enemies) {
      if (!e.alive) continue;
      if ((e.judged || 0) > 0) {
        e.judged -= dt;
        if (e.judged <= 0) { e.judged = 0; e.judgedMult = 1.0; }
      }
    }

    // ── Epiphany: speed boost, free casts, enemy pull ─────────
    if (player.epiphanyTimer > 0) {
      player.epiphanyTimer -= dt;
      // Pull enemies toward player if rank>=4
      if (player.epiphanyPull) {
        for (const e of enemies) {

      if (player.epiphanyTimer <= 0) {

            }
          }
          spawnDamageNumber(player.x, player.y - 30, 'EPIPHANY EXIT!', { color: '#ffeecc', size: 13, vy: -55, life: 1.5 });
          shake = Math.min(shake + 5, 10);
        }
        player.epiphanyFreeCasts = false;
        player.epiphanySpeedBonus = 0;
        player.epiphanyPull = false;
        player.epiphanyCyclone = false;
      }
    }

    // ── Inner Fire: periodic fire aura damage ─────────────────
    if (player.innerFireTimer > 0) {
      player.innerFireTimer -= dt;
      player.innerFireHitTimer = (player.innerFireHitTimer || 0) + dt;
      if (player.innerFireHitTimer >= 0.4) {
        player.innerFireHitTimer = 0;
        const auraR = player.innerFireRadius || 50;
        const dmg = player.innerFireDmg || (player.weaponDamage * player.dmgMult * 0.6);
        for (const e of enemies) {
          if (!e.alive) continue;

            if (died) {
              handleEnemyDeath(e);

              if (player.innerFireExplodeKill) {
                for (const n of enemies) {
                  if (!n.alive || n === e) continue;

            if (Math.hypot(e.x - player.x, e.y - player.y) < detR) {
              const died = e.takeDamage(detDmg, { crit: true, color: '#ff8822' });
              player.onCrit(); spawnBurst(e.x, e.y, ['#ff8822', '#ffcc44', '#ffffff'], 14);
              if (died) handleEnemyDeath(e);
            }
          }
          spawnBurst(player.x, player.y, ['#ff8822', '#ffcc44', '#ffffff'], 28);
          spawnDamageNumber(player.x, player.y - 30, 'INNER FIRE DETONATED!', { color: '#ff8822', size: 13, vy: -58, life: 1.6 });
          shake = Math.min(shake + 6, 12);
        }
        player.innerFireDmg = 0; player.innerFireHitTimer = 0;
      }
    }

    // ── Transcendence: path AoE + iframe + detonate on exit ───
    if (player.transcendenceTimer > 0) {
      player.transcendenceTimer -= dt;
      player.iframeTimer = Math.max(player.iframeTimer, dt + 0.05); // rolling iframe
      player.transcendenceStepTimer = (player.transcendenceStepTimer || 0) + dt;
      if (player.transcendenceStepTimer >= 0.25) {
        player.transcendenceStepTimer = 0;
        const stepR = player.transcendenceRadius || 40;
        const stepDmg = player.transcendenceDmg || (player.weaponDamage * player.dmgMult * 0.8);
        for (const e of enemies) {
          if (!e.alive) continue;
          if (Math.hypot(e.x - player.x, e.y - player.y) < stepR) {
            const isCrit = Math.random() * 100 < player.effectiveCritChance();
            const fd = isCrit ? stepDmg * 2 : stepDmg;
            const died = e.takeDamage(fd, { crit: isCrit, color: '#ffeecc' });
            if (isCrit) player.onCrit();
            spawnBurst(e.x, e.y, ['#ffeecc', '#ffdd44', '#ffaa44'], 6);
            if (died) {
              if (player.transcendenceHealKill)
                player.hp = Math.min(player.maxHp, player.hp + Math.ceil(fd * 0.5));
              handleEnemyDeath(e);
            }
          }
        }
        spawnBurst(player.x, player.y, ['#ffeecc', '#ffaa44'], 4);
      }
      if (player.transcendenceTimer <= 0) {
        player.transcendenceTimer = 0;
        // Linger iframe (rank 4)
        if (player.transcendenceLingerIframe > 0)
          player.iframeTimer = Math.max(player.iframeTimer, player.transcendenceLingerIframe);
        // Detonate on exit (rank 5)
        if (player.transcendenceDetonate) {
          const detDmg = player.weaponDamage * player.dmgMult * 5;
          for (const e of enemies) {
            if (!e.alive) continue;
            const died = e.takeDamage(detDmg, { crit: true, color: '#ffeecc' });
            player.onCrit(); spawnBurst(e.x, e.y, ['#ffeecc', '#ffdd44', '#ffffff'], 10);
            if (died) handleEnemyDeath(e);
          }
          spawnBurst(player.x, player.y, ['#ffeecc', '#ffdd44', '#ffffff'], 36);
          spawnDamageNumber(player.x, player.y - 32, 'TRANSCEND DETONATES!', { color: '#ffeecc', size: 14, vy: -62, life: 1.8 });
          shake = Math.min(shake + 8, 14);
        }
        player.transcendenceDmg = 0;
      }
    }

  } // end Templar

  // ── CRUSADER CLASS MECHANICS ──────────────────────────────────
  if (player.class.id === 'crusader') {

    // Judged tick (Crusader owns this)
    for (const e of enemies) {
      if (!e.alive) continue;
      if ((e.judged || 0) > 0) {
        e.judged -= dt;
        if (e.judged <= 0) { e.judged = 0; e.judgedMult = 1.0; }
      }
    }

    // ── Blessing of Might: buff timer + kill burst effect ─────
    if (player.blessingTimer > 0) {
      player.blessingTimer -= dt;
      if (player.blessingTimer <= 0) {
        player.blessingTimer = 0;
        player.blessingDmgBonus = 0; player.blessingAspdBonus = 0;
        player.blessingKillBurst = false;
      }
    }

    // ── Crusader's Edge: cleave Wrath fill + auto Fury ────────
    if (player.crusaderEdgeTimer > 0) {
      player.crusaderEdgeTimer -= dt;
      // Passive Wrath generation (faster than base regen)
      const furyRate = (player.crusaderFuryFill || 1) * (player.class.baseResourceRegen || 7) * dt;
      player.resource = Math.min(player.maxResource, player.resource + furyRate);
      // Auto-trigger Righteous Fury at max Wrath every ~10s (rank 5)
      if (player.crusaderEdgeAutoFury) {
        player.crusaderAutoFuryTimer = (player.crusaderAutoFuryTimer || 0) + dt;
        if (player.crusaderAutoFuryTimer >= 10 && player.resource >= player.maxResource * 0.8) {
          player.crusaderAutoFuryTimer = 0;
          // Righteous Fury: massive cleave burst
          const furyDmg = player.weaponDamage * player.dmgMult * 3.5;
          const furyR = 100;
          for (const e of enemies) {
            if (!e.alive) continue;
            if (Math.hypot(e.x - player.x, e.y - player.y) < furyR) {
              const died = e.takeDamage(furyDmg, { crit: true, color: '#ffe866' });
              player.onCrit(); spawnBurst(e.x, e.y, ['#ffe866', '#ffcc44', '#ffffff'], 10);
              if (died) {
                if (player.crusaderEdgeHealFury)
                  player.hp = Math.min(player.maxHp, player.hp + Math.ceil(player.maxHp * 0.20));
                handleEnemyDeath(e);
              }
            }
          }
          player.resource = 0;
          spawnBurst(player.x, player.y, ['#ffe866', '#ffcc44', '#ffffff'], 24);
          spawnDamageNumber(player.x, player.y - 28, 'RIGHTEOUS FURY!', { color: '#ffe866', size: 13, vy: -55, life: 1.5 });
          shake = Math.min(shake + 5, 10);
        }
      }
      if (player.crusaderEdgeTimer <= 0) {
        player.crusaderEdgeTimer = 0;
        player.crusaderEdgeDmgBonus = 0;
        player.crusaderFuryFill = 1;
        player.crusaderEdgeAutoFury = false;
        player.crusaderAutoFuryTimer = 0;
      }
    }

  } // end Crusader

  // ── SHAMAN CLASS MECHANICS ────────────────────────────────────
  if (player.class.id === 'shaman') {

    // ── Cursed status tick on all enemies ─────────────────────
    for (const e of enemies) {
      if (!e.alive) continue;
      if ((e.cursed || 0) > 0) {
        e.cursed -= dt;
        if (e.cursed <= 0) { e.cursed = 0; e.cursedMult = 1.0; }
      }
    }

    // ── Spirit Totem: fires at nearest enemy ──────────────────
    if (player.spiritTotemTimer > 0) {
      player.spiritTotemTimer -= dt;
      player.spiritTotemHitTimer = (player.spiritTotemHitTimer || 0) + dt;
      const fireInterval = 1.0 / (player.spiritTotemFireRate || 1.0);
      if (player.spiritTotemHitTimer >= fireInterval) {
        player.spiritTotemHitTimer = 0;
        const tx = player.spiritTotemX || player.x;
        const ty = player.spiritTotemY || player.y;
        const targets = [];
        const sorted = enemies.filter(e=>e.alive).sort((a,b)=>Math.hypot(a.x-tx,a.y-ty)-Math.hypot(b.x-tx,b.y-ty));
        const numTargets = player.spiritTotemTargets || 1;
        for (let i=0;i<numTargets&&i<sorted.length;i++) targets.push(sorted[i]);
        for (const t of targets) {
          const dx=t.x-tx, dy=t.y-ty, d=Math.hypot(dx,dy)||1;
          const sp = player.weaponProjSpeed * 1.1;
          const dmg = player.spiritTotemDmg || (player.weaponDamage * player.dmgMult * 1.2);
          const isCrit = Math.random()*100 < player.effectiveCritChance();
          const fd = isCrit ? dmg*2 : dmg;
          const proj = new Projectile(tx, ty, (dx/d)*sp, (dy/d)*sp, fd, d/sp+0.1, isCrit);
          proj.r = 4; proj.theme = 'arcane';
          if (isCrit) player.onCrit();
          if (player.spiritTotemHex) {
            proj.onHit = (e) => { e.cursed = Math.max(e.cursed||0, 4); e.cursedMult = 1.35; };
          }
          projectiles.push(proj);
          spawnBurst(tx, ty, ['#aaff44','#55dd66'], 4);
        }
      }
      if (player.spiritTotemTimer <= 0) {
        player.spiritTotemTimer = 0;
        if (player.spiritTotemExplode) {
          const tx = player.spiritTotemX || player.x;
          const ty = player.spiritTotemY || player.y;
          const expDmg = player.weaponDamage * player.dmgMult * 4;
          for (const e of enemies) {
            if (!e.alive) continue;
            if (Math.hypot(e.x-tx, e.y-ty) < 90) {
              const died = e.takeDamage(expDmg, {crit:true,color:'#aaff44'});
              player.onCrit(); spawnBurst(e.x,e.y,['#aaff44','#55dd66','#ffffff'],10);
              if (died) handleEnemyDeath(e);
            }
          }
          spawnBurst(tx, ty, ['#aaff44','#55dd66','#ffffff'], 24);
          shake = Math.min(shake+5,10);
        }
        player.spiritTotemDmg = 0; player.spiritTotemHex = false;
      }
    }

    // ── Spirit Walk: rolling iframe + speed bonus + exit effects ─
    if ((player.spiritWalkTimer || 0) > 0) {
      player.spiritWalkTimer -= dt;
      player.iframeTimer = Math.max(player.iframeTimer, dt + 0.05);
      // Trail of spirit pools
      if (player.spiritWalkTrail) {
        groundEffects.push({type:'burn',x:player.x,y:player.y,r:20,life:1.5,maxLife:1.5,dmgPerSec:player.weaponDamage*player.dmgMult*0.4,color:'#99eeff',hit:new Set()});
      }
      if (player.spiritWalkTimer <= 0) {
        player.spiritWalkTimer = 0;
        if (player.spiritWalkFillMana) player.resource = player.maxResource;
        // Exit AoE burst
        const exitDmg = player.weaponDamage * player.dmgMult * 3;
        for (const e of enemies) {
          if (!e.alive) continue;
          if (Math.hypot(e.x-player.x,e.y-player.y)<100) {
            const died=e.takeDamage(exitDmg,{crit:true,color:'#99eeff'});
            player.onCrit(); spawnBurst(e.x,e.y,['#99eeff','#55ddcc','#ffffff'],10);
            if (died) handleEnemyDeath(e);
          }
        }
        // Summon spirits (rank 5)
        if (player.spiritWalkSummon) {
          if (!player.summons) player.summons=[];
          for (let s=0;s<3;s++){const a=(s/3)*Math.PI*2;player.summons.push({type:'spirit',x:player.x+Math.cos(a)*25,y:player.y+Math.sin(a)*25,hp:999,maxHp:999,alive:true,life:8,dmg:player.weaponDamage*player.dmgMult*1.2,fireTimer:0,fireRate:1.2,r:6,theme:'spirit'});}
        }
        spawnBurst(player.x,player.y,['#99eeff','#55ddcc','#ffffff'],24);
        player.spiritWalkSpeedBonus = 0;
        player.spiritWalkFillMana = false;
        player.spiritWalkTrail = false;
        player.spiritWalkSummon = false;
      }
    }

    // ── Spirit Storm: random lightning bolts each frame tick ──
    if ((player.spiritStormTimer || 0) > 0) {
      player.spiritStormTimer -= dt;
      player.spiritStormBoltTimer = (player.spiritStormBoltTimer || 0) + dt;
      if (player.spiritStormBoltTimer >= (player.spiritStormInterval || 0.40)) {
        player.spiritStormBoltTimer = 0;
        const dmg = player.spiritStormDmg || (player.weaponDamage * player.dmgMult * 3);
        let target;
        if (player.spiritStormSeek) {
          // Prefer cursed enemies
          const cursed = enemies.filter(e=>e.alive&&(e.cursed||0)>0);
          const pool = cursed.length ? cursed : enemies.filter(e=>e.alive);
          target = pool[Math.floor(Math.random()*pool.length)];
        } else {
          const alive = enemies.filter(e=>e.alive);
          target = alive[Math.floor(Math.random()*alive.length)];
        }
        if (target) {
          const isCrit = Math.random()*100 < player.effectiveCritChance();
          let fd = dmg*(isCrit?2:1);
          if (player.spiritStormDetonate && (target.cursed||0)>0) fd *= 10;
          const died = target.takeDamage(fd,{crit:isCrit,color:'#cceeff'});
          if (isCrit) player.onCrit();
          spawnBurst(target.x,target.y,['#cceeff','#88ddff','#ffffff'],12);
          spawnDamageNumber(target.x,target.y-target.r,fd,{color:'#cceeff',crit:isCrit});
          if (died) handleEnemyDeath(target);
        }
      }
      if (player.spiritStormTimer <= 0) {
        player.spiritStormTimer = 0;
        player.spiritStormDmg = 0;
        player.spiritStormBoltTimer = 0;
      }
    }

    // ── Summon tick (shared: spirits + skeleton warriors for Shaman) ─
    if (player.summons && player.summons.length) {
      for (let i = player.summons.length-1; i >= 0; i--) {
        const s = player.summons[i];
        if (!s.alive) { player.summons.splice(i,1); continue; }
        s.life -= dt;
        if (s.life <= 0) {
          if (s.explodeOnDeath) {
            const expDmg = player.weaponDamage*player.dmgMult*2.5;
            for (const e of enemies){if(!e.alive)continue;if(Math.hypot(e.x-s.x,e.y-s.y)<55){const d=e.takeDamage(expDmg,{crit:false,color:'#aaff44'});spawnBurst(e.x,e.y,['#aaff44','#ffffff'],8);if(d)handleEnemyDeath(e);}}
            spawnBurst(s.x,s.y,['#aaff44','#55dd66','#ffffff'],16);
          }
          player.summons.splice(i,1); continue;
        }
        // Move toward nearest enemy
        const target = findNearestEnemy(s.x,s.y,200);
        if (target) {
          const dx=target.x-s.x,dy=target.y-s.y,d=Math.hypot(dx,dy)||1;
          if (d > 30) { s.x+=(dx/d)*80*dt; s.y+=(dy/d)*80*dt; }
          s.fireTimer=(s.fireTimer||0)+dt;
          if (s.fireTimer>=1.0/(s.fireRate||1.0)){
            s.fireTimer=0;
            const isCrit=s.copyPlayerCrit?Math.random()*100<player.effectiveCritChance():false;
            const dmg=s.dmg*(isCrit?2:1);
            const died=target.takeDamage(dmg,{crit:isCrit,color:s.theme==='spirit'?'#aaff88':'#ccbbee'});
            if(isCrit)player.onCrit();
            spawnBurst(target.x,target.y,[s.theme==='spirit'?'#aaff88':'#ccbbee','#ffffff'],6);
            if(died)handleEnemyDeath(target);
          }
        }
      }
    }

  } // end Shaman

  // ── NECROMANCER CLASS MECHANICS ───────────────────────────────
  if (player.class.id === 'necromancer') {

    // ── Cursed tick (necro also uses cursed via hexBolt synergies)
    for (const e of enemies) {
      if (!e.alive) continue;
      if ((e.cursed || 0) > 0) { e.cursed -= dt; if (e.cursed<=0){e.cursed=0;e.cursedMult=1.0;} }
      // Bone Crack decay
      if ((e.boneCrack || 0) > 0) {
        e.boneCrackDecayTimer = (e.boneCrackDecayTimer||0)+dt;
        if (e.boneCrackDecayTimer >= 6.0) { e.boneCrack=0; e.boneCrackMult=1.0; e.boneCrackDecayTimer=0; }
      }
      // Necrotic Apocalypse mark tick
      if ((e.necroApocMark || 0) > 0) {
        e.necroApocMark -= dt;
        if (e.necroApocMark <= 0.1 && e.necroApocMark > 0) {
          // Deadline — obliterate or detonate
          const finDmg = player.weaponDamage * player.dmgMult * (player.necroApocMult || 10);
          const died = e.takeDamage(finDmg, {crit:true, color:'#440066'});
          player.onCrit();
          spawnBurst(e.x,e.y,['#440066','#9944cc','#ffffff'],16);
          e.necroApocMark = 0;
          if (died) {
            if (player.necroApocRaiseSkeleton) {
              if(!player.summons)player.summons=[];
              player.summons.push({type:'skeleton',x:e.x,y:e.y,hp:player.maxHp*0.3,maxHp:player.maxHp*0.3,alive:true,life:10,dmg:player.weaponDamage*player.dmgMult*0.9,fireTimer:0,fireRate:1.1,r:6,theme:'arcane',explodeOnDeath:player.necroApocCorpseExplode});
            }
            handleEnemyDeath(e);
          }
        }
      }
    }

    // ── Lich Form: dmg buff + free casts + bone armor rolling ─
    if ((player.lichFormTimer || 0) > 0) {
      player.lichFormTimer -= dt;
      player.boneArmorCharges = Math.max(player.boneArmorCharges||0, 1); // always at least 1 charge
      if (player.lichFormKillFill) {
        // Passive: small Necrotic Power trickle (kill hook is in handleEnemyDeath)
      }
      if (player.lichFormTimer <= 0) {
        player.lichFormTimer = 0;
        player.lichFormDmgBonus = 0;
        player.lichFormFreeCasts = false;
        player.lichFormBoneArmor = false;
        // Revive mechanic flag persists for rest of wave (rank 5)
        if (!player.lichFormRevive) player.lichFormRevive = false;
        player.boneArmorCharges = Math.min(player.boneArmorCharges, 3);
        spawnDamageNumber(player.x,player.y-26,'LICH FADES',{color:'#7755aa',size:10,vy:-40,life:1.0});
      }
    }

    // ── Blood Ritual: guaranteed crits timer ──────────────────
    if ((player.bloodRitualCritTimer || 0) > 0) {
      player.bloodRitualCritTimer -= dt;
      if (player.bloodRitualCritTimer <= 0) player.bloodRitualCritTimer = 0;
    }

    // ── Bone Storm: orbital AoE + shard bursts ────────────────
    if ((player.boneStormTimer || 0) > 0) {
      player.boneStormTimer -= dt;
      player.boneStormAngle = (player.boneStormAngle || 0) + dt * 3.5;
      player.boneStormHitTimer = (player.boneStormHitTimer || 0) + dt;
      // Hit enemies in orbit zone every 0.25s
      if (player.boneStormHitTimer >= 0.25) {
        player.boneStormHitTimer = 0;
        const orbitR = (player.boneStormExpand && player.boneStormTimer < 2.0) ? 160 : (player.boneStormRadius || 75);
        const dmg = player.boneStormDmg || (player.weaponDamage * player.dmgMult * 2);
        for (const e of enemies) {
          if (!e.alive) continue;
          if (Math.hypot(e.x-player.x, e.y-player.y) < orbitR) {
            const isCrit = Math.random()*100 < player.effectiveCritChance();
            const fd = dmg*(isCrit?2:1);
            const died = e.takeDamage(fd,{crit:isCrit,color:'#ccbbee'});
            if (isCrit) player.onCrit();
            spawnBurst(e.x,e.y,['#ccbbee','#9988cc'],5);
            if (died) handleEnemyDeath(e);
          }
        }
        // Orbit visual indicator
        const ox = player.x + Math.cos(player.boneStormAngle)*(player.boneStormRadius||75);
        const oy = player.y + Math.sin(player.boneStormAngle)*(player.boneStormRadius||75);
        spawnBurst(ox, oy, ['#ccbbee','#9988cc'], 3);
      }
      // Outward shards every 1s (rank 3)
      if (player.boneStormShards) {
        player.boneStormShardTimer = (player.boneStormShardTimer||0)+dt;
        if (player.boneStormShardTimer >= 1.0) {
          player.boneStormShardTimer = 0;
          const shardDmg = (player.boneStormDmg||1)*0.8;
          const count=8;
          for(let i=0;i<count;i++){const a=(i/count)*Math.PI*2;const sp=player.weaponProjSpeed*1.2;const proj=new Projectile(player.x,player.y,Math.cos(a)*sp,Math.sin(a)*sp,shardDmg,0.7,false);proj.r=3;proj.theme='arcane';proj.piercing=true;projectiles.push(proj);}
        }
      }
      if (player.boneStormTimer <= 0) {
        player.boneStormTimer = 0;
        player.boneStormDmg = 0;
        spawnBurst(player.x,player.y,['#ccbbee','#9988cc','#ffffff'],20);
      }
    }

    // ── Necromancer summon tick (skeletons) ───────────────────
    if (player.summons && player.summons.length) {
      for (let i = player.summons.length-1; i>=0; i--) {
        const s = player.summons[i];
        if (!s.alive) { player.summons.splice(i,1); continue; }
        s.life -= dt;
        if (s.life <= 0) {
          if (s.explodeOnDeath){const expDmg=player.weaponDamage*player.dmgMult*2.0;for(const e of enemies){if(!e.alive)continue;if(Math.hypot(e.x-s.x,e.y-s.y)<60){const d=e.takeDamage(expDmg,{crit:false,color:'#9988cc'});spawnBurst(e.x,e.y,['#9988cc','#ccbbee','#ffffff'],10);if(d)handleEnemyDeath(e);}}spawnBurst(s.x,s.y,['#9988cc','#ccbbee','#ffffff'],18);}
          player.summons.splice(i,1); continue;
        }
        const target2 = findNearestEnemy(s.x,s.y,220);
        if (target2) {
          const dx=target2.x-s.x,dy=target2.y-s.y,d=Math.hypot(dx,dy)||1;
          if(d>28){s.x+=(dx/d)*75*dt;s.y+=(dy/d)*75*dt;}
          s.fireTimer=(s.fireTimer||0)+dt;
          if(s.fireTimer>=1.0/(s.fireRate||1.1)){
            s.fireTimer=0;
            const isCrit=s.copyPlayerCrit?Math.random()*100<player.effectiveCritChance():Math.random()*100<8;
            const dmg2=s.dmg*(isCrit?2:1);
            const died2=target2.takeDamage(dmg2,{crit:isCrit,color:'#ccbbee'});
            if(isCrit)player.onCrit();
            spawnBurst(target2.x,target2.y,['#ccbbee','#9988cc'],6);
            if(died2)handleEnemyDeath(target2);
          }
        }
      }
    }

  } // end Necromancer

  // ── Shared bleed tick — runs for ALL classes (Druid Panther form + Amazonian Panther bond) ──
  for (const e of enemies) {
    if (!e.alive) continue;
    if ((e.bleedTimer||0) > 0) {
      e.bleedTimer -= dt;
      e.bleedElapsed = (e.bleedElapsed||0) + dt;
      while (e.bleedElapsed >= 0.5) {
        e.bleedElapsed -= 0.5;
        const died = e.takeDamage(e.bleedDmg||1);
        spawnDamageNumber(e.x, e.y-e.r, e.bleedDmg||1, { color:'#cc2222', size:8 });
        if (died) { handleEnemyDeath(e); break; }
      }
      if (e.bleedTimer <= 0) { e.bleedTimer=0; e.bleedElapsed=0; }
    }
  }

  } // end updateClassMechanics



  // ============================================================
  // HUB SCREEN — Blacksmith, Jeweler, Stash, Shopkeeper
  // ============================================================
  function drawHubScreen() {
    ctx.fillStyle = '#0e0e16'; ctx.fillRect(0, 0, W, H);
    // Title
    ctx.fillStyle = '#ffd040'; ctx.font = 'bold 16px monospace'; ctx.textAlign = 'center';
    ctx.fillText('THE SLAYER HUB', W / 2, 22);
    ctx.fillStyle = '#888'; ctx.font = '8px monospace';
    ctx.fillText('Your gems: ' + (player ? (player.gems || []).length : 0) + '/' + (player ? player.GEM_CAP : 50) + '  |  Gold: ' + (player ? player.gold : 0) + 'g', W / 2, 34);

    if (!hubSubMenu) {
      // 4-panel NPC layout
      const panels = [
        { id: 'blacksmith', label: 'BLACKSMITH',   icon: '⚒',  color: '#ff8844', desc: 'Add sockets to items' },
        { id: 'jeweler',    label: 'JEWELER',       icon: '◆',  color: '#44ccff', desc: 'Socket & combine gems' },
        { id: 'stash',      label: 'STASH',         icon: '⬛', color: '#aaaaff', desc: 'Shared item storage' },

  function isTreeView() {
