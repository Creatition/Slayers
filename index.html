<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Slayers — Phase 9 (split)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    background: #0e0e12;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    color: #ddd;
    user-select: none;
  }
  body {
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
  }
  #game {
    image-rendering: pixelated; image-rendering: crisp-edges;
    background: #14181a; border: 2px solid #444;
    width: min(1280px, 96vw); height: min(720px, 54vw);
    box-shadow: 0 0 60px rgba(122, 217, 107, 0.08);
    cursor: crosshair;
  }
  #hud {
    font-size: 12px; color: #888; letter-spacing: 1px;
    display: flex; gap: 16px; flex-wrap: wrap; justify-content: center;
  }
  #hud .label { color: #5a5a66; }
  #hud .value { color: #eee; }
  #hud .accent { color: #7ad96b; }
</style>
</head>
<body>
  <canvas id="game" width="640" height="360"></canvas>
  <div id="hud">
    <div><span class="label">INPUT:</span> <span id="device" class="accent">keyboard</span></div>
    <div><span class="label">MOVE:</span> <span class="value">WASD / Stick</span></div>
    <div><span class="label">ABILITIES:</span> <span class="value">1-4 / Face Btns</span></div>
    <div><span class="label">INVENTORY:</span> <span class="value">Tab / I / Select</span></div>
    <div><span class="label">MENU CURSOR:</span> <span class="value">Stick / D-pad</span></div>
    <div><span class="label">RESTART:</span> <span class="value">R</span></div>
  </div>

<script src="src/data.js"></script>
<script src="src/sprites.js"></script>
<script src="src/entities.js"></script>
<script src="src/sfx.js"></script>
<script>
// =============================================================================
// SLAYERS — index.html inline script
// Glue: state vars + input + world helpers + render + main loop.
// Constants live in src/data.js; entity classes in src/entities.js.
// All declarations here are globals (no IIFE) so the cross-file references work.
// =============================================================================
  // ============================================================
  // CANVAS + DOM
  // ============================================================
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  const W = canvas.width;
  const H = canvas.height;
  const $device = document.getElementById('device');

  // ============================================================
  // GAME STATE
  // ============================================================
  const STATE = { PLAYING: 0, LEVELUP: 1, INTERMISSION: 2, DEAD: 3, INVENTORY: 4, ABILITYDRAFT: 5, SHOP: 6, VICTORY: 7, CLASS_SELECT: 8, STASH_BANKING: 9, TRIAL_LOADOUT: 10 };
  let state = STATE.PLAYING;
  let prevState = STATE.PLAYING;
  let levelUpChoices = [];
  let abilityDraftChoices = [];
  let intermissionTimer = 0;
  let waveTimer = 0;
  let currentWave = 1;
  let spawnTimer = 0;
  let shake = 0;
  let levelUpFlashTimer = 0;
  let lootFlashTimer = 0;
  let lastLootName = '';
  let bossBannerTimer = 0;
  let bossDefeatedBannerTimer = 0;
  let lastBossName = '';
  let goldFlashTimer = 0;
  let biomeBannerTimer = 0;

  // Shop / blacksmith state
  let shopItems = [];
  let shopLocked = [false, false, false, false];
  let shopRefreshCost = 5;
  let selectedInvIdx = -1;
  let levelUpRerollCost = 1;
  let currentBiomeId = '';
  let selectedClassId = 'archer';
  // Persistent stash (saved to localStorage across runs)
  let stash = [];
  // STASH_SIZE_INIT moved to src/data.js
  let stashSize = STASH_SIZE_INIT;
  let pendingBank = null; // { source: 'inv'|'eq', key: idxNumber|slotName }
  // SAVE_KEY + SAVE_VERSION moved to src/data.js
  // Slayer Trials (Phase 9)
  let runMode = 'standard';  // 'standard' or 'trial'
  let trialTier = 1;
  let unlockedTrialTier = 1; // highest tier the player can attempt
  // TRIAL_MAX_TIER + TRIAL_MULT moved to src/data.js
  // Loadout state — slot -> stashIndex (which stash item to pre-equip per slot)
  let loadout = {};

  let activeDevice = 'keyboard';
  let detectedGamepadType = null;

  let player;
  let enemies = [];
  let projectiles = [];
  let enemyProjectiles = [];
  let xpGems = [];
  let itemDrops = [];
  let particles = [];
  let groundEffects = []; // shockwaves, meteor warnings
  let damageNumbers = []; // floating damage text
  let bossRef = null;
  let floorDecorations = [];
  let hitPauseTimer = 0; // brief freeze-frame on crits for impact

  // ============================================================
  // INPUT
  // ============================================================
  const Actions = { moveX: 0, moveY: 0 };
  const keys = new Set();
  const keyJustPressed = new Set();
  const gpButtonsLast = new Map();
  const gpJustPressed = new Set();
  let mouseX = -1, mouseY = -1;
  let mouseClicked = false;
  let rightClicked = false;
  let virtualCursor = { x: W / 2, y: H / 2, active: false, idleTimer: 0 };
  let gpClassIdx = 0; // highlighted card index for gamepad nav on class select
  const CURSOR_SPEED = 260; // px/sec
  let dpadCooldown = 0;

  window.addEventListener('keydown', (e) => {
    const k = e.key.toLowerCase();
    if (!keys.has(k)) keyJustPressed.add(k);
    keys.add(k);
    // Lazy-init audio on first user gesture (browsers require this).
    Sfx.init(); Sfx.resume();
    const blocked = ['arrowup','arrowdown','arrowleft','arrowright',' ','tab','i'];
    if (blocked.includes(k)) e.preventDefault();
  });
  window.addEventListener('keyup', (e) => keys.delete(e.key.toLowerCase()));
  window.addEventListener('blur', () => keys.clear());
  canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    mouseX = (e.clientX - rect.left) * (W / rect.width);
    mouseY = (e.clientY - rect.top) * (H / rect.height);
  });
  canvas.addEventListener('mousedown', (e) => {
    if (e.button === 2) { rightClicked = true; }
    else { mouseClicked = true; }
    Sfx.init(); Sfx.resume();
  });
  canvas.addEventListener('contextmenu', (e) => e.preventDefault());
  window.addEventListener('gamepadconnected', (e) => { detectedGamepadType = detectGamepadType(e.gamepad.id); });
  window.addEventListener('gamepaddisconnected', () => {});

  function detectGamepadType(id) {
    const lower = id.toLowerCase();
    if (lower.includes('xbox') || lower.includes('xinput')) return 'xbox';
    if (lower.includes('dualshock') || lower.includes('dualsense') || lower.includes('playstation') || lower.includes('054c')) return 'playstation';
    return 'generic';
  }
  function pollKeyboard() {
    let kx = 0, ky = 0;
    if (keys.has('a') || keys.has('arrowleft'))  kx -= 1;
    if (keys.has('d') || keys.has('arrowright')) kx += 1;
    if (keys.has('w') || keys.has('arrowup'))    ky -= 1;
    if (keys.has('s') || keys.has('arrowdown'))  ky += 1;
    if (kx !== 0 || ky !== 0) {
      const len = Math.hypot(kx, ky);
      Actions.moveX = kx / len; Actions.moveY = ky / len;
      activeDevice = 'keyboard';
      return true;
    }
    return false;
  }
  function pollGamepad() {
    gpJustPressed.clear();
    const gps = navigator.getGamepads ? navigator.getGamepads() : [];
    let moved = false;
    for (const gp of gps) {
      if (!gp) continue;
      if (!detectedGamepadType) detectedGamepadType = detectGamepadType(gp.id);
      for (let i = 0; i < gp.buttons.length; i++) {
        const wasP = gpButtonsLast.get(i) || false;
        const isP = gp.buttons[i] && gp.buttons[i].pressed;
        if (isP && !wasP) gpJustPressed.add(i);
        gpButtonsLast.set(i, isP);
      }
      const dz = 0.18;
      let gx = gp.axes[0] || 0;
      let gy = gp.axes[1] || 0;
      const mag = Math.hypot(gx, gy);
      if (mag < dz) { gx = 0; gy = 0; }
      else { const s = (mag - dz) / (1 - dz); gx = (gx / mag) * s; gy = (gy / mag) * s; }
      const btn = (i) => gp.buttons[i] && gp.buttons[i].pressed;
      if (btn(14)) gx = -1;
      if (btn(15)) gx =  1;
      if (btn(12)) gy = -1;
      if (btn(13)) gy =  1;
      if (gx !== 0 || gy !== 0) {
        const m = Math.hypot(gx, gy);
        if (m > 1) { gx /= m; gy /= m; }
        Actions.moveX = gx; Actions.moveY = gy;
        activeDevice = 'gamepad';
        moved = true;
      }
    }
    return moved;
  }
  function updateInput() {
    Actions.moveX = 0; Actions.moveY = 0;
    const gpInput = pollGamepad();
    if (!gpInput) pollKeyboard();
    let label = 'keyboard';
    if (activeDevice === 'gamepad') {
      label = detectedGamepadType === 'playstation' ? 'PS5 controller'
            : detectedGamepadType === 'xbox' ? 'Xbox controller'
            : 'gamepad';
    }
    if ($device && $device.textContent !== label) $device.textContent = label;
  }

  // Move the virtual cursor (used in UI states: inventory, shop, levelup, ability draft)
  function updateVirtualCursor(dt) {
    const gps = navigator.getGamepads ? navigator.getGamepads() : [];
    let cdx = 0, cdy = 0;
    const dz = 0.18;
    for (const gp of gps) {
      if (!gp) continue;
      const lx = gp.axes[0] || 0, ly = gp.axes[1] || 0;
      const rx = gp.axes[2] || 0, ry = gp.axes[3] || 0;
      const lm = Math.hypot(lx, ly);
      const rm = Math.hypot(rx, ry);
      if (lm > dz) { const s = (lm - dz) / (1 - dz); cdx += (lx / lm) * s; cdy += (ly / lm) * s; }
      if (rm > dz) { const s = (rm - dz) / (1 - dz); cdx += (rx / rm) * s; cdy += (ry / rm) * s; }
      // D-pad nudges cursor
      const btn = (i) => gp.buttons[i] && gp.buttons[i].pressed;
      if (btn(14)) cdx -= 1;
      if (btn(15)) cdx += 1;
      if (btn(12)) cdy -= 1;
      if (btn(13)) cdy += 1;
    }
    const moved = Math.abs(cdx) > 0.01 || Math.abs(cdy) > 0.01;
    if (moved) {
      virtualCursor.x += cdx * CURSOR_SPEED * dt;
      virtualCursor.y += cdy * CURSOR_SPEED * dt;
      virtualCursor.x = Math.max(0, Math.min(W, virtualCursor.x));
      virtualCursor.y = Math.max(0, Math.min(H, virtualCursor.y));
      virtualCursor.active = true;
      virtualCursor.idleTimer = 0;
      // Override mouse pos so existing hover logic works
      mouseX = virtualCursor.x;
      mouseY = virtualCursor.y;
    } else {
      virtualCursor.idleTimer += dt;
      // After 5s idle without controller input, hide cursor
      if (virtualCursor.idleTimer > 5) virtualCursor.active = false;
    }
  }

  // Draw the virtual cursor reticle (visible when active in UI state)
  function drawVirtualCursor() {
    if (!virtualCursor.active) return;
    const cx = Math.floor(virtualCursor.x), cy = Math.floor(virtualCursor.y);
    ctx.fillStyle = '#ffd23f';
    ctx.fillRect(cx - 1, cy - 5, 2, 4);
    ctx.fillRect(cx - 1, cy + 1, 2, 4);
    ctx.fillRect(cx - 5, cy - 1, 4, 2);
    ctx.fillRect(cx + 1, cy - 1, 4, 2);
    ctx.fillStyle = '#fff';
    ctx.fillRect(cx, cy, 1, 1);
  }

  // [all constants/abilities/stat-pool/wave-config/enemy-types live in src/data.js]
  const _ABILITIES_DEAD = {
    multishot: {
      id: 'multishot', name: 'Multishot', letter: 'M', classOf: 'archer',
      desc: '3 arrows in spread (+20% dmg)',
      cost: 25, cooldown: 1.8, color: '#ffd23f',
      cast: (player, slot) => {
        const rDmg = slot && slot.rarity ? slot.rarity.dmgMult : 1.0;
        const target = findNearestEnemy(player.x, player.y, player.weaponRange * 1.5);
        if (!target) return false;
        const baseAngle = Math.atan2(target.y - player.y, target.x - player.x);
        const arrows = slot && slot.rarity && slot.rarity.id === 'orange' ? 5 : 3;
        const halfSpread = arrows > 3 ? 0.46 : 0.35;
        for (let i = 0; i < arrows; i++) {
          const t = arrows === 1 ? 0 : (i / (arrows - 1)) * 2 - 1;
          const a = baseAngle + t * halfSpread;
          const sp = player.weaponProjSpeed;
          let dmg = player.weaponDamage * player.dmgMult * 1.20 * rDmg;
          const isCrit = Math.random() * 100 < player.critChance;
          if (isCrit) { dmg *= 2; player.onCrit(); }
          projectiles.push(new Projectile(player.x, player.y, Math.cos(a) * sp, Math.sin(a) * sp, dmg, player.weaponRange / sp + 0.15, isCrit));
        }
        spawnBurst(player.x, player.y, ['#ffd040', '#fff7a0', '#ffffff'], 8);
        shake = Math.min(shake + 1.5, 5);
        return true;
      },
    },
    rainOfArrows: {
      id: 'rainOfArrows', name: 'Rain of Arrows', letter: 'R', classOf: 'archer',
      desc: 'AoE rain on target (3x dmg)',
      cost: 40, cooldown: 4.0, color: '#ffaa44',
      cast: (player, slot) => {
        const rDmg = slot && slot.rarity ? slot.rarity.dmgMult : 1.0;
        const target = findNearestEnemy(player.x, player.y, 280);
        if (!target) return false;
        const isLegend = slot && slot.rarity && slot.rarity.id === 'orange';
        const radius = isLegend ? 70 : 50;
        const dmg = player.weaponDamage * player.dmgMult * 3.0 * rDmg;
        for (const e of enemies) {
          if (!e.alive) continue;
          const dx = e.x - target.x, dy = e.y - target.y;
          if (dx*dx + dy*dy < radius*radius) {
            const isCrit = Math.random() * 100 < player.critChance;
            const finalDmg = isCrit ? dmg * 2 : dmg;
            const died = e.takeDamage(finalDmg);
            if (isCrit) player.onCrit();
            if (died) {
              player.kills++;
              spawnBurst(e.x, e.y, ['#f0f0e0', '#e8e8d8', '#b0b0a0'], 8);
              xpGems.push(new XPGem(e.x, e.y, 1));
              if (Math.random() < 0.18) itemDrops.push(new ItemDrop(e.x, e.y, generateItem()));
              const g = rngInt(1, 3); player.gold += g; goldFlashTimer = 0.8;
            }
          }
        }
        for (let i = 0; i < 28; i++) {
          const offX = (Math.random() - 0.5) * radius * 2;
          const offY = (Math.random() - 0.5) * radius * 2;
          if (offX*offX + offY*offY < radius*radius) {
            spawnBurst(target.x + offX, target.y + offY, ['#fff7a0', '#ffd040'], 2);
          }
        }
        shake = Math.min(shake + 3, 6);
        return true;
      },
    },
    piercingShot: {
      id: 'piercingShot', name: 'Piercing Shot', letter: 'P', classOf: 'archer',
      desc: 'Pierces all enemies (+150% dmg)',
      cost: 30, cooldown: 2.5, color: '#5599ff',
      cast: (player, slot) => {
        const rDmg = slot && slot.rarity ? slot.rarity.dmgMult : 1.0;
        const target = findNearestEnemy(player.x, player.y, player.weaponRange * 2);
        if (!target) return false;
        const dx = target.x - player.x, dy = target.y - player.y;
        const d = Math.hypot(dx, dy);
        if (d < 0.01) return false;
        const sp = player.weaponProjSpeed * 1.4;
        let dmg = player.weaponDamage * player.dmgMult * 2.5 * rDmg;
        const isCrit = Math.random() * 100 < player.critChance;
        if (isCrit) { dmg *= 2; player.onCrit(); }
        const proj = new Projectile(player.x, player.y, (dx/d) * sp, (dy/d) * sp, dmg, 1.2, isCrit);
        proj.piercing = true;
        proj.r = 4;
        projectiles.push(proj);
        spawnBurst(player.x, player.y, ['#5599ff', '#aaccff'], 8);
        return true;
      },
    },
    hawkEye: {
      id: 'hawkEye', name: 'Hawk Eye', letter: 'E', classOf: 'archer',
      desc: '+30% crit & atk speed (5s)',
      cost: 50, cooldown: 12.0, color: '#33cc55',
      cast: (player, slot) => {
        const isLegend = slot && slot.rarity && slot.rarity.id === 'orange';
        player.hawkEyeTimer = isLegend ? 8 : 5;
        spawnBurst(player.x, player.y, ['#33cc55', '#88ff88', '#ffffff'], 12);
        return true;
      },
    },
    arrowVolley: {
      id: 'arrowVolley', name: 'Arrow Volley', letter: 'V', classOf: 'archer',
      desc: '8 arrows in full circle',
      cost: 35, cooldown: 3.0, color: '#ff8000',
      cast: (player, slot) => {
        const rDmg = slot && slot.rarity ? slot.rarity.dmgMult : 1.0;
        const isLegend = slot && slot.rarity && slot.rarity.id === 'orange';
        const arrows = isLegend ? 12 : 8;
        for (let i = 0; i < arrows; i++) {
          const a = (i / arrows) * Math.PI * 2;
          const sp = player.weaponProjSpeed;
          let dmg = player.weaponDamage * player.dmgMult * 1.0 * rDmg;
          const isCrit = Math.random() * 100 < player.critChance;
          if (isCrit) { dmg *= 2; player.onCrit(); }
          projectiles.push(new Projectile(player.x, player.y, Math.cos(a) * sp, Math.sin(a) * sp, dmg, player.weaponRange / sp + 0.1, isCrit));
        }
        spawnBurst(player.x, player.y, ['#ff8000', '#ffaa00', '#ffd040'], 12);
        shake = Math.min(shake + 2, 5);
        return true;
      },
    },
    fireball: {
      id: 'fireball', name: 'Fireball', letter: 'F', classOf: 'wizard',
      desc: 'Big projectile, explodes on impact', cost: 30, cooldown: 1.5, color: '#ff5520',
      cast: (player, slot) => {
        const rDmg = slot && slot.rarity ? slot.rarity.dmgMult : 1.0;
        const isLegend = slot && slot.rarity && slot.rarity.id === 'orange';
        const target = findNearestEnemy(player.x, player.y, player.weaponRange * 1.6);
        if (!target) return false;
        const dx = target.x - player.x, dy = target.y - player.y;
        const d = Math.hypot(dx, dy);
        if (d < 0.01) return false;
        const sp = player.weaponProjSpeed;
        let dmg = player.weaponDamage * player.dmgMult * 1.4 * rDmg;
        const isCrit = Math.random() * 100 < player.critChance;
        if (isCrit) { dmg *= 2; player.onCrit(); }
        const proj = new Projectile(player.x, player.y, (dx/d) * sp, (dy/d) * sp, dmg, d / sp + 0.15, isCrit);
        proj.r = 5;
        proj.theme = 'fire';
        proj.explosive = true;
        proj.explosionRadius = isLegend ? 60 : 40;
        proj.explosionDamage = dmg * 0.9;
        projectiles.push(proj);
        spawnBurst(player.x, player.y, ['#ff5520', '#ffaa00', '#ffdd00'], 8);
        return true;
      },
    },
    frostNova: {
      id: 'frostNova', name: 'Frost Nova', letter: 'N', classOf: 'wizard',
      desc: 'AoE around player, slows enemies', cost: 50, cooldown: 5.0, color: '#aaccff',
      cast: (player, slot) => {
        const rDmg = slot && slot.rarity ? slot.rarity.dmgMult : 1.0;
        const isLegend = slot && slot.rarity && slot.rarity.id === 'orange';
        const radius = 80;
        const dmg = player.weaponDamage * player.dmgMult * 1.8 * rDmg;
        const slowDur = isLegend ? 4 : 2.5;
        for (const e of enemies) {
          if (!e.alive) continue;
          const dx = e.x - player.x, dy = e.y - player.y;
          if (dx*dx + dy*dy < radius*radius) {
            const isCrit = Math.random() * 100 < player.critChance;
            const finalDmg = isCrit ? dmg * 2 : dmg;
            const died = e.takeDamage(finalDmg);
            if (isCrit) player.onCrit();
            e.slowTimer = slowDur;
            e.slowFactor = 0.4;
            if (died) handleEnemyDeath(e);
          }
        }
        for (let i = 0; i < 36; i++) {
          const a = (i / 36) * Math.PI * 2;
          const r = 30 + Math.random() * radius;
          spawnBurst(player.x + Math.cos(a) * r * 0.6, player.y + Math.sin(a) * r * 0.6, ['#aaccff', '#5599ff', '#ffffff'], 2);
        }
        groundEffects.push({ type: 'shockwave', x: player.x, y: player.y, r: 10, maxR: radius, damage: 0, life: 0.5, maxLife: 0.5, color: '#aaccff', hit: new Set(), target: 'none' });
        shake = Math.min(shake + 2, 5);
        return true;
      },
    },
    chainLightning: {
      id: 'chainLightning', name: 'Chain Lightning', letter: 'L', classOf: 'wizard',
      desc: 'Hits target, chains to 3 nearby', cost: 40, cooldown: 2.5, color: '#ffff80',
      cast: (player, slot) => {
        const rDmg = slot && slot.rarity ? slot.rarity.dmgMult : 1.0;
        const isLegend = slot && slot.rarity && slot.rarity.id === 'orange';
        const maxChains = isLegend ? 5 : 3;
        let target = findNearestEnemy(player.x, player.y, player.weaponRange * 1.4);
        if (!target) return false;
        const hit = new Set();
        let lastX = player.x, lastY = player.y;
        let dmg = player.weaponDamage * player.dmgMult * 1.8 * rDmg;
        for (let i = 0; i <= maxChains; i++) {
          if (!target || hit.has(target) || !target.alive) break;
          hit.add(target);
          const isCrit = Math.random() * 100 < player.critChance;
          const finalDmg = isCrit ? dmg * 2 : dmg;
          const died = target.takeDamage(finalDmg);
          if (isCrit) player.onCrit();
          // Lightning visual: particles along path
          const steps = 8;
          for (let s = 0; s <= steps; s++) {
            const lx = lastX + (target.x - lastX) * (s / steps) + (Math.random() - 0.5) * 6;
            const ly = lastY + (target.y - lastY) * (s / steps) + (Math.random() - 0.5) * 6;
            particles.push(new Particle(lx, ly, 0, 0, '#ffff80', 0.3, 2));
          }
          if (died) handleEnemyDeath(target);
          lastX = target.x; lastY = target.y;
          // Find next chain target within 90px
          let nextBest = null, nextD = 90;
          for (const e of enemies) {
            if (!e.alive || hit.has(e)) continue;
            const d = Math.hypot(e.x - lastX, e.y - lastY);
            if (d < nextD) { nextD = d; nextBest = e; }
          }
          target = nextBest;
          dmg *= 0.8;
        }
        spawnBurst(player.x, player.y, ['#ffff80', '#ffffff'], 6);
        shake = Math.min(shake + 2, 5);
        return true;
      },
    },
    arcaneOrb: {
      id: 'arcaneOrb', name: 'Arcane Orb', letter: 'O', classOf: 'wizard',
      desc: 'Slow piercing orb, big damage', cost: 45, cooldown: 3.0, color: '#aa66ff',
      cast: (player, slot) => {
        const rDmg = slot && slot.rarity ? slot.rarity.dmgMult : 1.0;
        const isLegend = slot && slot.rarity && slot.rarity.id === 'orange';
        const target = findNearestEnemy(player.x, player.y, player.weaponRange * 2);
        if (!target) return false;

  function updateGroundEffects(dt) {
    for (const g of groundEffects) {
      g.life -= dt;
      if (g.type === 'shockwave') {
        g.r += (g.maxR / g.maxLife) * dt;
        const tgt = g.target || 'player';
        if (g.life > 0 && tgt === 'player' && player.iframeTimer <= 0 && !g.hit.has(player)) {
          const dx = player.x - g.x, dy = player.y - g.y;
          const d2 = dx*dx + dy*dy;
          if (d2 < g.r * g.r && d2 > (g.r - 25) * (g.r - 25)) {
            const died = player.takeDamage(g.damage);
            const dmg = Math.max(1, g.damage - player.armor);
            spawnDamageNumber(player.x, player.y - player.r, dmg, { color: '#ff5555', size: 10 });
            hitPauseTimer = Math.max(hitPauseTimer, 0.06);
            if (died) { Sfx.playerDie(); state = STATE.DEAD; }
            else Sfx.playerHit();
            g.hit.add(player);
          }
        }
      } else if (g.type === 'meteor') {
        if (!g.exploded && g.life <= 0.05) {
          g.exploded = true;
          const tgt = g.target || 'player';
          if (tgt === 'enemy') {
            for (const e of enemies) {
              if (!e.alive) continue;
              const dx = e.x - g.x, dy = e.y - g.y;
              if (dx*dx + dy*dy < g.maxR * g.maxR) {
                const died = e.takeDamage(g.damage, { color: '#ffaa44' });
                if (died) handleEnemyDeath(e);
              }
            }
          } else if (player.iframeTimer <= 0) {
            const dx = player.x - g.x, dy = player.y - g.y;
            if (dx*dx + dy*dy < g.maxR * g.maxR) {
              const died = player.takeDamage(g.damage);
              const dmg = Math.max(1, g.damage - player.armor);
              spawnDamageNumber(player.x, player.y - player.r, dmg, { color: '#ff5555', size: 10 });

              if (died) { Sfx.playerDie(); state = STATE.DEAD; }

            spawnDamageNumber(player.x, player.y - player.r, Math.max(1, g.damage - player.armor), { color: '#ff7700', size: 9 });

        if (pcDx*pcDx + pcDy*pcDy < g.r * g.r && player.iframeTimer <= 0) {
          const now = performance.now();
          const last = g.cooldowns.get('player') || 0;
          if (now - last > 600) {
            g.cooldowns.set('player', now);
            const died = player.takeDamage(g.damage);
            spawnDamageNumber(player.x, player.y - player.r, Math.max(1, g.damage - player.armor), { color: '#55ff66', size: 9 });

        for (const e of enemies) {
          if (!e.alive) continue;
          const hzDx = e.x - g.x, hzDy = e.y - g.y;
          if (hzDx*hzDx + hzDy*hzDy < g.r * g.r) {
            const last = g.cooldowns.get(e) || 0;
            if (now - last > 800) {
              g.cooldowns.set(e, now);
              const died = e.takeDamage(g.damage, { color: '#ffe866' });
              spawnBurst(e.x, e.y, ['#ffe866', '#ffffff'], 3);
              if (died) handleEnemyDeath(e);
            }
          }
        }
      }
    }
    for (let i = groundEffects.length - 1; i >= 0; i--) {
      const g = groundEffects[i];
      const expired = g.life <= 0;
      if (expired && (g.type !== 'meteor' || g.exploded)) groundEffects.splice(i, 1);
    }
  }
  function drawGroundEffects(ctx) {
    for (const g of groundEffects) {
      if (g.type === 'shockwave') {
        const a = Math.max(0, g.life / g.maxLife);
        ctx.strokeStyle = g.color;
        ctx.globalAlpha = a * 0.8; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(g.x, g.y, g.r, 0, Math.PI * 2); ctx.stroke();
        ctx.lineWidth = 1; ctx.globalAlpha = 1;
      } else if (g.type === 'meteor') {
        const a = Math.max(0, g.life / g.maxLife);
        ctx.strokeStyle = '#ff4040';
        ctx.globalAlpha = (1 - a) * 0.9; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(g.x, g.y, g.maxR, 0, Math.PI * 2); ctx.stroke();
        ctx.fillStyle = '#ff4040';
        ctx.globalAlpha = (1 - a) * 0.3;
        ctx.beginPath(); ctx.arc(g.x, g.y, g.maxR * (1 - a), 0, Math.PI * 2); ctx.fill();
        ctx.lineWidth = 1; ctx.globalAlpha = 1;
      } else if (g.type === 'fire_patch') {
        const lifeRatio = Math.max(0, g.life / g.maxLife);
        const flicker = 0.45 + 0.2 * Math.sin(performance.now() * 0.018 + g.x);
        ctx.globalAlpha = lifeRatio * flicker;
        ctx.fillStyle = '#ff6600';
        ctx.fillRect(g.x - g.r, g.y - g.r, g.r * 2, g.r * 2);
        ctx.globalAlpha = lifeRatio * flicker * 0.7;
        ctx.fillStyle = '#ffcc00';
        ctx.fillRect(g.x - g.r + 4, g.y - g.r + 4, g.r * 2 - 8, g.r * 2 - 8);
        ctx.globalAlpha = 1;
      } else if (g.type === 'poison_cloud') {
        const lifeRatio = Math.max(0, g.life / g.maxLife);
        const pulse = 0.35 + 0.15 * Math.sin(performance.now() * 0.006 + g.y);
        ctx.globalAlpha = lifeRatio * pulse;
        ctx.fillStyle = '#22cc44';
        ctx.beginPath(); ctx.arc(g.x, g.y, g.r, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = lifeRatio * pulse * 0.6;
        ctx.fillStyle = '#88ff99';
        ctx.beginPath(); ctx.arc(g.x, g.y, g.r * 0.55, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;
      } else if (g.type === 'holy_zone') {
        const lifeRatio = Math.max(0, g.life / g.maxLife);
        const pulse = 0.3 + 0.2 * Math.sin(performance.now() * 0.008 + g.x);
        ctx.globalAlpha = lifeRatio * pulse * 0.45;
        ctx.fillStyle = '#ffe866';
        ctx.beginPath(); ctx.arc(g.x, g.y, g.r, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = lifeRatio * 0.85;
        ctx.strokeStyle = '#ffe866';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(g.x, g.y, g.r, 0, Math.PI * 2); ctx.stroke();
        ctx.globalAlpha = lifeRatio * pulse * 0.5;
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(g.x, g.y, g.r * 0.6, 0, Math.PI * 2); ctx.stroke();
        ctx.lineWidth = 1; ctx.globalAlpha = 1;
      }
    }
  }

  // ============================================================
  // COLLISIONS
  // ============================================================
  function checkCollisions() {
    for (const proj of projectiles) {
      if (proj.dead) continue;
      for (const enemy of enemies) {
        if (!enemy.alive) continue;
        if (proj.piercing) {
          if (!proj.hitSet) proj.hitSet = new Set();
          if (proj.hitSet.has(enemy)) continue;
        }
        const dx = enemy.x - proj.x, dy = enemy.y - proj.y;
        const rr = enemy.r + proj.r;
        if (dx * dx + dy * dy < rr * rr) {
          const died = enemy.takeDamage(proj.damage, { crit: proj.isCrit });
          if (proj.onHit) proj.onHit(enemy);
          if (proj.piercing) proj.hitSet.add(enemy);
          else proj.dead = true;
          spawnBurst(enemy.x, enemy.y, proj.isCrit ? ['#ff8800', '#ffd040', '#ffffff'] : ['#fff7a0', '#ffd040'], proj.isCrit ? 6 : 4);
          // Damage-scaled screenshake + hit-pause on crit
          if (proj.isCrit) {
            shake = Math.min(shake + 2.5, 8);
            hitPauseTimer = Math.max(hitPauseTimer, 0.045);
            Sfx.crit();
          } else {
            shake = Math.min(shake + 0.5, 4);
            Sfx.hit();
          }
          if (proj.explosive && !proj.piercing) {
            explodeAt(proj.x, proj.y, proj.explosionRadius, proj.explosionDamage);
            if (proj.onExplode) proj.onExplode(proj.x, proj.y);
          }
          if (died) {
            if (enemy.isBoss) handleBossDeath(enemy);
            else handleEnemyDeath(enemy);
          }
          if (!proj.piercing) break;
        }
      }
    }
    if (player.iframeTimer <= 0) {
      for (const ep of enemyProjectiles) {
        if (ep.dead) continue;
        const dx = ep.x - player.x, dy = ep.y - player.y;
        const rr = ep.r + player.r;
        if (dx * dx + dy * dy < rr * rr) {
          ep.dead = true;
          const died = player.takeDamage(ep.damage);
          const dmg = Math.max(1, ep.damage - player.armor);
          spawnDamageNumber(player.x, player.y - player.r, dmg, { color: '#ff5555', size: 10 });
          hitPauseTimer = Math.max(hitPauseTimer, 0.06);
          if (died) { Sfx.playerDie(); state = STATE.DEAD; }
          else Sfx.playerHit();
          break;
        }
      }
    }
    if (player.iframeTimer <= 0) {
      for (const enemy of enemies) {
        if (!enemy.alive) continue;
        const dx = enemy.x - player.x, dy = enemy.y - player.y;
        const rr = enemy.r + player.r;
        if (dx * dx + dy * dy < rr * rr) {
          const died = player.takeDamage(enemy.contactDmg);
          const dmg = Math.max(1, enemy.contactDmg - player.armor);
          spawnDamageNumber(player.x, player.y - player.r, dmg, { color: '#ff5555', size: 10 });
          hitPauseTimer = Math.max(hitPauseTimer, 0.06);
          if (died) { Sfx.playerDie(); state = STATE.DEAD; }
          else Sfx.playerHit();
          break;
        }
      }
    }
  }

  // ============================================================
  // STATE TRANSITIONS
  // ============================================================
  function endWave() {
    enemies = []; enemyProjectiles = []; bossRef = null; groundEffects = [];
    Sfx.waveComplete();
    if (player.pendingLevelUps > 0) enterLevelUp();
    else enterShop();
  }
  function enterLevelUp() {
    state = STATE.LEVELUP;
    levelUpChoices = rollLevelUpChoices();
    levelUpRerollCost = 1;
  }
  function pickLevelUp(idx) {
    if (idx < 0 || idx >= levelUpChoices.length) return;
    levelUpChoices[idx].apply(player);
    player.pendingLevelUps--;
    Sfx.uiConfirm();
    if (player.pendingLevelUps > 0) enterLevelUp();
    else enterShop();
  }
  function enterAbilityDraft() {
    const pool = classAbilities(player.class.id).slice();
    const out = [];
    const seen = new Set();
    while (out.length < 3 && pool.length > 0) {
      const idx = rngInt(0, pool.length - 1);
      const def = pool.splice(idx, 1)[0];
      if (seen.has(def.id)) continue;
      seen.add(def.id);
      out.push({ def, rarity: pickWeightedRarity() });
    }
    abilityDraftChoices = out;
    state = STATE.ABILITYDRAFT;
  }
  function pickAbilityDraft(idx) {
    if (idx < 0 || idx >= abilityDraftChoices.length) return;
    const choice = abilityDraftChoices[idx];
    let target = -1;
    for (let i = 1; i < 4; i++) {
      if (!player.abilities[i]) { target = i; break; }
    }
    if (target < 0) target = 1;
    player.abilities[target] = { id: choice.def.id, def: choice.def, rarity: choice.rarity };
    Sfx.uiConfirm();
    if (player.pendingLevelUps > 0) enterLevelUp();
    else enterShop();
  }
  function enterShop() {
    state = STATE.SHOP;
    shopRefreshCost = 5;
    shopItems = [];
    for (let i = 0; i < 4; i++) shopItems.push(generateItem());
    selectedInvIdx = -1;
  }
  function startNextWave() {
    currentWave += 1;
    state = STATE.PLAYING;
    const cfg = waveConfig(currentWave);
    waveTimer = cfg.duration;
    spawnTimer = 0;
    const newBiome = biomeFor(currentWave);
    if (newBiome.id !== currentBiomeId) {
      currentBiomeId = newBiome.id;
      generateFloorDecorations();
      biomeBannerTimer = 2.5;
    }
    if (isBossWave(currentWave)) spawnBoss(cfg);
  }
  function toggleInventory() {
    if (state === STATE.INVENTORY) state = prevState;
    else if (state === STATE.PLAYING) { prevState = state; state = STATE.INVENTORY; }
  }
  function pickClass(classId) {
    selectedClassId = classId;
    if (runMode === 'trial') {
      // Go to loadout screen first
      resetWorld();          // sets up empty player
      state = STATE.TRIAL_LOADOUT;
      loadout = {};
    } else {
      resetWorld();
      state = STATE.PLAYING;
    }
  }
  function returnToClassSelect() { state = STATE.CLASS_SELECT; }
  function startTrialRun() {
    // Apply loadout: equip stash items into player slots
    for (const slot in loadout) {
      const stashIdx = loadout[slot];
      const item = stash[stashIdx];
      if (item) player.equipped[slot] = item;
    }
    player.recomputeStats();
    state = STATE.PLAYING;
  }
  function endTrial(victory) {
    if (victory && trialTier < TRIAL_MAX_TIER) {
      unlockedTrialTier = Math.max(unlockedTrialTier, trialTier + 1);
    }
    saveData();
    loadout = {};
    runMode = 'standard';
    state = STATE.CLASS_SELECT;
  }
  function cycleMode() {
    if (runMode === 'standard') {
      runMode = 'trial';
      trialTier = 1;
    } else {
      if (trialTier < unlockedTrialTier) trialTier++;
      else { runMode = 'standard'; trialTier = 1; }
    }
  }
  function generateFloorDecorations() {
    floorDecorations = [];
    const biome = currentBiome();
    for (let i = 0; i < 30; i++) {
      floorDecorations.push({
        x: Math.random() * W, y: Math.random() * H,
        size: 1 + Math.floor(Math.random() * 2),
        color: biome.decoColors[Math.floor(Math.random() * biome.decoColors.length)],
      });
    }
  }
  // === SAVE / LOAD ===
  function serializeItem(item) {
    return {
      id: item.id,
      baseId: item.base.id,
      rarityId: item.rarity.id,
      affixes: item.affixes.map(a => ({ defId: a.def.id, value: a.value })),
    };
  }
  function deserializeItem(s) {
    const base = ITEM_BASES.find(b => b.id === s.baseId) || ITEM_BASES[0];
    const rarity = RARITY_LIST.find(r => r.id === s.rarityId) || RARITY.WHITE;
    const affixes = (s.affixes || []).map(a => {
      const def = AFFIX_POOL.find(d => d.id === a.defId);
      return def ? { def, value: a.value } : null;
    }).filter(Boolean);
    return { id: s.id || nextItemId++, base, rarity, affixes };
  }
  function loadSave() {
    try {
      const raw = localStorage.getItem(SAVE_KEY);
      if (!raw) return;
      const data = JSON.parse(raw);
      if (data.version !== SAVE_VERSION) return;
      stash = (data.stash || []).map(deserializeItem);
      stashSize = data.stashSize || STASH_SIZE_INIT;
      unlockedTrialTier = data.unlockedTrialTier || 1;
    } catch (e) { console.warn('load save failed:', e); }
  }
  function saveData() {
    try {
      localStorage.setItem(SAVE_KEY, JSON.stringify({
        version: SAVE_VERSION,
        stash: stash.map(serializeItem),
        stashSize,
        unlockedTrialTier,
      }));
    } catch (e) { console.warn('save failed:', e); }
  }
  function commitBank() {
    if (!pendingBank) return;
    let item = null;
    if (pendingBank.source === 'inv') item = player.inventory[pendingBank.key];
    else if (pendingBank.source === 'eq') item = player.equipped[pendingBank.key];
    if (item && stash.length < stashSize) {
      stash.push(item);
      saveData();
    }
    pendingBank = null;
  }

  function resetWorld() {
    player = new Player(W / 2, H / 2, selectedClassId);
    enemies = []; projectiles = []; enemyProjectiles = []; xpGems = []; itemDrops = []; particles = [];
    groundEffects = []; damageNumbers = []; bossRef = null; shake = 0; hitPauseTimer = 0;
    state = STATE.PLAYING;
    currentWave = 1; spawnTimer = 0; intermissionTimer = 0;
    levelUpChoices = []; abilityDraftChoices = [];
    levelUpFlashTimer = 0; lootFlashTimer = 0; lastLootName = '';
    bossBannerTimer = 0; bossDefeatedBannerTimer = 0; lastBossName = '';
    goldFlashTimer = 0; biomeBannerTimer = 2.5;
    shopItems = []; shopLocked = [false,false,false,false]; shopRefreshCost = 5; selectedInvIdx = -1; levelUpRerollCost = 1;
    currentBiomeId = currentBiome().id;
    const cfg = waveConfig(currentWave);
    waveTimer = cfg.duration;
    generateFloorDecorations();
  }

  // ============================================================
  // EQUIP / UNEQUIP / SALVAGE / REROLL
  // ============================================================
  function equipFromInventory(idx) {
    const item = player.inventory[idx];
    if (!item) return;
    let targetSlot = item.base.slot;
    if (targetSlot === 'ring') {
      if (!player.equipped.ring1) targetSlot = 'ring1';
      else if (!player.equipped.ring2) targetSlot = 'ring2';
      else targetSlot = 'ring1';
    }
    player.inventory.splice(idx, 1);
    if (player.equipped[targetSlot]) player.inventory.push(player.equipped[targetSlot]);
    player.equipped[targetSlot] = item;
    player.recomputeStats();
    if (selectedInvIdx === idx) selectedInvIdx = -1;
    else if (selectedInvIdx > idx) selectedInvIdx -= 1;
    Sfx.uiConfirm();
  }
  function unequipSlot(slotKey) {
    const item = player.equipped[slotKey];
    if (!item) return;
    if (player.inventory.length >= player.INVENTORY_CAP) return;
    player.equipped[slotKey] = null;
    player.inventory.push(item);
    player.recomputeStats();
  }
  function buyShopItem(idx) {
    const item = shopItems[idx];
    if (!item) return;
    const price = itemPrice(item);
    if (player.gold < price) return;
    if (player.inventory.length >= player.INVENTORY_CAP) return;
    player.gold -= price;
    player.inventory.push(item);
    shopItems[idx] = null;
    goldFlashTimer = 0.8;
    Sfx.shopBuy();
  }
  function doRefreshShop() {
    if (player.gold < shopRefreshCost) return;
    player.gold -= shopRefreshCost;
    shopRefreshCost = Math.ceil(shopRefreshCost * 2.5);
    for (let i = 0; i < 4; i++) {
      if (!shopLocked[i]) shopItems[i] = generateItem();
    }
    goldFlashTimer = 0.8;
    Sfx.uiConfirm();
  }
  function salvageInventoryItem(idx) {
    const item = player.inventory[idx];
    if (!item) return;
    const goldGain = salvageGold(item);
    const mat = RARITY_MAT[item.rarity.id];
    player.gold += goldGain;
    player.mats[mat] = (player.mats[mat] || 0) + 1;
    player.inventory.splice(idx, 1);
    if (selectedInvIdx === idx) selectedInvIdx = -1;
    else if (selectedInvIdx > idx) selectedInvIdx -= 1;
    goldFlashTimer = 0.8;
    Sfx.shopSell();
  }
  function rerollInventoryItem(idx) {
    const item = player.inventory[idx];
    if (!item) return;
    const spec = rerollSpec(item);
    if (!spec) return;
    if (player.gold < spec.gold) return;
    if ((player.mats[spec.mat] || 0) < spec.count) return;
    player.gold -= spec.gold;
    player.mats[spec.mat] -= spec.count;
    item.affixes = rollAffixes(rngInt(item.rarity.affixMin, item.rarity.affixMax));
    goldFlashTimer = 0.8;
    Sfx.uiConfirm();
  }
  // Salvage every inventory item at or below the given rarity tier (white=0, blue=1, yellow=2, orange=3, green=4).
  // Default: only White ('common') items.
  function bulkSalvage(maxTier) {
    if (maxTier === undefined) maxTier = 0;
    const order = { white: 0, blue: 1, yellow: 2, orange: 3, green: 4 };
    let count = 0;
    for (let i = player.inventory.length - 1; i >= 0; i--) {
      const item = player.inventory[i];
      if (item && order[item.rarity.id] !== undefined && order[item.rarity.id] <= maxTier) {
        salvageInventoryItem(i);
        count++;
      }
    }
    if (count > 0) {
      lootFlashTimer = 2.0;
      lastLootName = `Salvaged ${count} item${count === 1 ? '' : 's'}`;
    }
    return count;
  }
  function doRerollLevelUp() {
    if (player.gold < levelUpRerollCost) return;
    player.gold -= levelUpRerollCost;
    levelUpRerollCost = Math.ceil(levelUpRerollCost * 3);
    levelUpChoices = rollLevelUpChoices();
    goldFlashTimer = 0.8;
  }

  // ============================================================
  // BUTTON HELPERS
  // ============================================================
  function isHovering(x, y, w, h) {
    return mouseX >= x && mouseX < x + w && mouseY >= y && mouseY < y + h;
  }
  function drawButton(x, y, w, h, label, enabled, accent) {
    const hovered = isHovering(x, y, w, h) && enabled;
    ctx.fillStyle = !enabled ? '#1a1a22' : (hovered ? '#3a3a45' : '#2a2a35');
    ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = !enabled ? '#333' : (accent || '#888');
    ctx.lineWidth = hovered ? 2 : 1;
    ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);
    ctx.lineWidth = 1;
    ctx.fillStyle = !enabled ? '#555' : (accent || '#eee');
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(label, x + w / 2, y + h / 2 + 1);
    ctx.textBaseline = 'alphabetic'; ctx.textAlign = 'left';
    return hovered;
  }

  // ============================================================
  // RENDER — Background
  // ============================================================
  function drawBackground() {
    const biome = currentBiome();
    ctx.fillStyle = biome.bg; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = biome.grid;
    for (let gx = 0; gx < W; gx += 16) {
      for (let gy = 0; gy < H; gy += 16) {
        if (((gx / 16) + (gy / 16)) % 2 === 0) ctx.fillRect(gx, gy, 16, 16);
      }
    }
    for (const d of floorDecorations) {
      ctx.fillStyle = d.color;
      ctx.fillRect(Math.floor(d.x), Math.floor(d.y), d.size, d.size);
    }
  }
  function drawBossBar() {
    if (!bossRef || !bossRef.alive) return;
    const bw = 360, bh = 8;
    const bx = (W - bw) / 2, by = 8;
    ctx.fillStyle = '#000'; ctx.fillRect(bx - 2, by - 2, bw + 4, bh + 4);
    ctx.fillStyle = '#3a1818'; ctx.fillRect(bx, by, bw, bh);
    const ratio = Math.max(0, bossRef.hp / bossRef.maxHp);
    ctx.fillStyle = ratio > 0.5 ? '#cc3030' : ratio > 0.25 ? '#dd6020' : '#ff2020';
    ctx.fillRect(bx, by, bw * ratio, bh);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 9px monospace'; ctx.textAlign = 'center';
    ctx.fillText(`${bossRef.name.toUpperCase()}  -  ${Math.ceil(bossRef.hp)} / ${bossRef.maxHp}`, W / 2, by + 7);
    ctx.textAlign = 'left';
  }
  function drawHud() {
    // Skip player-stat bars on pure menu screens
    if (state === STATE.CLASS_SELECT || state === STATE.TRIAL_LOADOUT) return;
    const hpx = 8, hpy = 8;
    ctx.fillStyle = '#000'; ctx.fillRect(hpx - 1, hpy - 1, 122, 8);
    ctx.fillStyle = '#3a2020'; ctx.fillRect(hpx, hpy, 120, 6);
    const hpRatio = Math.max(0, player.hp / player.maxHp);
    ctx.fillStyle = hpRatio > 0.5 ? '#ff5050' : hpRatio > 0.25 ? '#ff8030' : '#ff3030';
    ctx.fillRect(hpx, hpy, 120 * hpRatio, 6);
    ctx.fillStyle = '#fff'; ctx.font = '8px monospace'; ctx.textAlign = 'left';
    ctx.fillText(`${Math.ceil(player.hp)} / ${player.maxHp}`, hpx + 2, hpy + 5);

    const xpx = 8, xpy = 19;
    ctx.fillStyle = '#000'; ctx.fillRect(xpx - 1, xpy - 1, 122, 5);
    ctx.fillStyle = '#1a2030'; ctx.fillRect(xpx, xpy, 120, 3);
    const xpRatio = player.xp / player.xpToNext;
    ctx.fillStyle = '#9b59ff'; ctx.fillRect(xpx, xpy, 120 * xpRatio, 3);

    const rx = 8, ry = 28;
    ctx.fillStyle = '#000'; ctx.fillRect(rx - 1, ry - 1, 122, 5);
    ctx.fillStyle = '#2a2515'; ctx.fillRect(rx, ry, 120, 3);
    const resRatio = player.resource / player.maxResource;
    ctx.fillStyle = player.class.resourceColor;
    ctx.fillRect(rx, ry, 120 * resRatio, 3);

    ctx.fillStyle = '#c89aff'; ctx.font = '8px monospace';
    ctx.fillText(`LV ${player.level}`, hpx + 1, 42);
    ctx.fillStyle = '#888';
    ctx.fillText(`${player.class.name.toUpperCase()}`, hpx + 36, 42);
    ctx.fillStyle = player.class.resourceColor;
    ctx.fillText(`${player.class.resourceName} ${Math.floor(player.resource)}/${Math.floor(player.maxResource)}`, hpx + 80, 42);

    ctx.textAlign = 'center';
    if (state === STATE.PLAYING) {
      if (!bossRef) {
        ctx.fillStyle = '#fff'; ctx.font = '10px monospace';
        ctx.fillText(`WAVE ${currentWave} / 20`, W / 2, 12);
        ctx.fillStyle = '#999'; ctx.font = '8px monospace';
        ctx.fillText(`${Math.ceil(Math.max(0, waveTimer))}s`, W / 2, 22);
      }
    }
    ctx.fillStyle = currentBiome().decoColors[3] || '#557755';
    ctx.font = '7px monospace';
    ctx.fillText(currentBiome().name.toUpperCase(), W / 2, H - 86);

    // Audio mute indicator (small, bottom-right of the HUD)
    if (Sfx.muted) {
      ctx.fillStyle = '#ff6060'; ctx.font = 'bold 7px monospace'; ctx.textAlign = 'right';
      ctx.fillText('MUTED [M]', W - 8, H - 4);
    }

    ctx.fillStyle = '#fff'; ctx.textAlign = 'right'; ctx.font = '8px monospace';
    ctx.fillText(`KILLS  ${player.kills}`, W - 8, 12);

  function drawAbilityBar() {
    const slotSize = 30, gap = 6;
    const totalW = 4 * slotSize + 3 * gap;
    const startX = (W - totalW) / 2;
    const y = H - slotSize - 6;
    for (let i = 0; i < 4; i++) {
      const x = startX + i * (slotSize + gap);
      const ability = player.abilities[i];
      const cd = player.abilityCooldowns[i];
      ctx.fillStyle = ability ? '#22222a' : '#13131a';
      ctx.fillRect(x, y, slotSize, slotSize);
      if (ability) {
        ctx.strokeStyle = ability.rarity.color; ctx.lineWidth = 2;
        ctx.strokeRect(x + 1, y + 1, slotSize - 2, slotSize - 2);
        ctx.lineWidth = 1;
      } else {
        ctx.strokeStyle = '#2a2a30';
        ctx.strokeRect(x + 0.5, y + 0.5, slotSize - 1, slotSize - 1);
      }
      ctx.fillStyle = ability ? '#888' : '#444';
      ctx.font = 'bold 7px monospace'; ctx.textAlign = 'left';
      ctx.fillText(`${i + 1}`, x + 3, y + 8);
      if (ability) {
        const canCast = cd <= 0 && player.resource >= ability.def.cost;
        ctx.fillStyle = canCast ? ability.def.color : '#666';
        ctx.font = 'bold 16px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(ability.def.letter, x + slotSize / 2, y + slotSize / 2 + 1);
        ctx.textBaseline = 'alphabetic';
        ctx.fillStyle = player.resource >= ability.def.cost ? '#ffd23f' : '#664020';
        ctx.font = '6px monospace'; ctx.textAlign = 'right';
        ctx.fillText(`${ability.def.cost}`, x + slotSize - 2, y + slotSize - 2);
        if (cd > 0) {
          const ratio = cd / ability.def.cooldown;
          ctx.fillStyle = 'rgba(0,0,0,0.7)';
          ctx.fillRect(x, y + slotSize * (1 - ratio), slotSize, slotSize * ratio);
          ctx.fillStyle = '#fff'; ctx.font = 'bold 10px monospace';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText(cd.toFixed(1), x + slotSize / 2, y + slotSize / 2);
          ctx.textBaseline = 'alphabetic';
        }
      } else {
        ctx.fillStyle = '#333'; ctx.font = '6px monospace';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('LOCKED', x + slotSize / 2, y + slotSize / 2);
        ctx.textBaseline = 'alphabetic';
      }
    }
    ctx.textAlign = 'left';
  }

      const isSel = pendingBank && pendingBank.source === r.source && pendingBank.key === r.key;

  // ============================================================
  // TRIAL LOADOUT — pre-run gear equip screen

  const LOADOUT_EQ_LAYOUT = {
    helm:    { x: 60,  y: 70  },
    amulet:  { x: 95,  y: 70  },
    chest:   { x: 60,  y: 110 },
    offhand: { x: 95,  y: 110 },
    gloves:  { x: 25,  y: 110 },
    belt:    { x: 60,  y: 150 },
    boots:   { x: 60,  y: 190 },

    ring2:   { x: 95,  y: 190 },
    weapon:  { x: 60,  y: 230 },
  };
  const LOADOUT_EQ_SIZE = 30;
  function getLoadoutSlotAtMouse() {
    for (const k in LOADOUT_EQ_LAYOUT) {
      const p = LOADOUT_EQ_LAYOUT[k];
      if (mouseX >= p.x && mouseX < p.x + LOADOUT_EQ_SIZE && mouseY >= p.y && mouseY < p.y + LOADOUT_EQ_SIZE) return k;
    }
    return null;
  }
  function getLoadoutStashIdxAtMouse() {
    const cols = 5, slotSize = 30, gap = 4, sx = 230, sy = 70;
    for (let i = 0; i < stashSize; i++) {
      const col = i % cols, row = Math.floor(i / cols);
      const x = sx + col * (slotSize + gap), y = sy + row * (slotSize + gap);
      if (mouseX >= x && mouseX < x + slotSize && mouseY >= y && mouseY < y + slotSize) return i;
    }
    return -1;
  }
  function getCurrentEquippedForSlot(slot) {
    // What's currently in player.equipped for this slot, based on loadout
    const stashIdx = loadout[slot];
    if (stashIdx === undefined) return null;
    return stash[stashIdx];
  }

    const modeColor = runMode === 'standard' ? '#7ad96b' : '#ff4080';
    drawButton(8, 8, 140, 20, modeLabel, true, modeColor);
    ctx.fillStyle = '#666'; ctx.font = '7px monospace'; ctx.textAlign = 'left';
    ctx.fillText(`Unlocked tier: ${unlockedTrialTier}/${TRIAL_MAX_TIER}`, 8, 38);

    ctx.fillStyle = '#ffd23f'; ctx.font = '9px monospace'; ctx.textAlign = 'right';
    ctx.fillText(`STASH  ${stash.length}/${stashSize}`, W - 8, H - 8);
    ctx.textAlign = 'left';

    // 4×2 grid layout — row 0: Archer/Wizard/Warrior/Rogue, row 1: Monk/Paladin/Witch Doctor/Necromancer
    const allClasses = [CLASS.ARCHER, CLASS.WIZARD, CLASS.WARRIOR, CLASS.ROGUE,
                        CLASS.MONK, CLASS.PALADIN, CLASS.WITCH_DOCTOR, CLASS.NECROMANCER];
    const cardW = 148, cardH = 138, gap = 6;
    const cols = 4;
    const totalW = cardW * cols + gap * (cols - 1);
    const startX = Math.floor((W - totalW) / 2);
    const startY = 48;

    for (let i = 0; i < allClasses.length; i++) {
      const c = allClasses[i];
      const col = i % cols, row = Math.floor(i / cols);
      const cx = startX + col * (cardW + gap);
      const cy = startY + row * (cardH + gap);
      const hovered = mouseX >= cx && mouseX <= cx + cardW && mouseY >= cy && mouseY <= cy + cardH;
      const gpHover = (i === gpClassIdx);

      ctx.fillStyle = (hovered || gpHover) ? '#2a2a38' : '#18181f';
      ctx.fillRect(cx, cy, cardW, cardH);
      ctx.strokeStyle = c.color;
      ctx.lineWidth = gpHover ? 4 : hovered ? 3 : 2;
      ctx.strokeRect(cx + 1, cy + 1, cardW - 2, cardH - 2);
      // Extra glow rect for gamepad selection
      if (gpHover) {
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 1;
        ctx.globalAlpha = 0.25 + 0.2 * Math.sin(performance.now() * 0.01);
        ctx.strokeRect(cx + 3, cy + 3, cardW - 6, cardH - 6);
        ctx.globalAlpha = 1;
      }
      ctx.lineWidth = 1;

      // Key hint
      ctx.fillStyle = '#555'; ctx.font = 'bold 9px monospace'; ctx.textAlign = 'left';
      ctx.fillText(`[${i + 1}]`, cx + 6, cy + 12);

      // Name
      ctx.fillStyle = c.color; ctx.font = 'bold 12px monospace'; ctx.textAlign = 'center';
      ctx.fillText(c.name.toUpperCase(), cx + cardW / 2, cy + 22);

      // Sprite icon — colored block
      const sx = Math.floor(cx + cardW / 2), sy = Math.floor(cy + 46);
      ctx.fillStyle = c.color;
      ctx.fillRect(sx - 5, sy - 3, 10, 9);
      ctx.fillStyle = '#ffd5a0'; ctx.fillRect(sx - 4, sy - 9, 8, 6);
      ctx.fillStyle = '#000';
      ctx.fillRect(sx - 2, sy - 7, 1, 1); ctx.fillRect(sx + 1, sy - 7, 1, 1);
      ctx.fillStyle = '#4a3a2a';
      ctx.fillRect(sx - 4, sy + 6, 2, 3); ctx.fillRect(sx + 2, sy + 6, 2, 3);

      // Stats block
      ctx.fillStyle = '#ccc'; ctx.font = '7px monospace'; ctx.textAlign = 'left';
      const sy2 = cy + 68;
      ctx.fillText(`HP ${c.baseMaxHp}  SPD ${c.baseSpeed}  CRIT ${c.baseCritChance}%`, cx + 8, sy2);
      ctx.fillText(`WPN ${c.weaponDamage}dmg @ ${c.weaponFireRate}/s`, cx + 8, sy2 + 10);
      ctx.fillStyle = c.resourceColor || c.color;
      ctx.fillText(`${c.resourceName}: ${c.baseMaxResource} (+${c.baseResourceRegen}/s)`, cx + 8, sy2 + 20);

      // Desc (wrapped to ~24 chars)
      ctx.fillStyle = '#888'; ctx.font = '7px monospace'; ctx.textAlign = 'center';
      const words = (c.desc || '').split(' ');
      const dlines = []; let dline = '';
      for (const w of words) {
        const test = dline ? dline + ' ' + w : w;
        if (test.length > 24) { dlines.push(dline); dline = w; } else dline = test;
      }
      if (dline) dlines.push(dline);
      for (let li = 0; li < Math.min(dlines.length, 2); li++) {
        ctx.fillText(dlines[li], cx + cardW / 2, sy2 + 36 + li * 9);
      }

      // Signature ability
      const sig = ABILITIES[c.signature];
      if (sig) {
        ctx.fillStyle = sig.color; ctx.font = 'bold 7px monospace'; ctx.textAlign = 'center';
        ctx.fillText(`★ ${sig.name}`, cx + cardW / 2, cy + cardH - 8);
      }
    }
    ctx.textAlign = 'left';
  }

  function drawItemInBox(item, x, y, size, selected) {
    if (!item) return;

    ctx.lineWidth = selected ? 3 : 2;
    ctx.strokeRect(x + 1, y + 1, size - 2, size - 2);
    ctx.lineWidth = 1;
    const spr = (typeof ITEM_SPRITES !== 'undefined') && ITEM_SPRITES[item.base.id];
    if (spr && typeof drawSprite === 'function') {
      // Pick scale so sprite fills ~75% of box
      const scale = Math.max(1, Math.floor(size * 0.75 / spr.w));
      drawSprite(ctx, spr, Math.floor(x + size / 2), Math.floor(y + size / 2), false, false, scale);

      ctx.globalAlpha = 0.15;
      ctx.fillStyle = item.rarity.color;
      ctx.fillRect(x + 2, y + 2, size - 4, size - 4);
      ctx.globalAlpha = 1;

      ctx.fillStyle = item.rarity.color;
      ctx.font = 'bold 14px monospace';

      const rowY = sy + 11 + yOff;

      ctx.fillText(label, sx, rowY);

    // Compute deltas
    const hpGear = player.bonusMaxHp;

      ctx.fillRect(p.x, p.y, EQ_SLOT_SIZE, EQ_SLOT_SIZE);
      ctx.strokeStyle = '#444';
      ctx.strokeRect(p.x + 0.5, p.y + 0.5, EQ_SLOT_SIZE - 1, EQ_SLOT_SIZE - 1);
      if (item) drawItemInBox(item, p.x, p.y, EQ_SLOT_SIZE);
      else {
        ctx.fillStyle = '#444'; ctx.font = '7px monospace'; ctx.textAlign = 'center';
        ctx.fillText(SLOT_LABEL[k], p.x + EQ_SLOT_SIZE / 2, p.y + EQ_SLOT_SIZE / 2 + 2);
        ctx.textAlign = 'left';
      }
    }

    // Inventory grid (shifted down)
    const invYOff = 70;
    ctx.fillStyle = '#aaa'; ctx.font = 'bold 8px monospace'; ctx.textAlign = 'left';
    ctx.fillText(`INVENTORY (${player.inventory.length}/${player.INVENTORY_CAP})`, INV_START_X, 114);
    for (let i = 0; i < INV_COLS * INV_ROWS; i++) {
      const col = i % INV_COLS;
      const row = Math.floor(i / INV_COLS);
      const x = INV_START_X + col * (INV_SLOT_SIZE + INV_GAP);
      const y = INV_START_Y + invYOff + row * (INV_SLOT_SIZE + INV_GAP);
      const item = player.inventory[i];
      const hovered = mouseX >= x && mouseX < x + INV_SLOT_SIZE && mouseY >= y && mouseY < y + INV_SLOT_SIZE;
      const isSel = selectedInvIdx === i;
      ctx.fillStyle = isSel ? '#3a3a45' : (hovered ? '#33333d' : '#22222a');
      ctx.fillRect(x, y, INV_SLOT_SIZE, INV_SLOT_SIZE);
      ctx.strokeStyle = isSel ? '#ffd23f' : '#444';
      ctx.lineWidth = isSel ? 2 : 1;
      ctx.strokeRect(x + 0.5, y + 0.5, INV_SLOT_SIZE - 1, INV_SLOT_SIZE - 1);
      ctx.lineWidth = 1;
      if (item) drawItemInBox(item, x, y, INV_SLOT_SIZE, isSel);
    }

    // Selected item action buttons
    if (selectedInvIdx >= 0 && player.inventory[selectedInvIdx]) {
      const sel = player.inventory[selectedInvIdx];
      const spec = rerollSpec(sel);
      const salvageG = salvageGold(sel);
      const matName = RARITY_MAT[sel.rarity.id];
      // 3 buttons at right side
      const btnX = W - 130, btnY = 200, btnW = 120, btnH = 18;
      const canEquip = true;
      drawButton(btnX, btnY,         btnW, btnH, 'EQUIP', canEquip, '#7ad96b');
      const salvageLabel = `SALVAGE  ${salvageG}g + 1 ${MAT_LABELS[matName]}`;
      drawButton(btnX, btnY + btnH + 4, btnW, btnH, salvageLabel, true, '#ff8030');
      const canReroll = spec && player.gold >= spec.gold && (player.mats[spec.mat] || 0) >= spec.count;
      const rerollLabel = spec ? `REROLL  ${spec.gold}g + 1 ${MAT_LABELS[spec.mat]}` : 'REROLL';
      drawButton(btnX, btnY + (btnH + 4) * 2, btnW, btnH, rerollLabel, canReroll, '#ffd23f');
    } else {
      ctx.fillStyle = '#555'; ctx.font = '8px monospace'; ctx.textAlign = 'right';
      ctx.fillText('Click an inventory item to select', W - 10, 210);
      ctx.textAlign = 'left';
    }

    // Tooltip panel at bottom
    drawTooltipPanel(true);

    // READY button (bottom-right)
    const rX = W - 130, rY = H - 30, rW = 120, rH = 24;
    const hov = isHovering(rX, rY, rW, rH);
    ctx.fillStyle = hov ? '#2a4a2a' : '#1a3a1a';
    ctx.fillRect(rX, rY, rW, rH);
    ctx.strokeStyle = '#7ad96b';
    ctx.lineWidth = hov ? 3 : 2;
    ctx.strokeRect(rX + 0.5, rY + 0.5, rW - 1, rH - 1);
    ctx.lineWidth = 1;
    ctx.fillStyle = '#7ad96b'; ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(`READY  -  WAVE ${currentWave + 1}  ▶`, rX + rW / 2, rY + rH / 2 + 1);
    ctx.textBaseline = 'alphabetic';
    ctx.fillStyle = '#557755'; ctx.font = '7px monospace'; ctx.textAlign = 'right';
    ctx.fillText('(Press Space, Enter, or A)', W - 10, rY - 4);
    ctx.textAlign = 'left';
  }

  // ============================================================
  // RENDER — Shared tooltip panel (used by inventory + shop)
  // ============================================================
  function drawTooltipPanel(inShop) {
    let tooltipItem = null;
    let tooltipSource = '';
    if (inShop) {
      // Check shop hover first
      const shopIdx = getShopIdxAtMouse();
      if (shopIdx >= 0 && shopItems[shopIdx]) {
        tooltipItem = shopItems[shopIdx];
        tooltipSource = `SHOP  ${itemPrice(tooltipItem)}g`;
      } else {
        // Equipped (shifted layout)
        for (const k of SLOT_ORDER) {
          const p = EQ_LAYOUT[k];
          const sy = p.y + 70; // matches shop's offset
          if (mouseX >= p.x && mouseX < p.x + EQ_SLOT_SIZE && mouseY >= sy && mouseY < sy + EQ_SLOT_SIZE && player.equipped[k]) {
            tooltipItem = player.equipped[k];
            tooltipSource = `EQUIPPED - ${SLOT_LABEL[k]}`;
            break;
          }
        }
        // Inventory (shifted)
        if (!tooltipItem) {
          for (let i = 0; i < INV_COLS * INV_ROWS; i++) {
            const col = i % INV_COLS;
            const row = Math.floor(i / INV_COLS);
            const x = INV_START_X + col * (INV_SLOT_SIZE + INV_GAP);
            const y = INV_START_Y + 70 + row * (INV_SLOT_SIZE + INV_GAP);
            if (mouseX >= x && mouseX < x + INV_SLOT_SIZE && mouseY >= y && mouseY < y + INV_SLOT_SIZE) {
              if (player.inventory[i]) {
                tooltipItem = player.inventory[i];
                tooltipSource = `INVENTORY`;
              }
              break;
            }
          }
        }
        // If nothing hovered, show selected if any
        if (!tooltipItem && selectedInvIdx >= 0 && player.inventory[selectedInvIdx]) {
          tooltipItem = player.inventory[selectedInvIdx];
          tooltipSource = `SELECTED`;
        }
      }
    } else {
      const eqSlot = getEquippedSlotAtMouse();
      if (eqSlot && player.equipped[eqSlot]) {
        tooltipItem = player.equipped[eqSlot];
        tooltipSource = `EQUIPPED - ${SLOT_LABEL[eqSlot]}`;
      } else {
        const invIdx = getInventoryIdxAtMouse();
        if (invIdx >= 0 && player.inventory[invIdx]) {
          tooltipItem = player.inventory[invIdx];
          tooltipSource = `INVENTORY [click to equip]`;
        }
      }
    }
    const tx = 10, ty = H - 80, tw = W - 150, th = 65;
    ctx.fillStyle = '#1a1a22'; ctx.fillRect(tx, ty, tw, th);
    ctx.strokeStyle = tooltipItem ? tooltipItem.rarity.color : '#333';
    ctx.lineWidth = 2;
    ctx.strokeRect(tx + 1, ty + 1, tw - 2, th - 2);
    ctx.lineWidth = 1;
    if (tooltipItem) {
      ctx.fillStyle = tooltipItem.rarity.color;
      ctx.font = 'bold 11px monospace'; ctx.textAlign = 'left';
      ctx.fillText(itemDisplayName(tooltipItem), tx + 8, ty + 14);
      ctx.fillStyle = '#666'; ctx.font = '7px monospace';
      ctx.fillText(`(${SLOT_LABEL[tooltipItem.base.slot] || tooltipItem.base.slot.toUpperCase()})  ${tooltipSource}`, tx + 8, ty + 25);
      ctx.fillStyle = '#ddd'; ctx.font = '8px monospace';
      if (tooltipItem.affixes.length === 0) {
        ctx.fillStyle = '#888'; ctx.fillText('(no affixes)', tx + 8, ty + 40);
      } else {
        for (let i = 0; i < tooltipItem.affixes.length; i++) {
          const aff = tooltipItem.affixes[i];
          ctx.fillText(aff.def.fmt(aff.value), tx + 8, ty + 40 + i * 9);
        }
      }
    } else {
      ctx.fillStyle = '#555'; ctx.font = '9px monospace'; ctx.textAlign = 'center';
      ctx.fillText('Hover an item to inspect', tx + tw / 2, ty + th / 2 + 3);
      ctx.textAlign = 'left';
    }
  }

  // ============================================================
  // MAIN LOOP
  // ============================================================
  loadSave();
  resetWorld();
  state = STATE.CLASS_SELECT; // start at class picker
  let lastTime = performance.now();

  function loop(now) {
    const dt = Math.min((now - lastTime) / 1000, 1 / 30);
    lastTime = now;
    updateInput();

    // Global audio mute toggle (M key) — works in any state.
    if (keyJustPressed.has('m')) Sfx.toggleMute();

    if ((keyJustPressed.has('tab') || keyJustPressed.has('i') ||
         gpJustPressed.has(8) || gpJustPressed.has(9)) &&
        (state === STATE.PLAYING || state === STATE.INVENTORY)) {
      toggleInventory();
    } else if (keyJustPressed.has('escape') && state === STATE.INVENTORY) {
      toggleInventory();
    }

    if (state === STATE.PLAYING) {
      if (keyJustPressed.has('1') || gpJustPressed.has(0)) castAbility(0);
      if (keyJustPressed.has('2') || gpJustPressed.has(1)) castAbility(1);
      if (keyJustPressed.has('3') || gpJustPressed.has(2)) castAbility(2);
      if (keyJustPressed.has('4') || gpJustPressed.has(3)) castAbility(3);

      // Hit-pause: freeze world for a few frames after a crit/big hit.
      // Damage numbers continue animating so the popup is visible during the freeze.
      const frozen = hitPauseTimer > 0;
      if (frozen) hitPauseTimer -= dt;
      const wdt = frozen ? 0 : dt;

      const cfg = waveConfig(currentWave);
      waveTimer -= wdt;
      if (!isBossWave(currentWave) && waveTimer > 0) {
        spawnTimer += wdt;
        while (spawnTimer >= cfg.spawnInterval) {
          spawnTimer -= cfg.spawnInterval;
          spawnEnemy(cfg);
        }
      }
      player.update(wdt);
      for (const e of enemies) if (e.alive) e.update(wdt, player);
      for (const p of projectiles) if (!p.dead) p.update(wdt);
      for (const ep of enemyProjectiles) if (!ep.dead) ep.update(wdt);
      for (const g of xpGems) if (!g.dead) g.update(wdt, player);
      for (const d of itemDrops) if (!d.dead) d.update(wdt, player);
      updateGroundEffects(wdt);
      if (!frozen) checkCollisions();
      enemies = enemies.filter(e => e.alive);
      projectiles = projectiles.filter(p => !p.dead);
      enemyProjectiles = enemyProjectiles.filter(p => !p.dead);
      xpGems = xpGems.filter(g => !g.dead);
      itemDrops = itemDrops.filter(d => !d.dead);
      if (!isBossWave(currentWave) && waveTimer <= 0 && enemies.length === 0) endWave();
    }
    else if (state === STATE.LEVELUP) {
      updateVirtualCursor(dt);
      let picked = -1;
      if (keyJustPressed.has('1')) picked = 0;
      else if (keyJustPressed.has('2')) picked = 1;
      else if (keyJustPressed.has('3')) picked = 2;
      else if (gpJustPressed.has(0)) picked = 0;
      else if (gpJustPressed.has(1)) picked = 1;
      else if (gpJustPressed.has(2)) picked = 2;
      else if (keyJustPressed.has('r')) doRerollLevelUp();
      else if (gpJustPressed.has(3)) doRerollLevelUp();
      else if (mouseClicked) {
        // Check reroll button
        const cardW = 130, cardH = 140, gap = 18;
        const totalW = cardW * 3 + gap * 2;
        const startX = (W - totalW) / 2;
        const cardY = (H - cardH) / 2 + 10;
        const rbW = 120, rbH = 22;
        const rbX = (W - rbW) / 2, rbY = cardY + cardH + 14;
        if (isHovering(rbX, rbY, rbW, rbH)) {
          doRerollLevelUp();
        } else {
          for (let i = 0; i < levelUpChoices.length; i++) {
            const cx = startX + i * (cardW + gap);
            if (mouseX >= cx && mouseX <= cx + cardW && mouseY >= cardY && mouseY <= cardY + cardH) { picked = i; break; }
          }
        }
      }
      if (picked >= 0) pickLevelUp(picked);
    }
    else if (state === STATE.ABILITYDRAFT) {
      updateVirtualCursor(dt);
      let picked = -1;
      if (keyJustPressed.has('1')) picked = 0;
      else if (keyJustPressed.has('2')) picked = 1;
      else if (keyJustPressed.has('3')) picked = 2;
      else if (gpJustPressed.has(0)) picked = 0;
      else if (gpJustPressed.has(1)) picked = 1;
      else if (gpJustPressed.has(2)) picked = 2;
      else if (mouseClicked) {
        const cardW = 150, cardH = 170, gap = 18;
        const totalW = cardW * 3 + gap * 2;
        const startX = (W - totalW) / 2;
        const cardY = (H - cardH) / 2 + 10;
        for (let i = 0; i < abilityDraftChoices.length; i++) {
          const cx = startX + i * (cardW + gap);
          if (mouseX >= cx && mouseX <= cx + cardW && mouseY >= cardY && mouseY <= cardY + cardH) { picked = i; break; }
        }
      }
      if (picked >= 0) pickAbilityDraft(picked);
    }
    else if (state === STATE.DEAD || state === STATE.VICTORY) {
      const anyGp = gpJustPressed.has(0) || gpJustPressed.has(1) || gpJustPressed.has(2) || gpJustPressed.has(3);
      if (keyJustPressed.has('r') || mouseClicked || anyGp) {
        if (runMode === 'trial') {
          endTrial(state === STATE.VICTORY);
        } else {
          pendingBank = null;
          state = STATE.STASH_BANKING;
        }
      }
    }
    else if (state === STATE.STASH_BANKING) {
      updateVirtualCursor(dt);
      if (gpJustPressed.has(0)) mouseClicked = true;
      if (gpJustPressed.has(1)) { pendingBank = null; state = STATE.CLASS_SELECT; }
      if (mouseClicked) {
        const runItems = [];
        for (const k of SLOT_ORDER) {
          if (player.equipped[k]) runItems.push({ source: 'eq', key: k });
        }
        for (let i = 0; i < player.inventory.length; i++) {
          runItems.push({ source: 'inv', key: i });
        }
        const cols = 10, slotSize = 28, slotGap = 4, startX = 20, startY = 112;
        let consumed = false;
        for (let i = 0; i < runItems.length; i++) {
          const r = runItems[i];
          const col = i % cols, row = Math.floor(i / cols);
          const x = startX + col * (slotSize + slotGap);
          const y = startY + row * (slotSize + slotGap);
          if (mouseX >= x && mouseX < x + slotSize && mouseY >= y && mouseY < y + slotSize) {
            if (pendingBank && pendingBank.source === r.source && pendingBank.key === r.key) pendingBank = null;
            else pendingBank = r;
            consumed = true;
            break;
          }
        }
        if (!consumed) {
          if (isHovering(W - 280, H - 30, 130, 24)) {
            commitBank();
            state = STATE.CLASS_SELECT;
          } else if (isHovering(W - 140, H - 30, 120, 24)) {
            pendingBank = null;
            state = STATE.CLASS_SELECT;
          }
        }
      }
    }
    else if (state === STATE.CLASS_SELECT) {
      // Tab or T key cycles mode
      if (keyJustPressed.has('t') || gpJustPressed.has(3)) cycleMode();
      const classIds = ['archer', 'wizard', 'warrior', 'rogue', 'monk', 'paladin', 'witchdoctor', 'necromancer'];
      const COLS = 4;
      let picked = null;

      // Keyboard 1-8
      for (let ki = 0; ki < classIds.length; ki++) {
        if (keyJustPressed.has(String(ki + 1))) { picked = classIds[ki]; break; }
      }

      // Gamepad d-pad grid navigation
      if (gpJustPressed.has(15)) { gpClassIdx = (gpClassIdx % COLS === COLS - 1) ? gpClassIdx : gpClassIdx + 1; }
      if (gpJustPressed.has(14)) { gpClassIdx = (gpClassIdx % COLS === 0) ? gpClassIdx : gpClassIdx - 1; }
      if (gpJustPressed.has(13)) { gpClassIdx = Math.min(classIds.length - 1, gpClassIdx + COLS); }
      if (gpJustPressed.has(12)) { gpClassIdx = Math.max(0, gpClassIdx - COLS); }
      // A/Cross = confirm highlighted
      if (gpJustPressed.has(0)) picked = classIds[gpClassIdx];

      // Mouse click
      if (!picked && mouseClicked) {
        if (isHovering(8, 8, 140, 20)) {
          cycleMode();
        } else {
          const cardW = 148, cardH = 138, gap = 6;
          const totalW = cardW * COLS + gap * (COLS - 1);
          const startX = Math.floor((W - totalW) / 2);
          const startY = 48;
          for (let i = 0; i < classIds.length; i++) {
            const col = i % COLS, row = Math.floor(i / COLS);
            const cx = startX + col * (cardW + gap);
            const cy = startY + row * (cardH + gap);
            if (mouseX >= cx && mouseX <= cx + cardW && mouseY >= cy && mouseY <= cy + cardH) {
              picked = classIds[i]; break;
            }
          }
        }
      }
      if (picked) pickClass(picked);
    }
    else if (state === STATE.TRIAL_LOADOUT) {
      updateVirtualCursor(dt);
      if (gpJustPressed.has(0)) mouseClicked = true;
      if (gpJustPressed.has(1)) { loadout = {}; runMode = 'standard'; state = STATE.CLASS_SELECT; }
      if (mouseClicked) {
        // Click equipped slot — unequip
        const eqSlot = getLoadoutSlotAtMouse();
        if (eqSlot) {
          delete loadout[eqSlot];
        } else {
          // Click stash item — equip into its slot
          const si = getLoadoutStashIdxAtMouse();
          if (si >= 0 && stash[si]) {
            const item = stash[si];
            let targetSlot = item.base.slot;
            if (targetSlot === 'ring') {
              // Pick first empty ring slot
              if (loadout.ring1 === undefined) targetSlot = 'ring1';
              else if (loadout.ring2 === undefined) targetSlot = 'ring2';
              else targetSlot = 'ring1';
            }
            // If this stash item already loaded into another slot, remove from there
            for (const slot in loadout) {
              if (loadout[slot] === si) delete loadout[slot];
            }
            loadout[targetSlot] = si;
          } else {
            // BACK button
            if (isHovering(W - 280, H - 30, 130, 24)) {
              loadout = {}; runMode = 'standard'; state = STATE.CLASS_SELECT;
            }
            // START button
            else if (isHovering(W - 140, H - 30, 120, 24)) {
              startTrialRun();
            }
          }
        }
      }
    }
    else if (state === STATE.INVENTORY) {
      updateVirtualCursor(dt);
      // A button = synthetic click
      if (gpJustPressed.has(0)) mouseClicked = true;
      // B button = close
      if (gpJustPressed.has(1)) toggleInventory();
      // V=whites  B=blues  Y=rares
      if (keyJustPressed.has('v')) bulkSalvage(0);
      if (keyJustPressed.has('b')) bulkSalvage(1);
      if (keyJustPressed.has('y')) bulkSalvage(2);
      // Right-click = instant salvage
      if (rightClicked) {
        const rIdx = getInventoryIdxAtMouse();
        if (rIdx >= 0 && player.inventory[rIdx]) salvageInventoryItem(rIdx);
      }
      if (mouseClicked) {
        const eqSlot = getEquippedSlotAtMouse();
        if (eqSlot && player.equipped[eqSlot]) unequipSlot(eqSlot);
        else {
          const idx = getInventoryIdxAtMouse();
          if (idx >= 0 && player.inventory[idx]) {
            if (keys.has('shift')) salvageInventoryItem(idx);
            else equipFromInventory(idx);
          }
        }
      }
    }
    else if (state === STATE.SHOP) {
      updateVirtualCursor(dt);
      // A button = synthetic click at cursor; B button or Space/Enter = next wave
      if (gpJustPressed.has(0)) mouseClicked = true;
      if (keyJustPressed.has(' ') || keyJustPressed.has('enter') || gpJustPressed.has(1)) {
        startNextWave(); return finalizeFrame();
      }
      // Refresh shortcut: R key
      if (keyJustPressed.has('r')) doRefreshShop();
      // Bulk-salvage shortcuts: V=whites, B=blues, Y=rares
      if (keyJustPressed.has('v')) bulkSalvage(0);
      if (keyJustPressed.has('b')) bulkSalvage(1);
      if (keyJustPressed.has('y')) bulkSalvage(2);
      if (mouseClicked) {
        // Shop item buy
        const shopIdx = getShopIdxAtMouse();
        if (shopIdx >= 0 && shopItems[shopIdx]) {
          buyShopItem(shopIdx);
        } else {
          // Refresh button
          const refX = SHOP_START_X + 4 * (SHOP_ITEM_W + SHOP_GAP) + 10;
          const refY = SHOP_Y;
          const salvBtnX = refX + 95;
          if (isHovering(refX, refY, 90, SHOP_ITEM_H)) {
            doRefreshShop();
          } else if (isHovering(salvBtnX, refY, 95, SHOP_ITEM_H)) {
            // Bulk salvage whites button
            bulkSalvage(0);
          } else {
            // Right-click on shop item = toggle lock; on inventory item = salvage
            if (rightClicked) {
              const lockIdx = getShopIdxAtMouse();
              if (lockIdx >= 0 && shopItems[lockIdx]) {
                shopLocked[lockIdx] = !shopLocked[lockIdx];
                Sfx.uiConfirm();
              } else {
                const rIdxS = getInventoryIdxAtMouse();
                if (rIdxS >= 0 && player.inventory[rIdxS]) salvageInventoryItem(rIdxS);
              }
            }
            // Inventory click — select (or Shift+Click = instant salvage)
            let invHit = -1;
            for (let i = 0; i < INV_COLS * INV_ROWS; i++) {
              const col = i % INV_COLS;
              const row = Math.floor(i / INV_COLS);
              const x = INV_START_X + col * (INV_SLOT_SIZE + INV_GAP);
              const y = INV_START_Y + 70 + row * (INV_SLOT_SIZE + INV_GAP);
              if (mouseX >= x && mouseX < x + INV_SLOT_SIZE && mouseY >= y && mouseY < y + INV_SLOT_SIZE) { invHit = i; break; }
            }
            if (invHit >= 0 && player.inventory[invHit]) {
              if (keys.has('shift')) {
                // Shift+Click = instant salvage (salvageInventoryItem also adjusts selectedInvIdx)
                salvageInventoryItem(invHit);
              } else {
                selectedInvIdx = (selectedInvIdx === invHit) ? -1 : invHit;
              }
            } else {
              // Action buttons (only when selection)
              if (selectedInvIdx >= 0 && player.inventory[selectedInvIdx]) {
                const btnX = W - 130, btnY = 200, btnW = 120, btnH = 18;
                if (isHovering(btnX, btnY, btnW, btnH)) {
                  equipFromInventory(selectedInvIdx);
                } else if (isHovering(btnX, btnY + btnH + 4, btnW, btnH)) {
                  salvageInventoryItem(selectedInvIdx);
                } else if (isHovering(btnX, btnY + (btnH + 4) * 2, btnW, btnH)) {
                  rerollInventoryItem(selectedInvIdx);
                }
              }
              // READY button
              const rX = W - 130, rY = H - 30, rW = 120, rH = 24;
              if (isHovering(rX, rY, rW, rH)) startNextWave();
            }
          }
        }
      }
    }

    for (const p of particles) p.update(dt);
    particles = particles.filter(p => !p.dead);
    updateDamageNumbers(dt);
    if (levelUpFlashTimer > 0) levelUpFlashTimer -= dt;
    if (lootFlashTimer > 0) lootFlashTimer -= dt;
    if (bossBannerTimer > 0) bossBannerTimer -= dt;
    if (bossDefeatedBannerTimer > 0) bossDefeatedBannerTimer -= dt;
    if (goldFlashTimer > 0) goldFlashTimer -= dt;
    if (biomeBannerTimer > 0) biomeBannerTimer -= dt;
    shake *= 0.85; if (shake < 0.05) shake = 0;

    ctx.save();
    if (shake > 0 && state !== STATE.INVENTORY && state !== STATE.SHOP) {
      const sx = (Math.random() - 0.5) * shake * 2;
      const sy = (Math.random() - 0.5) * shake * 2;
      ctx.translate(sx, sy);
    }
    drawBackground();
    drawGroundEffects(ctx);
    for (const d of itemDrops) d.draw(ctx);
    for (const g of xpGems) g.draw(ctx);
    for (const p of particles) p.draw(ctx);
    for (const e of enemies) e.draw(ctx);
    for (const p of projectiles) p.draw(ctx);
    for (const ep of enemyProjectiles) ep.draw(ctx);
    if (state !== STATE.DEAD) player.draw(ctx);
    drawDamageNumbers(ctx);
    ctx.restore();

    drawHud();
    if (state === STATE.PLAYING) drawAbilityBar();
    if (state === STATE.LEVELUP) drawLevelUpScreen();
    else if (state === STATE.ABILITYDRAFT) drawAbilityDraftScreen();
    else if (state === STATE.DEAD) drawDeathScreen();
    else if (state === STATE.VICTORY) drawVictoryScreen();
    else if (state === STATE.INVENTORY) drawInventoryScreen();
    else if (state === STATE.SHOP) drawShopScreen();
    else if (state === STATE.CLASS_SELECT) drawClassSelectScreen();
    else if (state === STATE.STASH_BANKING) drawStashBankingScreen();
    else if (state === STATE.TRIAL_LOADOUT) drawTrialLoadoutScreen();

    // Virtual cursor draws on top of all UI
    if (state === STATE.INVENTORY || state === STATE.SHOP || state === STATE.LEVELUP || state === STATE.ABILITYDRAFT || state === STATE.CLASS_SELECT || state === STATE.STASH_BANKING || state === STATE.TRIAL_LOADOUT) {
      drawVirtualCursor();
    }

    finalizeFrame();
  }

  function finalizeFrame() {
    keyJustPressed.clear();
    mouseClicked = false;
    rightClicked = false;
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
</script>
</body>
</html>
