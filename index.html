<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Slayers — Phase 9 (split)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    background: #0e0e12;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    color: #ddd;
    user-select: none;
  }
  body {
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
  }
  #game {
    image-rendering: pixelated; image-rendering: crisp-edges;
    background: #14181a; border: 2px solid #444;
    /* Bound by width AND height so the canvas never overflows the viewport / taskbar */
    width:  min(1280px, 96vw, calc(80vh * 16 / 9));
    height: min(720px,  54vw, 80vh);
    box-shadow: 0 0 60px rgba(122, 217, 107, 0.08);
    cursor: crosshair;
  }
  #hud {
    font-size: 12px; color: #888; letter-spacing: 1px;
    display: flex; gap: 16px; flex-wrap: wrap; justify-content: center;
  }
  #hud .label { color: #5a5a66; }
  #hud .value { color: #eee; }
  #hud .accent { color: #7ad96b; }
</style>
</head>
<body>
  <canvas id="game" width="640" height="360"></canvas>
  <div id="hud">
    <div><span class="label">INPUT:</span> <span id="device" class="accent">keyboard</span></div>
    <div><span class="label">MOVE:</span> <span class="value">WASD / Stick</span></div>
    <div><span class="label">ABILITIES:</span> <span class="value">1-6 / Face Btns + LB/RB</span></div>
    <div><span class="label">INVENTORY:</span> <span class="value">Tab / I / Select</span></div>
    <div><span class="label">MENU CURSOR:</span> <span class="value">Stick / D-pad</span></div>
    <div><span class="label">RESTART:</span> <span class="value">R</span></div>
  </div>

<script src="src/data.js"></script>
<script src="src/sprites.js"></script>
<script src="src/entities.js"></script>
<script src="src/sfx.js"></script>
<script>
// =============================================================================
// SLAYERS — index.html inline script
// Glue: state vars + input + world helpers + render + main loop.
// Constants live in src/data.js; entity classes in src/entities.js.
// All declarations here are globals (no IIFE) so the cross-file references work.
// =============================================================================
  // ============================================================
  // CANVAS + DOM
  // ============================================================
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  // Logical game resolution (kept at 640x360 so all draw code stays unchanged)
  const W = 640;
  const H = 360;
  // Arena playable boundary — keeps entities out of the dark vignette edges of background images.
  // Increase to shrink the play area away from the edges; 18 matches the crypt image vignette.
  const ARENA_PAD = 18;
  // Render at 2x internal resolution for crisp text — chunky pixels stay chunky
  // because the canvas CSS-scales to the same final size, but anti-aliased
  // text rasterizes at 2x and looks much sharper.
  const RENDER_SCALE = 2;
  canvas.width  = W * RENDER_SCALE;
  canvas.height = H * RENDER_SCALE;
  ctx.imageSmoothingEnabled = false; // re-set after width change resets state
  ctx.scale(RENDER_SCALE, RENDER_SCALE);
  const $device = document.getElementById('device');

  // ============================================================
  // GAME STATE
  // ============================================================
  const STATE = { PLAYING: 0, LEVELUP: 1, INTERMISSION: 2, DEAD: 3, INVENTORY: 4, ABILITYDRAFT: 5, SHOP: 6, VICTORY: 7, CLASS_SELECT: 8, STASH_BANKING: 9, TRIAL_LOADOUT: 10, ACT_TRANSITION: 11 };
  let state = STATE.PLAYING;
  let prevState = STATE.PLAYING;
  let levelUpChoices = [];
  let abilityDraftChoices = [];
  let intermissionTimer = 0;
  let waveTimer = 0;
  let currentWave = 1;
  let spawnTimer = 0;
  let shake = 0;
  let levelUpFlashTimer = 0;
  let lootFlashTimer = 0;
  let lastLootName = '';
  let bossBannerTimer = 0;
  let bossDefeatedBannerTimer = 0;
  let lastBossName = '';
  let goldFlashTimer = 0;
  let biomeBannerTimer = 0;
  // Act-transition cinematic state (post-boss → next biome)
  let actTransitionTimer = 0;        // counts down; transition advances when <= 0 or skipped
  let actTransitionData  = null;     // { actRoman, biome, bossName, bossWave, particles: [...] }
  const ACT_TRANSITION_DURATION = 3.0;

  // Shop / blacksmith state
  let shopItems = [];
  let shopLocked = [false, false, false, false];
  let shopRefreshCost = 5;
  let selectedInvIdx = -1;
  let levelUpRerollCost = 1;
  let currentBiomeId = '';
  let selectedClassId = 'archer';
  // Persistent stash (saved to localStorage across runs)
  let stash = [];
  // STASH_SIZE_INIT moved to src/data.js
  let stashSize = STASH_SIZE_INIT;
  let pendingBank = null; // { source: 'inv'|'eq', key: idxNumber|slotName }
  // SAVE_KEY + SAVE_VERSION moved to src/data.js
  // Slayer Trials (Phase 9)
  let runMode = 'standard';  // 'standard' or 'trial'
  let trialTier = 1;
  let unlockedTrialTier = 1; // highest tier the player can attempt
  // TRIAL_MAX_TIER + TRIAL_MULT moved to src/data.js
  // Loadout state — slot -> stashIndex (which stash item to pre-equip per slot)
  let loadout = {};

  let activeDevice = 'keyboard';
  let detectedGamepadType = null;

  let player;
  let enemies = [];
  let projectiles = [];
  let enemyProjectiles = [];
  let xpGems = [];
  let itemDrops = [];
  let particles = [];
  let groundEffects = []; // shockwaves, meteor warnings
  let abilityFlashes = []; // expanding cast rings
  let meleeSwings    = []; // active melee swing arcs (visual + already-resolved damage)
  let damageNumbers = []; // floating damage text
  let bossRef = null;
  let floorDecorations = [];
  let hitPauseTimer = 0; // brief freeze-frame on crits for impact

  // ============================================================
  // BACKGROUND IMAGES — preloaded once, drawn as base layer per biome
  // ============================================================
  const BG_IMAGES = {};
  (function preloadBgImages() {
    const toLoad = { crypt: 'bg_crypt.jpg', frostspire: 'bg_frostspire.jpg' };
    for (const [key, file] of Object.entries(toLoad)) {
      const img = new Image();
      img.src = file;
      BG_IMAGES[key] = img;
    }
  })();

  // ============================================================
  // INPUT
  // ============================================================
  const Actions = { moveX: 0, moveY: 0 };
  const keys = new Set();
  const keyJustPressed = new Set();
  const gpButtonsLast = new Map();
  const gpJustPressed = new Set();
  let mouseX = -1, mouseY = -1;
  let mouseClicked = false;
  let rightClicked = false;
  let virtualCursor = { x: W / 2, y: H / 2, active: false, idleTimer: 0 };
  let gpClassIdx = 0; // highlighted card index for gamepad nav on class select
  const CURSOR_SPEED = 260; // px/sec
  let dpadCooldown = 0;

  window.addEventListener('keydown', (e) => {
    const k = e.key.toLowerCase();
    if (!keys.has(k)) keyJustPressed.add(k);
    keys.add(k);
    // Lazy-init audio on first user gesture (browsers require this).
    Sfx.init(); Sfx.resume();
    const blocked = ['arrowup','arrowdown','arrowleft','arrowright',' ','tab','i'];
    if (blocked.includes(k)) e.preventDefault();
  });
  window.addEventListener('keyup', (e) => keys.delete(e.key.toLowerCase()));
  window.addEventListener('blur', () => keys.clear());
  canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    mouseX = (e.clientX - rect.left) * (W / rect.width);
    mouseY = (e.clientY - rect.top) * (H / rect.height);
  });
  canvas.addEventListener('mousedown', (e) => {
    if (e.button === 2) { rightClicked = true; }
    else { mouseClicked = true; }
    Sfx.init(); Sfx.resume();
  });
  canvas.addEventListener('contextmenu', (e) => e.preventDefault());
  window.addEventListener('gamepadconnected', (e) => { detectedGamepadType = detectGamepadType(e.gamepad.id); });
  window.addEventListener('gamepaddisconnected', () => {});

  function detectGamepadType(id) {
    const lower = id.toLowerCase();
    if (lower.includes('xbox') || lower.includes('xinput')) return 'xbox';
    if (lower.includes('dualshock') || lower.includes('dualsense') || lower.includes('playstation') || lower.includes('054c')) return 'playstation';
    return 'generic';
  }
  function pollKeyboard() {
    let kx = 0, ky = 0;
    if (keys.has('a') || keys.has('arrowleft'))  kx -= 1;
    if (keys.has('d') || keys.has('arrowright')) kx += 1;
    if (keys.has('w') || keys.has('arrowup'))    ky -= 1;
    if (keys.has('s') || keys.has('arrowdown'))  ky += 1;
    if (kx !== 0 || ky !== 0) {
      const len = Math.hypot(kx, ky);
      Actions.moveX = kx / len; Actions.moveY = ky / len;
      activeDevice = 'keyboard';
      return true;
    }
    return false;
  }
  function pollGamepad() {
    gpJustPressed.clear();
    const gps = navigator.getGamepads ? navigator.getGamepads() : [];
    let moved = false;
    for (const gp of gps) {
      if (!gp) continue;
      if (!detectedGamepadType) detectedGamepadType = detectGamepadType(gp.id);
      for (let i = 0; i < gp.buttons.length; i++) {
        const wasP = gpButtonsLast.get(i) || false;
        const isP = gp.buttons[i] && gp.buttons[i].pressed;
        if (isP && !wasP) gpJustPressed.add(i);
        gpButtonsLast.set(i, isP);
      }
      const dz = 0.18;
      let gx = gp.axes[0] || 0;
      let gy = gp.axes[1] || 0;
      const mag = Math.hypot(gx, gy);
      if (mag < dz) { gx = 0; gy = 0; }
      else { const s = (mag - dz) / (1 - dz); gx = (gx / mag) * s; gy = (gy / mag) * s; }
      const btn = (i) => gp.buttons[i] && gp.buttons[i].pressed;
      if (btn(14)) gx = -1;
      if (btn(15)) gx =  1;
      if (btn(12)) gy = -1;
      if (btn(13)) gy =  1;
      if (gx !== 0 || gy !== 0) {
        const m = Math.hypot(gx, gy);
        if (m > 1) { gx /= m; gy /= m; }
        Actions.moveX = gx; Actions.moveY = gy;
        activeDevice = 'gamepad';
        moved = true;
      }
    }
    return moved;
  }
  function updateInput() {
    Actions.moveX = 0; Actions.moveY = 0;
    const gpInput = pollGamepad();
    if (!gpInput) pollKeyboard();
    let label = 'keyboard';
    if (activeDevice === 'gamepad') {
      label = detectedGamepadType === 'playstation' ? 'PS5 controller'
            : detectedGamepadType === 'xbox' ? 'Xbox controller'
            : 'gamepad';
    }
    if ($device && $device.textContent !== label) $device.textContent = label;
  }

  // Move the virtual cursor (used in UI states: inventory, shop, levelup, ability draft)
  function updateVirtualCursor(dt) {
    const gps = navigator.getGamepads ? navigator.getGamepads() : [];
    let cdx = 0, cdy = 0;
    const dz = 0.18;
    for (const gp of gps) {
      if (!gp) continue;
      const lx = gp.axes[0] || 0, ly = gp.axes[1] || 0;
      const rx = gp.axes[2] || 0, ry = gp.axes[3] || 0;
      const lm = Math.hypot(lx, ly);
      const rm = Math.hypot(rx, ry);
      if (lm > dz) { const s = (lm - dz) / (1 - dz); cdx += (lx / lm) * s; cdy += (ly / lm) * s; }
      if (rm > dz) { const s = (rm - dz) / (1 - dz); cdx += (rx / rm) * s; cdy += (ry / rm) * s; }
      // D-pad nudges cursor
      const btn = (i) => gp.buttons[i] && gp.buttons[i].pressed;
      if (btn(14)) cdx -= 1;
      if (btn(15)) cdx += 1;
      if (btn(12)) cdy -= 1;
      if (btn(13)) cdy += 1;
    }
    const moved = Math.abs(cdx) > 0.01 || Math.abs(cdy) > 0.01;
    if (moved) {
      virtualCursor.x += cdx * CURSOR_SPEED * dt;
      virtualCursor.y += cdy * CURSOR_SPEED * dt;
      virtualCursor.x = Math.max(0, Math.min(W, virtualCursor.x));
      virtualCursor.y = Math.max(0, Math.min(H, virtualCursor.y));
      virtualCursor.active = true;
      virtualCursor.idleTimer = 0;
      // Override mouse pos so existing hover logic works
      mouseX = virtualCursor.x;
      mouseY = virtualCursor.y;
    } else {
      virtualCursor.idleTimer += dt;
      // After 5s idle without controller input, hide cursor
      if (virtualCursor.idleTimer > 5) virtualCursor.active = false;
    }
  }

  // Draw the virtual cursor reticle (visible when active in UI state)
  function drawVirtualCursor() {
    if (!virtualCursor.active) return;
    const cx = Math.floor(virtualCursor.x), cy = Math.floor(virtualCursor.y);
    ctx.fillStyle = '#ffd23f';
    ctx.fillRect(cx - 1, cy - 5, 2, 4);
    ctx.fillRect(cx - 1, cy + 1, 2, 4);
    ctx.fillRect(cx - 5, cy - 1, 4, 2);
    ctx.fillRect(cx + 1, cy - 1, 4, 2);
    ctx.fillStyle = '#fff';
    ctx.fillRect(cx, cy, 1, 1);
  }

  function classAbilities(classId) {
    return ABILITY_LIST.filter(a => !a.classOf || a.classOf === classId);
  }

  function castAbility(slotIdx) {
    if (slotIdx < 0 || slotIdx > 5) return;
    const slot = player.abilities[slotIdx];
    if (!slot) return;
    if (player.abilityCooldowns[slotIdx] > 0) return;
    if (player.resource < slot.def.cost) return;
    const ok = slot.def.cast(player, slot);
    if (ok) {
      player.resource -= slot.def.cost;
      player.abilityCooldowns[slotIdx] = slot.def.cooldown;
      Sfx.abilityCast();
      // Visual cast ring
      abilityFlashes.push({ x: player.x, y: player.y, r: 4, maxR: 44, life: 1.0, maxLife: 1.0, color: slot.def.color || '#ffffff', name: slot.def.name });
    }
  }

  // ============================================================
  // LEVEL-UP STAT POOL
  // ============================================================
  function rollLevelUpChoices() { return [...STAT_POOL].sort(() => Math.random() - 0.5).slice(0, 3); }

  // ============================================================
  // WAVE / BOSS LOGIC
  // ============================================================
  function isBossWave(w) { return w > 0 && w % 5 === 0; }
  function isFinalWave(w) { return w === 20; }
  function trialMultiplier() {
    if (runMode !== 'trial') return 1;
    return TRIAL_MULT[trialTier] || 1;
  }
  function waveConfig(w) {
    const tm = trialMultiplier();
    const speedTm = 1 + (tm - 1) * 0.4; // softer scaling on speed
    return {
      duration:       isBossWave(w) ? 999 : Math.min(20 + (w - 1) * 3, 50),
      spawnInterval:  Math.max(0.7 - (w - 1) * 0.04, 0.18) / Math.sqrt(tm),
      enemyHpMult:    (1 + (w - 1) * 0.18) * tm,
      enemySpeedMult: (1 + (w - 1) * 0.04) * speedTm,
      enemyDmgMult:   (1 + (w - 1) * 0.08) * tm,
    };
  }

  // ============================================================
  // ENEMY TYPES
  // ============================================================
  function pickEnemyType(w) {
    const biome = biomeFor(w);
    if (biome === BIOME.CRYPT) {
      if (w === 1) return 'skeleton';
      if (w === 2) return Math.random() < 0.8 ? 'skeleton' : 'rat';
      if (w === 3) { const r = Math.random(); if (r < 0.5) return 'skeleton'; if (r < 0.75) return 'rat'; return 'zombie'; }
      const r = Math.random(); if (r < 0.4) return 'skeleton'; if (r < 0.7) return 'rat'; return 'zombie';
    }
    if (biome === BIOME.FROSTSPIRE) {
      const r = Math.random();
      if (r < 0.40) return 'frostWolf';
      if (r < 0.75) return 'yeti';
      return 'rat';
    }
    if (biome === BIOME.INFERNO) {
      const r = Math.random();
      if (r < 0.45) return 'imp';
      if (r < 0.80) return 'hellhound';
      return 'rat';
    }
    // VOID
    const r = Math.random();
    if (r < 0.40) return 'shadow';
    if (r < 0.75) return 'voidCaster';
    return 'zombie';
  }

  // Floating damage number (Diablo/Brotato-style hit feedback)
  // opts: { color, size, vy, vx, life, crit }
  function spawnDamageNumber(x, y, amount, opts) {
    opts = opts || {};
    damageNumbers.push({
      x: x + (Math.random() - 0.5) * 6,
      y: y - 4,
      vx: (opts.vx !== undefined) ? opts.vx : (Math.random() - 0.5) * 20,
      vy: (opts.vy !== undefined) ? opts.vy : -38 - Math.random() * 14,
      text: (typeof amount === 'string') ? amount : String(Math.round(amount)),
      color: opts.color || '#fff7a0',
      size: opts.size || (opts.crit ? 11 : 8),
      life: opts.life || 0.65,
      maxLife: opts.life || 0.65,
      crit: !!opts.crit,
      dead: false,
    });
  }
  function updateDamageNumbers(dt) {
    for (const n of damageNumbers) {
      if (n.dead) continue;
      n.x += n.vx * dt; n.y += n.vy * dt;
      n.vy += 60 * dt;     // gentle gravity so they arc
      n.vx *= 0.92;
      n.life -= dt;
      if (n.life <= 0) n.dead = true;
    }
    damageNumbers = damageNumbers.filter(n => !n.dead);
  }
  // Floating "this is an elite" beacon — drawn above every live elite enemy so the player
  // can prioritise them at a glance. Pulses + bobs; outlined for legibility on any background.
  function drawEliteBeacon(ctx, enemy) {
    const t = performance.now() * 0.005;
    const bob = Math.sin(t * 2) * 1.5;
    const cx = Math.floor(enemy.x);
    const cy = Math.floor(enemy.y - enemy.r * 2 - 12 + bob);
    const pulse = 0.6 + 0.4 * Math.sin(t * 3);
    // Glow halo (pulses)
    ctx.globalAlpha = pulse * 0.4;
    ctx.fillStyle = '#ffd040';
    ctx.fillRect(cx - 4, cy - 1, 9, 3);
    ctx.fillRect(cx - 1, cy - 4, 3, 9);
    // Black outline for legibility
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#000';
    ctx.fillRect(cx, cy - 4, 1, 1);
    ctx.fillRect(cx - 1, cy - 3, 3, 1);
    ctx.fillRect(cx - 2, cy - 2, 5, 1);
    ctx.fillRect(cx - 3, cy - 1, 7, 1);
    ctx.fillRect(cx - 2, cy + 2, 5, 1);
    ctx.fillRect(cx - 1, cy + 3, 3, 1);
    ctx.fillRect(cx, cy + 4, 1, 1);
    // Yellow diamond core
    ctx.fillStyle = '#ffd040';
    ctx.fillRect(cx, cy - 3, 1, 1);
    ctx.fillRect(cx - 1, cy - 2, 3, 1);
    ctx.fillRect(cx - 2, cy - 1, 5, 1);
    ctx.fillRect(cx - 2, cy, 5, 1);
    ctx.fillRect(cx - 2, cy + 1, 5, 1);
    ctx.fillRect(cx - 1, cy + 2, 3, 1);
    ctx.fillRect(cx, cy + 3, 1, 1);
    ctx.globalAlpha = 1;
  }
  function drawDamageNumbers(ctx) {
    for (const n of damageNumbers) {
      const a = Math.max(0, Math.min(1, n.life / n.maxLife));
      ctx.globalAlpha = a;
      ctx.font = `bold ${n.size}px monospace`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
      // Shadow for readability
      ctx.fillStyle = '#000';
      ctx.fillText(n.text, Math.floor(n.x) + 1, Math.floor(n.y) + 1);
      ctx.fillStyle = n.color;
      ctx.fillText(n.text, Math.floor(n.x), Math.floor(n.y));
      ctx.textAlign = 'left';
    }
    ctx.globalAlpha = 1;
  }

  function spawnBurst(x, y, palette, count) {
    palette = palette || ['#f0f0e0', '#e8e8d8', '#b0b0a0', '#ffffff'];
    count = count || 8;
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = 40 + Math.random() * 70;
      const c = palette[Math.floor(Math.random() * palette.length)];
      particles.push(new Particle(x, y, Math.cos(a) * s, Math.sin(a) * s, c, 0.35 + Math.random() * 0.25));
    }
  }

  // ============================================================
  // KILL HANDLERS — centralised so ALL kill paths get the same rewards
  // ============================================================
  function handleEnemyDeath(e) {
    player.kills++;
    const isElite = e.eliteScale > 1;
    const burstColors = isElite
      ? (e.eliteMods[0] ? [e.eliteMods[0].auraColor, '#ffd040', '#ffffff'] : ['#ffd040', '#ffaa00', '#ffffff'])
      : ['#f0f0e0', '#e8e8d8', '#b0b0a0'];
    spawnBurst(e.x, e.y, burstColors, isElite ? 20 : 8);
    if (isElite) {
      // Elite: big XP haul, guaranteed rare+ drop, bonus gold
      for (let i = 0; i < 4; i++) xpGems.push(new XPGem(e.x + rngInt(-8,8), e.y + rngInt(-8,8), 2));
      itemDrops.push(new ItemDrop(e.x, e.y, generateItemMinRarity('yellow')));
      const g = rngInt(6, 14); player.gold += g; goldFlashTimer = 0.8;
      shake = Math.min(shake + 2, 6);
    } else {
      // Normal: 1 XP gem, 18% item chance, small gold
      xpGems.push(new XPGem(e.x, e.y, 1));
      if (Math.random() < 0.18) itemDrops.push(new ItemDrop(e.x, e.y, generateItem()));
      const g = rngInt(1, 3); player.gold += g; goldFlashTimer = 0.8;
    }
  }
  function handleBossDeath(e) {
    player.kills++;
    spawnBurst(e.x, e.y, ['#ffd040', '#ff8800', '#ffffff', '#ff4400'], 36);
    for (let i = 0; i < 8; i++) xpGems.push(new XPGem(e.x + rngInt(-20,20), e.y + rngInt(-20,20), 5));
    // Boss always drops a legendary or set item
    itemDrops.push(new ItemDrop(e.x, e.y, generateItemMinRarity('orange')));
    const g = rngInt(30, 60); player.gold += g; goldFlashTimer = 0.8;
    shake = Math.min(shake + 6, 10);
    lastBossName = e.name || 'Boss';
    bossDefeatedBannerTimer = 2.0;
    bossRef = null;
    // Sweep the arena so nothing lingers behind the post-boss UI
    enemies = enemies.filter(en => en.alive && en !== e);
    enemyProjectiles = [];
    groundEffects = [];
    // Wave transition — final boss goes straight to victory; act bosses trigger the ability draft.
    // The draft itself handles the level-up / shop chain on selection.
    if (isFinalWave(currentWave)) {
      Sfx.waveComplete();
      state = STATE.VICTORY;
    } else {
      Sfx.waveComplete();
      enterAbilityDraft();
    }
  }

  // ============================================================
  // WORLD HELPERS
  // ============================================================
  function spawnEnemy(cfg) {
    const edge = Math.floor(Math.random() * 4);
    const pad = 12; let x, y;
    if (edge === 0) { x = Math.random() * W; y = -pad; }
    else if (edge === 1) { x = W + pad; y = Math.random() * H; }
    else if (edge === 2) { x = Math.random() * W; y = H + pad; }
    else { x = -pad; y = Math.random() * H; }
    const e = new Enemy(x, y, pickEnemyType(currentWave), cfg.enemyHpMult, cfg.enemySpeedMult, cfg.enemyDmgMult);
    // Champion / Elite roll — scales with wave
    if (Math.random() < eliteChance(currentWave)) {
      const modCount = Math.random() < 0.25 ? 2 : 1; // 25% chance dual-mod champion
      e.makeElite(rollEliteMods(modCount));
    }
    enemies.push(e);
  }
  function spawnBoss(cfg) {
    let boss;
    if (currentWave === 5)       boss = new BoneLord(W / 2, 70, cfg.enemyHpMult, cfg.enemySpeedMult, cfg.enemyDmgMult);
    else if (currentWave === 10) boss = new IceGiant(W / 2, 70, cfg.enemyHpMult, cfg.enemySpeedMult, cfg.enemyDmgMult);
    else if (currentWave === 15) boss = new Pyromancer(W / 2, 70, cfg.enemyHpMult, cfg.enemySpeedMult, cfg.enemyDmgMult);
    else if (currentWave === 20) boss = new SlayerKiller(W / 2, 70, cfg.enemyHpMult, cfg.enemySpeedMult, cfg.enemyDmgMult);
    else                         boss = new BoneLord(W / 2, 70, cfg.enemyHpMult, cfg.enemySpeedMult, cfg.enemyDmgMult);
    bossRef = boss;
    enemies.push(boss);
    bossBannerTimer = 2.5;
    shake = Math.min(shake + 4, 8);
    spawnBurst(W / 2, 70, ['#7755aa', '#aa88cc', '#ffd040'], 18);
    Sfx.bossSpawn();
  }
  function findNearestEnemy(x, y, maxRange) {
    let best = null, bestD = maxRange;
    for (const e of enemies) {
      if (!e.alive) continue;
      const d = Math.hypot(e.x - x, e.y - y);
      if (d < bestD) { bestD = d; best = e; }
    }
    return best;
  }
  function fireProjectile(shooter, target) {
    const dx = target.x - shooter.x, dy = target.y - shooter.y;
    const d = Math.hypot(dx, dy);
    if (d < 0.01) return;
    const sp = shooter.weaponProjSpeed;
    const life = shooter.weaponRange / sp + 0.05;
    let dmg = shooter.weaponDamage * (shooter.effectiveDmgMult ? shooter.effectiveDmgMult() : shooter.dmgMult);
    const crit = shooter.effectiveCritChance ? shooter.effectiveCritChance() : shooter.critChance;
    const isCrit = Math.random() * 100 < crit;
    if (isCrit) { dmg *= (shooter.critDmg || 2); if (shooter.onCrit) shooter.onCrit(); }
    projectiles.push(new Projectile(shooter.x, shooter.y, (dx / d) * sp, (dy / d) * sp, dmg, life, isCrit));
    Sfx.shoot();
  }

  // ============================================================
  // GROUND EFFECTS (boss attacks: shockwaves, meteors)
  // ============================================================
  function updateGroundEffects(dt) {
    for (const g of groundEffects) {
      g.life -= dt;
      if (g.type === 'shockwave') {
        g.r += (g.maxR / g.maxLife) * dt;
        const tgt = g.target || 'player';
        if (g.life > 0 && tgt === 'player' && player.iframeTimer <= 0 && !g.hit.has(player)) {
          const dx = player.x - g.x, dy = player.y - g.y;
          const d2 = dx*dx + dy*dy;
          if (d2 < g.r * g.r && d2 > (g.r - 25) * (g.r - 25)) {
            const died = player.takeDamage(g.damage);
            const dmg = Math.max(1, g.damage - player.armor);
            spawnDamageNumber(player.x, player.y - player.r, dmg, { color: '#ff5555', size: 10 });
            hitPauseTimer = Math.max(hitPauseTimer, 0.06);
            if (died) { Sfx.playerDie(); state = STATE.DEAD; }
            else Sfx.playerHit();
            g.hit.add(player);
          }
        }
      } else if (g.type === 'meteor') {
        if (!g.exploded && g.life <= 0.05) {
          g.exploded = true;
          const tgt = g.target || 'player';
          if (tgt === 'enemy') {
            for (const e of enemies) {
              if (!e.alive) continue;
              const dx = e.x - g.x, dy = e.y - g.y;
              if (dx*dx + dy*dy < g.maxR * g.maxR) {
                const died = e.takeDamage(g.damage, { color: '#ffaa44' });
                if (died) handleEnemyDeath(e);
              }
            }
          } else if (player.iframeTimer <= 0) {
            const dx = player.x - g.x, dy = player.y - g.y;
            if (dx*dx + dy*dy < g.maxR * g.maxR) {
              const died = player.takeDamage(g.damage);
              const dmg = Math.max(1, g.damage - player.armor);
              spawnDamageNumber(player.x, player.y - player.r, dmg, { color: '#ff5555', size: 10 });
              hitPauseTimer = Math.max(hitPauseTimer, 0.07);
              if (died) { Sfx.playerDie(); state = STATE.DEAD; }
              else Sfx.playerHit();
            }
          }
          spawnBurst(g.x, g.y, ['#ff4400', '#ff8800', '#ffdd00', '#ffffff'], 24);
          shake = Math.min(shake + 5, 10);
        }
      } else if (g.type === 'fire_patch') {
        g.life -= dt;
        // Tick damage to player if standing in it (once per 0.8s)
        const fpDx = player.x - g.x, fpDy = player.y - g.y;
        if (fpDx*fpDx + fpDy*fpDy < g.r * g.r && player.iframeTimer <= 0) {
          const now = performance.now();
          const last = g.cooldowns.get('player') || 0;
          if (now - last > 800) {
            g.cooldowns.set('player', now);
            const died = player.takeDamage(g.damage);
            spawnDamageNumber(player.x, player.y - player.r, Math.max(1, g.damage - player.armor), { color: '#ff7700', size: 9 });
            if (died) { Sfx.playerDie(); state = STATE.DEAD; } else Sfx.playerHit();
          }
        }
      } else if (g.type === 'poison_cloud') {
        g.life -= dt;
        // Tick damage to player if inside cloud (once per 0.6s)
        const pcDx = player.x - g.x, pcDy = player.y - g.y;
        if (pcDx*pcDx + pcDy*pcDy < g.r * g.r && player.iframeTimer <= 0) {
          const now = performance.now();
          const last = g.cooldowns.get('player') || 0;
          if (now - last > 600) {
            g.cooldowns.set('player', now);
            const died = player.takeDamage(g.damage);
            spawnDamageNumber(player.x, player.y - player.r, Math.max(1, g.damage - player.armor), { color: '#55ff66', size: 9 });
            if (died) { Sfx.playerDie(); state = STATE.DEAD; } else Sfx.playerHit();
          }
        }
      } else if (g.type === 'holy_zone') {
        // Damage enemies inside the consecrated zone once per 0.8s
        const now = performance.now();
        for (const e of enemies) {
          if (!e.alive) continue;
          const hzDx = e.x - g.x, hzDy = e.y - g.y;
          if (hzDx*hzDx + hzDy*hzDy < g.r * g.r) {
            const last = g.cooldowns.get(e) || 0;
            if (now - last > 800) {
              g.cooldowns.set(e, now);
              const died = e.takeDamage(g.damage, { color: '#ffe866' });
              spawnBurst(e.x, e.y, ['#ffe866', '#ffffff'], 3);
              if (died) handleEnemyDeath(e);
            }
          }
        }
      }
    }
    for (let i = groundEffects.length - 1; i >= 0; i--) {
      const g = groundEffects[i];
      const expired = g.life <= 0;
      if (expired && (g.type !== 'meteor' || g.exploded)) groundEffects.splice(i, 1);
    }
  }
  function drawGroundEffects(ctx) {
    for (const g of groundEffects) {
      if (g.type === 'shockwave') {
        const a = Math.max(0, g.life / g.maxLife);
        ctx.strokeStyle = g.color;
        ctx.globalAlpha = a * 0.8; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(g.x, g.y, g.r, 0, Math.PI * 2); ctx.stroke();
        ctx.lineWidth = 1; ctx.globalAlpha = 1;
      } else if (g.type === 'meteor') {
        const a = Math.max(0, g.life / g.maxLife);
        ctx.strokeStyle = '#ff4040';
        ctx.globalAlpha = (1 - a) * 0.9; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(g.x, g.y, g.maxR, 0, Math.PI * 2); ctx.stroke();
        ctx.fillStyle = '#ff4040';
        ctx.globalAlpha = (1 - a) * 0.3;
        ctx.beginPath(); ctx.arc(g.x, g.y, g.maxR * (1 - a), 0, Math.PI * 2); ctx.fill();
        ctx.lineWidth = 1; ctx.globalAlpha = 1;
      } else if (g.type === 'fire_patch') {
        const lifeRatio = Math.max(0, g.life / g.maxLife);
        const flicker = 0.45 + 0.2 * Math.sin(performance.now() * 0.018 + g.x);
        ctx.globalAlpha = lifeRatio * flicker;
        ctx.fillStyle = '#ff6600';
        ctx.fillRect(g.x - g.r, g.y - g.r, g.r * 2, g.r * 2);
        ctx.globalAlpha = lifeRatio * flicker * 0.7;
        ctx.fillStyle = '#ffcc00';
        ctx.fillRect(g.x - g.r + 4, g.y - g.r + 4, g.r * 2 - 8, g.r * 2 - 8);
        ctx.globalAlpha = 1;
      } else if (g.type === 'poison_cloud') {
        const lifeRatio = Math.max(0, g.life / g.maxLife);
        const pulse = 0.35 + 0.15 * Math.sin(performance.now() * 0.006 + g.y);
        ctx.globalAlpha = lifeRatio * pulse;
        ctx.fillStyle = '#22cc44';
        ctx.beginPath(); ctx.arc(g.x, g.y, g.r, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = lifeRatio * pulse * 0.6;
        ctx.fillStyle = '#88ff99';
        ctx.beginPath(); ctx.arc(g.x, g.y, g.r * 0.55, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;
      } else if (g.type === 'holy_zone') {
        const lifeRatio = Math.max(0, g.life / g.maxLife);
        const pulse = 0.3 + 0.2 * Math.sin(performance.now() * 0.008 + g.x);
        ctx.globalAlpha = lifeRatio * pulse * 0.45;
        ctx.fillStyle = '#ffe866';
        ctx.beginPath(); ctx.arc(g.x, g.y, g.r, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = lifeRatio * 0.85;
        ctx.strokeStyle = '#ffe866';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(g.x, g.y, g.r, 0, Math.PI * 2); ctx.stroke();
        ctx.globalAlpha = lifeRatio * pulse * 0.5;
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(g.x, g.y, g.r * 0.6, 0, Math.PI * 2); ctx.stroke();
        ctx.lineWidth = 1; ctx.globalAlpha = 1;
      }
    }
  }

  // ============================================================
  // COLLISIONS
  // ============================================================
  function checkCollisions() {
    for (const proj of projectiles) {
      if (proj.dead) continue;
      for (const enemy of enemies) {
        if (!enemy.alive) continue;
        if (proj.piercing) {
          if (!proj.hitSet) proj.hitSet = new Set();
          if (proj.hitSet.has(enemy)) continue;
        }
        const dx = enemy.x - proj.x, dy = enemy.y - proj.y;
        const rr = enemy.r + proj.r;
        if (dx * dx + dy * dy < rr * rr) {
          const died = enemy.takeDamage(proj.damage, { crit: proj.isCrit });
          if (proj.onHit) proj.onHit(enemy);
          if (proj.piercing) proj.hitSet.add(enemy);
          else proj.dead = true;
          spawnBurst(enemy.x, enemy.y, proj.isCrit ? ['#ff8800', '#ffd040', '#ffffff'] : ['#fff7a0', '#ffd040'], proj.isCrit ? 6 : 4);
          // Damage-scaled screenshake + hit-pause on crit
          if (proj.isCrit) {
            shake = Math.min(shake + 2.5, 8);
            hitPauseTimer = Math.max(hitPauseTimer, 0.045);
            Sfx.crit();
          } else {
            shake = Math.min(shake + 0.5, 4);
            Sfx.hit();
          }
          if (proj.explosive && !proj.piercing) {
            explodeAt(proj.x, proj.y, proj.explosionRadius, proj.explosionDamage);
            if (proj.onExplode) proj.onExplode(proj.x, proj.y);
          }
          if (died) {
            if (enemy.isBoss) handleBossDeath(enemy);
            else handleEnemyDeath(enemy);
          }
          if (!proj.piercing) break;
        }
      }
    }
    if (player.iframeTimer <= 0) {
      for (const ep of enemyProjectiles) {
        if (ep.dead) continue;
        const dx = ep.x - player.x, dy = ep.y - player.y;
        const rr = ep.r + player.r;
        if (dx * dx + dy * dy < rr * rr) {
          ep.dead = true;
          const died = player.takeDamage(ep.damage);
          const dmg = Math.max(1, ep.damage - player.armor);
          spawnDamageNumber(player.x, player.y - player.r, dmg, { color: '#ff5555', size: 10 });
          hitPauseTimer = Math.max(hitPauseTimer, 0.06);
          if (died) { Sfx.playerDie(); state = STATE.DEAD; }
          else Sfx.playerHit();
          break;
        }
      }
    }
    if (player.iframeTimer <= 0) {
      for (const enemy of enemies) {
        if (!enemy.alive) continue;
        const dx = enemy.x - player.x, dy = enemy.y - player.y;
        const rr = enemy.r + player.r;
        if (dx * dx + dy * dy < rr * rr) {
          const died = player.takeDamage(enemy.contactDmg);
          const dmg = Math.max(1, enemy.contactDmg - player.armor);
          spawnDamageNumber(player.x, player.y - player.r, dmg, { color: '#ff5555', size: 10 });
          hitPauseTimer = Math.max(hitPauseTimer, 0.06);
          if (died) { Sfx.playerDie(); state = STATE.DEAD; }
          else Sfx.playerHit();
          break;
        }
      }
    }
  }

  // ============================================================
  // STATE TRANSITIONS
  // ============================================================
  function endWave() {
    // Vacuum: instantly collect all remaining XP gems and item drops on the field.
    // XP gems grant their value; items auto-fill inventory or salvage to gold if full.
    for (const gem of xpGems) {
      if (!gem.dead) player.addXp(gem.value);
    }
    for (const drop of itemDrops) {
      if (!drop.dead) {
        if (player.inventory.length < player.INVENTORY_CAP) {
          player.inventory.push(drop.item);
          lastLootName = drop.item.base ? (drop.item.base.name || 'Item') : 'Item';
          lootFlashTimer = 1.5;
        } else {
          // Inventory full — salvage to gold
          player.gold += salvageGold(drop.item);
          goldFlashTimer = 0.8;
        }
      }
    }
    xpGems = []; itemDrops = [];
    enemies = []; enemyProjectiles = []; projectiles = []; bossRef = null; groundEffects = [];
    Sfx.waveComplete();
    if (player.pendingLevelUps > 0) enterLevelUp();
    else enterShop();
  }
  function enterLevelUp() {
    state = STATE.LEVELUP;
    levelUpChoices = rollLevelUpChoices();
    levelUpRerollCost = 1;
  }
  function pickLevelUp(idx) {
    if (idx < 0 || idx >= levelUpChoices.length) return;
    levelUpChoices[idx].apply(player);
    player.pendingLevelUps--;
    Sfx.uiConfirm();
    if (player.pendingLevelUps > 0) enterLevelUp();
    else enterShop();
  }
  // Boss ability draft — design: class-filtered with 10% cross-class spice, stack up to 6 slots.
  // Slot 0 is the class signature ability and is never drafted into. Drafted abilities fill
  // slots 1-5. When all 6 are full, the draft is skipped with a brief banner.
  function enterAbilityDraft() {
    // Skip entirely when slots are full (cap = 6 total: signature + 5 drafted)
    const filledSlots = player.abilities.filter(a => a).length;
    if (filledSlots >= 6) {
      lastLootName = 'Ability slots full!';
      lootFlashTimer = 2.0;
      if (player.pendingLevelUps > 0) enterLevelUp();
      else enterShop();
      return;
    }
    // Build the two pools, excluding abilities already owned
    const owned = new Set();
    for (const a of player.abilities) if (a) owned.add(a.id);
    const classPool   = classAbilities(player.class.id).filter(a => !owned.has(a.id));
    const offClassPool = ABILITY_LIST.filter(a => a.classOf && a.classOf !== player.class.id && !owned.has(a.id));

    const out = [];
    const offered = new Set();
    let attempts = 0;
    while (out.length < 3 && attempts < 50) {
      attempts++;
      // 10% chance this slot rolls an off-class "rare find"
      const crossRoll = Math.random() < 0.10;
      const primary  = (crossRoll && offClassPool.length > 0) ? offClassPool : classPool;
      const fallback = (crossRoll && offClassPool.length > 0) ? classPool    : offClassPool;
      const pool = primary.length > 0 ? primary : fallback;
      if (pool.length === 0) break; // Nothing left to offer
      const def = pool[rngInt(0, pool.length - 1)];
      if (offered.has(def.id)) continue;
      offered.add(def.id);
      out.push({ def, rarity: pickWeightedRarity() });
    }
    if (out.length === 0) {
      // Player owns everything available — skip without a banner
      if (player.pendingLevelUps > 0) enterLevelUp();
      else enterShop();
      return;
    }
    abilityDraftChoices = out;
    state = STATE.ABILITYDRAFT;
  }
  function pickAbilityDraft(idx) {
    if (idx < 0 || idx >= abilityDraftChoices.length) return;
    const choice = abilityDraftChoices[idx];
    // Find first empty slot in 1..5 (slot 0 reserved for class signature)
    let target = -1;
    for (let i = 1; i < 6; i++) {
      if (!player.abilities[i]) { target = i; break; }
    }
    if (target < 0) target = 1; // Safety net (enterAbilityDraft already skips when full)
    player.abilities[target] = { id: choice.def.id, def: choice.def, rarity: choice.rarity };
    Sfx.uiConfirm();
    if (player.pendingLevelUps > 0) enterLevelUp();
    else enterShop();
  }
  function enterShop() {
    state = STATE.SHOP;
    shopRefreshCost = 5;
    shopItems = [];
    for (let i = 0; i < 4; i++) shopItems.push(generateItemForClass(player ? player.class.id : 'archer'));
    selectedInvIdx = -1;
  }
  // Returns act info for the act the given wave belongs to.
  // Wave 1-5 = Act I (Crypt, BoneLord), 6-10 = II (Frostspire, Ice Giant), etc.
  function actInfoForWave(w) {
    const actNum   = Math.max(1, Math.min(4, Math.ceil(w / 5)));
    const actRoman = ['I','II','III','IV'][actNum - 1];
    const lastWave = actNum * 5;
    const bossName = lastWave === 5  ? 'BONE LORD'
                   : lastWave === 10 ? 'ICE GIANT'
                   : lastWave === 15 ? 'PYROMANCER'
                   : 'SLAYER-KILLER';
    return { actNum, actRoman, biome: biomeFor(w), bossName, bossWave: lastWave };
  }
  // Trigger between the shop and startNextWave when the upcoming wave crosses a biome boundary.
  // The cinematic plays the new act's title, biome, and incoming boss before the wave actually starts.
  function enterActTransition(upcomingWave) {
    const info = actInfoForWave(upcomingWave);
    // Pre-roll biome-themed particles: motion + palette tailored per biome so each
    // act transition has its own visual signature.
    // Frostspire = snow falls, Inferno = embers rise, Void = motes float random, Crypt = bone dust drifts.
    const palette = info.biome.decoColors;
    const id = info.biome.id;
    const particles = [];
    for (let i = 0; i < 70; i++) {
      let vx, vy, size, color;
      if (id === 'frostspire') {
        vx = (Math.random() - 0.5) * 8;
        vy = 14 + Math.random() * 16;
        size = 1 + Math.floor(Math.random() * 2);
        color = Math.random() < 0.65 ? '#ffffff' : (palette[3] || '#aaccff');
      } else if (id === 'inferno') {
        vx = (Math.random() - 0.5) * 6;
        vy = -(18 + Math.random() * 22);
        size = 1 + Math.floor(Math.random() * 2);
        color = Math.random() < 0.5 ? (palette[3] || '#ff8040') : (palette[2] || '#aa4020');
      } else if (id === 'void') {
        const a = Math.random() * Math.PI * 2;
        const s = 4 + Math.random() * 10;
        vx = Math.cos(a) * s;
        vy = Math.sin(a) * s;
        size = 1 + Math.floor(Math.random() * 2);
        color = Math.random() < 0.5 ? (palette[3] || '#dd99ff') : '#ffffff';
      } else {
        vx = (Math.random() - 0.5) * 6;
        vy = 6 + Math.random() * 10;
        size = 1;
        color = palette[2] || '#88aabb';
      }
      particles.push({
        x: Math.random() * W,
        y: id === 'inferno' ? H + Math.random() * 20 : Math.random() * H,
        vx, vy, size, color,
        twinkle: Math.random() * Math.PI * 2,
      });
    }
    actTransitionData = { ...info, upcomingWave, particles };
    actTransitionTimer = ACT_TRANSITION_DURATION;
    state = STATE.ACT_TRANSITION;
    // Audio cue — re-use the boss-spawn sting so it lands like an arrival
    if (typeof Sfx !== 'undefined' && Sfx.bossSpawn) Sfx.bossSpawn();
  }
  function drawActTransitionScreen() {
    if (!actTransitionData) return;
    const d = actTransitionData;
    const elapsed = ACT_TRANSITION_DURATION - actTransitionTimer;
    const t = Math.max(0, Math.min(1, elapsed / ACT_TRANSITION_DURATION));

    // Background: dark base, biome-tinted wash that strengthens as the cinematic plays
    ctx.fillStyle = '#05060a';
    ctx.fillRect(0, 0, W, H);
    const wash = Math.min(0.55, t * 0.7);
    ctx.fillStyle = d.biome.bg;
    ctx.globalAlpha = wash;
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;

    // Themed particle drift (snow falls, embers rise, motes float — wraps differ by direction)
    for (const p of d.particles) {
      p.x += p.vx * (1/60); p.y += p.vy * (1/60);
      p.twinkle += 0.12;
      // Vertical wrap respects motion direction
      if (p.vy >= 0 && p.y > H + 4)      { p.y = -4;    p.x = Math.random() * W; }
      else if (p.vy < 0 && p.y < -4)     { p.y = H + 4; p.x = Math.random() * W; }
      // Horizontal wrap (also handles void's omnidirectional drift)
      if (p.x < -4)    p.x = W + 4;
      if (p.x > W + 4) p.x = -4;
      const a = 0.45 + 0.40 * Math.sin(p.twinkle);
      ctx.globalAlpha = a * Math.min(1, t * 2);
      ctx.fillStyle = p.color;
      ctx.fillRect(Math.floor(p.x), Math.floor(p.y), p.size, p.size);
    }
    ctx.globalAlpha = 1;

    // Vignette
    const grad = ctx.createRadialGradient(W/2, H/2, 60, W/2, H/2, Math.max(W, H) * 0.7);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(1, 'rgba(0,0,0,0.8)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    ctx.textAlign = 'center';

    // ACT label — fades + scales up in the first 1s
    const actAlpha = Math.min(1, t / 0.25);
    const actScale = 1 + Math.max(0, 0.25 - elapsed) * 0.6; // briefly oversized on entry
    ctx.save();
    ctx.translate(W / 2, H / 2 - 40);
    ctx.scale(actScale, actScale);
    ctx.globalAlpha = actAlpha;
    ctx.fillStyle = '#000'; ctx.font = 'bold 22px monospace';
    ctx.fillText(`ACT ${d.actRoman}`, 1, 1);
    ctx.fillStyle = d.biome.decoColors[3] || '#ffffff';
    ctx.fillText(`ACT ${d.actRoman}`, 0, 0);
    ctx.restore();

    // Biome name — fades in after 0.4s
    const biomeAlpha = Math.max(0, Math.min(1, (elapsed - 0.4) / 0.5));
    if (biomeAlpha > 0) {
      ctx.globalAlpha = biomeAlpha;
      ctx.fillStyle = '#000'; ctx.font = 'bold 30px monospace';
      ctx.fillText(d.biome.name.toUpperCase(), W / 2 + 2, H / 2 + 2);
      ctx.fillStyle = '#ffffff';
      ctx.fillText(d.biome.name.toUpperCase(), W / 2, H / 2);
      ctx.globalAlpha = 1;
    }

    // Incoming boss — fades in after 1.3s
    const bossAlpha = Math.max(0, Math.min(1, (elapsed - 1.3) / 0.6));
    if (bossAlpha > 0) {
      ctx.globalAlpha = bossAlpha;
      ctx.fillStyle = '#aaa'; ctx.font = '10px monospace';
      ctx.fillText('INCOMING', W / 2, H / 2 + 32);
      ctx.fillStyle = '#000'; ctx.font = 'bold 16px monospace';
      ctx.fillText(d.bossName, W / 2 + 1, H / 2 + 51);
      ctx.fillStyle = '#ff6060';
      ctx.fillText(d.bossName, W / 2, H / 2 + 50);
      ctx.fillStyle = '#888'; ctx.font = '8px monospace';
      ctx.fillText(`Wave ${d.bossWave}`, W / 2, H / 2 + 64);
      ctx.globalAlpha = 1;
    }

    // Skip prompt — pulses in the last 1.5s
    if (elapsed > 1.0) {
      const pulse = 0.5 + 0.5 * Math.sin(elapsed * 4);
      ctx.globalAlpha = 0.5 + 0.5 * pulse;
      ctx.fillStyle = '#888'; ctx.font = '8px monospace';
      ctx.fillText('SPACE / Click / [B] to continue', W / 2, H - 22);
      ctx.globalAlpha = 1;
    }
    ctx.textAlign = 'left';
  }
  function startNextWave() {
    currentWave += 1;
    state = STATE.PLAYING;
    const cfg = waveConfig(currentWave);
    waveTimer = cfg.duration;
    spawnTimer = 0;
    const newBiome = biomeFor(currentWave);
    if (newBiome.id !== currentBiomeId) {
      currentBiomeId = newBiome.id;
      generateFloorDecorations();
      biomeBannerTimer = 2.5;
    }
    if (isBossWave(currentWave)) spawnBoss(cfg);
  }
  function toggleInventory() {
    if (state === STATE.INVENTORY) state = prevState;
    else if (state === STATE.PLAYING) { prevState = state; state = STATE.INVENTORY; }
  }
  function pickClass(classId) {
    selectedClassId = classId;
    if (runMode === 'trial') {
      // Go to loadout screen first
      resetWorld();          // sets up empty player
      state = STATE.TRIAL_LOADOUT;
      loadout = {};
    } else {
      resetWorld();
      state = STATE.PLAYING;
    }
  }
  function returnToClassSelect() { state = STATE.CLASS_SELECT; }
  function startTrialRun() {
    // Apply loadout: equip stash items into player slots
    for (const slot in loadout) {
      const stashIdx = loadout[slot];
      const item = stash[stashIdx];
      if (item) player.equipped[slot] = item;
    }
    player.recomputeStats();
    state = STATE.PLAYING;
  }
  function endTrial(victory) {
    if (victory && trialTier < TRIAL_MAX_TIER) {
      unlockedTrialTier = Math.max(unlockedTrialTier, trialTier + 1);
    }
    saveData();
    loadout = {};
    runMode = 'standard';
    state = STATE.CLASS_SELECT;
  }
  function cycleMode() {
    if (runMode === 'standard') {
      runMode = 'trial';
      trialTier = 1;
    } else {
      if (trialTier < unlockedTrialTier) trialTier++;
      else { runMode = 'standard'; trialTier = 1; }
    }
  }
  function generateFloorDecorations() {
    floorDecorations = [];
    const biome = currentBiome();
    const count = biome.id === 'void' ? 80 : 40; // more stars in void
    for (let i = 0; i < count; i++) {
      floorDecorations.push({
        x: Math.random() * W, y: Math.random() * H,
        size: biome.id === 'void' ? (Math.random() < 0.15 ? 2 : 1) : (1 + Math.floor(Math.random() * 2)),
        color: biome.decoColors[Math.floor(Math.random() * biome.decoColors.length)],
      });
    }
  }
  // === SAVE / LOAD ===
  function serializeItem(item) {
    return {
      id: item.id,
      baseId: item.base.id,
      rarityId: item.rarity.id,
      affixes: item.affixes.map(a => ({ defId: a.def.id, value: a.value })),
    };
  }
  function deserializeItem(s) {
    const base = ITEM_BASES.find(b => b.id === s.baseId) || ITEM_BASES[0];
    const rarity = RARITY_LIST.find(r => r.id === s.rarityId) || RARITY.WHITE;
    const affixes = (s.affixes || []).map(a => {
      const def = AFFIX_POOL.find(d => d.id === a.defId);
      return def ? { def, value: a.value } : null;
    }).filter(Boolean);
    return { id: s.id || nextItemId++, base, rarity, affixes };
  }
  function loadSave() {
    try {
      const raw = localStorage.getItem(SAVE_KEY);
      if (!raw) return;
      const data = JSON.parse(raw);
      if (data.version !== SAVE_VERSION) return;
      stash = (data.stash || []).map(deserializeItem);
      stashSize = data.stashSize || STASH_SIZE_INIT;
      unlockedTrialTier = data.unlockedTrialTier || 1;
    } catch (e) { console.warn('load save failed:', e); }
  }
  function saveData() {
    try {
      localStorage.setItem(SAVE_KEY, JSON.stringify({
        version: SAVE_VERSION,
        stash: stash.map(serializeItem),
        stashSize,
        unlockedTrialTier,
      }));
    } catch (e) { console.warn('save failed:', e); }
  }
  function commitBank() {
    if (!pendingBank) return;
    let item = null;
    if (pendingBank.source === 'inv') item = player.inventory[pendingBank.key];
    else if (pendingBank.source === 'eq') item = player.equipped[pendingBank.key];
    if (item && stash.length < stashSize) {
      stash.push(item);
      saveData();
    }
    pendingBank = null;
  }

  function resetWorld() {
    player = new Player(W / 2, H / 2, selectedClassId);
    enemies = []; projectiles = []; enemyProjectiles = []; xpGems = []; itemDrops = []; particles = []; abilityFlashes = []; meleeSwings = [];
    groundEffects = []; damageNumbers = []; bossRef = null; shake = 0; hitPauseTimer = 0;
    state = STATE.PLAYING;
    currentWave = 1; spawnTimer = 0; intermissionTimer = 0;
    levelUpChoices = []; abilityDraftChoices = [];
    levelUpFlashTimer = 0; lootFlashTimer = 0; lastLootName = '';
    bossBannerTimer = 0; bossDefeatedBannerTimer = 0; lastBossName = '';
    goldFlashTimer = 0; biomeBannerTimer = 2.5;
    shopItems = []; shopLocked = [false,false,false,false]; shopRefreshCost = 5; selectedInvIdx = -1; levelUpRerollCost = 1;
    currentBiomeId = currentBiome().id;
    const cfg = waveConfig(currentWave);
    waveTimer = cfg.duration;
    generateFloorDecorations();
  }

  // ============================================================
  // EQUIP / UNEQUIP / SALVAGE / REROLL
  // ============================================================
  function equipFromInventory(idx) {
    const item = player.inventory[idx];
    if (!item) return;
    let targetSlot = item.base.slot;
    if (targetSlot === 'ring') {
      if (!player.equipped.ring1) targetSlot = 'ring1';
      else if (!player.equipped.ring2) targetSlot = 'ring2';
      else targetSlot = 'ring1';
    }
    player.inventory.splice(idx, 1);
    if (player.equipped[targetSlot]) player.inventory.push(player.equipped[targetSlot]);
    player.equipped[targetSlot] = item;
    player.recomputeStats();
    if (selectedInvIdx === idx) selectedInvIdx = -1;
    else if (selectedInvIdx > idx) selectedInvIdx -= 1;
    Sfx.uiConfirm();
  }
  function unequipSlot(slotKey) {
    const item = player.equipped[slotKey];
    if (!item) return;
    if (player.inventory.length >= player.INVENTORY_CAP) return;
    player.equipped[slotKey] = null;
    player.inventory.push(item);
    player.recomputeStats();
  }
  function buyShopItem(idx) {
    const item = shopItems[idx];
    if (!item) return;
    const price = itemPrice(item);
    if (player.gold < price) return;
    if (player.inventory.length >= player.INVENTORY_CAP) return;
    player.gold -= price;
    player.inventory.push(item);
    shopItems[idx] = null;
    goldFlashTimer = 0.8;
    Sfx.shopBuy();
  }
  function doRefreshShop() {
    if (player.gold < shopRefreshCost) return;
    player.gold -= shopRefreshCost;
    shopRefreshCost = Math.ceil(shopRefreshCost * 2.5);
    for (let i = 0; i < 4; i++) {
      if (!shopLocked[i]) shopItems[i] = generateItemForClass(player ? player.class.id : 'archer');
    }
    goldFlashTimer = 0.8;
    Sfx.uiConfirm();
  }
  function salvageInventoryItem(idx) {
    const item = player.inventory[idx];
    if (!item) return;
    const goldGain = salvageGold(item);
    const mat = RARITY_MAT[item.rarity.id];
    player.gold += goldGain;
    player.mats[mat] = (player.mats[mat] || 0) + 1;
    player.inventory.splice(idx, 1);
    if (selectedInvIdx === idx) selectedInvIdx = -1;
    else if (selectedInvIdx > idx) selectedInvIdx -= 1;
    goldFlashTimer = 0.8;
    Sfx.shopSell();
  }
  function rerollInventoryItem(idx) {
    const item = player.inventory[idx];
    if (!item) return;
    const spec = rerollSpec(item);
    if (!spec) return;
    if (player.gold < spec.gold) return;
    if ((player.mats[spec.mat] || 0) < spec.count) return;
    player.gold -= spec.gold;
    player.mats[spec.mat] -= spec.count;
    item.affixes = rollAffixes(rngInt(item.rarity.affixMin, item.rarity.affixMax));
    goldFlashTimer = 0.8;
    Sfx.uiConfirm();
  }
  // Salvage every inventory item at or below the given rarity tier (white=0, blue=1, yellow=2, orange=3, green=4).
  // Default: only White ('common') items.
  function bulkSalvage(maxTier) {
    if (maxTier === undefined) maxTier = 0;
    const order = { white: 0, blue: 1, yellow: 2, orange: 3, green: 4 };
    let count = 0;
    for (let i = player.inventory.length - 1; i >= 0; i--) {
      const item = player.inventory[i];
      if (item && order[item.rarity.id] !== undefined && order[item.rarity.id] <= maxTier) {
        salvageInventoryItem(i);
        count++;
      }
    }
    if (count > 0) {
      lootFlashTimer = 2.0;
      lastLootName = `Salvaged ${count} item${count === 1 ? '' : 's'}`;
    }
    return count;
  }
  function doRerollLevelUp() {
    if (player.gold < levelUpRerollCost) return;
    player.gold -= levelUpRerollCost;
    levelUpRerollCost = Math.ceil(levelUpRerollCost * 3);
    levelUpChoices = rollLevelUpChoices();
    goldFlashTimer = 0.8;
  }

  // ============================================================
  // BUTTON HELPERS
  // ============================================================
  function isHovering(x, y, w, h) {
    return mouseX >= x && mouseX < x + w && mouseY >= y && mouseY < y + h;
  }
  function drawButton(x, y, w, h, label, enabled, accent) {
    const hovered = isHovering(x, y, w, h) && enabled;
    ctx.fillStyle = !enabled ? '#1a1a22' : (hovered ? '#3a3a45' : '#2a2a35');
    ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = !enabled ? '#333' : (accent || '#888');
    ctx.lineWidth = hovered ? 2 : 1;
    ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);
    ctx.lineWidth = 1;
    ctx.fillStyle = !enabled ? '#555' : (accent || '#eee');
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(label, x + w / 2, y + h / 2 + 1);
    ctx.textBaseline = 'alphabetic'; ctx.textAlign = 'left';
    return hovered;
  }

  // ============================================================
  // RENDER — Background
  // ============================================================
  function drawBackground() {
    const biome = currentBiome();
    const t = performance.now() * 0.001; // seconds, for animation
    ctx.fillStyle = biome.bg; ctx.fillRect(0, 0, W, H);

    if (biome.id === 'crypt') {
      // === CRYPT: painted background image ===
      const bgImg = BG_IMAGES.crypt;
      if (bgImg && bgImg.complete && bgImg.naturalWidth > 0) {
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(bgImg, 0, 0, W, H);
      } else {
        // Fallback: solid fill while image loads
        ctx.fillStyle = '#15181a'; ctx.fillRect(0, 0, W, H);
      }
      // Torch glow at 4 corners (animated flicker)
      const torchPositions = [[20, 20], [W-20, 20], [20, H-20], [W-20, H-20]];
      for (const [tx, ty] of torchPositions) {
        const flicker = 0.7 + 0.3 * Math.sin(t * 4.1 + tx * 0.3);
        const grad = ctx.createRadialGradient(tx, ty, 0, tx, ty, 36 * flicker);
        grad.addColorStop(0, `rgba(255,140,30,${0.22 * flicker})`);
        grad.addColorStop(0.5, `rgba(200,80,10,${0.10 * flicker})`);
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(tx, ty, 36 * flicker, 0, Math.PI*2); ctx.fill();
        // Torch stem (tiny pixel)
        ctx.fillStyle = '#cc6622'; ctx.fillRect(tx - 1, ty, 2, 4);
        ctx.fillStyle = '#ffcc44'; ctx.fillRect(tx - 1, ty - 3, 2, 3);
        ctx.fillStyle = '#ffffff'; ctx.fillRect(tx, ty - 4, 1, 1);
      }
      // Floor deco: bone/skull fragments
      for (const d of floorDecorations) {
        ctx.fillStyle = d.color;
        ctx.fillRect(Math.floor(d.x), Math.floor(d.y), d.size, d.size);
        if (d.size > 1) { // skull hint
          ctx.fillStyle = '#2a2e28';
          ctx.fillRect(Math.floor(d.x) + 1, Math.floor(d.y) + 1, 1, 1);
        }
      }
      // Edge vignette
      const vg = ctx.createRadialGradient(W/2,H/2,80, W/2,H/2,Math.max(W,H)*0.65);
      vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, 'rgba(0,0,0,0.45)');
      ctx.fillStyle = vg; ctx.fillRect(0,0,W,H);

    } else if (biome.id === 'frostspire') {
      // === FROSTSPIRE: painted background image ===
      const bgImg = BG_IMAGES.frostspire;
      if (bgImg && bgImg.complete && bgImg.naturalWidth > 0) {
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(bgImg, 0, 0, W, H);
      } else {
        ctx.fillStyle = '#1a2030'; ctx.fillRect(0, 0, W, H);
      }
      // Snowflakes (drifting particles over the image)
      for (const d of floorDecorations) {
        const drift = Math.sin(t * 0.8 + d.x * 0.05) * 2;
        ctx.fillStyle = d.color;
        ctx.fillRect(Math.floor(d.x + drift), Math.floor(d.y), 1, 1);
      }
      // Blue edge glow
      const fg = ctx.createRadialGradient(W/2,H/2,60, W/2,H/2,Math.max(W,H)*0.65);
      fg.addColorStop(0, 'rgba(0,0,0,0)'); fg.addColorStop(1, 'rgba(10,30,80,0.5)');
      ctx.fillStyle = fg; ctx.fillRect(0,0,W,H);

    } else if (biome.id === 'inferno') {
      // === INFERNO: cracked lava floor ===
      const lsz = 20;
      for (let gy = 0; gy < H; gy += lsz) {
        for (let gx = 0; gx < W; gx += lsz) {
          ctx.fillStyle = '#1a0d08';
          ctx.fillRect(gx, gy, lsz - 1, lsz - 1);
          // Lava crack seam (every few tiles)
          const idx = Math.floor(gx/lsz) + Math.floor(gy/lsz) * 33;
          if (idx % 5 === 0) {
            const lavaGlow = 0.5 + 0.5 * Math.sin(t * 2.5 + idx * 0.7);
            ctx.fillStyle = `rgba(255,${60 + Math.floor(lavaGlow*40)},0,${0.5 + lavaGlow * 0.3})`;
            ctx.fillRect(gx + lsz - 1, gy + 2, 2, lsz - 4);
          }
          if (idx % 7 === 0) {
            const lavaGlow = 0.4 + 0.6 * Math.sin(t * 1.8 + idx * 1.1);
            ctx.fillStyle = `rgba(255,${40 + Math.floor(lavaGlow*50)},0,${0.4 + lavaGlow * 0.3})`;
            ctx.fillRect(gx + 2, gy + lsz - 1, lsz - 4, 2);
          }
        }
      }
      // Corner fire glow
      const fireCorners = [[0,0],[W,0],[0,H],[W,H]];
      for (const [fx, fy] of fireCorners) {
        const flicker = 0.75 + 0.25 * Math.sin(t * 3.7 + fx * 0.01);
        const grad = ctx.createRadialGradient(fx, fy, 0, fx, fy, 60 * flicker);
        grad.addColorStop(0, `rgba(255,80,0,${0.30 * flicker})`);
        grad.addColorStop(0.6, `rgba(200,30,0,${0.12 * flicker})`);
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(fx, fy, 60 * flicker, 0, Math.PI*2); ctx.fill();
      }
      // Embers / floor deco
      for (const d of floorDecorations) {
        const rise = ((t * 18 + d.x * 0.7) % d.y) - 4;
        ctx.fillStyle = d.color;
        ctx.fillRect(Math.floor(d.x), Math.floor(Math.max(2, d.y - (rise > 0 ? rise * 0.3 : 0))), 1, 1);
      }
      // Dark vignette
      const ig = ctx.createRadialGradient(W/2,H/2,70, W/2,H/2,Math.max(W,H)*0.65);
      ig.addColorStop(0, 'rgba(0,0,0,0)'); ig.addColorStop(1, 'rgba(40,0,0,0.55)');
      ctx.fillStyle = ig; ctx.fillRect(0,0,W,H);

    } else {
      // === VOID: starfield + floating platforms ===
      // Starfield
      for (const d of floorDecorations) {
        const twinkle = 0.4 + 0.6 * Math.abs(Math.sin(t * 1.5 + d.x * 0.09 + d.y * 0.07));
        ctx.globalAlpha = twinkle;
        ctx.fillStyle = d.color;
        ctx.fillRect(Math.floor(d.x), Math.floor(d.y), d.size, d.size);
      }
      ctx.globalAlpha = 1;
      // Dark platform tiles with glowing edges
      const psz = 32;
      for (let gy = 0; gy < H; gy += psz) {
        for (let gx = 0; gx < W; gx += psz) {
          if ((Math.floor(gx/psz) + Math.floor(gy/psz)) % 3 !== 0) {
            ctx.fillStyle = 'rgba(60,20,100,0.18)';
            ctx.fillRect(gx + 1, gy + 1, psz - 2, psz - 2);
            // Glowing edge
            const eg = 0.3 + 0.2 * Math.sin(t * 0.9 + gx * 0.04 + gy * 0.03);
            ctx.strokeStyle = `rgba(160,80,255,${eg})`; ctx.lineWidth = 0.5;
            ctx.strokeRect(gx + 1, gy + 1, psz - 2, psz - 2);
          }
        }
      }
      // Void rift shimmer at corners
      const voidCorners = [[0,0],[W,0],[0,H],[W,H]];
      for (const [vx, vy] of voidCorners) {
        const pulse = 0.6 + 0.4 * Math.sin(t * 2.2 + vx * 0.01);
        for (let ri = 1; ri <= 3; ri++) {
          ctx.strokeStyle = `rgba(${120+ri*20},${40+ri*10},255,${0.15 * pulse})`;
          ctx.lineWidth = 1;
          ctx.beginPath(); ctx.arc(vx, vy, ri * 14 * pulse, 0, Math.PI*2); ctx.stroke();
        }
      }
      // Purple nebula streak
      ctx.fillStyle = 'rgba(80,20,140,0.07)';
      ctx.fillRect(0, H/2 - 20, W, 40);
      // Dark vignette
      const vgv = ctx.createRadialGradient(W/2,H/2,60, W/2,H/2,Math.max(W,H)*0.65);
      vgv.addColorStop(0, 'rgba(0,0,0,0)'); vgv.addColorStop(1, 'rgba(20,0,50,0.6)');
      ctx.fillStyle = vgv; ctx.fillRect(0,0,W,H);
    }
  }
  function drawBossBar() {
    if (!bossRef || !bossRef.alive) return;
    const bw = 360, bh = 8;
    const bx = (W - bw) / 2, by = 8;
    ctx.fillStyle = '#000'; ctx.fillRect(bx - 2, by - 2, bw + 4, bh + 4);
    ctx.fillStyle = '#3a1818'; ctx.fillRect(bx, by, bw, bh);
    const ratio = Math.max(0, bossRef.hp / bossRef.maxHp);
    ctx.fillStyle = ratio > 0.5 ? '#cc3030' : ratio > 0.25 ? '#dd6020' : '#ff2020';
    ctx.fillRect(bx, by, bw * ratio, bh);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 9px monospace'; ctx.textAlign = 'center';
    ctx.fillText(`${bossRef.name.toUpperCase()}  -  ${Math.ceil(bossRef.hp)} / ${bossRef.maxHp}`, W / 2, by + 7);
    ctx.textAlign = 'left';
  }
  function drawHud() {
    // Skip player-stat bars on pure menu screens
    if (state === STATE.CLASS_SELECT || state === STATE.TRIAL_LOADOUT) return;
    const hpx = 8, hpy = 8;
    ctx.fillStyle = '#000'; ctx.fillRect(hpx - 1, hpy - 1, 122, 8);
    ctx.fillStyle = '#3a2020'; ctx.fillRect(hpx, hpy, 120, 6);
    const hpRatio = Math.max(0, player.hp / player.maxHp);
    ctx.fillStyle = hpRatio > 0.5 ? '#ff5050' : hpRatio > 0.25 ? '#ff8030' : '#ff3030';
    ctx.fillRect(hpx, hpy, 120 * hpRatio, 6);
    ctx.fillStyle = '#fff'; ctx.font = '8px monospace'; ctx.textAlign = 'left';
    ctx.fillText(`${Math.ceil(player.hp)} / ${player.maxHp}`, hpx + 2, hpy + 5);

    const xpx = 8, xpy = 19;
    ctx.fillStyle = '#000'; ctx.fillRect(xpx - 1, xpy - 1, 122, 5);
    ctx.fillStyle = '#1a2030'; ctx.fillRect(xpx, xpy, 120, 3);
    const xpRatio = player.xp / player.xpToNext;
    ctx.fillStyle = '#9b59ff'; ctx.fillRect(xpx, xpy, 120 * xpRatio, 3);

    const rx = 8, ry = 28;
    ctx.fillStyle = '#000'; ctx.fillRect(rx - 1, ry - 1, 122, 5);
    ctx.fillStyle = '#2a2515'; ctx.fillRect(rx, ry, 120, 3);
    const resRatio = player.resource / player.maxResource;
    ctx.fillStyle = player.class.resourceColor;
    ctx.fillRect(rx, ry, 120 * resRatio, 3);

    ctx.fillStyle = '#c89aff'; ctx.font = '8px monospace';
    ctx.fillText(`LV ${player.level}`, hpx + 1, 42);
    ctx.fillStyle = '#888';
    ctx.fillText(`${player.class.name.toUpperCase()}`, hpx + 36, 42);
    ctx.fillStyle = player.class.resourceColor;
    ctx.fillText(`${player.class.resourceName} ${Math.floor(player.resource)}/${Math.floor(player.maxResource)}`, hpx + 80, 42);

    ctx.textAlign = 'center';
    if (state === STATE.PLAYING) {
      if (!bossRef) {
        ctx.fillStyle = '#fff'; ctx.font = '10px monospace';
        ctx.fillText(`WAVE ${currentWave} / 20`, W / 2, 12);
        ctx.fillStyle = '#999'; ctx.font = '8px monospace';
        ctx.fillText(`${Math.ceil(Math.max(0, waveTimer))}s`, W / 2, 22);
      }
    }
    ctx.fillStyle = currentBiome().decoColors[3] || '#557755';
    ctx.font = '7px monospace';
    ctx.fillText(currentBiome().name.toUpperCase(), W / 2, H - 86);

    // Audio mute indicator (small, bottom-right of the HUD)
    if (Sfx.muted) {
      ctx.fillStyle = '#ff6060'; ctx.font = 'bold 7px monospace'; ctx.textAlign = 'right';
      ctx.fillText('MUTED [M]', W - 8, H - 4);
    }

    ctx.fillStyle = '#fff'; ctx.textAlign = 'right'; ctx.font = '8px monospace';
    ctx.fillText(`KILLS  ${player.kills}`, W - 8, 12);
    ctx.fillStyle = '#aaa';
    ctx.fillText(`ENEMIES  ${enemies.filter(e => e.alive).length}`, W - 8, 22);
    ctx.fillText(`BAG  ${player.inventory.length}/${player.INVENTORY_CAP}`, W - 8, 32);

  function drawAbilityBar() {
    const slotSize = 30, gap = 6;
    const slotCount = 6;
    const totalW = slotCount * slotSize + (slotCount - 1) * gap;
    const startX = (W - totalW) / 2;
    const y = H - slotSize - 6;
    for (let i = 0; i < slotCount; i++) {
      const x = startX + i * (slotSize + gap);
      const ability = player.abilities[i];
      const cd = player.abilityCooldowns[i];
      ctx.fillStyle = ability ? '#22222a' : '#13131a';
      ctx.fillRect(x, y, slotSize, slotSize);
      if (ability) {
        ctx.strokeStyle = ability.rarity.color; ctx.lineWidth = 2;
        ctx.strokeRect(x + 1, y + 1, slotSize - 2, slotSize - 2);
        ctx.lineWidth = 1;
      } else {
        ctx.strokeStyle = '#2a2a30';
        ctx.strokeRect(x + 0.5, y + 0.5, slotSize - 1, slotSize - 1);
      }
      ctx.fillStyle = ability ? '#888' : '#444';
      ctx.font = 'bold 7px monospace'; ctx.textAlign = 'left';
      ctx.fillText(`${i + 1}`, x + 3, y + 8);
      if (ability) {
        const canCast = cd <= 0 && player.resource >= ability.def.cost;
        ctx.fillStyle = canCast ? ability.def.color : '#666';
        ctx.font = 'bold 16px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(ability.def.letter, x + slotSize / 2, y + slotSize / 2 + 1);
        ctx.textBaseline = 'alphabetic';
        ctx.fillStyle = player.resource >= ability.def.cost ? '#ffd23f' : '#664020';
        ctx.font = '6px monospace'; ctx.textAlign = 'right';
        ctx.fillText(`${ability.def.cost}`, x + slotSize - 2, y + slotSize - 2);
        if (cd > 0) {
          const ratio = cd / ability.def.cooldown;
          ctx.fillStyle = 'rgba(0,0,0,0.7)';
          ctx.fillRect(x, y + slotSize * (1 - ratio), slotSize, slotSize * ratio);
          ctx.fillStyle = '#fff'; ctx.font = 'bold 10px monospace';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText(cd.toFixed(1), x + slotSize / 2, y + slotSize / 2);
          ctx.textBaseline = 'alphabetic';
        }
      } else {
        ctx.fillStyle = '#333'; ctx.font = '6px monospace';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('LOCKED', x + slotSize / 2, y + slotSize / 2);
        ctx.textBaseline = 'alphabetic';
      }
    }
    ctx.textAlign = 'left';
  }

  const LOADOUT_EQ_LAYOUT = {
    helm:    { x: 60,  y: 70  },

    offhand: { x: 95,  y: 110 },

  const LOADOUT_EQ_SIZE = 30;
  function getLoadoutSlotAtMouse() {
    for (const k in LOADOUT_EQ_LAYOUT) {
      const p = LOADOUT_EQ_LAYOUT[k];
      if (mouseX >= p.x && mouseX < p.x + LOADOUT_EQ_SIZE && mouseY >= p.y && mouseY < p.y + LOADOUT_EQ_SIZE) return k;

    return null;

  function getLoadoutStashIdxAtMouse() {

  function getCurrentEquippedForSlot(slot) {

    // Mode toggle button (top-left)
    const modeLabel = runMode === 'standard' ? 'MODE: STANDARD' : `MODE: TRIAL T${trialTier}`;
    const modeColor = runMode === 'standard' ? '#7ad96b' : '#ff4080';
    drawButton(8, 8, 140, 20, modeLabel, true, modeColor);
    ctx.fillStyle = '#aaa'; ctx.font = 'bold 8px monospace'; ctx.textAlign = 'left';
    ctx.fillText(`Unlocked tier: ${unlockedTrialTier}/${TRIAL_MAX_TIER}`, 8, 38);
    // Stash count display
    ctx.fillStyle = '#ffd23f'; ctx.font = 'bold 10px monospace'; ctx.textAlign = 'right';
    ctx.fillText(`STASH  ${stash.length}/${stashSize}`, W - 8, H - 8);
    ctx.textAlign = 'left';

    // Helper to draw text with 1px black shadow for legibility on any background
    const shadowText = (text, x, y) => {
      const orig = ctx.fillStyle;
      ctx.fillStyle = '#000';
      ctx.fillText(text, x + 1, y + 1);
      ctx.fillStyle = orig;
      ctx.fillText(text, x, y);
    };

    // 4×2 grid layout — row 0: Archer/Wizard/Warrior/Rogue, row 1: Monk/Paladin/Witch Doctor/Necromancer
    const allClasses = [CLASS.ARCHER, CLASS.WIZARD, CLASS.WARRIOR, CLASS.ROGUE,
                        CLASS.MONK, CLASS.PALADIN, CLASS.WITCH_DOCTOR, CLASS.NECROMANCER];
    const cardW = 148, cardH = 145, gap = 6;
    const cols = 4;
    const totalW = cardW * cols + gap * (cols - 1);
    const startX = Math.floor((W - totalW) / 2);
    const startY = 52;

    for (let i = 0; i < allClasses.length; i++) {
      const c = allClasses[i];
      const col = i % cols, row = Math.floor(i / cols);
      const cx = startX + col * (cardW + gap);
      const cy = startY + row * (cardH + gap);
      const hovered = mouseX >= cx && mouseX <= cx + cardW && mouseY >= cy && mouseY <= cy + cardH;
      const gpHover = (i === gpClassIdx);

      // Darker base, slightly lighter when hovered — better contrast against text
      ctx.fillStyle = (hovered || gpHover) ? '#26262f' : '#13131a';
      ctx.fillRect(cx, cy, cardW, cardH);
      ctx.strokeStyle = c.color;
      ctx.lineWidth = gpHover ? 4 : hovered ? 3 : 2;
      ctx.strokeRect(cx + 1, cy + 1, cardW - 2, cardH - 2);
      // Extra glow rect for gamepad selection
      if (gpHover) {
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 1;
        ctx.globalAlpha = 0.25 + 0.2 * Math.sin(performance.now() * 0.01);
        ctx.strokeRect(cx + 3, cy + 3, cardW - 6, cardH - 6);
        ctx.globalAlpha = 1;
      }
      ctx.lineWidth = 1;

      // Key hint
      ctx.fillStyle = '#aaa'; ctx.font = 'bold 10px monospace'; ctx.textAlign = 'left';
      ctx.fillText(`[${i + 1}]`, cx + 6, cy + 13);

      // Name (with shadow for emphasis)
      ctx.font = 'bold 13px monospace'; ctx.textAlign = 'center';
      ctx.fillStyle = '#000'; ctx.fillText(c.name.toUpperCase(), cx + cardW / 2 + 1, cy + 24);
      ctx.fillStyle = c.color; ctx.fillText(c.name.toUpperCase(), cx + cardW / 2, cy + 23);

      // Sprite icon — actual in-game character at 3x scale
      const sx = Math.floor(cx + cardW / 2), sy = Math.floor(cy + 48);
      const sprite = (typeof PLAYER_SPRITES !== 'undefined') ? PLAYER_SPRITES[c.id] : null;
      if (sprite && typeof drawSprite === 'function') {
        drawSprite(ctx, sprite, sx, sy, false, false, 3);
      } else {
        // Fallback: generic colored placeholder if sprites missing
        ctx.fillStyle = c.color;
        ctx.fillRect(sx - 5, sy - 3, 10, 9);
        ctx.fillStyle = '#ffd5a0'; ctx.fillRect(sx - 4, sy - 9, 8, 6);
        ctx.fillStyle = '#000';
        ctx.fillRect(sx - 2, sy - 7, 1, 1); ctx.fillRect(sx + 1, sy - 7, 1, 1);
        ctx.fillStyle = '#4a3a2a';
        ctx.fillRect(sx - 4, sy + 6, 2, 3); ctx.fillRect(sx + 2, sy + 6, 2, 3);
      }

      // Stats block — bigger, brighter, with shadow
      ctx.font = 'bold 9px monospace'; ctx.textAlign = 'left';
      const sy2 = cy + 72;
      ctx.fillStyle = '#e8e8e8'; shadowText(`HP ${c.baseMaxHp}  SPD ${c.baseSpeed}  CRIT ${c.baseCritChance}%`, cx + 8, sy2);
      ctx.fillStyle = '#e8e8e8'; shadowText(`WPN ${c.weaponDamage}dmg @ ${c.weaponFireRate}/s`, cx + 8, sy2 + 11);
      ctx.fillStyle = c.resourceColor || c.color;
      shadowText(`${c.resourceName}: ${c.baseMaxResource} (+${c.baseResourceRegen}/s)`, cx + 8, sy2 + 22);

      // Desc (wrapped to ~24 chars) — brighter
      ctx.fillStyle = '#c8c8c8'; ctx.font = 'bold 8px monospace'; ctx.textAlign = 'center';
      const words = (c.desc || '').split(' ');
      const dlines = []; let dline = '';
      for (const w of words) {
        const test = dline ? dline + ' ' + w : w;
        if (test.length > 24) { dlines.push(dline); dline = w; } else dline = test;
      }
      if (dline) dlines.push(dline);
      for (let li = 0; li < Math.min(dlines.length, 2); li++) {
        shadowText(dlines[li], cx + cardW / 2, sy2 + 40 + li * 10);
      }

      // Signature ability — bigger with shadow
      const sig = ABILITIES[c.signature];
      if (sig) {
        ctx.font = 'bold 8px monospace'; ctx.textAlign = 'center';
        ctx.fillStyle = sig.color;
        shadowText(`★ ${sig.name}`, cx + cardW / 2, cy + cardH - 7);
      }
    }
    ctx.textAlign = 'left';
  }

  function drawItemInBox(item, x, y, size, selected) {
    if (!item) return;
    ctx.strokeStyle = item.rarity.color;
    ctx.lineWidth = selected ? 3 : 2;
    ctx.strokeRect(x + 1, y + 1, size - 2, size - 2);
    ctx.lineWidth = 1;
    const spr = (typeof ITEM_SPRITES !== 'undefined') && ITEM_SPRITES[item.base.id];
    if (spr && typeof drawSprite === 'function') {
      // Pick scale so sprite fills ~75% of box
      const scale = Math.max(1, Math.floor(size * 0.75 / spr.w));
      drawSprite(ctx, spr, Math.floor(x + size / 2), Math.floor(y + size / 2), false, false, scale);
      // Subtle rarity tint
      ctx.globalAlpha = 0.15;
      ctx.fillStyle = item.rarity.color;
      ctx.fillRect(x + 2, y + 2, size - 4, size - 4);
      ctx.globalAlpha = 1;
    } else {
      ctx.fillStyle = item.rarity.color;
      ctx.font = 'bold 14px monospace';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(item.base.letter, x + size / 2, y + size / 2 + 1);
      ctx.textBaseline = 'alphabetic'; ctx.textAlign = 'left';

    // Helper: draw a stat row with gear/level-up callouts
    function drawStat(label, value, gearPart, lvlPart, yOff) {
      const rowY = sy + 11 + yOff;
      ctx.fillStyle = '#ddd'; ctx.font = '8px monospace'; ctx.textAlign = 'left';
      ctx.fillText(label, sx, rowY);

    }
    // Compute deltas
    const hpGear = player.bonusMaxHp;

    const dmgGear = player.bonusDmgPct;
    const dmgLvl  = Math.round((player.baseDmgMult - 1) * 100);
    const spdGear = Math.round(player.bonusMoveSpeed);

    ctx.fillText(`GOLD ${player.gold}g   KILLS ${player.kills}`, sx, sy + 100);
