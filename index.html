  // ============================================================
  // PAUSE MENU
  // ============================================================
  function drawPauseScreen() {
    // World is still visible underneath — just dim it
    ctx.fillStyle = 'rgba(0,0,0,0.60)';
    ctx.fillRect(0, 0, W, H);

    const cx = W / 2, cy = H / 2;
    const pw = 200, ph = pauseInSettings ? 128 : 116;
    const px = cx - pw / 2, py = cy - ph / 2;

    // Panel bg + border
    ctx.fillStyle = '#0e0e18';
    ctx.fillRect(px, py, pw, ph);
    ctx.strokeStyle = '#8855ff';
    ctx.lineWidth = 2;
    ctx.strokeRect(px + 1, py + 1, pw - 2, ph - 2);
    ctx.lineWidth = 1;
    ctx.strokeStyle = '#4433aa';
    ctx.strokeRect(px + 3, py + 3, pw - 6, ph - 6);

    ctx.textAlign = 'center';

    if (!pauseInSettings) {
      // ── Main pause panel ──────────────────────────────────────
      ctx.fillStyle = '#ccaaff';
      ctx.font = 'bold 14px monospace';
      ctx.fillText('PAUSED', cx, py + 22);

      // Divider
      ctx.strokeStyle = '#2a2a44'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(px + 12, py + 30); ctx.lineTo(px + pw - 12, py + 30); ctx.stroke();

      const opts = ['CONTINUE', 'SETTINGS', 'QUIT TO MENU'];
      const optColors = ['#66ffaa', '#aaaaff', '#ff8866'];
      const optY = [py + 52, py + 72, py + 92];

      // Mouse hover detect
      for (let i = 0; i < opts.length; i++) {
        const hov = mouseX >= px && mouseX <= px + pw && mouseY >= optY[i] - 11 && mouseY <= optY[i] + 5;
        if (hov) pauseMenuSel = i;
        if (mouseClicked && hov) activatePauseOption(i);
        const sel = pauseMenuSel === i;
        ctx.fillStyle = sel ? optColors[i] : '#666688';
        ctx.font = (sel ? 'bold ' : '') + '11px monospace';
        ctx.fillText((sel ? '▶ ' : '  ') + opts[i], cx, optY[i]);
      }

      // Keyboard / gamepad nav
      if (keyJustPressed.has('arrowup') || gpJustPressed.has(12))
        pauseMenuSel = (pauseMenuSel + 2) % 3;
      if (keyJustPressed.has('arrowdown') || gpJustPressed.has(13))
        pauseMenuSel = (pauseMenuSel + 1) % 3;
      if (keyJustPressed.has('enter') || keyJustPressed.has(' ') || gpJustPressed.has(0))
        activatePauseOption(pauseMenuSel);

      // Footer hint
      ctx.fillStyle = '#44445a'; ctx.font = '7px monospace';
      ctx.fillText('ESC / Start  →  continue', cx, py + ph - 8);

    } else {
      // ── Settings sub-panel ───────────────────────────────────
      ctx.fillStyle = '#ccaaff';
      ctx.font = 'bold 12px monospace';
      ctx.fillText('SETTINGS', cx, py + 22);

      ctx.strokeStyle = '#2a2a44'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(px + 12, py + 30); ctx.lineTo(px + pw - 12, py + 30); ctx.stroke();

      const rows = [
        { label: 'Sound',        val: Sfx.muted ? 'MUTED' : 'ON',  col: Sfx.muted ? '#ff6666' : '#66ff88' },
        { label: 'Screen Shake', val: gameSettings.screenShake ? 'ON' : 'OFF', col: gameSettings.screenShake ? '#66ff88' : '#ff6666' },
      ];
      const rowY = [py + 52, py + 72, py + 96];

      for (let i = 0; i < 2; i++) {
        const hov = mouseX >= px && mouseX <= px + pw && mouseY >= rowY[i] - 11 && mouseY <= rowY[i] + 5;
        if (hov) pauseMenuSel = i;
        if (mouseClicked && hov) activateSettingsOption(i);
        const sel = pauseMenuSel === i;
        ctx.fillStyle = sel ? '#ffdd66' : '#888899';
        ctx.font = (sel ? 'bold ' : '') + '10px monospace';
        ctx.textAlign = 'left';
        ctx.fillText((sel ? '▶ ' : '  ') + rows[i].label, px + 18, rowY[i]);
        ctx.fillStyle = rows[i].col;
        ctx.textAlign = 'right';
        ctx.fillText(rows[i].val, px + pw - 14, rowY[i]);
        ctx.textAlign = 'center';
      }

      // BACK button
      {
        const i = 2;
        const hov = mouseX >= px && mouseX <= px + pw && mouseY >= rowY[i] - 11 && mouseY <= rowY[i] + 5;
        if (hov) pauseMenuSel = i;
        if (mouseClicked && hov) activateSettingsOption(i);
        const sel = pauseMenuSel === i;
        ctx.fillStyle = sel ? '#ffdd66' : '#666688';
        ctx.font = (sel ? 'bold ' : '') + '10px monospace';
        ctx.fillText((sel ? '◀ ' : '  ') + 'BACK', cx, rowY[i]);
      }

      if (keyJustPressed.has('arrowup') || gpJustPressed.has(12))
        pauseMenuSel = (pauseMenuSel + 2) % 3;
      if (keyJustPressed.has('arrowdown') || gpJustPressed.has(13))
        pauseMenuSel = (pauseMenuSel + 1) % 3;
      if (keyJustPressed.has('enter') || keyJustPressed.has(' ') || gpJustPressed.has(0))
        activateSettingsOption(pauseMenuSel);
      // ESC / B button goes back
      if ((keyJustPressed.has('escape') || gpJustPressed.has(1)) && pauseInSettings) {
        pauseInSettings = false; pauseMenuSel = 1;
      }
    }

    ctx.textAlign = 'left';
  }

  function activatePauseOption(i) {
    Sfx.uiClick && Sfx.uiClick();
    if (i === 0) { state = STATE.PLAYING; }
    else if (i === 1) { pauseInSettings = true; pauseMenuSel = 0; }
    else if (i === 2) { state = STATE.CLASS_SELECT; }
  }

  function activateSettingsOption(i) {
    Sfx.uiClick && Sfx.uiClick();
    if (i === 0) { Sfx.toggleMute(); }
    else if (i === 1) { gameSettings.screenShake = !gameSettings.screenShake; }
    else if (i === 2) { pauseInSettings = false; pauseMenuSel = 1; }
  }

  function drawParagonScreen() {
    const W = 640, H = 360;
    ctx.fillStyle = '#0d0d14'; ctx.fillRect(0, 0, W, H);
    // Header
    ctx.fillStyle = '#cc66ff'; ctx.font = 'bold 14px monospace'; ctx.textAlign = 'center';
    ctx.fillText('PARAGON BOARD', W / 2, 20);
    const parPct = paragonLevel < PARAGON_LEVEL_CAP ? paragonXp / paragonXpToNext(paragonLevel) : 1;
    ctx.fillStyle = '#1a1a2e'; ctx.fillRect(W/2-140, 27, 280, 8);
    ctx.fillStyle = '#cc66ff'; ctx.fillRect(W/2-140, 27, 280 * parPct, 8);
    ctx.fillStyle = '#aaa'; ctx.font = '8px monospace';
    const parLabel = paragonLevel < PARAGON_LEVEL_CAP
      ? `P${paragonLevel}  ${paragonXp}/${paragonXpToNext(paragonLevel)} XP`
      : `P${paragonLevel}  ASCENDED`;
    ctx.fillText(parLabel, W / 2, 44);
    if (paragonPoints > 0) {
      ctx.fillStyle = '#ffdd44'; ctx.font = 'bold 8px monospace';
      ctx.fillText(`${paragonPoints} POINT${paragonPoints !== 1 ? 'S' : ''} AVAILABLE`, W / 2, 53);
    }
    // Category tabs
    const CATS = Object.keys(PARAGON_BOARD);
    const tabW = 70, tabH = 14, tabStartX = W/2 - (CATS.length * tabW) / 2;
    for (let i = 0; i < CATS.length; i++) {
      const cat = PARAGON_BOARD[CATS[i]];
      const tx = tabStartX + i * tabW, ty = 58;
      const active = CATS[i] === paragonTreeCat;
      ctx.fillStyle = active ? cat.color : '#222'; ctx.fillRect(tx, ty, tabW - 2, tabH);
      ctx.strokeStyle = cat.color; ctx.lineWidth = active ? 2 : 1; ctx.strokeRect(tx, ty, tabW - 2, tabH);
      ctx.fillStyle = active ? '#000' : cat.color; ctx.font = `bold 7px monospace`; ctx.textAlign = 'center';
      ctx.fillText(cat.label, tx + (tabW - 2) / 2, ty + 9);
    }
    // Node grid — 5 rows, 2 per row, laid out in the board area
    const cat = PARAGON_BOARD[paragonTreeCat];
    const colW = (W - 60) / 2;
    const rowH = 42, startY = 82;
    // Sort nodes by row
    const rows = {};
    for (const node of cat.nodes) { rows[node.row] = rows[node.row] || []; rows[node.row].push(node); }
    for (const rowNum of Object.keys(rows).sort((a,b)=>a-b)) {
      const rowNodes = rows[rowNum];
      for (let ci = 0; ci < rowNodes.length; ci++) {
        const node = rowNodes[ci];
        const nx = 30 + ci * colW;
        const ny = startY + (rowNum - 1) * rowH;
        const spent = spentParagon[node.id];
        const canBuy = canSpendParagon(node.id);
        ctx.fillStyle = spent ? cat.color : (canBuy ? '#1a1a2e' : '#111');
        ctx.fillRect(nx, ny, colW - 8, rowH - 6);
        ctx.strokeStyle = spent ? cat.color : (canBuy ? '#444466' : '#222');
        ctx.lineWidth = spent ? 2 : 1; ctx.strokeRect(nx, ny, colW - 8, rowH - 6);
        ctx.fillStyle = spent ? '#000' : (canBuy ? '#ddd' : '#555');
        ctx.font = `bold 8px monospace`; ctx.textAlign = 'left';
        ctx.fillText(node.name, nx + 5, ny + 12);
        ctx.fillStyle = spent ? '#000099' : (canBuy ? '#aaa' : '#444');
        ctx.font = `7px monospace`;
        const words = node.desc.split(' ');
        let line = '', lineY = ny + 22;
        for (const w of words) {
          if (ctx.measureText(line + w).width > colW - 18) {
            ctx.fillText(line.trim(), nx + 5, lineY); line = w + ' '; lineY += 9;
          } else line += w + ' ';
        }
        if (line.trim()) ctx.fillText(line.trim(), nx + 5, lineY);
        // Store hitbox for click
        node._hx = nx; node._hy = ny; node._hw = colW - 8; node._hh = rowH - 6;
      }
    }
    // Back button
    ctx.fillStyle = '#222'; ctx.fillRect(8, 8, 55, 16);
    ctx.strokeStyle = '#555'; ctx.lineWidth = 1; ctx.strokeRect(8, 8, 55, 16);
    ctx.fillStyle = '#aaa'; ctx.font = '8px monospace'; ctx.textAlign = 'left';
    ctx.fillText('← BACK', 13, 19);
    ctx.textAlign = 'left';
  }

  // ============================================================
  // MAIN LOOP
  // ============================================================
  loadSave();
  resetWorld();
  state = STATE.CLASS_SELECT; // start at class picker
  let lastTime = performance.now();

  function loop(now) {
    const dt = Math.min((now - lastTime) / 1000, 1 / 30);
    lastTime = now;
    updateInput();

    // Global audio mute toggle (M key) — works in any state.
    if (keyJustPressed.has('m')) Sfx.toggleMute();

    // Pause toggle: ESC or gamepad Start (9) while playing/paused
    if ((keyJustPressed.has('escape') || gpJustPressed.has(9)) && state === STATE.PLAYING) {
      state = STATE.PAUSED; pauseMenuSel = 0; pauseInSettings = false;
    } else if ((keyJustPressed.has('escape') || gpJustPressed.has(9)) && state === STATE.PAUSED && !pauseInSettings) {
      state = STATE.PLAYING;
    } else if ((keyJustPressed.has('tab') || keyJustPressed.has('i') || gpJustPressed.has(8)) &&
        (state === STATE.PLAYING || state === STATE.INVENTORY)) {
      toggleInventory();
    } else if (keyJustPressed.has('escape') && state === STATE.INVENTORY) {
      toggleInventory();
    }

    if (state === STATE.PLAYING) {
      if (keyJustPressed.has('1') || gpJustPressed.has(0)) castAbility(0);
      if (keyJustPressed.has('2') || gpJustPressed.has(1)) castAbility(1);
      if (keyJustPressed.has('3') || gpJustPressed.has(2)) castAbility(2);
      if (keyJustPressed.has('4') || gpJustPressed.has(3)) castAbility(3);
      if (keyJustPressed.has('5') || gpJustPressed.has(4)) castAbility(4); // LB
      if (keyJustPressed.has('6') || gpJustPressed.has(5)) castAbility(5); // RB

      // Hit-pause: freeze world for a few frames after a crit/big hit.
      // Damage numbers continue animating so the popup is visible during the freeze.
      const frozen = hitPauseTimer > 0;
      if (frozen) hitPauseTimer -= dt;
      const wdt = frozen ? 0 : dt;

      const cfg = waveConfig(currentWave);
      waveTimer -= wdt;
      if (!isBossWave(currentWave) && waveTimer > 0) {
        spawnTimer += wdt;
        while (spawnTimer >= cfg.spawnInterval) {
          spawnTimer -= cfg.spawnInterval;
          spawnEnemy(cfg);
        }
      }
      player.update(wdt);
      updateClassMechanics(wdt);
      for (const e of enemies) if (e.alive) e.update(wdt, player);
      for (const p of projectiles) if (!p.dead) p.update(wdt);
      for (const ep of enemyProjectiles) if (!ep.dead) ep.update(wdt);
      for (const g of xpGems) if (!g.dead) g.update(wdt, player);
      for (const d of itemDrops) if (!d.dead) d.update(wdt, player);
      for (const sw of meleeSwings) if (!sw.dead) sw.update(wdt);
      updateGroundEffects(wdt);
      if (!frozen) checkCollisions();
      enemies = enemies.filter(e => e.alive);
      projectiles = projectiles.filter(p => !p.dead);
      enemyProjectiles = enemyProjectiles.filter(p => !p.dead);
      xpGems = xpGems.filter(g => !g.dead);
      itemDrops = itemDrops.filter(d => !d.dead);
      meleeSwings = meleeSwings.filter(sw => !sw.dead);
      if (!isBossWave(currentWave) && waveTimer <= 0) endWave();
    }
    else if (state === STATE.LEVELUP) {
      updateVirtualCursor(dt);
      let picked = -1;
      if (keyJustPressed.has('1')) picked = 0;
      else if (keyJustPressed.has('2')) picked = 1;
      else if (keyJustPressed.has('3')) picked = 2;
      else if (gpJustPressed.has(0)) picked = 0;
      else if (gpJustPressed.has(1)) picked = 1;
      else if (gpJustPressed.has(2)) picked = 2;
      else if (keyJustPressed.has('r')) doRerollLevelUp();
      else if (gpJustPressed.has(3)) doRerollLevelUp();
      else if (mouseClicked) {
        // Check reroll button
        const cardW = 130, cardH = 140, gap = 18;
        const totalW = cardW * 3 + gap * 2;
        const startX = (W - totalW) / 2;
        const cardY = (H - cardH) / 2 + 10;
        const rbW = 120, rbH = 22;
        const rbX = (W - rbW) / 2, rbY = cardY + cardH + 14;
        if (isHovering(rbX, rbY, rbW, rbH)) {
          doRerollLevelUp();
        } else {
          for (let i = 0; i < levelUpChoices.length; i++) {
            const cx = startX + i * (cardW + gap);
            if (mouseX >= cx && mouseX <= cx + cardW && mouseY >= cardY && mouseY <= cardY + cardH) { picked = i; break; }
          }
        }
      }
      if (picked >= 0) pickLevelUp(picked);
    }
    else if (state === STATE.ABILITYDRAFT) {
      updateVirtualCursor(dt);
      let picked = -1;
      if (keyJustPressed.has('1')) picked = 0;
      else if (keyJustPressed.has('2')) picked = 1;
      else if (keyJustPressed.has('3')) picked = 2;
      else if (gpJustPressed.has(0)) picked = 0;
      else if (gpJustPressed.has(1)) picked = 1;
      else if (gpJustPressed.has(2)) picked = 2;
      else if (mouseClicked) {
        const cardW = 150, cardH = 170, gap = 18;
        const totalW = cardW * 3 + gap * 2;
        const startX = (W - totalW) / 2;
        const cardY = (H - cardH) / 2 + 10;
        for (let i = 0; i < abilityDraftChoices.length; i++) {
          const cx = startX + i * (cardW + gap);
          if (mouseX >= cx && mouseX <= cx + cardW && mouseY >= cardY && mouseY <= cardY + cardH) { picked = i; break; }
        }
      }
      if (picked >= 0) pickAbilityDraft(picked);
    } else if (state === STATE.TIERDRAFT) {
      const count = tierDraftChoices.length;
      const cardW = 120, cardH = 90, gap = 14;
      const totalW = count * cardW + (count - 1) * gap;
      const sx = (W - totalW) / 2;
      const cy = H / 2 - 20;
      for (let i = 0; i < count; i++) {
        const cx = sx + i * (cardW + gap);
        if (mx >= cx && mx <= cx+cardW && my >= cy && my <= cy+cardH) { pickTierDraft(i); break; }
      }
    }
    else if (state === STATE.ACT_TRANSITION) {
      // Tick the cinematic timer; auto-advance to next wave when it expires.
      actTransitionTimer -= dt;
      const skipPressed = keyJustPressed.has(' ') || keyJustPressed.has('enter') ||
                          mouseClicked || gpJustPressed.has(0) || gpJustPressed.has(1);
      if (actTransitionTimer <= 0 || skipPressed) {
        // currentWave hasn't been incremented yet; startNextWave will do the work.
        actTransitionData = null;
        startNextWave();
      }
    }
    else if (state === STATE.DEAD || state === STATE.VICTORY) {
      if (!runXpAwarded) { awardRunXp(runWavesCompleted, runBossesKilled, state === STATE.VICTORY); runXpAwarded = true; }
      const anyGp = gpJustPressed.has(0) || gpJustPressed.has(1) || gpJustPressed.has(2) || gpJustPressed.has(3);
      if (keyJustPressed.has('r') || mouseClicked || anyGp) {
        if (runMode === 'trial') {
          endTrial(state === STATE.VICTORY);
        } else {
          pendingBank = null;
          state = STATE.STASH_BANKING;
        }
      }
    }
    else if (state === STATE.STASH_BANKING) {
      updateVirtualCursor(dt);
      if (gpJustPressed.has(0)) mouseClicked = true;
      if (gpJustPressed.has(1)) { pendingBank = null; state = STATE.CLASS_SELECT; }
      if (mouseClicked) {
        const runItems = [];
        for (const k of SLOT_ORDER) {
          if (player.equipped[k]) runItems.push({ source: 'eq', key: k });
        }
        for (let i = 0; i < player.inventory.length; i++) {
          runItems.push({ source: 'inv', key: i });
        }
        const cols = 10, slotSize = 28, slotGap = 4, startX = 20, startY = 112;
        let consumed = false;
        for (let i = 0; i < runItems.length; i++) {
          const r = runItems[i];
          const col = i % cols, row = Math.floor(i / cols);
          const x = startX + col * (slotSize + slotGap);
          const y = startY + row * (slotSize + slotGap);
          if (mouseX >= x && mouseX < x + slotSize && mouseY >= y && mouseY < y + slotSize) {
            if (pendingBank && pendingBank.source === r.source && pendingBank.key === r.key) pendingBank = null;
            else pendingBank = r;
            consumed = true;
            break;
          }
        }
        if (!consumed) {
          if (isHovering(W - 280, H - 30, 130, 24)) {
            commitBank();
            state = STATE.CLASS_SELECT;
          } else if (isHovering(W - 140, H - 30, 120, 24)) {
            pendingBank = null;
            state = STATE.CLASS_SELECT;
          }
        }
      }
    }
    else if (state === STATE.CLASS_SELECT) {
      // Tab or T key cycles mode
      if (keyJustPressed.has('t') || gpJustPressed.has(3)) cycleMode();
      const classIds = ['archer', 'wizard', 'warrior', 'rogue', 'monk', 'paladin', 'witchdoctor', 'necromancer'];
      const COLS = 4;
      let picked = null;

      // Keyboard 1-8
      for (let ki = 0; ki < classIds.length; ki++) {
        if (keyJustPressed.has(String(ki + 1))) { picked = classIds[ki]; break; }
      }

      // Gamepad d-pad grid navigation
      if (gpJustPressed.has(15)) { gpClassIdx = (gpClassIdx % COLS === COLS - 1) ? gpClassIdx : gpClassIdx + 1; }
      if (gpJustPressed.has(14)) { gpClassIdx = (gpClassIdx % COLS === 0) ? gpClassIdx : gpClassIdx - 1; }
      if (gpJustPressed.has(13)) { gpClassIdx = Math.min(classIds.length - 1, gpClassIdx + COLS); }
      if (gpJustPressed.has(12)) { gpClassIdx = Math.max(0, gpClassIdx - COLS); }
      // A/Cross = confirm highlighted
      if (gpJustPressed.has(0)) picked = classIds[gpClassIdx];

      // Mouse click
      if (!picked && mouseClicked) {
        if (isHovering(8, 8, 140, 20)) {
          cycleMode();
        } else if (isHovering(W - 170, 34, 75, 18)) {
          // HUB button
          hubSubMenu = null; hubSelectedItem = null; hubGemPick = null;
          state = STATE.HUB;
        } else if (isHovering(W - 170, 8, 160, 20)) {
          state = STATE.CHAR_SCREEN;
        } else {
          const cardW = 148, cardH = 138, gap = 6;
          const totalW = cardW * COLS + gap * (COLS - 1);
          const startX = Math.floor((W - totalW) / 2);
          const startY = 48;
          for (let i = 0; i < classIds.length; i++) {
            const col = i % COLS, row = Math.floor(i / COLS);
            const cx = startX + col * (cardW + gap);
            const cy = startY + row * (cardH + gap);
            if (mouseX >= cx && mouseX <= cx + cardW && mouseY >= cy && mouseY <= cy + cardH) {
              picked = classIds[i]; break;
            }
          }
        }
      }
      if (picked) pickClass(picked);
    }
    else if (state === STATE.CHAR_SCREEN) {
      updateVirtualCursor(dt);
      if (gpJustPressed.has(0)) mouseClicked = true;
      if (keyJustPressed.has('escape') || keyJustPressed.has('c') || gpJustPressed.has(1)) {
        state = STATE.CLASS_SELECT;
      }
      handleCharTreeClicks(() => { state = STATE.CLASS_SELECT; });
    }
    else if (state === STATE.TRIAL_LOADOUT) {
      updateVirtualCursor(dt);
      if (gpJustPressed.has(0)) mouseClicked = true;
      if (gpJustPressed.has(1)) { loadout = {}; runMode = 'standard'; state = STATE.CLASS_SELECT; }
      if (mouseClicked) {
        // Click equipped slot — unequip
        const eqSlot = getLoadoutSlotAtMouse();
        if (eqSlot) {
          delete loadout[eqSlot];
        } else {
          // Click stash item — equip into its slot
          const si = getLoadoutStashIdxAtMouse();
          if (si >= 0 && stash[si]) {
            const item = stash[si];
            let targetSlot = item.base.slot;
            if (targetSlot === 'ring') {
              if (loadout.ring1 === undefined) targetSlot = 'ring1';
              else if (loadout.ring2 === undefined) targetSlot = 'ring2';
              else targetSlot = 'ring1';
            }
            for (const slot in loadout) {
              if (loadout[slot] === si) delete loadout[slot];
            }
            loadout[targetSlot] = si;
          } else {
            if (isHovering(W - 280, H - 30, 130, 24)) {
              loadout = {}; runMode = 'standard'; state = STATE.CLASS_SELECT;
            } else if (isHovering(W - 140, H - 30, 120, 24)) {
              startTrialRun();
            }
          }
        }
      }
    }
    // TRIALS_SELECT — paragon board input
    if (state === STATE.TRIALS_SELECT && mouseClicked) {
      if (mouseX >= 8 && mouseX <= 63 && mouseY >= 8 && mouseY <= 24) {
        state = STATE.CLASS_SELECT;
      } else {
        const CATS = Object.keys(PARAGON_BOARD);
        const tabW = 70, tabStartX = W/2 - (CATS.length * tabW) / 2;
        let handled = false;
        for (let i = 0; i < CATS.length; i++) {
          const tx = tabStartX + i * tabW;
          if (mouseX >= tx && mouseX <= tx + tabW - 2 && mouseY >= 58 && mouseY <= 72) {
            paragonTreeCat = CATS[i]; handled = true; break;
          }
        }
        if (!handled) {
          const cat = PARAGON_BOARD[paragonTreeCat];
          for (const node of cat.nodes) {
            if (node._hx !== undefined &&
                mouseX >= node._hx && mouseX <= node._hx + node._hw &&
                mouseY >= node._hy && mouseY <= node._hy + node._hh) {
              spendParagon(node.id); break;
            }
          }
        }
      }
    }
    // ── INVENTORY input handler ──────────────────────────────────────
    if (state === STATE.INVENTORY) {
      updateVirtualCursor(dt);
      // Tab switch: LB(GP4)/Q = prev, RB(GP5) = next
      if (gpJustPressed.has(4) || keyJustPressed.has('q')) {
        inventoryTab = (inventoryTab + 2) % 3;
        charTreeTab = inventoryTab === 1 ? 'abilities' : 'talents';
        if (player) charTreeClass = player.class.id;
        Sfx.uiClick && Sfx.uiClick();
      }
      if (gpJustPressed.has(5)) {
        inventoryTab = (inventoryTab + 1) % 3;
        charTreeTab = inventoryTab === 1 ? 'abilities' : 'talents';
        if (player) charTreeClass = player.class.id;
        Sfx.uiClick && Sfx.uiClick();
      }
      if (inventoryTab > 0) {
        // Abilities / Skill Tree tab
        if (gpJustPressed.has(0)) mouseClicked = true;
        handleCharTreeClicks(() => { inventoryTab = 0; });
      } else {
      // GEAR tab
      // Gamepad: Square(2)=equip hovered item, Triangle(3)=salvage hovered
      const gpEquip  = gpJustPressed.has(2);
      const gpSalvage = gpJustPressed.has(3);

      // Bulk salvage shortcuts
      if (keyJustPressed.has('v')) { bulkSalvage(0); Sfx.uiClick(); }
      if (keyJustPressed.has('b')) { bulkSalvage(1); Sfx.uiClick(); }
      if (keyJustPressed.has('y')) { bulkSalvage(2); Sfx.uiClick(); }

      const invIdx = getInventoryIdxAtMouse();
      const eqSlot = getEquippedSlotAtMouse();

      // Square or E key = instant equip hovered inv item
      if ((gpEquip || keyJustPressed.has('e')) && invIdx >= 0 && player.inventory[invIdx]) {
        equipFromInventory(invIdx);
      }
      // Triangle or Del = salvage hovered inv item
      if ((gpSalvage || keyJustPressed.has('delete')) && invIdx >= 0 && player.inventory[invIdx]) {
        salvageInventoryItem(invIdx);
      }

      if (mouseClicked) {
        // Click equipped slot → unequip back to inventory
        if (eqSlot) {
          unequipSlot(eqSlot); Sfx.uiClick();
        }
        // Click inventory item → select it
        else if (invIdx >= 0 && player.inventory[invIdx]) {
          selectedInvIdx = (selectedInvIdx === invIdx) ? -1 : invIdx;
          Sfx.uiClick();
        } else {
          // EQUIP button
          const btnX = W - 130, btnH = 18;
          if (selectedInvIdx >= 0 && isHovering(btnX, 200, 120, btnH)) {
            equipFromInventory(selectedInvIdx);
          }
          // SALVAGE button
          else if (selectedInvIdx >= 0 && isHovering(btnX, 222, 120, btnH)) {
            salvageInventoryItem(selectedInvIdx);
          }
          // REROLL button
          else if (selectedInvIdx >= 0 && isHovering(btnX, 244, 120, btnH)) {
            rerollInventoryItem(selectedInvIdx);
          }
          else { selectedInvIdx = -1; }
        }
      }
      // RIGHT-CLICK on inventory item = instant equip (new behaviour)
      if (rightClicked) {
        if (invIdx >= 0 && player.inventory[invIdx]) {
          equipFromInventory(invIdx);
        } else if (eqSlot) {
          unequipSlot(eqSlot); Sfx.uiClick();
        }
      }
      } // end GEAR tab
    }

    // ── SHOP input handler ────────────────────────────────────────────────
    if (state === STATE.SHOP) {
      updateVirtualCursor(dt);
      const gpEquip   = gpJustPressed.has(2);  // Square = buy+equip shop item
      const gpSalvage = gpJustPressed.has(3);  // Triangle = salvage hovered inv item

      // Keyboard shortcuts
      if (keyJustPressed.has('v')) { bulkSalvage(0); Sfx.uiClick(); }
      if (keyJustPressed.has('b')) { bulkSalvage(1); Sfx.uiClick(); }
      if (keyJustPressed.has('y')) { bulkSalvage(2); Sfx.uiClick(); }
      if (keyJustPressed.has('r')) doRefreshShop();
      // Space/Enter/A = advance wave (same as READY button)
      if (keyJustPressed.has(' ') || keyJustPressed.has('enter') || gpJustPressed.has(0)) {
        selectedInvIdx = -1; startNextWave();
      }

      const shopIdx = getShopIdxAtMouse();
      // Inventory in shop uses offset coords
      const invIdxShop = (() => {
        const invYOff = 70;
        for (let i = 0; i < INV_COLS * INV_ROWS; i++) {
          const col = i % INV_COLS, row = Math.floor(i / INV_COLS);
          const x = INV_START_X + col * (INV_SLOT_SIZE + INV_GAP);
          const y = INV_START_Y + invYOff + row * (INV_SLOT_SIZE + INV_GAP);
          if (mouseX >= x && mouseX < x + INV_SLOT_SIZE && mouseY >= y && mouseY < y + INV_SLOT_SIZE) return i;
        }
        return -1;
      })();
      // Equipped slot in shop (shifted by eqYOffset=70)
      const eqSlotShop = (() => {
        for (const k of SLOT_ORDER) {
          const p = EQ_LAYOUT[k];
          const sy = p.y + 70;
          if (mouseX >= p.x && mouseX < p.x + EQ_SLOT_SIZE && mouseY >= sy && mouseY < sy + EQ_SLOT_SIZE) return k;
        }
        return null;
      })();

      // Square = buy & immediately equip hovered shop item
      if (gpEquip && shopIdx >= 0 && shopItems[shopIdx]) {
        buyShopItem(shopIdx);
        // equip the item that just went to inventory
        const justAdded = player.inventory.length - 1;
        if (justAdded >= 0) equipFromInventory(justAdded);
      }
      // Triangle = salvage hovered inv item
      if (gpSalvage && invIdxShop >= 0 && player.inventory[invIdxShop]) {
        salvageInventoryItem(invIdxShop);
      }

      if (mouseClicked) {
        if (shopIdx >= 0 && shopItems[shopIdx]) {
          // Left-click shop item → buy it
          buyShopItem(shopIdx);
        } else if (invIdxShop >= 0 && player.inventory[invIdxShop]) {
          selectedInvIdx = (selectedInvIdx === invIdxShop) ? -1 : invIdxShop;
          Sfx.uiClick();
        } else if (eqSlotShop) {
          unequipSlot(eqSlotShop); Sfx.uiClick();
        } else {
          // Buttons (action panel for selected inv item)
          const btnX = W - 130, btnH = 18;
          if (selectedInvIdx >= 0 && isHovering(btnX, 200, 120, btnH)) {
            equipFromInventory(selectedInvIdx);
          } else if (selectedInvIdx >= 0 && isHovering(btnX, 222, 120, btnH)) {
            salvageInventoryItem(selectedInvIdx);
          } else if (selectedInvIdx >= 0 && isHovering(btnX, 244, 120, btnH)) {
            rerollInventoryItem(selectedInvIdx);
          }
          // Salvage buttons row
          const refX = SHOP_START_X + 4 * (SHOP_ITEM_W + SHOP_GAP);
          const salvX = refX + 95, salvY = SHOP_Y;
          if (isHovering(salvX, salvY, 90, SHOP_ITEM_H))      { bulkSalvage(0); Sfx.uiClick(); }
          else if (isHovering(salvX+94, salvY, 90, SHOP_ITEM_H)) { bulkSalvage(1); Sfx.uiClick(); }
          else if (isHovering(salvX+188, salvY, 90, SHOP_ITEM_H)) { bulkSalvage(2); Sfx.uiClick(); }
          // Refresh button
          else if (isHovering(refX, SHOP_Y, 90, SHOP_ITEM_H)) { doRefreshShop(); }
          // READY button
          else if (isHovering(W - 130, H - 30, 120, 24)) {
            selectedInvIdx = -1; startNextWave();
          }
          else { selectedInvIdx = -1; }
        }
      }
      // RIGHT-CLICK: shop item → lock/unlock | inv item → instant equip
      if (rightClicked) {
        if (shopIdx >= 0) {
          shopLocked[shopIdx] = !shopLocked[shopIdx];
          Sfx.uiClick();
        } else if (invIdxShop >= 0 && player.inventory[invIdxShop]) {
          equipFromInventory(invIdxShop);
        } else if (eqSlotShop) {
          unequipSlot(eqSlotShop); Sfx.uiClick();
        }
      }
    }

    // HUB state input
    if (state === STATE.HUB) {
      updateVirtualCursor(dt);
      if (gpJustPressed.has(0)) mouseClicked = true;
      if (keyJustPressed.has('h') || keyJustPressed.has('escape') || gpJustPressed.has(1)) {
        if (hubSubMenu) { hubSubMenu = null; hubSelectedItem = null; hubGemPick = null; }
        else state = STATE.CLASS_SELECT;
      }
      if (mouseClicked) {
        // Back button (8,8,70,16) — always visible
        if (isHovering(8, 8, 70, 16)) {
          if (hubSubMenu) { hubSubMenu = null; hubSelectedItem = null; hubGemPick = null; }
          else state = STATE.CLASS_SELECT;
        } else if (!hubSubMenu) {
          // NPC panel clicks
          const panels = drawHubScreen._panels || [];
          for (const p of panels) {
            if (mouseX >= p._hx && mouseX <= p._hx + p._hw && mouseY >= p._hy && mouseY <= p._hy + p._hh) {
              hubSubMenu = p.id; hubSelectedItem = null; hubGemPick = null; break;
            }
          }
        } else if (hubSubMenu === 'blacksmith') {
          // Select item
          for (const k of Object.keys(player.equipped)) {
            const it = player.equipped[k];
            if (!it) continue;
            if (it._bsHx !== undefined && mouseX >= it._bsHx && mouseX < it._bsHx + it._bsHw && mouseY >= it._bsHy && mouseY < it._bsHy + it._bsHh) {
              hubSelectedItem = { source: 'eq', key: k }; break;
            }
          }
          if (!hubSelectedItem) {
            const invItems = player.inventory.filter(Boolean);
            for (const it of invItems) {
              if (it._bsHx !== undefined && mouseX >= it._bsHx && mouseX < it._bsHx + it._bsHw && mouseY >= it._bsHy && mouseY < it._bsHy + it._bsHh) {
                hubSelectedItem = { source: 'inv', it }; break;
              }
            }
          }
          // Add socket button (232,98,140,18)
          if (hubSelectedItem && isHovering(232, 98, 140, 18)) {
            const it = hubSelectedItem.source === 'eq' ? player.equipped[hubSelectedItem.key] : hubSelectedItem.it;
            if (it && player.gold >= 50) {
              const socks = (it.sockets || []);
              const maxS = it.base.maxSockets || 0;
              if (socks.length < maxS) {
                if (!it.sockets) it.sockets = [];
                it.sockets.push(null); // empty socket
                player.gold -= 50;
                saveData();
                spawnDamageNumber(W/2, H/2, 'SOCKET ADDED', { color: '#ff8844', size: 12, vy: -50, life: 1.5 });
              }
            }
          }
        } else if (hubSubMenu === 'jeweler') {
          // Gem selection
          const gems = player.gems || [];
          for (let i = 0; i < gems.length; i++) {
            const gem = gems[i];
            if (gem._jHx !== undefined && mouseX >= gem._jHx && mouseX < gem._jHx + gem._jHw && mouseY >= gem._jHy && mouseY < gem._jHy + gem._jHh) {
              hubGemPick = (hubGemPick && hubGemPick._idx === i) ? null : { ...gem, _idx: i };
              break;
            }
          }
          // Combine button (438,102,130,16)
          if (hubGemPick && isHovering(438, 102, 130, 16)) {
            const sameIdxs = gems.map((g,i) => (g.typeId === hubGemPick.typeId && g.quality === hubGemPick.quality) ? i : -1).filter(i => i >= 0);
            if (sameIdxs.length >= 3 && hubGemPick.quality < 4) {
              // Remove 3 gems
              const toRemove = sameIdxs.slice(0, 3).sort((a,b) => b-a);
              for (const idx of toRemove) gems.splice(idx, 1);
              // Add 1 higher quality
              gems.push({ typeId: hubGemPick.typeId, quality: hubGemPick.quality + 1 });
              hubGemPick = null;
              saveData();
              spawnDamageNumber(W/2, H/2, 'GEM UPGRADED!', { color: '#44ccff', size: 13, vy: -55, life: 1.8 });
            }
          }
          // Socket gem into item slot
          for (const k of Object.keys(player.equipped)) {
            const it = player.equipped[k];
            if (!it || !it._jSock) continue;
            for (const sock of it._jSock) {
              if (!sock) continue;
              if (mouseX >= sock.x && mouseX < sock.x + sock.w && mouseY >= sock.y && mouseY < sock.y + sock.h) {
                if (hubGemPick) {
                  // Insert gem
                  if (!it.sockets) it.sockets = [];
                  while (it.sockets.length <= sock.si) it.sockets.push(null);
                  it.sockets[sock.si] = { typeId: hubGemPick.typeId, quality: hubGemPick.quality };
                  gems.splice(hubGemPick._idx, 1);
                  hubGemPick = null;
                  player.recomputeStats();
                  saveData();
                }
              }
            }
          }
        }
      }
      // H key from dead/victory → hub
    }
    // H key from dead/victory state — visit hub
    if ((state === STATE.DEAD || state === STATE.VICTORY) && keyJustPressed.has('h')) {
      if (!runXpAwarded) { awardRunXp(runWavesCompleted, runBossesKilled, state === STATE.VICTORY); runXpAwarded = true; }
      hubSubMenu = null; hubSelectedItem = null; hubGemPick = null;
      state = STATE.HUB;
    }

    for (const p of particles) p.update(dt);
    particles = particles.filter(p => !p.dead);
    updateDamageNumbers(dt);
    if (levelUpFlashTimer > 0) levelUpFlashTimer -= dt;
    if (lootFlashTimer > 0) lootFlashTimer -= dt;
    if (bossBannerTimer > 0) bossBannerTimer -= dt;
    if (bossDefeatedBannerTimer > 0) bossDefeatedBannerTimer -= dt;
    if (goldFlashTimer > 0) goldFlashTimer -= dt;
    if (biomeBannerTimer > 0) biomeBannerTimer -= dt;
    shake *= 0.85; if (shake < 0.05) shake = 0;

    ctx.save();
    if (shake > 0 && gameSettings.screenShake && state !== STATE.INVENTORY && state !== STATE.SHOP) {
      const sx = (Math.random() - 0.5) * shake * 2;
      const sy = (Math.random() - 0.5) * shake * 2;
      ctx.translate(sx, sy);
    }
    drawBackground();
    drawGroundEffects(ctx);
    for (const d of itemDrops) d.draw(ctx);
    // Ability cast rings
    for (let i = abilityFlashes.length - 1; i >= 0; i--) {
      const f = abilityFlashes[i];
      f.r += (f.maxR - f.r) * 0.28;
      f.life -= 1/60;
      if (f.life <= 0) { abilityFlashes.splice(i, 1); continue; }
      const alpha = f.life / f.maxLife;
      ctx.save();
      ctx.globalAlpha = alpha * 0.75;
      ctx.strokeStyle = f.color;
      ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2); ctx.stroke();
      ctx.globalAlpha = alpha * 0.12;
      ctx.fillStyle = f.color;
      ctx.beginPath(); ctx.arc(f.x, f.y, f.r * 0.6, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }
    for (const g of xpGems) g.draw(ctx);
    for (const p of particles) p.draw(ctx);
    for (const e of enemies) e.draw(ctx);
    for (const e of enemies) if (e.alive && e.elite) drawEliteBeacon(ctx, e);
    for (const sw of meleeSwings) sw.draw(ctx);
    for (const p of projectiles) p.draw(ctx);
    for (const ep of enemyProjectiles) ep.draw(ctx);
    if (state !== STATE.DEAD) player.draw(ctx);
    drawDamageNumbers(ctx);
    ctx.restore();

    drawHud();
    if (state === STATE.PLAYING) drawAbilityBar();
    else if (state === STATE.PAUSED) drawPauseScreen();
    if (state === STATE.LEVELUP) drawLevelUpScreen();
    else if (state === STATE.ABILITYDRAFT) drawAbilityDraftScreen();
    else if (state === STATE.TIERDRAFT) drawTierDraftScreen();
    else if (state === STATE.DEAD) drawDeathScreen();
    else if (state === STATE.VICTORY) drawVictoryScreen();
    else if (state === STATE.INVENTORY) drawInventoryScreen();
    else if (state === STATE.SHOP) drawShopScreen();
    else if (state === STATE.CLASS_SELECT) drawClassSelectScreen();
    else if (state === STATE.STASH_BANKING) drawStashBankingScreen();
    else if (state === STATE.TRIAL_LOADOUT) drawTrialLoadoutScreen();
    else if (state === STATE.ACT_TRANSITION) drawActTransitionScreen();
    else if (state === STATE.CHAR_SCREEN) drawCharScreen();
    else if (state === STATE.TRIALS_SELECT) drawParagonScreen();
    else if (state === STATE.HUB) drawHubScreen();

    // Virtual cursor on top of all UI
    if (state === STATE.INVENTORY || state === STATE.SHOP || state === STATE.LEVELUP ||
        state === STATE.ABILITYDRAFT || state === STATE.TIERDRAFT || state === STATE.CLASS_SELECT ||
        state === STATE.STASH_BANKING || state === STATE.TRIAL_LOADOUT ||
        state === STATE.CHAR_SCREEN || state === STATE.HUB || state === STATE.PAUSED) {
      drawVirtualCursor();
    }

    finalizeFrame();
  }

  function finalizeFrame() {
    keyJustPressed.clear();
    mouseClicked = false;
    rightClicked = false;
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
</script>
</body>
</html>
