<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Slayers — Phase 6</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    background: #0e0e12;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    color: #ddd;
    user-select: none;
  }
  body {
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
  }
  #game {
    image-rendering: pixelated; image-rendering: crisp-edges;
    background: #14181a; border: 2px solid #444;
    width: min(1280px, 96vw); height: min(720px, 54vw);
    box-shadow: 0 0 60px rgba(122, 217, 107, 0.08);
    cursor: crosshair;
  }
  #hud {
    font-size: 12px; color: #888; letter-spacing: 1px;
    display: flex; gap: 16px; flex-wrap: wrap; justify-content: center;
  }
  #hud .label { color: #5a5a66; }
  #hud .value { color: #eee; }
  #hud .accent { color: #7ad96b; }
</style>
</head>
<body>
  <canvas id="game" width="640" height="360"></canvas>
  <div id="hud">
    <div><span class="label">INPUT:</span> <span id="device" class="accent">keyboard</span></div>
    <div><span class="label">MOVE:</span> <span class="value">WASD / Stick</span></div>
    <div><span class="label">ABILITIES:</span> <span class="value">1-4 / Face Btns</span></div>
    <div><span class="label">INVENTORY:</span> <span class="value">Tab / I</span></div>
    <div><span class="label">RESTART:</span> <span class="value">R</span></div>
  </div>

<script>
// =============================================================================
// SLAYERS — Phase 6 — 4 biomes / 4 bosses / 9 enemy types / Victory at wave 20
// TOC:
//   - CANVAS + DOM
//   - GAME STATE / GLOBAL VARS
//   - INPUT ABSTRACTION
//   - BIOME
//   - ITEM SYSTEM (rarity, slots, bases, affixes, gen)
//   - ECONOMY (prices, salvage, reroll, gold, mats)
//   - CLASS SYSTEM
//   - ABILITIES
//   - LEVEL-UP STAT POOL
//   - WAVE / BOSS LOGIC
//   - ENEMY TYPES
//   - ENTITIES (Player, Enemy, BoneLord, Projectile, BoneProjectile, XPGem, ItemDrop, Particle)
//   - WORLD HELPERS (spawn, findNearestEnemy, fireProjectile)
//   - COLLISIONS
//   - STATE TRANSITIONS (endWave, enterLevelUp, enterShop, enterAbilityDraft)
//   - EQUIP / UNEQUIP / SALVAGE / REROLL
//   - RENDER (background, HUD, ability bar, level-up, ability draft, death, inventory, shop)
//   - MAIN LOOP
// =============================================================================
(() => {
  // ============================================================
  // CANVAS + DOM
  // ============================================================
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  const W = canvas.width;
  const H = canvas.height;
  const $device = document.getElementById('device');

  // ============================================================
  // GAME STATE
  // ============================================================
  const STATE = { PLAYING: 0, LEVELUP: 1, INTERMISSION: 2, DEAD: 3, INVENTORY: 4, ABILITYDRAFT: 5, SHOP: 6, VICTORY: 7 };
  let state = STATE.PLAYING;
  let prevState = STATE.PLAYING;
  let levelUpChoices = [];
  let abilityDraftChoices = [];
  let intermissionTimer = 0;
  let waveTimer = 0;
  let currentWave = 1;
  let spawnTimer = 0;
  let shake = 0;
  let levelUpFlashTimer = 0;
  let lootFlashTimer = 0;
  let lastLootName = '';
  let bossBannerTimer = 0;
  let bossDefeatedBannerTimer = 0;
  let lastBossName = '';
  let goldFlashTimer = 0;
  let biomeBannerTimer = 0;

  // Shop / blacksmith state
  let shopItems = [];
  let shopRefreshCost = 5;
  let selectedInvIdx = -1;
  let levelUpRerollCost = 1;
  let currentBiomeId = '';

  let activeDevice = 'keyboard';
  let detectedGamepadType = null;

  let player;
  let enemies = [];
  let projectiles = [];
  let enemyProjectiles = [];
  let xpGems = [];
  let itemDrops = [];
  let particles = [];
  let groundEffects = []; // shockwaves, meteor warnings
  let bossRef = null;
  let floorDecorations = [];

  // ============================================================
  // INPUT
  // ============================================================
  const Actions = { moveX: 0, moveY: 0 };
  const keys = new Set();
  const keyJustPressed = new Set();
  const gpButtonsLast = new Map();
  const gpJustPressed = new Set();
  let mouseX = -1, mouseY = -1;
  let mouseClicked = false;

  window.addEventListener('keydown', (e) => {
    const k = e.key.toLowerCase();
    if (!keys.has(k)) keyJustPressed.add(k);
    keys.add(k);
    const blocked = ['arrowup','arrowdown','arrowleft','arrowright',' ','tab','i'];
    if (blocked.includes(k)) e.preventDefault();
  });
  window.addEventListener('keyup', (e) => keys.delete(e.key.toLowerCase()));
  window.addEventListener('blur', () => keys.clear());
  canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    mouseX = (e.clientX - rect.left) * (W / rect.width);
    mouseY = (e.clientY - rect.top) * (H / rect.height);
  });
  canvas.addEventListener('mousedown', () => { mouseClicked = true; });
  window.addEventListener('gamepadconnected', (e) => { detectedGamepadType = detectGamepadType(e.gamepad.id); });
  window.addEventListener('gamepaddisconnected', () => {});

  function detectGamepadType(id) {
    const lower = id.toLowerCase();
    if (lower.includes('xbox') || lower.includes('xinput')) return 'xbox';
    if (lower.includes('dualshock') || lower.includes('dualsense') || lower.includes('playstation') || lower.includes('054c')) return 'playstation';
    return 'generic';
  }
  function pollKeyboard() {
    let kx = 0, ky = 0;
    if (keys.has('a') || keys.has('arrowleft'))  kx -= 1;
    if (keys.has('d') || keys.has('arrowright')) kx += 1;
    if (keys.has('w') || keys.has('arrowup'))    ky -= 1;
    if (keys.has('s') || keys.has('arrowdown'))  ky += 1;
    if (kx !== 0 || ky !== 0) {
      const len = Math.hypot(kx, ky);
      Actions.moveX = kx / len; Actions.moveY = ky / len;
      activeDevice = 'keyboard';
      return true;
    }
    return false;
  }
  function pollGamepad() {
    gpJustPressed.clear();
    const gps = navigator.getGamepads ? navigator.getGamepads() : [];
    let moved = false;
    for (const gp of gps) {
      if (!gp) continue;
      if (!detectedGamepadType) detectedGamepadType = detectGamepadType(gp.id);
      for (let i = 0; i < gp.buttons.length; i++) {
        const wasP = gpButtonsLast.get(i) || false;
        const isP = gp.buttons[i] && gp.buttons[i].pressed;
        if (isP && !wasP) gpJustPressed.add(i);
        gpButtonsLast.set(i, isP);
      }
      const dz = 0.18;
      let gx = gp.axes[0] || 0;
      let gy = gp.axes[1] || 0;
      const mag = Math.hypot(gx, gy);
      if (mag < dz) { gx = 0; gy = 0; }
      else { const s = (mag - dz) / (1 - dz); gx = (gx / mag) * s; gy = (gy / mag) * s; }
      const btn = (i) => gp.buttons[i] && gp.buttons[i].pressed;
      if (btn(14)) gx = -1;
      if (btn(15)) gx =  1;
      if (btn(12)) gy = -1;
      if (btn(13)) gy =  1;
      if (gx !== 0 || gy !== 0) {
        const m = Math.hypot(gx, gy);
        if (m > 1) { gx /= m; gy /= m; }
        Actions.moveX = gx; Actions.moveY = gy;
        activeDevice = 'gamepad';
        moved = true;
      }
    }
    return moved;
  }
  function updateInput() {
    Actions.moveX = 0; Actions.moveY = 0;
    const gpInput = pollGamepad();
    if (!gpInput) pollKeyboard();
    let label = 'keyboard';
    if (activeDevice === 'gamepad') {
      label = detectedGamepadType === 'playstation' ? 'PS5 controller'
            : detectedGamepadType === 'xbox' ? 'Xbox controller'
            : 'gamepad';
    }
    if ($device && $device.textContent !== label) $device.textContent = label;
  }

  // ============================================================
  // BIOME
  // ============================================================
  const BIOME = {
    CRYPT:      { id: 'crypt',      name: 'The Crypt',        bg: '#15181a', grid: '#1d2220', decoColors: ['#3a3f3a', '#2a2e2a', '#4a4f44', '#557755'] },
    FROSTSPIRE: { id: 'frostspire', name: 'Frostspire Peaks', bg: '#1a2030', grid: '#232c3c', decoColors: ['#5a7090', '#3a4a60', '#88aabb', '#aaccff'] },
    INFERNO:    { id: 'inferno',    name: 'Infernal Depths',  bg: '#1a0e0a', grid: '#2a1410', decoColors: ['#5a2010', '#7a3020', '#aa4020', '#ff8040'] },
    VOID:       { id: 'void',       name: 'The Void Throne',  bg: '#10081a', grid: '#180c28', decoColors: ['#4a2a6a', '#3a1a5a', '#aa66ff', '#dd99ff'] },
  };
  function biomeFor(w) {
    if (w <= 5)  return BIOME.CRYPT;
    if (w <= 10) return BIOME.FROSTSPIRE;
    if (w <= 15) return BIOME.INFERNO;
    return BIOME.VOID;
  }
  function currentBiome() { return biomeFor(currentWave); }

  // ============================================================
  // ITEM SYSTEM
  // ============================================================
  const SLOT_ORDER = ['helm', 'amulet', 'chest', 'offhand', 'gloves', 'belt', 'boots', 'ring1', 'ring2', 'weapon'];
  const SLOT_LABEL = {
    helm: 'HELM', chest: 'CHEST', gloves: 'GLOVES', boots: 'BOOTS', belt: 'BELT',
    amulet: 'AMULET', ring1: 'RING I', ring2: 'RING II', weapon: 'WEAPON', offhand: 'OFFHAND',
  };
  const RARITY = {
    WHITE:  { id: 'white',  name: 'Common',    color: '#cccccc', affixMin: 0, affixMax: 1, weight: 60, dmgMult: 1.00 },
    BLUE:   { id: 'blue',   name: 'Magic',     color: '#5599ff', affixMin: 2, affixMax: 3, weight: 25, dmgMult: 1.15 },
    YELLOW: { id: 'yellow', name: 'Rare',      color: '#ffcc33', affixMin: 4, affixMax: 4, weight: 10, dmgMult: 1.30 },
    ORANGE: { id: 'orange', name: 'Legendary', color: '#ff8000', affixMin: 4, affixMax: 4, weight: 4,  dmgMult: 1.50 },
    GREEN:  { id: 'green',  name: 'Set',       color: '#33cc55', affixMin: 4, affixMax: 4, weight: 1,  dmgMult: 1.40 },
  };
  const RARITY_LIST = [RARITY.WHITE, RARITY.BLUE, RARITY.YELLOW, RARITY.ORANGE, RARITY.GREEN];

  const ITEM_BASES = [
    { id: 'cap',    name: 'Leather Cap',    slot: 'helm',    letter: 'H' },
    { id: 'tunic',  name: 'Leather Tunic',  slot: 'chest',   letter: 'C' },
    { id: 'gloves', name: 'Cloth Gloves',   slot: 'gloves',  letter: 'G' },
    { id: 'boots',  name: 'Soft Boots',     slot: 'boots',   letter: 'F' },
    { id: 'belt',   name: 'Worn Belt',      slot: 'belt',    letter: 'L' },
    { id: 'amulet', name: 'Tin Amulet',     slot: 'amulet',  letter: 'A' },
    { id: 'ring',   name: 'Iron Ring',      slot: 'ring',    letter: 'R' },
    { id: 'bow',    name: 'Hunter Bow',     slot: 'weapon',  letter: 'W' },
    { id: 'quiver', name: 'Tattered Quiver',slot: 'offhand', letter: 'Q' },
  ];
  const AFFIX_POOL = [
    { id: 'maxhp',        min: 5,  max: 22, fmt: (v) => `+${v} Max HP`,         apply: (p, v) => { p.bonusMaxHp += v; } },
    { id: 'dmg_pct',      min: 5,  max: 18, fmt: (v) => `+${v}% Damage`,        apply: (p, v) => { p.bonusDmgPct += v; } },
    { id: 'firerate_pct', min: 5,  max: 18, fmt: (v) => `+${v}% Attack Speed`,  apply: (p, v) => { p.bonusFireRatePct += v; } },
    { id: 'regen',        min: 1,  max: 3,  fmt: (v) => `+${v} HP/sec Regen`,   apply: (p, v) => { p.bonusRegen += v; } },
    { id: 'pickup',       min: 5,  max: 15, fmt: (v) => `+${v} Pickup Range`,   apply: (p, v) => { p.bonusPickupRange += v; } },
    { id: 'movespeed',    min: 5,  max: 15, fmt: (v) => `+${v} Move Speed`,     apply: (p, v) => { p.bonusMoveSpeed += v; } },
    { id: 'armor',        min: 1,  max: 5,  fmt: (v) => `+${v} Armor`,          apply: (p, v) => { p.bonusArmor += v; } },
    { id: 'crit_chance',  min: 2,  max: 9,  fmt: (v) => `+${v}% Crit Chance`,   apply: (p, v) => { p.bonusCritChance += v; } },
    { id: 'max_focus',    min: 5,  max: 25, fmt: (v) => `+${v} Max Focus`,      apply: (p, v) => { p.bonusMaxResource += v; } },
    { id: 'focus_regen',  min: 1,  max: 5,  fmt: (v) => `+${v} Focus/sec`,      apply: (p, v) => { p.bonusResourceRegen += v; } },
  ];

  function rngInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
  function rngPick(arr) { return arr[rngInt(0, arr.length - 1)]; }
  function pickWeightedRarity() {
    const total = RARITY_LIST.reduce((s, r) => s + r.weight, 0);
    let roll = Math.random() * total;
    for (const r of RARITY_LIST) { roll -= r.weight; if (roll <= 0) return r; }
    return RARITY.WHITE;
  }
  function rollAffixes(count) {
    const pool = AFFIX_POOL.slice();
    const out = [];
    for (let i = 0; i < count && pool.length > 0; i++) {
      const idx = rngInt(0, pool.length - 1);
      const def = pool.splice(idx, 1)[0];
      out.push({ def, value: rngInt(def.min, def.max) });
    }
    return out;
  }
  let nextItemId = 1;
  function generateItem() {
    const rarity = pickWeightedRarity();
    const base = rngPick(ITEM_BASES);
    return { id: nextItemId++, base, rarity, affixes: rollAffixes(rngInt(rarity.affixMin, rarity.affixMax)) };
  }
  function itemDisplayName(item) { return `${item.rarity.name} ${item.base.name}`; }

  // ============================================================
  // ECONOMY
  // ============================================================
  const RARITY_PRICE = { white: 12, blue: 30, yellow: 80, orange: 200, green: 250 };
  const RARITY_MAT   = { white: 'bone', blue: 'arcane', yellow: 'essence', orange: 'fragment', green: 'fragment' };
  const RARITY_REROLL = {
    white:  { gold: 5,   mat: 'bone',     count: 1 },
    blue:   { gold: 15,  mat: 'arcane',   count: 1 },
    yellow: { gold: 40,  mat: 'essence',  count: 1 },
    orange: { gold: 100, mat: 'fragment', count: 1 },
    green:  { gold: 80,  mat: 'fragment', count: 1 },
  };
  const MAT_LABELS = { bone: 'BONE', arcane: 'ARCANE', essence: 'ESSENCE', fragment: 'FRAGMENT' };
  const MAT_COLORS = { bone: '#d0d0c0', arcane: '#5599ff', essence: '#ffcc33', fragment: '#ff8000' };
  function itemPrice(item) { return RARITY_PRICE[item.rarity.id] || 10; }
  function rerollSpec(item) { return RARITY_REROLL[item.rarity.id]; }
  function salvageGold(item) { return Math.floor(itemPrice(item) * 0.5); }

  // ============================================================
  // CLASS SYSTEM
  // ============================================================
  const CLASS = {
    ARCHER: {
      id: 'archer', name: 'Archer', color: '#7ad96b',
      baseMaxHp: 80, baseSpeed: 105, baseCritChance: 5,
      weaponDamage: 4, weaponFireRate: 2.2, weaponRange: 210, weaponProjSpeed: 290,
      resourceName: 'FOCUS', resourceColor: '#ffd23f',
      baseMaxResource: 100, baseResourceRegen: 15, critResourceGain: 18,
      signature: 'multishot',
    },
  };

  // ============================================================
  // ABILITIES
  // ============================================================
  const ABILITIES = {
    multishot: {
      id: 'multishot', name: 'Multishot', letter: 'M',
      desc: '3 arrows in spread (+20% dmg)',
      cost: 25, cooldown: 1.8, color: '#ffd23f',
      cast: (player, slot) => {
        const rDmg = slot && slot.rarity ? slot.rarity.dmgMult : 1.0;
        const target = findNearestEnemy(player.x, player.y, player.weaponRange * 1.5);
        if (!target) return false;
        const baseAngle = Math.atan2(target.y - player.y, target.x - player.x);
        const arrows = slot && slot.rarity && slot.rarity.id === 'orange' ? 5 : 3;
        const halfSpread = arrows > 3 ? 0.46 : 0.35;
        for (let i = 0; i < arrows; i++) {
          const t = arrows === 1 ? 0 : (i / (arrows - 1)) * 2 - 1;
          const a = baseAngle + t * halfSpread;
          const sp = player.weaponProjSpeed;
          let dmg = player.weaponDamage * player.dmgMult * 1.20 * rDmg;
          const isCrit = Math.random() * 100 < player.critChance;
          if (isCrit) { dmg *= 2; player.onCrit(); }
          projectiles.push(new Projectile(player.x, player.y, Math.cos(a) * sp, Math.sin(a) * sp, dmg, player.weaponRange / sp + 0.15, isCrit));
        }
        spawnBurst(player.x, player.y, ['#ffd040', '#fff7a0', '#ffffff'], 8);
        shake = Math.min(shake + 1.5, 5);
        return true;
      },
    },
    rainOfArrows: {
      id: 'rainOfArrows', name: 'Rain of Arrows', letter: 'R',
      desc: 'AoE rain on target (3x dmg)',
      cost: 40, cooldown: 4.0, color: '#ffaa44',
      cast: (player, slot) => {
        const rDmg = slot && slot.rarity ? slot.rarity.dmgMult : 1.0;
        const target = findNearestEnemy(player.x, player.y, 280);
        if (!target) return false;
        const isLegend = slot && slot.rarity && slot.rarity.id === 'orange';
        const radius = isLegend ? 70 : 50;
        const dmg = player.weaponDamage * player.dmgMult * 3.0 * rDmg;
        for (const e of enemies) {
          if (!e.alive) continue;
          const dx = e.x - target.x, dy = e.y - target.y;
          if (dx*dx + dy*dy < radius*radius) {
            const isCrit = Math.random() * 100 < player.critChance;
            const finalDmg = isCrit ? dmg * 2 : dmg;
            const died = e.takeDamage(finalDmg);
            if (isCrit) player.onCrit();
            if (died) {
              player.kills++;
              spawnBurst(e.x, e.y, ['#f0f0e0', '#e8e8d8', '#b0b0a0'], 8);
              xpGems.push(new XPGem(e.x, e.y, 1));
              if (Math.random() < 0.18) itemDrops.push(new ItemDrop(e.x, e.y, generateItem()));
              const g = rngInt(1, 3); player.gold += g; goldFlashTimer = 0.8;
            }
          }
        }
        for (let i = 0; i < 28; i++) {
          const offX = (Math.random() - 0.5) * radius * 2;
          const offY = (Math.random() - 0.5) * radius * 2;
          if (offX*offX + offY*offY < radius*radius) {
            spawnBurst(target.x + offX, target.y + offY, ['#fff7a0', '#ffd040'], 2);
          }
        }
        shake = Math.min(shake + 3, 6);
        return true;
      },
    },
    piercingShot: {
      id: 'piercingShot', name: 'Piercing Shot', letter: 'P',
      desc: 'Pierces all enemies (+150% dmg)',
      cost: 30, cooldown: 2.5, color: '#5599ff',
      cast: (player, slot) => {
        const rDmg = slot && slot.rarity ? slot.rarity.dmgMult : 1.0;
        const target = findNearestEnemy(player.x, player.y, player.weaponRange * 2);
        if (!target) return false;
        const dx = target.x - player.x, dy = target.y - player.y;
        const d = Math.hypot(dx, dy);
        if (d < 0.01) return false;
        const sp = player.weaponProjSpeed * 1.4;
        let dmg = player.weaponDamage * player.dmgMult * 2.5 * rDmg;
        const isCrit = Math.random() * 100 < player.critChance;
        if (isCrit) { dmg *= 2; player.onCrit(); }
        const proj = new Projectile(player.x, player.y, (dx/d) * sp, (dy/d) * sp, dmg, 1.2, isCrit);
        proj.piercing = true;
        proj.r = 4;
        projectiles.push(proj);
        spawnBurst(player.x, player.y, ['#5599ff', '#aaccff'], 8);
        return true;
      },
    },
    hawkEye: {
      id: 'hawkEye', name: 'Hawk Eye', letter: 'E',
      desc: '+30% crit & atk speed (5s)',
      cost: 50, cooldown: 12.0, color: '#33cc55',
      cast: (player, slot) => {
        const isLegend = slot && slot.rarity && slot.rarity.id === 'orange';
        player.hawkEyeTimer = isLegend ? 8 : 5;
        spawnBurst(player.x, player.y, ['#33cc55', '#88ff88', '#ffffff'], 12);
        return true;
      },
    },
    arrowVolley: {
      id: 'arrowVolley', name: 'Arrow Volley', letter: 'V',
      desc: '8 arrows in full circle',
      cost: 35, cooldown: 3.0, color: '#ff8000',
      cast: (player, slot) => {
        const rDmg = slot && slot.rarity ? slot.rarity.dmgMult : 1.0;
        const isLegend = slot && slot.rarity && slot.rarity.id === 'orange';
        const arrows = isLegend ? 12 : 8;
        for (let i = 0; i < arrows; i++) {
          const a = (i / arrows) * Math.PI * 2;
          const sp = player.weaponProjSpeed;
          let dmg = player.weaponDamage * player.dmgMult * 1.0 * rDmg;
          const isCrit = Math.random() * 100 < player.critChance;
          if (isCrit) { dmg *= 2; player.onCrit(); }
          projectiles.push(new Projectile(player.x, player.y, Math.cos(a) * sp, Math.sin(a) * sp, dmg, player.weaponRange / sp + 0.1, isCrit));
        }
        spawnBurst(player.x, player.y, ['#ff8000', '#ffaa00', '#ffd040'], 12);
        shake = Math.min(shake + 2, 5);
        return true;
      },
    },
  };
  const ABILITY_LIST = Object.values(ABILITIES);

  function castAbility(slotIdx) {
    if (slotIdx < 0 || slotIdx > 3) return;
    const slot = player.abilities[slotIdx];
    if (!slot) return;
    if (player.abilityCooldowns[slotIdx] > 0) return;
    if (player.resource < slot.def.cost) return;
    const ok = slot.def.cast(player, slot);
    if (ok) {
      player.resource -= slot.def.cost;
      player.abilityCooldowns[slotIdx] = slot.def.cooldown;
    }
  }

  // ============================================================
  // LEVEL-UP STAT POOL
  // ============================================================
  const STAT_POOL = [
    { id: 'maxhp',       name: '+20 Max HP',        desc: 'Higher max + heal 20',  color: '#ff6b6b', apply: (p) => { p.baseMaxHp += 20; p.recomputeStats(); p.hp = Math.min(p.maxHp, p.hp + 20); } },
    { id: 'damage',      name: '+15% Damage',        desc: 'Hits hit harder',       color: '#ffaa44', apply: (p) => { p.baseDmgMult *= 1.15; p.recomputeStats(); } },
    { id: 'firerate',    name: '+20% Attack Speed',  desc: 'Fire faster',           color: '#ffd23f', apply: (p) => { p.baseFireRateMult *= 1.2; p.recomputeStats(); } },
    { id: 'pickup',      name: '+10 Pickup Range',   desc: 'Magnet items further',  color: '#9b59ff', apply: (p) => { p.basePickupRange += 10; p.recomputeStats(); } },
    { id: 'speed',       name: '+15 Move Speed',     desc: 'Run faster',            color: '#4ecdc4', apply: (p) => { p.baseSpeed += 15; p.recomputeStats(); } },
    { id: 'regen',       name: '+1 HP / sec',        desc: 'Passive healing',       color: '#7ad96b', apply: (p) => { p.baseRegen += 1; p.recomputeStats(); } },
    { id: 'focus_regen', name: '+3 Focus/sec',       desc: 'Regen abilities faster',color: '#ffd23f', apply: (p) => { p.baseResourceRegen += 3; p.recomputeStats(); } },
    { id: 'crit',        name: '+5% Crit Chance',    desc: 'More crits',            color: '#ff8800', apply: (p) => { p.baseCritChance += 5; p.recomputeStats(); } },
  ];
  function rollLevelUpChoices() { return [...STAT_POOL].sort(() => Math.random() - 0.5).slice(0, 3); }

  // ============================================================
  // WAVE / BOSS LOGIC
  // ============================================================
  function isBossWave(w) { return w > 0 && w % 5 === 0; }
  function isFinalWave(w) { return w === 20; }
  function waveConfig(w) {
    return {
      duration:       isBossWave(w) ? 999 : Math.min(20 + (w - 1) * 3, 50),
      spawnInterval:  Math.max(0.7 - (w - 1) * 0.04, 0.18),
      enemyHpMult:    1 + (w - 1) * 0.18,
      enemySpeedMult: 1 + (w - 1) * 0.04,
      enemyDmgMult:   1 + (w - 1) * 0.08,
    };
  }

  // ============================================================
  // ENEMY TYPES
  // ============================================================
  const ENEMY_TYPES = {
    skeleton:   { hp: 8,  speedRange: [38, 56],  dmg: 5,  r: 4, name: 'Skeleton' },
    zombie:     { hp: 18, speedRange: [22, 32],  dmg: 8,  r: 5, name: 'Zombie' },
    rat:        { hp: 3,  speedRange: [78, 100], dmg: 3,  r: 3, name: 'Crypt Rat' },
    yeti:       { hp: 28, speedRange: [28, 38],  dmg: 11, r: 6, name: 'Yeti' },
    frostWolf:  { hp: 7,  speedRange: [85, 110], dmg: 6,  r: 4, name: 'Frost Wolf' },
    imp:        { hp: 5,  speedRange: [60, 80],  dmg: 5,  r: 3, name: 'Imp', ranged: true },
    hellhound:  { hp: 16, speedRange: [55, 75],  dmg: 10, r: 4, name: 'Hellhound' },
    shadow:     { hp: 22, speedRange: [40, 55],  dmg: 12, r: 5, name: 'Shadow' },
    voidCaster: { hp: 12, speedRange: [25, 35],  dmg: 8,  r: 4, name: 'Void Caster', ranged: true },
  };
  function pickEnemyType(w) {
    const biome = biomeFor(w);
    if (biome === BIOME.CRYPT) {
      if (w === 1) return 'skeleton';
      if (w === 2) return Math.random() < 0.8 ? 'skeleton' : 'rat';
      if (w === 3) { const r = Math.random(); if (r < 0.5) return 'skeleton'; if (r < 0.75) return 'rat'; return 'zombie'; }
      const r = Math.random(); if (r < 0.4) return 'skeleton'; if (r < 0.7) return 'rat'; return 'zombie';
    }
    if (biome === BIOME.FROSTSPIRE) {
      const r = Math.random();
      if (r < 0.40) return 'frostWolf';
      if (r < 0.75) return 'yeti';
      return 'rat';
    }
    if (biome === BIOME.INFERNO) {
      const r = Math.random();
      if (r < 0.45) return 'imp';
      if (r < 0.80) return 'hellhound';
      return 'rat';
    }
    // VOID
    const r = Math.random();
    if (r < 0.40) return 'shadow';
    if (r < 0.75) return 'voidCaster';
    return 'zombie';
  }

  // ============================================================
  // ENTITY: Player
  // ============================================================
  class Player {
    constructor(x, y) {
      this.x = x; this.y = y;
      this.r = 5; this.facing = 1;
      this.class = CLASS.ARCHER;
      this.baseMaxHp = this.class.baseMaxHp;
      this.baseDmgMult = 1.0;
      this.baseFireRateMult = 1.0;
      this.basePickupRange = 30;
      this.baseSpeed = this.class.baseSpeed;
      this.baseRegen = 0;
      this.baseArmor = 0;
      this.baseCritChance = this.class.baseCritChance;
      this.baseMaxResource = this.class.baseMaxResource;
      this.baseResourceRegen = this.class.baseResourceRegen;
      this.bonusMaxHp = 0; this.bonusDmgPct = 0; this.bonusFireRatePct = 0;
      this.bonusPickupRange = 0; this.bonusMoveSpeed = 0; this.bonusRegen = 0;
      this.bonusArmor = 0; this.bonusCritChance = 0;
      this.bonusMaxResource = 0; this.bonusResourceRegen = 0;
      this.maxHp = this.baseMaxHp; this.hp = this.maxHp;
      this.dmgMult = 1.0; this.fireRateMult = 1.0;
      this.pickupRange = this.basePickupRange; this.speed = this.baseSpeed;
      this.regen = 0; this.armor = 0; this.critChance = this.baseCritChance;
      this.maxResource = this.baseMaxResource; this.resourceRegen = this.baseResourceRegen;
      this.resource = this.maxResource;
      this.iframeTimer = 0; this.IFRAME = 0.5; this.hitFlash = 0;
      this.hawkEyeTimer = 0;
      this.level = 1; this.xp = 0; this.xpToNext = 5;
      this.pendingLevelUps = 0; this.kills = 0;
      this.weaponDamage = this.class.weaponDamage;
      this.weaponFireRate = this.class.weaponFireRate;
      this.weaponRange = this.class.weaponRange;
      this.weaponProjSpeed = this.class.weaponProjSpeed;
      this.fireTimer = 0;
      this.abilities = [null, null, null, null];
      this.abilityCooldowns = [0, 0, 0, 0];
      if (this.class.signature && ABILITIES[this.class.signature]) {
        this.abilities[0] = { id: this.class.signature, def: ABILITIES[this.class.signature], rarity: RARITY.WHITE };
      }
      this.equipped = {
        helm: null, chest: null, gloves: null, boots: null, belt: null,
        amulet: null, ring1: null, ring2: null, weapon: null, offhand: null,
      };
      this.inventory = []; this.INVENTORY_CAP = 24;
      this.gold = 0;
      this.mats = { bone: 0, arcane: 0, essence: 0, fragment: 0 };
    }
    onCrit() {
      if (this.class.critResourceGain) {
        this.resource = Math.min(this.maxResource, this.resource + this.class.critResourceGain);
      }
    }
    effectiveCritChance() { return this.critChance + (this.hawkEyeTimer > 0 ? 30 : 0); }
    effectiveFireRateMult() { return this.fireRateMult * (this.hawkEyeTimer > 0 ? 1.3 : 1.0); }
    recomputeStats() {
      this.bonusMaxHp = 0; this.bonusDmgPct = 0; this.bonusFireRatePct = 0;
      this.bonusPickupRange = 0; this.bonusMoveSpeed = 0; this.bonusRegen = 0;
      this.bonusArmor = 0; this.bonusCritChance = 0;
      this.bonusMaxResource = 0; this.bonusResourceRegen = 0;
      for (const k in this.equipped) {
        const it = this.equipped[k];
        if (!it) continue;
        for (const aff of it.affixes) aff.def.apply(this, aff.value);
      }
      const oldMax = this.maxHp;
      const ratio = oldMax > 0 ? this.hp / oldMax : 1;
      const oldMaxR = this.maxResource;
      const ratioR = oldMaxR > 0 ? this.resource / oldMaxR : 1;
      this.maxHp = this.baseMaxHp + this.bonusMaxHp;
      this.dmgMult = this.baseDmgMult * (1 + this.bonusDmgPct / 100);
      this.fireRateMult = this.baseFireRateMult * (1 + this.bonusFireRatePct / 100);
      this.pickupRange = this.basePickupRange + this.bonusPickupRange;
      this.speed = this.baseSpeed + this.bonusMoveSpeed;
      this.regen = this.baseRegen + this.bonusRegen;
      this.armor = this.baseArmor + this.bonusArmor;
      this.critChance = this.baseCritChance + this.bonusCritChance;
      this.maxResource = this.baseMaxResource + this.bonusMaxResource;
      this.resourceRegen = this.baseResourceRegen + this.bonusResourceRegen;
      if (this.maxHp !== oldMax) this.hp = Math.min(this.maxHp, Math.max(1, ratio * this.maxHp));
      else this.hp = Math.min(this.hp, this.maxHp);
      if (this.maxResource !== oldMaxR) this.resource = Math.min(this.maxResource, ratioR * this.maxResource);
      else this.resource = Math.min(this.resource, this.maxResource);
    }
    update(dt) {
      this.x += Actions.moveX * this.speed * dt;
      this.y += Actions.moveY * this.speed * dt;
      this.x = Math.max(this.r, Math.min(W - this.r, this.x));
      this.y = Math.max(this.r, Math.min(H - this.r, this.y));
      if (Actions.moveX >  0.1) this.facing =  1;
      else if (Actions.moveX < -0.1) this.facing = -1;
      if (this.iframeTimer > 0) this.iframeTimer -= dt;
      if (this.hitFlash > 0) this.hitFlash -= dt;
      if (this.hawkEyeTimer > 0) this.hawkEyeTimer -= dt;
      if (this.regen > 0 && this.hp < this.maxHp) this.hp = Math.min(this.maxHp, this.hp + this.regen * dt);
      if (this.resource < this.maxResource) this.resource = Math.min(this.maxResource, this.resource + this.resourceRegen * dt);
      for (let i = 0; i < this.abilityCooldowns.length; i++) {
        if (this.abilityCooldowns[i] > 0) this.abilityCooldowns[i] -= dt;
      }
      if (this.fireTimer > 0) this.fireTimer -= dt;
      if (this.fireTimer <= 0) {
        const target = findNearestEnemy(this.x, this.y, this.weaponRange);
        if (target) {
          fireProjectile(this, target);
          this.fireTimer = 1 / (this.weaponFireRate * this.effectiveFireRateMult());
        }
      }
    }
    takeDamage(amount) {
      if (this.iframeTimer > 0) return false;
      const actual = Math.max(1, amount - this.armor);
      this.hp -= actual;
      this.iframeTimer = this.IFRAME; this.hitFlash = 0.25;
      shake = Math.min(shake + 3, 6);
      if (this.hp <= 0) { this.hp = 0; return true; }
      return false;
    }
    addXp(amount) {
      this.xp += amount;
      while (this.xp >= this.xpToNext) {
        this.xp -= this.xpToNext; this.level += 1; this.pendingLevelUps += 1;
        this.xpToNext = 5 + (this.level - 1) * 3;
        levelUpFlashTimer = 1.5;
      }
    }
    draw(ctx) {
      const px = Math.floor(this.x), py = Math.floor(this.y);
      const flash = this.hitFlash > 0 && Math.floor(this.hitFlash * 24) % 2 === 0;
      if (this.hawkEyeTimer > 0) {
        const pulse = 0.4 + 0.3 * Math.sin(performance.now() * 0.012);
        ctx.globalAlpha = pulse * 0.5;
        ctx.fillStyle = '#33cc55';
        ctx.fillRect(px - 8, py - 9, 16, 17);
        ctx.globalAlpha = 1;
      }
      ctx.fillStyle = flash ? '#ff4444' : '#7ad96b';
      ctx.fillRect(px - 4, py - 2, 8, 7);
      ctx.fillStyle = '#3a4a2a'; ctx.fillRect(px - 4, py + 2, 8, 1);
      ctx.fillStyle = '#4a3a2a';
      ctx.fillRect(px - 3, py + 5, 2, 2); ctx.fillRect(px + 1, py + 5, 2, 2);
      ctx.fillStyle = flash ? '#ff8888' : '#ffd5a0'; ctx.fillRect(px - 3, py - 7, 6, 5);
      ctx.fillStyle = '#5a3a2a'; ctx.fillRect(px - 3, py - 8, 6, 2);
      ctx.fillStyle = '#000';
      const eo = this.facing === 1 ? 0 : -1;
      ctx.fillRect(px - 2 + eo, py - 5, 1, 1);
      ctx.fillRect(px + 1 + eo, py - 5, 1, 1);
    }
  }

  // ============================================================
  // ENTITY: Enemy
  // ============================================================
  class Enemy {
    constructor(x, y, type, hpMult, speedMult, dmgMult) {
      const t = ENEMY_TYPES[type];
      this.type = type;
      this.x = x; this.y = y; this.r = t.r;
      this.maxHp = Math.round(t.hp * hpMult); this.hp = this.maxHp;
      this.contactDmg = Math.round(t.dmg * dmgMult);
      this.speed = (t.speedRange[0] + Math.random() * (t.speedRange[1] - t.speedRange[0])) * speedMult;
      this.alive = true;
      this.bobPhase = Math.random() * Math.PI * 2;
      this.hitFlash = 0; this.isBoss = false;
      this.fireTimer = 1 + Math.random() * 2;
    }
    update(dt, target) {
      const dx = target.x - this.x, dy = target.y - this.y;
      const d = Math.hypot(dx, dy);
      if (d > 0.01) { this.x += (dx / d) * this.speed * dt; this.y += (dy / d) * this.speed * dt; }
      const bobSpeed = (this.type === 'rat' || this.type === 'frostWolf') ? 14
                     : (this.type === 'zombie' || this.type === 'yeti') ? 5
                     : 8;
      this.bobPhase += dt * bobSpeed;
      if (this.hitFlash > 0) this.hitFlash -= dt;
      // Ranged enemies fire occasionally
      const t = ENEMY_TYPES[this.type];
      if (t.ranged) {
        this.fireTimer -= dt;
        if (this.fireTimer <= 0 && d < 200 && d > 0.01) {
          this.fireTimer = 2.5 + Math.random() * 1.5;
          const sp = this.type === 'imp' ? 110 : 90;
          const theme = this.type === 'imp' ? 'fire' : 'void';
          enemyProjectiles.push(new BoneProjectile(this.x, this.y, (dx/d)*sp, (dy/d)*sp, this.contactDmg, theme));
        }
      }
    }
    takeDamage(amount) {
      this.hp -= amount; this.hitFlash = 0.1;
      if (this.hp <= 0) { this.alive = false; return true; }
      return false;
    }
    draw(ctx) {
      const t = ENEMY_TYPES[this.type];
      const px = Math.floor(this.x), py = Math.floor(this.y + Math.sin(this.bobPhase) * 0.5);
      const f = this.hitFlash > 0;
      if (this.type === 'skeleton') {
        ctx.fillStyle = f ? '#ffffff' : t.body; ctx.fillRect(px - 3, py - 1, 6, 4);
        ctx.fillStyle = f ? '#dddddd' : '#b0b0a0'; ctx.fillRect(px - 2, py + 1, 4, 1);
        ctx.fillStyle = f ? '#eeeeee' : '#d0d0c0';
        ctx.fillRect(px - 2, py + 3, 1, 2); ctx.fillRect(px + 1, py + 3, 1, 2);
        ctx.fillStyle = f ? '#ffffff' : t.head; ctx.fillRect(px - 2, py - 5, 4, 4);
        ctx.fillStyle = '#1a0a0a';
        ctx.fillRect(px - 1, py - 4, 1, 1); ctx.fillRect(px + 1, py - 4, 1, 1);
      } else if (this.type === 'zombie') {
        ctx.fillStyle = f ? '#ffffff' : t.body; ctx.fillRect(px - 4, py - 2, 8, 6);
        ctx.fillStyle = f ? '#dddddd' : '#4a6535'; ctx.fillRect(px - 4, py + 2, 8, 1);
        ctx.fillStyle = f ? '#dddddd' : '#3a4a25';
        ctx.fillRect(px - 3, py + 4, 2, 2); ctx.fillRect(px + 1, py + 4, 2, 2);
        ctx.fillStyle = f ? '#ffffff' : t.head; ctx.fillRect(px - 3, py - 7, 6, 5);
        ctx.fillStyle = '#1a0a0a';
        ctx.fillRect(px - 2, py - 5, 1, 1); ctx.fillRect(px + 1, py - 5, 1, 1);
        ctx.fillStyle = '#aabb55'; ctx.fillRect(px, py - 3, 1, 1);
      } else if (this.type === 'rat') {
        ctx.fillStyle = f ? '#ffffff' : '#6b5034'; ctx.fillRect(px - 3, py - 1, 5, 3);
        ctx.fillStyle = '#4a3a25'; ctx.fillRect(px + 2, py, 2, 1);
        ctx.fillStyle = f ? '#ffffff' : '#7a5d3a'; ctx.fillRect(px - 4, py - 3, 3, 3);
        ctx.fillStyle = '#ff3030'; ctx.fillRect(px - 3, py - 2, 1, 1);
        ctx.fillStyle = '#4a3a25';
        ctx.fillRect(px - 4, py - 4, 1, 1); ctx.fillRect(px - 2, py - 4, 1, 1);
      } else if (this.type === 'yeti') {
        ctx.fillStyle = f ? '#ffffff' : '#d8e8f5'; ctx.fillRect(px - 5, py - 2, 10, 8);
        ctx.fillStyle = f ? '#dddddd' : '#aaccd8';
        ctx.fillRect(px - 5, py + 3, 10, 1); ctx.fillRect(px - 5, py + 5, 10, 1);
        ctx.fillStyle = f ? '#dddddd' : '#88aac0';
        ctx.fillRect(px - 4, py + 7, 3, 3); ctx.fillRect(px + 1, py + 7, 3, 3);
        ctx.fillStyle = f ? '#ffffff' : '#e8f0ff'; ctx.fillRect(px - 4, py - 8, 8, 6);
        ctx.fillStyle = '#5599ff';
        ctx.fillRect(px - 2, py - 6, 2, 2); ctx.fillRect(px, py - 6, 2, 2);
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(px - 3, py - 2, 1, 2); ctx.fillRect(px + 2, py - 2, 1, 2);
      } else if (this.type === 'frostWolf') {
        ctx.fillStyle = f ? '#ffffff' : '#88aac0'; ctx.fillRect(px - 4, py - 1, 7, 4);
        ctx.fillStyle = '#5588a0'; ctx.fillRect(px + 3, py, 3, 1);
        ctx.fillStyle = f ? '#ffffff' : '#aaccd8'; ctx.fillRect(px - 5, py - 4, 4, 4);
        ctx.fillStyle = '#3366aa'; ctx.fillRect(px - 4, py - 3, 1, 1);
        ctx.fillStyle = '#5588a0';
        ctx.fillRect(px - 5, py - 5, 1, 1); ctx.fillRect(px - 3, py - 5, 1, 1);
        ctx.fillStyle = '#88ccdd';
        ctx.fillRect(px - 4, py + 3, 1, 2); ctx.fillRect(px + 2, py + 3, 1, 2);
      } else if (this.type === 'imp') {
        ctx.fillStyle = f ? '#ffffff' : '#cc2020'; ctx.fillRect(px - 3, py - 1, 5, 4);
        ctx.fillStyle = '#882010'; ctx.fillRect(px - 3, py + 3, 5, 1);
        ctx.fillStyle = f ? '#ffffff' : '#dd3030'; ctx.fillRect(px - 3, py - 5, 5, 4);
        ctx.fillStyle = '#ffff00';
        ctx.fillRect(px - 2, py - 4, 1, 1); ctx.fillRect(px + 1, py - 4, 1, 1);
        ctx.fillStyle = '#882010';
        ctx.fillRect(px - 3, py - 6, 1, 1); ctx.fillRect(px + 1, py - 6, 1, 1);
        ctx.fillStyle = '#aa3030';
        ctx.fillRect(px - 5, py - 1, 2, 2); ctx.fillRect(px + 3, py - 1, 2, 2);
      } else if (this.type === 'hellhound') {
        ctx.fillStyle = f ? '#ffffff' : '#3a1010'; ctx.fillRect(px - 4, py - 2, 8, 5);
        ctx.fillStyle = '#5a2020'; ctx.fillRect(px - 4, py + 3, 8, 1);
        ctx.fillStyle = '#ff5520';
        ctx.fillRect(px - 3, py, 2, 1); ctx.fillRect(px + 1, py, 2, 1);
        ctx.fillStyle = f ? '#ffffff' : '#5a2020'; ctx.fillRect(px - 5, py - 5, 4, 4);
        ctx.fillStyle = '#ff2020'; ctx.fillRect(px - 4, py - 4, 2, 2);
        ctx.fillStyle = '#3a1010';
        ctx.fillRect(px - 4, py + 4, 1, 2); ctx.fillRect(px + 3, py + 4, 1, 2);
      } else if (this.type === 'shadow') {
        const shimmer = 0.7 + 0.3 * Math.sin(performance.now() * 0.01 + this.bobPhase);
        ctx.globalAlpha = shimmer;
        ctx.fillStyle = f ? '#ffffff' : '#2a1a4a'; ctx.fillRect(px - 4, py - 4, 8, 9);
        ctx.fillStyle = f ? '#ffffff' : '#5533aa'; ctx.fillRect(px - 3, py - 7, 6, 5);
        ctx.globalAlpha = 1;
        ctx.fillStyle = '#aa66ff';
        ctx.fillRect(px - 2, py - 5, 1, 1); ctx.fillRect(px + 1, py - 5, 1, 1);
        ctx.fillStyle = '#ddaaff'; ctx.fillRect(px - 2, py - 5, 1, 1);
      } else if (this.type === 'voidCaster') {
        ctx.fillStyle = f ? '#ffffff' : '#3a1a5a'; ctx.fillRect(px - 4, py - 2, 8, 7);
        ctx.fillStyle = '#5a2a7a'; ctx.fillRect(px - 4, py + 4, 8, 1);
        ctx.fillStyle = f ? '#ffffff' : '#aa66ff'; ctx.fillRect(px - 2, py - 7, 4, 5);
        ctx.fillStyle = '#000';
        ctx.fillRect(px - 1, py - 5, 1, 1); ctx.fillRect(px + 1, py - 5, 1, 1);
        const orbY = py + Math.sin(performance.now() * 0.005) * 1;
        ctx.fillStyle = '#aa66ff'; ctx.fillRect(px + 4, Math.floor(orbY), 2, 2);
      }
    }
  }

  // ============================================================
  // ENTITY: BoneLord (Act I boss)
  // ============================================================
  class BoneLord {
    constructor(x, y, hpMult, speedMult, dmgMult) {
      this.x = x; this.y = y; this.r = 10;
      this.maxHp = Math.round(280 * hpMult); this.hp = this.maxHp;
      this.contactDmg = Math.round(12 * dmgMult);
      this.speed = 32 * speedMult;
      this.alive = true; this.isBoss = true;
      this.bobPhase = 0; this.hitFlash = 0;
      this.boneThrowTimer = 3.0; this.summonTimer = 8.0;
      this.preferredDistance = 80;
      this.name = 'Bone Lord';
    }
    update(dt, target) {
      const dx = target.x - this.x, dy = target.y - this.y;
      const d = Math.hypot(dx, dy);
      let mv = 0;
      if (d > this.preferredDistance + 20) mv = 1;
      else if (d < this.preferredDistance - 20) mv = -0.5;
      if (d > 0.01 && mv !== 0) {
        this.x += (dx / d) * this.speed * mv * dt;
        this.y += (dy / d) * this.speed * mv * dt;
      }
      this.x = Math.max(this.r, Math.min(W - this.r, this.x));
      this.y = Math.max(this.r, Math.min(H - this.r, this.y));
      this.bobPhase += dt * 4;
      if (this.hitFlash > 0) this.hitFlash -= dt;
      this.boneThrowTimer -= dt;
      if (this.boneThrowTimer <= 0) {
        this.boneThrowTimer = 3.0;
        const a0 = Math.atan2(dy, dx);
        for (const off of [-0.25, 0, 0.25]) {
          const a = a0 + off;
          enemyProjectiles.push(new BoneProjectile(this.x, this.y, Math.cos(a) * 130, Math.sin(a) * 130, this.contactDmg));
        }
        spawnBurst(this.x, this.y, ['#e8e8d0', '#a0a090'], 6);
      }
      this.summonTimer -= dt;
      if (this.summonTimer <= 0) {
        this.summonTimer = 9.0;
        for (let i = 0; i < 3; i++) {
          const ang = (Math.PI * 2) * (i / 3) + Math.random() * 0.5;
          const sx = this.x + Math.cos(ang) * 26;
          const sy = this.y + Math.sin(ang) * 26;
          enemies.push(new Enemy(sx, sy, 'skeleton', 0.8, 1.0, 0.8));
        }
        spawnBurst(this.x, this.y, ['#7755aa', '#aa88cc', '#ddccff'], 16);
      }
    }
    takeDamage(amount) {
      this.hp -= amount; this.hitFlash = 0.12;
      if (this.hp <= 0) { this.alive = false; return true; }
      return false;
    }

    constructor(x, y, hpMult, speedMult, dmgMult) {

      this.boltTimer = 2.0; this.summonTimer = 12.0;
      this.preferredDistance = 110;

      this.phase = 1;
    }
    update(dt, target) {
      const hpRatio = this.hp / this.maxHp;
      const newPhase = hpRatio > 0.66 ? 1 : hpRatio > 0.33 ? 2 : 3;
      if (newPhase !== this.phase) {
        this.phase = newPhase;
        spawnBurst(this.x, this.y, ['#aa66ff', '#dd99ff', '#ffffff'], 20);
        shake = Math.min(shake + 5, 10);
      }
      const dx = target.x - this.x, dy = target.y - this.y;
      const d = Math.hypot(dx, dy);
      let mv = 0;
      if (d > this.preferredDistance + 20) mv = 1;
      else if (d < this.preferredDistance - 20) mv = -0.6;
      if (d > 0.01 && mv !== 0) {
        const sm = this.phase === 3 ? 1.5 : this.phase === 2 ? 1.2 : 1.0;
        this.x += (dx / d) * this.speed * sm * mv * dt;
        this.y += (dy / d) * this.speed * sm * mv * dt;
      }
      this.x = Math.max(this.r, Math.min(W - this.r, this.x));
      this.y = Math.max(this.r, Math.min(H - this.r, this.y));
      this.bobPhase += dt * 5;
      if (this.hitFlash > 0) this.hitFlash -= dt;
      this.boltTimer -= dt;
      const boltCd = this.phase === 3 ? 1.0 : this.phase === 2 ? 1.5 : 2.0;
      if (this.boltTimer <= 0) {
        this.boltTimer = boltCd;
        const a0 = Math.atan2(dy, dx);
        const sc = this.phase === 3 ? 5 : this.phase === 2 ? 4 : 3;
        const hs = 0.3;
        for (let i = 0; i < sc; i++) {
          const t = sc === 1 ? 0 : (i / (sc - 1)) * 2 - 1;
          const a = a0 + t * hs;

        }
        spawnBurst(this.x, this.y, ['#aa66ff', '#dd99ff'], 6);

      if (this.phase >= 2) {
        this.summonTimer -= dt;
        if (this.summonTimer <= 0) {
          this.summonTimer = this.phase === 3 ? 8.0 : 12.0;
          for (let i = 0; i < 2; i++) {

        this.vx *= 0.92; this.vy *= 0.92;
        this.x += this.vx * dt; this.y += this.vy * dt;
      }
      const dx = player.x - this.x, dy = player.y - this.y;
      const d = Math.hypot(dx, dy);
      if (!this.magnetized && d < player.pickupRange) this.magnetized = true;
      if (this.magnetized) {
        const sp = 200 + (1 - Math.min(d / 100, 1)) * 250;
        if (d > 0.01) { this.x += (dx / d) * sp * dt; this.y += (dy / d) * sp * dt; }
        if (d < player.r + this.r) { player.addXp(this.value); this.dead = true; }
      }
    }
    draw(ctx) {
      const px = Math.floor(this.x), py = Math.floor(this.y + Math.sin(this.bobPhase) * 0.8);

        this.vx *= 0.85; this.vy *= 0.85;

        if (Math.abs(this.vx) + Math.abs(this.vy) < 5) this.settled = true;
      }
      const dx = player.x - this.x, dy = player.y - this.y;
      const rr = player.r + this.r;
      if (dx * dx + dy * dy < rr * rr) {
        if (player.inventory.length < player.INVENTORY_CAP) {

      this.size = size || 2;

    update(dt) {
      this.x += this.vx * dt; this.y += this.vy * dt;
      this.vx *= 0.90; this.vy *= 0.90;
      this.life -= dt;

      ctx.globalAlpha = a; ctx.fillStyle = this.color;
      ctx.fillRect(Math.floor(this.x), Math.floor(this.y), this.size, this.size);
      ctx.globalAlpha = 1;
    }
    get dead() { return this.life <= 0; }

  function spawnBurst(x, y, palette, count) {
    palette = palette || ['#f0f0e0', '#e8e8d8', '#b0b0a0', '#ffffff'];
    count = count || 8;
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = 40 + Math.random() * 70;
      const c = palette[Math.floor(Math.random() * palette.length)];
      particles.push(new Particle(x, y, Math.cos(a) * s, Math.sin(a) * s, c, 0.35 + Math.random() * 0.25));
    }

  function spawnEnemy(cfg) {
    const edge = Math.floor(Math.random() * 4);
    const pad = 12; let x, y;
    if (edge === 0) { x = Math.random() * W; y = -pad; }
    else if (edge === 1) { x = W + pad; y = Math.random() * H; }
    else if (edge === 2) { x = Math.random() * W; y = H + pad; }
    else { x = -pad; y = Math.random() * H; }
    enemies.push(new Enemy(x, y, pickEnemyType(currentWave), cfg.enemyHpMult, cfg.enemySpeedMult, cfg.enemyDmgMult));
  }
  function spawnBoss(cfg) {
    let boss;
    if (currentWave === 5)       boss = new BoneLord(W / 2, 70, cfg.enemyHpMult, cfg.enemySpeedMult, cfg.enemyDmgMult);
    else if (currentWave === 10) boss = new IceGiant(W / 2, 70, cfg.enemyHpMult, cfg.enemySpeedMult, cfg.enemyDmgMult);
    else if (currentWave === 15) boss = new Pyromancer(W / 2, 70, cfg.enemyHpMult, cfg.enemySpeedMult, cfg.enemyDmgMult);
    else if (currentWave === 20) boss = new SlayerKiller(W / 2, 70, cfg.enemyHpMult, cfg.enemySpeedMult, cfg.enemyDmgMult);
    else                         boss = new BoneLord(W / 2, 70, cfg.enemyHpMult, cfg.enemySpeedMult, cfg.enemyDmgMult);
    bossRef = boss;
    enemies.push(boss);
    bossBannerTimer = 2.5;
    shake = Math.min(shake + 4, 8);
    spawnBurst(W / 2, 70, ['#7755aa', '#aa88cc', '#ffd040'], 18);
  }
  function findNearestEnemy(x, y, maxRange) {
    let best = null, bestD = maxRange;
    for (const e of enemies) {
      if (!e.alive) continue;
      const d = Math.hypot(e.x - x, e.y - y);
      if (d < bestD) { bestD = d; best = e; }
    }
    return best;
  }
  function fireProjectile(shooter, target) {
    const dx = target.x - shooter.x, dy = target.y - shooter.y;
    const d = Math.hypot(dx, dy);
    if (d < 0.01) return;
    const sp = shooter.weaponProjSpeed;
    const life = shooter.weaponRange / sp + 0.05;
    let dmg = shooter.weaponDamage * shooter.dmgMult;
    const crit = shooter.effectiveCritChance ? shooter.effectiveCritChance() : shooter.critChance;
    const isCrit = Math.random() * 100 < crit;
    if (isCrit) { dmg *= 2; if (shooter.onCrit) shooter.onCrit(); }
    projectiles.push(new Projectile(shooter.x, shooter.y, (dx / d) * sp, (dy / d) * sp, dmg, life, isCrit));
  }

  // ============================================================
  // GROUND EFFECTS (boss attacks: shockwaves, meteors)
  // ============================================================
  function updateGroundEffects(dt) {
    for (const g of groundEffects) {
      g.life -= dt;
      if (g.type === 'shockwave') {
        g.r += (g.maxR / g.maxLife) * dt;
        if (g.life > 0 && player.iframeTimer <= 0 && !g.hit.has(player)) {
          const dx = player.x - g.x, dy = player.y - g.y;
          const d2 = dx*dx + dy*dy;
          if (d2 < g.r * g.r && d2 > (g.r - 25) * (g.r - 25)) {
            const died = player.takeDamage(g.damage);
            if (died) state = STATE.DEAD;
            g.hit.add(player);
          }
        }
      } else if (g.type === 'meteor') {
        if (!g.exploded && g.life <= 0.05) {
          g.exploded = true;
          if (player.iframeTimer <= 0) {
            const dx = player.x - g.x, dy = player.y - g.y;
            if (dx*dx + dy*dy < g.maxR * g.maxR) {
              const died = player.takeDamage(g.damage);
              if (died) state = STATE.DEAD;
            }
          }
          spawnBurst(g.x, g.y, ['#ff4400', '#ff8800', '#ffdd00', '#ffffff'], 24);
          shake = Math.min(shake + 5, 10);
        }
      }
    }
    for (let i = groundEffects.length - 1; i >= 0; i--) {
      if (groundEffects[i].life <= 0 && (groundEffects[i].type !== 'meteor' || groundEffects[i].exploded)) groundEffects.splice(i, 1);
    }
  }
  function drawGroundEffects(ctx) {
    for (const g of groundEffects) {
      if (g.type === 'shockwave') {
        const a = Math.max(0, g.life / g.maxLife);
        ctx.strokeStyle = g.color;
        ctx.globalAlpha = a * 0.8; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(g.x, g.y, g.r, 0, Math.PI * 2); ctx.stroke();
        ctx.lineWidth = 1; ctx.globalAlpha = 1;
      } else if (g.type === 'meteor') {
        const a = Math.max(0, g.life / g.maxLife);
        ctx.strokeStyle = '#ff4040';
        ctx.globalAlpha = (1 - a) * 0.9; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(g.x, g.y, g.maxR, 0, Math.PI * 2); ctx.stroke();
        ctx.fillStyle = '#ff4040';
        ctx.globalAlpha = (1 - a) * 0.3;
        ctx.beginPath(); ctx.arc(g.x, g.y, g.maxR * (1 - a), 0, Math.PI * 2); ctx.fill();
        ctx.lineWidth = 1; ctx.globalAlpha = 1;
      }
    }
  }

  // ============================================================
  // COLLISIONS
  // ============================================================
  function checkCollisions() {
    for (const proj of projectiles) {
      if (proj.dead) continue;
      for (const enemy of enemies) {
        if (!enemy.alive) continue;
        if (proj.piercing) {
          if (!proj.hitSet) proj.hitSet = new Set();
          if (proj.hitSet.has(enemy)) continue;
        }
        const dx = enemy.x - proj.x, dy = enemy.y - proj.y;
        const rr = enemy.r + proj.r;
        if (dx * dx + dy * dy < rr * rr) {
          const died = enemy.takeDamage(proj.damage);
          if (proj.piercing) proj.hitSet.add(enemy);
          else proj.dead = true;
          spawnBurst(enemy.x, enemy.y, proj.isCrit ? ['#ff8800', '#ffd040', '#ffffff'] : ['#fff7a0', '#ffd040'], proj.isCrit ? 6 : 4);
          if (died) {
            player.kills++;
            spawnBurst(enemy.x, enemy.y, ['#f0f0e0', '#e8e8d8', '#b0b0a0', '#ffffff'], 8);
            xpGems.push(new XPGem(enemy.x, enemy.y, enemy.isBoss ? 8 : 1));
            // Gold drop
            const goldAmt = enemy.isBoss ? rngInt(40, 80) : rngInt(1, 3);
            player.gold += goldAmt;
            goldFlashTimer = 0.8;
            const dropChance = enemy.isBoss ? 1.0 : 0.18;
            if (Math.random() < dropChance) {
              if (enemy.isBoss) {
                let it = generateItem();
                let tries = 0;
                while (it.rarity.id === 'white' && tries < 6) { it = generateItem(); tries++; }
                itemDrops.push(new ItemDrop(enemy.x, enemy.y, it));
                itemDrops.push(new ItemDrop(enemy.x + 12, enemy.y, generateItem()));
                itemDrops.push(new ItemDrop(enemy.x - 12, enemy.y, generateItem()));
              } else {
                itemDrops.push(new ItemDrop(enemy.x, enemy.y, generateItem()));
              }
            }
            shake = Math.min(shake + (enemy.isBoss ? 6 : 1), enemy.isBoss ? 10 : 3);
            if (enemy.isBoss) {
              bossRef = null;
              bossDefeatedBannerTimer = 2.0;
              lastBossName = enemy.name || 'BOSS';
              if (isFinalWave(currentWave)) {
                state = STATE.VICTORY;
              } else {
                enterAbilityDraft();
              }
            }
          }
          if (!proj.piercing) break;
        }
      }
    }
    if (player.iframeTimer <= 0) {
      for (const ep of enemyProjectiles) {
        if (ep.dead) continue;
        const dx = ep.x - player.x, dy = ep.y - player.y;
        const rr = ep.r + player.r;
        if (dx * dx + dy * dy < rr * rr) {
          ep.dead = true;
          const died = player.takeDamage(ep.damage);
          if (died) state = STATE.DEAD;
          break;
        }
      }
    }
    if (player.iframeTimer <= 0) {
      for (const enemy of enemies) {
        if (!enemy.alive) continue;
        const dx = enemy.x - player.x, dy = enemy.y - player.y;
        const rr = enemy.r + player.r;
        if (dx * dx + dy * dy < rr * rr) {
          const died = player.takeDamage(enemy.contactDmg);
          if (died) state = STATE.DEAD;
          break;
        }
      }
    }
  }

  // ============================================================
  // STATE TRANSITIONS
  // ============================================================
  function endWave() {
    enemies = []; enemyProjectiles = []; bossRef = null; groundEffects = [];
    if (player.pendingLevelUps > 0) enterLevelUp();
    else enterShop();
  }
  function enterLevelUp() {
    state = STATE.LEVELUP;
    levelUpChoices = rollLevelUpChoices();
    levelUpRerollCost = 1;
  }
  function pickLevelUp(idx) {
    if (idx < 0 || idx >= levelUpChoices.length) return;
    levelUpChoices[idx].apply(player);
    player.pendingLevelUps--;
    if (player.pendingLevelUps > 0) enterLevelUp();
    else enterShop();
  }
  function enterAbilityDraft() {
    const pool = ABILITY_LIST.slice();
    const out = [];
    const seen = new Set();
    while (out.length < 3 && pool.length > 0) {
      const idx = rngInt(0, pool.length - 1);
      const def = pool.splice(idx, 1)[0];
      if (seen.has(def.id)) continue;
      seen.add(def.id);
      out.push({ def, rarity: pickWeightedRarity() });
    }
    abilityDraftChoices = out;
    state = STATE.ABILITYDRAFT;
  }
  function pickAbilityDraft(idx) {
    if (idx < 0 || idx >= abilityDraftChoices.length) return;
    const choice = abilityDraftChoices[idx];
    let target = -1;
    for (let i = 1; i < 4; i++) {
      if (!player.abilities[i]) { target = i; break; }
    }
    if (target < 0) target = 1;
    player.abilities[target] = { id: choice.def.id, def: choice.def, rarity: choice.rarity };
    if (player.pendingLevelUps > 0) enterLevelUp();
    else enterShop();
  }
  function enterShop() {
    state = STATE.SHOP;
    shopRefreshCost = 5;
    shopItems = [];
    for (let i = 0; i < 4; i++) shopItems.push(generateItem());
    selectedInvIdx = -1;
  }
  function startNextWave() {
    currentWave += 1;
    state = STATE.PLAYING;
    const cfg = waveConfig(currentWave);
    waveTimer = cfg.duration;
    spawnTimer = 0;
    const newBiome = biomeFor(currentWave);
    if (newBiome.id !== currentBiomeId) {
      currentBiomeId = newBiome.id;
      generateFloorDecorations();
      biomeBannerTimer = 2.5;
    }
    if (isBossWave(currentWave)) spawnBoss(cfg);
  }
  function toggleInventory() {
    if (state === STATE.INVENTORY) state = prevState;
    else if (state === STATE.PLAYING) { prevState = state; state = STATE.INVENTORY; }
  }
  function generateFloorDecorations() {
    floorDecorations = [];
    const biome = currentBiome();
    for (let i = 0; i < 30; i++) {
      floorDecorations.push({
        x: Math.random() * W, y: Math.random() * H,
        size: 1 + Math.floor(Math.random() * 2),
        color: biome.decoColors[Math.floor(Math.random() * biome.decoColors.length)],
      });
    }
  }
  function resetWorld() {
    player = new Player(W / 2, H / 2);
    enemies = []; projectiles = []; enemyProjectiles = []; xpGems = []; itemDrops = []; particles = [];
    groundEffects = []; bossRef = null; shake = 0;
    state = STATE.PLAYING;
    currentWave = 1; spawnTimer = 0; intermissionTimer = 0;
    levelUpChoices = []; abilityDraftChoices = [];
    levelUpFlashTimer = 0; lootFlashTimer = 0; lastLootName = '';
    bossBannerTimer = 0; bossDefeatedBannerTimer = 0; lastBossName = '';
    goldFlashTimer = 0; biomeBannerTimer = 2.5;
    shopItems = []; shopRefreshCost = 5; selectedInvIdx = -1; levelUpRerollCost = 1;
    currentBiomeId = currentBiome().id;
    const cfg = waveConfig(currentWave);
    waveTimer = cfg.duration;
    generateFloorDecorations();
  }

  // ============================================================
  // EQUIP / UNEQUIP / SALVAGE / REROLL
  // ============================================================
  function equipFromInventory(idx) {
    const item = player.inventory[idx];
    if (!item) return;
    let targetSlot = item.base.slot;
    if (targetSlot === 'ring') {
      if (!player.equipped.ring1) targetSlot = 'ring1';
      else if (!player.equipped.ring2) targetSlot = 'ring2';
      else targetSlot = 'ring1';
    }
    player.inventory.splice(idx, 1);
    if (player.equipped[targetSlot]) player.inventory.push(player.equipped[targetSlot]);
    player.equipped[targetSlot] = item;
    player.recomputeStats();
    if (selectedInvIdx === idx) selectedInvIdx = -1;
    else if (selectedInvIdx > idx) selectedInvIdx -= 1;
  }
  function unequipSlot(slotKey) {
    const item = player.equipped[slotKey];
    if (!item) return;
    if (player.inventory.length >= player.INVENTORY_CAP) return;
    player.equipped[slotKey] = null;
    player.inventory.push(item);
    player.recomputeStats();
  }
  function buyShopItem(idx) {
    const item = shopItems[idx];
    if (!item) return;
    const price = itemPrice(item);
    if (player.gold < price) return;
    if (player.inventory.length >= player.INVENTORY_CAP) return;
    player.gold -= price;
    player.inventory.push(item);
    shopItems[idx] = null;
    goldFlashTimer = 0.8;
  }
  function doRefreshShop() {
    if (player.gold < shopRefreshCost) return;
    player.gold -= shopRefreshCost;
    shopRefreshCost = Math.ceil(shopRefreshCost * 2.5);
    shopItems = [];
    for (let i = 0; i < 4; i++) shopItems.push(generateItem());
    goldFlashTimer = 0.8;
  }
  function salvageInventoryItem(idx) {
    const item = player.inventory[idx];
    if (!item) return;
    const goldGain = salvageGold(item);
    const mat = RARITY_MAT[item.rarity.id];
    player.gold += goldGain;
    player.mats[mat] = (player.mats[mat] || 0) + 1;
    player.inventory.splice(idx, 1);
    if (selectedInvIdx === idx) selectedInvIdx = -1;
    else if (selectedInvIdx > idx) selectedInvIdx -= 1;
    goldFlashTimer = 0.8;
  }
  function rerollInventoryItem(idx) {
    const item = player.inventory[idx];
    if (!item) return;
    const spec = rerollSpec(item);
    if (!spec) return;
    if (player.gold < spec.gold) return;
    if ((player.mats[spec.mat] || 0) < spec.count) return;
    player.gold -= spec.gold;
    player.mats[spec.mat] -= spec.count;
    item.affixes = rollAffixes(rngInt(item.rarity.affixMin, item.rarity.affixMax));
    goldFlashTimer = 0.8;
  }
  function doRerollLevelUp() {
    if (player.gold < levelUpRerollCost) return;
    player.gold -= levelUpRerollCost;
    levelUpRerollCost = Math.ceil(levelUpRerollCost * 3);
    levelUpChoices = rollLevelUpChoices();
    goldFlashTimer = 0.8;
  }

  // ============================================================
  // BUTTON HELPERS
  // ============================================================
  function isHovering(x, y, w, h) {
    return mouseX >= x && mouseX < x + w && mouseY >= y && mouseY < y + h;
  }
  function drawButton(x, y, w, h, label, enabled, accent) {
    const hovered = isHovering(x, y, w, h) && enabled;
    ctx.fillStyle = !enabled ? '#1a1a22' : (hovered ? '#3a3a45' : '#2a2a35');
    ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = !enabled ? '#333' : (accent || '#888');
    ctx.lineWidth = hovered ? 2 : 1;
    ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);
    ctx.lineWidth = 1;
    ctx.fillStyle = !enabled ? '#555' : (accent || '#eee');
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(label, x + w / 2, y + h / 2 + 1);
    ctx.textBaseline = 'alphabetic'; ctx.textAlign = 'left';
    return hovered;
  }

  // ============================================================
  // RENDER — Background
  // ============================================================
  function drawBackground() {
    const biome = currentBiome();
    ctx.fillStyle = biome.bg; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = biome.grid;
    for (let gx = 0; gx < W; gx += 16) {
      for (let gy = 0; gy < H; gy += 16) {
        if (((gx / 16) + (gy / 16)) % 2 === 0) ctx.fillRect(gx, gy, 16, 16);
      }
    }
    for (const d of floorDecorations) {
      ctx.fillStyle = d.color;
      ctx.fillRect(Math.floor(d.x), Math.floor(d.y), d.size, d.size);
    }
  }
  function drawBossBar() {
    if (!bossRef || !bossRef.alive) return;
    const bw = 360, bh = 8;
    const bx = (W - bw) / 2, by = 8;
    ctx.fillStyle = '#000'; ctx.fillRect(bx - 2, by - 2, bw + 4, bh + 4);
    ctx.fillStyle = '#3a1818'; ctx.fillRect(bx, by, bw, bh);
    const ratio = Math.max(0, bossRef.hp / bossRef.maxHp);
    ctx.fillStyle = ratio > 0.5 ? '#cc3030' : ratio > 0.25 ? '#dd6020' : '#ff2020';
    ctx.fillRect(bx, by, bw * ratio, bh);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 9px monospace'; ctx.textAlign = 'center';
    ctx.fillText(`${bossRef.name.toUpperCase()}  -  ${Math.ceil(bossRef.hp)} / ${bossRef.maxHp}`, W / 2, by + 7);
    ctx.textAlign = 'left';
  }
  function drawHud() {
    const hpx = 8, hpy = 8;
    ctx.fillStyle = '#000'; ctx.fillRect(hpx - 1, hpy - 1, 122, 8);
    ctx.fillStyle = '#3a2020'; ctx.fillRect(hpx, hpy, 120, 6);
    const hpRatio = Math.max(0, player.hp / player.maxHp);
    ctx.fillStyle = hpRatio > 0.5 ? '#ff5050' : hpRatio > 0.25 ? '#ff8030' : '#ff3030';
    ctx.fillRect(hpx, hpy, 120 * hpRatio, 6);
    ctx.fillStyle = '#fff'; ctx.font = '8px monospace'; ctx.textAlign = 'left';
    ctx.fillText(`${Math.ceil(player.hp)} / ${player.maxHp}`, hpx + 2, hpy + 5);

    const xpx = 8, xpy = 19;
    ctx.fillStyle = '#000'; ctx.fillRect(xpx - 1, xpy - 1, 122, 5);
    ctx.fillStyle = '#1a2030'; ctx.fillRect(xpx, xpy, 120, 3);
    const xpRatio = player.xp / player.xpToNext;
    ctx.fillStyle = '#9b59ff'; ctx.fillRect(xpx, xpy, 120 * xpRatio, 3);

    const rx = 8, ry = 28;
    ctx.fillStyle = '#000'; ctx.fillRect(rx - 1, ry - 1, 122, 5);
    ctx.fillStyle = '#2a2515'; ctx.fillRect(rx, ry, 120, 3);
    const resRatio = player.resource / player.maxResource;
    ctx.fillStyle = player.class.resourceColor;
    ctx.fillRect(rx, ry, 120 * resRatio, 3);

    ctx.fillStyle = '#c89aff'; ctx.font = '8px monospace';
    ctx.fillText(`LV ${player.level}`, hpx + 1, 42);
    ctx.fillStyle = '#888';
    ctx.fillText(`${player.class.name.toUpperCase()}`, hpx + 36, 42);
    ctx.fillStyle = player.class.resourceColor;
    ctx.fillText(`${player.class.resourceName} ${Math.floor(player.resource)}/${Math.floor(player.maxResource)}`, hpx + 80, 42);

    ctx.textAlign = 'center';
    if (state === STATE.PLAYING) {
      if (!bossRef) {
        ctx.fillStyle = '#fff'; ctx.font = '10px monospace';
        ctx.fillText(`WAVE ${currentWave} / 20`, W / 2, 12);
        ctx.fillStyle = '#999'; ctx.font = '8px monospace';
        ctx.fillText(`${Math.ceil(Math.max(0, waveTimer))}s`, W / 2, 22);
      }
    }
    ctx.fillStyle = currentBiome().decoColors[3] || '#557755';
    ctx.font = '7px monospace';
    ctx.fillText(currentBiome().name.toUpperCase(), W / 2, H - 86);

    ctx.fillStyle = '#fff'; ctx.textAlign = 'right'; ctx.font = '8px monospace';
    ctx.fillText(`KILLS  ${player.kills}`, W - 8, 12);
    ctx.fillStyle = '#aaa';
    ctx.fillText(`ENEMIES  ${enemies.filter(e => e.alive).length}`, W - 8, 22);
    ctx.fillText(`BAG  ${player.inventory.length}/${player.INVENTORY_CAP}`, W - 8, 32);
    // Gold
    const gFlash = goldFlashTimer > 0 ? 'bold 9px monospace' : 'bold 8px monospace';
    ctx.fillStyle = '#ffd23f'; ctx.font = gFlash;
    ctx.fillText(`GOLD  ${player.gold}`, W - 8, 44);

    if (levelUpFlashTimer > 0) {
      const a = Math.min(1, levelUpFlashTimer / 1.5);
      ctx.fillStyle = `rgba(255,208,64,${a})`;
      ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center';
      ctx.fillText(`+ LEVEL UP  (${player.pendingLevelUps} queued)`, W / 2, 54);
    }
    if (lootFlashTimer > 0 && lastLootName) {
      const a = Math.min(1, lootFlashTimer / 2.0);
      ctx.fillStyle = `rgba(255,255,255,${a * 0.9})`;
      ctx.font = '9px monospace'; ctx.textAlign = 'center';
      ctx.fillText(`+ ${lastLootName}`, W / 2, H - 50);
    }
    if (bossBannerTimer > 0 && bossRef) {
      const a = Math.min(1, bossBannerTimer / 2.5);
      ctx.fillStyle = `rgba(255,80,80,${a})`;
      ctx.font = 'bold 16px monospace'; ctx.textAlign = 'center';
      ctx.fillText(`${bossRef.name.toUpperCase()} APPROACHES`, W / 2, H / 2 - 20);
    }
    if (bossDefeatedBannerTimer > 0) {
      const a = Math.min(1, bossDefeatedBannerTimer / 2.0);
      ctx.fillStyle = `rgba(255,208,64,${a})`;
      ctx.font = 'bold 16px monospace'; ctx.textAlign = 'center';
      ctx.fillText(`${(lastBossName || 'BOSS').toUpperCase()} SLAIN`, W / 2, H / 2 - 20);
    }
    if (biomeBannerTimer > 0) {
      const a = Math.min(1, biomeBannerTimer / 2.5);
      ctx.fillStyle = `rgba(255,255,255,${a * 0.85})`;
      ctx.font = 'bold 18px monospace'; ctx.textAlign = 'center';
      ctx.fillText(`ENTERING  ${currentBiome().name.toUpperCase()}`, W / 2, H / 2 + 40);
    }
    ctx.textAlign = 'left';
    drawBossBar();
  }
  function drawAbilityBar() {
    const slotSize = 30, gap = 6;
    const totalW = 4 * slotSize + 3 * gap;
    const startX = (W - totalW) / 2;
    const y = H - slotSize - 6;
    for (let i = 0; i < 4; i++) {
      const x = startX + i * (slotSize + gap);
      const ability = player.abilities[i];
      const cd = player.abilityCooldowns[i];
      ctx.fillStyle = ability ? '#22222a' : '#13131a';
      ctx.fillRect(x, y, slotSize, slotSize);
      if (ability) {
        ctx.strokeStyle = ability.rarity.color; ctx.lineWidth = 2;
        ctx.strokeRect(x + 1, y + 1, slotSize - 2, slotSize - 2);
        ctx.lineWidth = 1;
      } else {
        ctx.strokeStyle = '#2a2a30';
        ctx.strokeRect(x + 0.5, y + 0.5, slotSize - 1, slotSize - 1);
      }
      ctx.fillStyle = ability ? '#888' : '#444';
      ctx.font = 'bold 7px monospace'; ctx.textAlign = 'left';
      ctx.fillText(`${i + 1}`, x + 3, y + 8);
      if (ability) {
        const canCast = cd <= 0 && player.resource >= ability.def.cost;
        ctx.fillStyle = canCast ? ability.def.color : '#666';
        ctx.font = 'bold 16px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(ability.def.letter, x + slotSize / 2, y + slotSize / 2 + 1);
        ctx.textBaseline = 'alphabetic';
        ctx.fillStyle = player.resource >= ability.def.cost ? '#ffd23f' : '#664020';
        ctx.font = '6px monospace'; ctx.textAlign = 'right';
        ctx.fillText(`${ability.def.cost}`, x + slotSize - 2, y + slotSize - 2);
        if (cd > 0) {
          const ratio = cd / ability.def.cooldown;
          ctx.fillStyle = 'rgba(0,0,0,0.7)';
          ctx.fillRect(x, y + slotSize * (1 - ratio), slotSize, slotSize * ratio);
          ctx.fillStyle = '#fff'; ctx.font = 'bold 10px monospace';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText(cd.toFixed(1), x + slotSize / 2, y + slotSize / 2);
          ctx.textBaseline = 'alphabetic';
        }
      } else {
        ctx.fillStyle = '#333'; ctx.font = '6px monospace';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('LOCKED', x + slotSize / 2, y + slotSize / 2);
        ctx.textBaseline = 'alphabetic';
      }
    }
    ctx.textAlign = 'left';
  }

  }

  function drawDeathScreen() {
